<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Активные Стопы — Суперсилы</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', sans-serif;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 48px;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 { font-size: 28px; margin: 0 0 6px; color: #2d3561; }
    .sub { color: #7c7f9b; font-size: 13px; margin-bottom: 20px; }
    .field-label { text-align: left; font-size: 12px; font-weight: bold; color: #2d3561; margin-top: 12px; }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e2e4f0;
      border-radius: 32px;
      outline: none;
      margin-top: 4px;
    }
    button {
      background: #5b4b8c;
      border: none;
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      width: 100%;
      margin-top: 16px;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
    .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .rank { background: #edf2fa; padding: 6px 14px; border-radius: 50px; font-size: 14px; font-weight: bold; }
    .key-icons { display: flex; gap: 16px; background: #f5f6fe; padding: 6px 16px; border-radius: 50px; align-items: center; }
    .key-icon { display: flex; align-items: center; gap: 6px; font-size: 20px; font-weight: bold; }
    .key-icon img { width: 64px; height: 64px; display: inline-block; object-fit: contain; }
    .greeting { font-size: 22px; font-weight: 800; margin: 12px 0 4px; }
    .progress { background: #f1f3fc; padding: 10px; border-radius: 40px; font-size: 14px; font-weight: bold; margin: 12px 0; }
    .key-slots { display: flex; justify-content: center; gap: 12px; margin: 16px 0; }
    .slot {
      width: 60px; height: 60px; background: #f8f9ff; border: 2px dashed #bcbfda;
      border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    .slot.filled { background: #fff1bf; border: 2px solid #f5b042; }
    .shop { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .shop button { background: #eef2ff; color: #2b2f5c; font-size: 15px; padding: 12px; border: 1px solid #cdd6f0; }
    .cooldown { background: #ffefcc; border-radius: 28px; padding: 12px; margin: 12px 0; font-size: 14px; font-weight: bold; display: none; }
    .collection-btn { margin-top: 18px; background: none; color: #5b4b8c; font-size: 15px; text-decoration: underline; box-shadow: none; }
    .gallery-tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 20px; border-bottom: 2px solid #e2e4f0; }
    .tab-btn { background: none; border: none; padding: 8px 16px; font-size: 15px; font-weight: bold; color: #888; cursor: pointer; width: auto; }
    .tab-btn.active { color: #5b4b8c; border-bottom: 3px solid #5b4b8c; }
    .gallery-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin: 20px 0; }
    .gallery-card { background: #f5f5ff; border-radius: 28px; padding: 12px; text-align: center; }
    .gallery-card img { width: 80px; height: 80px; object-fit: contain; }
    .back-btn { background: #eef2ff; color: #2b2f5c; margin-top: 8px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
  (function(){
    // ----- ПЕРСОНАЖИ -----
    const BASE = [
      { power:"Скорость", img:"gepard.png" }, { power:"Лёгкость", img:"kolibri.png" },
      { power:"Сила", img:"muravey.png" }, { power:"Баланс", img:"flamingo.png" },
      { power:"Восстановление", img:"lenivec.png" }, { power:"Координация", img:"obeziana.png" },
      { power:"Выносливость", img:"verblyud.png" }, { power:"Гибкость", img:"koshka.png" }
    ];
    const RARE = [
      { power:"Прыгучесть", img:"kenguru.png" }, { power:"Цепкость", img:"osminog.png" },
      { power:"Устойчивость", img:"krab.png" }, { power:"Чуткость", img:"ulitka.png" }
    ];
    const EPIC = [
      { power:"Суперлёгкость", img:"pegas.png" }, { power:"Суперсила", img:"drakon.png" }
    ];
    const LEGEND = { power:"Возрождение", img:"feniks.png" };

    let state = {
      childName: '', collectedBase: [], collectedRare: [], collectedEpic: [], legendaryUnlocked: false,
      currentBaseIdx: 0, goldProgress: 0, diamondKeys: 0, rubyKeys: 0,
      lastClaimDate: null, weekCount: 0, weekStart: null
    };
    let docId = '';

    function saveAll() {
      if(!docId) return;
      const save = {
        childName: state.childName,
        collectedBase: state.collectedBase,
        collectedRare: state.collectedRare,
        collectedEpic: state.collectedEpic,
        legendaryUnlocked: state.legendaryUnlocked,
        currentBaseIdx: state.currentBaseIdx,
        goldProgress: state.goldProgress,
        diamondKeys: state.diamondKeys,
        rubyKeys: state.rubyKeys,
        lastClaimDate: state.lastClaimDate,
        weekCount: state.weekCount,
        weekStart: state.weekStart
      };
      localStorage.setItem(`stop_${docId}`, JSON.stringify(save));
      localStorage.setItem(`stop_lastName`, state.childName);
    }

    function loadAll() {
      if(!docId) return false;
      let raw = localStorage.getItem(`stop_${docId}`);
      if(!raw) return false;
      try {
        let data = JSON.parse(raw);
        state.childName = data.childName || '';
        state.collectedBase = data.collectedBase || [];
        state.collectedRare = data.collectedRare || [];
        state.collectedEpic = data.collectedEpic || [];
        state.legendaryUnlocked = !!data.legendaryUnlocked;
        state.currentBaseIdx = data.currentBaseIdx ?? 0;
        state.goldProgress = data.goldProgress ?? 0;
        state.diamondKeys = data.diamondKeys ?? 0;
        state.rubyKeys = data.rubyKeys ?? 0;
        state.lastClaimDate = data.lastClaimDate ? new Date(data.lastClaimDate) : null;
        state.weekCount = data.weekCount ?? 0;
        state.weekStart = data.weekStart ?? null;
        if(state.collectedBase.length===0 && BASE.length) state.currentBaseIdx = Math.floor(Math.random()*BASE.length);
        return true;
      } catch(e) { return false; }
    }

    function getWeekStart(date) { let d=new Date(date); let day=d.getDay(); let diff=d.getDate()-day+(day===0?-6:1); d.setDate(diff); d.setHours(0,0,0,0); return d.getTime(); }
    function getRank() {
      let b=state.collectedBase.length, r=state.collectedRare.length, e=state.collectedEpic.length;
      if(b>=8 && r>=4 && e>=2) return "👑 МАСТЕР";
      if(b>=6) return "⭐ ПРОФИ";
      if(b>=3) return "📖 УЧЕНИК";
      return "🌱 НОВИЧОК";
    }
    function decl(n, one, two, five) { let m=n%10, m100=n%100; if(m100>=11&&m100<=19) return five; if(m===1) return one; if(m>=2&&m<=4) return two; return five; }
    function playSound() { try{ let ctx=new (window.AudioContext||window.webkitAudioContext)(); let o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.frequency.value=880; g.gain.value=0.2; g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+0.5); o.start(); o.stop(ctx.currentTime+0.5); } catch(e){} }

    function renderGame() {
      let currentChar = BASE[state.currentBaseIdx];
      let needProgress = state.goldProgress >= 4;
      let allBase = state.collectedBase.length===BASE.length;
      let allRare = state.collectedRare.length===RARE.length;
      let allEpic = state.collectedEpic.length===EPIC.length;
      if(!state.legendaryUnlocked && allBase && allRare && allEpic){
        state.legendaryUnlocked=true; saveAll();
        alert("🏆 ПУТЬ ПРОЙДЕН! 🏆\nТы — ЛЕГЕНДА!");
      }
      let html = `<div class="card"><div class="top-row"><div class="rank">${getRank()}</div><div class="key-icons"><div class="key-icon"><img src="blue_key.png" alt="синий ключ"> ${state.diamondKeys}</div><div class="key-icon"><img src="red_key.png" alt="красный ключ"> ${state.rubyKeys}</div></div></div>
      <div class="greeting">Привет, ${state.childName || 'игрок'}!</div>
      <div class="progress">${needProgress ? '✨ Суперсила открыта!' : `🔑 До суперсилы: ${4-state.goldProgress} ${decl(4-state.goldProgress,'зарядка','зарядки','зарядок')}`}</div>
      <div class="key-slots">${[0,1,2,3].map(i=>`<div class="slot ${i<state.goldProgress?'filled':''}">${i<state.goldProgress?'🔑':''}</div>`).join('')}</div>
      ${needProgress ? `<div><img src="${currentChar.img}" style="width:140px;height:140px;object-fit:contain"></div>` : ''}
      <button id="workoutBtn">Я сделал(а) зарядку!</button>
      ${(needProgress && (state.collectedBase.length<BASE.length || state.diamondKeys>=4 || state.rubyKeys>=4)) ? `
        <div class="shop">
          ${state.diamondKeys>=4 && state.collectedRare.length<RARE.length ? `<button id="unlockRareBtn">✨ Открыть РЕДКОГО (4 синих ключа)</button>` : ''}
          ${state.rubyKeys>=4 && state.collectedEpic.length<EPIC.length ? `<button id="unlockEpicBtn">🔥 Открыть ЭПИЧЕСКОГО (4 красных ключа)</button>` : ''}
        </div>` : ''}
      <div class="cooldown" id="cooldownMsg">Отличная работа! Приходи завтра 🌙<br><span id="cooldownTimer"></span></div>
      <button class="collection-btn" id="collectionBtn">🏅 Мои суперсилы →</button>
      <button id="changeNameBtn" style="background:none;color:#aaa;font-size:12px;margin-top:10px">Это не я → сменить имя</button></div>`;
      document.getElementById('app').innerHTML = html;
      document.getElementById('workoutBtn').onclick = claimWorkout;
      if(document.getElementById('unlockRareBtn')) document.getElementById('unlockRareBtn').onclick = () => { if(state.diamondKeys>=4 && state.collectedRare.length<RARE.length){ state.diamondKeys-=4; let left=RARE.map((_,i)=>i).filter(i=>!state.collectedRare.includes(i)); state.collectedRare.push(left[Math.floor(Math.random()*left.length)]); saveAll(); renderGame(); } };
      if(document.getElementById('unlockEpicBtn')) document.getElementById('unlockEpicBtn').onclick = () => { if(state.rubyKeys>=4 && state.collectedEpic.length<EPIC.length){ state.rubyKeys-=4; let left=EPIC.map((_,i)=>i).filter(i=>!state.collectedEpic.includes(i)); state.collectedEpic.push(left[Math.floor(Math.random()*left.length)]); saveAll(); renderGame(); } };
      document.getElementById('collectionBtn').onclick = () => showCollection();
      document.getElementById('changeNameBtn').onclick = () => { localStorage.removeItem(`stop_${docId}`); localStorage.removeItem(`stop_lastName`); renderNameScreen(); };
      if(state.lastClaimDate && (new Date()-state.lastClaimDate)<24*3600*1000) showCooldown();
    }

    function claimWorkout() {
      let now = new Date();
      let weekStart = getWeekStart(now);
      if(state.lastClaimDate && (now-state.lastClaimDate)<24*3600*1000){ showCooldown(); return; }
      playSound();
      if(!state.weekStart || state.weekStart!==weekStart){ state.weekStart=weekStart; state.weekCount=1; }
      else state.weekCount++;
      state.lastClaimDate=now;
      if(state.weekCount<=3){
        if(state.goldProgress<4){
          state.goldProgress++;
          if(state.goldProgress===4){
            if(!state.collectedBase.includes(state.currentBaseIdx)){
              state.collectedBase.push(state.currentBaseIdx);
              let left=BASE.map((_,i)=>i).filter(i=>!state.collectedBase.includes(i));
              if(left.length) state.currentBaseIdx=left[Math.floor(Math.random()*left.length)];
              else state.currentBaseIdx=0;
              state.goldProgress=0;
            }
          }
        }
      } else if(state.weekCount===5 || state.weekCount===6) state.diamondKeys++;
      else if(state.weekCount===7) state.rubyKeys++;
      saveAll(); renderGame();
    }

    function showCooldown(){
      let msg=document.getElementById('cooldownMsg'), timer=document.getElementById('cooldownTimer');
      if(msg && state.lastClaimDate){
        msg.style.display='block';
        let next=new Date(state.lastClaimDate.getTime()+24*3600*1000);
        let upd=()=>{ let diff=next-new Date(); if(diff<=0){ msg.style.display='none'; renderGame(); return; } timer.innerText=Math.floor(diff/3600000)+' ч '+Math.floor((diff%3600000)/60000)+' мин'; };
        upd(); setInterval(upd,60000);
      }
    }

    function showCollection(){
      let allBase=BASE.map((c,i)=>({...c,collected:state.collectedBase.includes(i)}));
      let allRare=RARE.map((c,i)=>({...c,collected:state.collectedRare.includes(i)}));
      let allEpic=EPIC.map((c,i)=>({...c,collected:state.collectedEpic.includes(i)}));
      let legend={...LEGEND,collected:state.legendaryUnlocked};
      let total=allBase.length+allRare.length+allEpic.length+1;
      let collected=[...allBase,...allRare,...allEpic,legend].filter(c=>c.collected).length;
      let html=`<div class="card"><h1>🏅 Мои суперсилы</h1><div class="sub">Собрано ${collected} из ${total}</div>
      <div class="gallery-tabs"><button class="tab-btn active" data-tab="base">Базовые</button><button class="tab-btn" data-tab="rareEpic">Редкие + Эпические</button><button class="tab-btn" data-tab="legend">Легенда</button></div>
      <div id="galleryContent"></div><button class="back-btn" id="backBtn">← Назад</button></div>`;
      document.getElementById('app').innerHTML = html;
      let renderTab = (tab)=>{
        let items=[];
        if(tab==='base') items=allBase;
        else if(tab==='rareEpic') items=[...allRare,...allEpic];
        else items=[legend];
        let grid=document.createElement('div'); grid.className='gallery-grid';
        items.forEach(it=>{
          let div=document.createElement('div'); div.className='gallery-card';
          if(it.collected){ let img=document.createElement('img'); img.src=it.img; div.appendChild(img); }
          else{ let q=document.createElement('div'); q.style.fontSize='48px'; q.textContent='❓'; div.appendChild(q); }
          grid.appendChild(div);
        });
        document.getElementById('galleryContent').innerHTML=''; document.getElementById('galleryContent').appendChild(grid);
      };
      renderTab('base');
      document.querySelectorAll('.tab-btn').forEach(btn=>btn.addEventListener('click',()=>{
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active'); renderTab(btn.dataset.tab);
      }));
      document.getElementById('backBtn').onclick=()=>renderGame();
    }

    function renderNameScreen(){
      let savedName = localStorage.getItem('stop_lastName') || '';
      let html = `<div class="card"><h1>👣 Активные Стопы</h1><div class="sub">Собери все суперсилы!</div>
      <div class="field-label">Твоё имя</div><input id="playerName" placeholder="Саша" value="${savedName.replace(/"/g, '&quot;')}">
      <div class="field-label">Придумай ник</div><input id="playerNick" placeholder="Ракета">
      <button id="startGameBtn">Вперёд! 🚀</button></div>`;
      document.getElementById('app').innerHTML = html;
      document.getElementById('startGameBtn').onclick = () => {
        let name = document.getElementById('playerName').value.trim();
        let nick = document.getElementById('playerNick').value.trim();
        if(!name || !nick) return;
        state.childName = name;
        docId = `${name}_${nick}`.toLowerCase().replace(/[^a-z0-9_]/g,'_');
        if(!loadAll()){
          state.collectedBase=[]; state.collectedRare=[]; state.collectedEpic=[]; state.legendaryUnlocked=false;
          state.currentBaseIdx=Math.floor(Math.random()*BASE.length);
          state.goldProgress=0; state.diamondKeys=0; state.rubyKeys=0;
          state.lastClaimDate=null; state.weekCount=0; state.weekStart=null;
        }
        saveAll();
        renderGame();
      };
    }
    renderNameScreen();
  })();
</script>
</body>
</html>
