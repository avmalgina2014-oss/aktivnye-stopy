<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы — Собери суперсилы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:32px;padding:24px 20px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
h1{font-family:'Fredoka One',cursive;font-size:26px;color:#2d2d2d;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:20px;font-weight:700}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;padding:13px 24px;font-family:'Fredoka One',cursive;font-size:19px;cursor:pointer;width:100%;transition:transform .15s;box-shadow:0 4px 16px rgba(102,126,234,.4);margin-top:8px}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.96)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-green{background:linear-gradient(135deg,#2E7D32,#4CAF50)}
.btn-star {background:linear-gradient(135deg,#F9A825,#FFB300)}
.btn-shiny{background:linear-gradient(135deg,#FF6F00,#FF8F00)}
.field-label{font-size:12px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;text-align:left}
.field-input{width:100%;border:3px solid #e0e4ef;border-radius:14px;padding:11px 14px;font-size:17px;font-weight:700;text-align:center;margin-bottom:14px}
.top-bar{display:flex;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.rank-badge{padding:5px 14px;border-radius:20px;font-family:'Fredoka One',cursive;font-size:14px}
.rank-novice{background:#e8f5e9;color:#2E7D32}
.rank-student{background:#FFF8E1;color:#F57F17}
.rank-pro{background:#E3F2FD;color:#1565C0}
.rank-master{background:#1a1a2e;color:#fff}
.keys-wallet{display:flex;gap:12px;background:#f5f5f5;border-radius:40px;padding:6px 16px}
.wallet-slot{font-family:'Fredoka One',cursive}
.greeting{font-size:18px;font-weight:900;margin-bottom:4px}
.progress-text{font-size:13px;color:#888;margin-bottom:12px}
.keys-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.key-slot{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px dashed #e0e4ef}
.key-slot.filled{border:3px solid gold;background:#fff9c4}
.cooldown-msg{font-size:13px;color:#667eea;margin-top:8px}
.cooldown-time{font-size:18px}
.collection-bar{margin-top:14px;cursor:pointer}
#galleryScreen{display:none}
.celebration{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center}
.celebration.show{display:flex}
.celeb-box{background:#fff;border-radius:32px;padding:20px;text-align:center}
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <input class="field-input" id="nameInput" placeholder="Имя">
  <input class="field-input" id="nickInput" placeholder="Ник">
  <button class="btn" id="startBtn" onclick="startGame()">Вперёд</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱</div>
    <div class="keys-wallet">
      ⭐ <span id="starCount">0</span>
      🌟 <span id="shinyCount">0</span>
    </div>
  </div>

  <div class="greeting" id="greeting"></div>
  <div id="dayBadge"></div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid"></div>

  <button class="btn btn-green" id="claimBtn" onclick="doWorkout()">Я сделал зарядку</button>
  <div class="cooldown-msg" id="cooldown"></div>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-box">
    <div id="celebTitle"></div>
    <button onclick="closeCeleb()">OK</button>
  </div>
</div>

<script>

// ===== НОВЫЙ ДЕНЬ (ГЛАВНЫЙ ФИКС) =====
function isNewDay(last){
 if(!last) return true;
 let a=new Date(last),b=new Date();
 return a.getDate()!=b.getDate()||a.getMonth()!=b.getMonth()||a.getFullYear()!=b.getFullYear();
}

// ===== ТИП ДНЯ =====
function getDayType(d){
 let x=((d-1)%7)+1;
 if(x<=4)return'key';
 if(x<=6)return'star';
 return'shiny';
}

let state={},playerKey='';

function save(){localStorage.setItem('as_'+playerKey,JSON.stringify(state))}
function load(){let d=localStorage.getItem('as_'+playerKey);if(d){state=JSON.parse(d);return true;}return false}

function render(){
 document.getElementById('greeting').innerText='Привет '+state.name;
 document.getElementById('dayBadge').innerText='День '+(state.day+1)+'/56';
 document.getElementById('starCount').innerText=state.stars||0;
 document.getElementById('shinyCount').innerText=state.shiny||0;

 let t=getDayType(state.day+1);

 if(t=='key'){
  let g='';
  for(let i=0;i<4;i++)g+=i<state.keyStep?'🔑':'⬜';
  document.getElementById('keysGrid').innerHTML=g;
 }else{
  document.getElementById('keysGrid').innerHTML='';
 }

 cooldown();
}

let timer=null;
function cooldown(){
 let btn=document.getElementById('claimBtn');
 let cd=document.getElementById('cooldown');

 if(timer)clearInterval(timer);

 if(isNewDay(state.last)){
  btn.style.display='block';
  cd.innerHTML='';
  return;
 }

 btn.style.display='none';

 timer=setInterval(()=>{
  let last=new Date(state.last);
  let next=new Date(last); next.setHours(24,0,0,0);
  let diff=next-new Date();

  if(diff<=0){clearInterval(timer);render();return;}

  let h=Math.floor(diff/3600000);
  let m=Math.floor(diff%3600000/60000);
  cd.innerHTML=`Жди ${h}ч ${m}м`;
 },1000);
}

function doWorkout(){

 if(!isNewDay(state.last)){cooldown();return;}

 state.day++;
 state.last=new Date().toISOString();

 let t=getDayType(state.day);

 if(t=='key'){
  state.keyStep=(state.keyStep||0)+1;
  if(state.keyStep==4){state.keyStep=0;alert('🎉 суперсила!');}
 }
 else if(t=='star'){state.stars=(state.stars||0)+1;alert('⭐');}
 else{state.shiny=(state.shiny||0)+1;alert('🌟');}

 save();
 render();
}

function startGame(){
 let n=nameInput.value,k=nickInput.value;
 playerKey=(n+k);
 if(!load())state={name:n,day:0,keyStep:0,stars:0,shiny:0};
 state.name=n;

 nameScreen.style.display='none';
 gameScreen.style.display='block';

 render();
}

function closeCeleb(){celebration.classList.remove('show')}

</script>
</body>
</html>
