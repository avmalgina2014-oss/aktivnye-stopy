<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Активные Стопы — Суперсилы</title>
  <style>
    * { box-sizing: border-box; user-select: none; }
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: system-ui, 'Segoe UI', 'Nunito', sans-serif;
      margin: 0;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 48px;
      padding: 24px 20px 32px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      text-align: center;
    }
    h1 {
      font-size: 28px;
      margin: 0 0 6px;
      background: linear-gradient(135deg, #1e2b6e, #4a2b7a);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .sub { color: #7c7f9b; font-weight: 600; font-size: 13px; margin-bottom: 20px; }
    .field-label { text-align: left; font-size: 12px; font-weight: bold; color: #2d3561; margin-top: 12px; }
    input {
      width: 100%;
      padding: 12px 16px;
      font-size: 16px;
      border: 2px solid #e2e4f0;
      border-radius: 32px;
      outline: none;
      margin-top: 4px;
    }
    button {
      background: #5b4b8c;
      border: none;
      border-radius: 60px;
      padding: 14px 20px;
      font-size: 18px;
      font-weight: bold;
      color: white;
      width: 100%;
      margin-top: 16px;
      cursor: pointer;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.5; transform: none; cursor: default; }
    .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .rank { background: #edf2fa; padding: 6px 14px; border-radius: 50px; font-size: 14px; font-weight: bold; color: #1f2b5c; }
    .key-icons { display: flex; gap: 12px; background: #f5f6fe; padding: 6px 14px; border-radius: 50px; align-items: center; }
    .key-icon { display: flex; align-items: center; gap: 4px; font-size: 20px; font-weight: bold; }
    .key-icon img { width: 28px; height: 28px; display: inline-block; }
    .greeting { font-size: 22px; font-weight: 800; margin: 12px 0 4px; }
    .progress { background: #f1f3fc; padding: 10px; border-radius: 40px; font-size: 14px; font-weight: bold; margin: 12px 0; }
    .key-slots { display: flex; justify-content: center; gap: 12px; margin: 16px 0; }
    .slot {
      width: 60px; height: 60px; background: #f8f9ff; border: 2px dashed #bcbfda;
      border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 32px;
    }
    .slot.filled { background: #fff1bf; border: 2px solid #f5b042; }
    .shop { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .shop button { background: #eef2ff; color: #2b2f5c; font-size: 15px; padding: 12px; border: 1px solid #cdd6f0; }
    .cooldown { background: #ffefcc; border-radius: 28px; padding: 12px; margin: 12px 0; font-size: 14px; font-weight: bold; display: none; }
    .collection-btn { margin-top: 18px; background: none; color: #5b4b8c; font-size: 15px; text-decoration: underline; box-shadow: none; }
    .gallery-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; margin: 20px 0; }
    .gallery-card { background: #f5f5ff; border-radius: 28px; padding: 12px; text-align: center; }
    .gallery-card img { width: 80px; height: 80px; object-fit: contain; }
    .back-btn { background: #eef2ff; color: #2b2f5c; margin-top: 8px; }
    .key-img-small { width: 24px; height: 24px; vertical-align: middle; margin-right: 4px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
  (function(){
    // SVG ключи (синий и красный)
    const blueKeySvg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234285F4'%3E%3Cpath d='M12 2C8 2 4 5 4 9c0 2.5 1 5 3 6.5V20c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2v-4.5c2-1.5 3-4 3-6.5 0-4-4-7-8-7z' /%3E%3C/svg%3E";
    const redKeySvg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23F44336'%3E%3Cpath d='M12 2C8 2 4 5 4 9c0 2.5 1 5 3 6.5V20c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2v-4.5c2-1.5 3-4 3-6.5 0-4-4-7-8-7z' /%3E%3C/svg%3E";
    const goldKeySvg = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23F5A623'%3E%3Cpath d='M12 2C8 2 4 5 4 9c0 2.5 1 5 3 6.5V20c0 1.1.9 2 2 2h6c1.1 0 2-.9 2-2v-4.5c2-1.5 3-4 3-6.5 0-4-4-7-8-7z' /%3E%3C/svg%3E";

    const BASE = [
      { power:"Скорость", emoji:"🐆", img:"gepard.png", color:"#E07000" },
      { power:"Лёгкость", emoji:"🐦", img:"kolibri.png", color:"#00ACC1" },
      { power:"Сила", emoji:"🐜", img:"muravey.png", color:"#CC0000" },
      { power:"Баланс", emoji:"🦩", img:"flamingo.png", color:"#E91E8C" },
      { power:"Восстановление", emoji:"🦥", img:"lenivec.png", color:"#2E7D32" },
      { power:"Координация", emoji:"🐒", img:"obeziana.png", color:"#8D6E63" },
      { power:"Выносливость", emoji:"🐫", img:"verblyud.png", color:"#D4A373" },
      { power:"Гибкость", emoji:"🐱", img:"koshka.png", color:"#FF9800" }
    ];
    const RARE = [
      { power:"Прыгучесть", emoji:"🦘", img:"kenguru.png", color:"#FF5722" },
      { power:"Цепкость", emoji:"🐙", img:"osminog.png", color:"#7B1FA2" },
      { power:"Устойчивость", emoji:"🦀", img:"krab.png", color:"#D32F2F" },
      { power:"Чуткость", emoji:"🐌", img:"ulitka.png", color:"#4CAF50" }
    ];
    const EPIC = [
      { power:"Суперлёгкость", emoji:"🦄", img:"pegas.png", color:"#E040FB" },
      { power:"Суперсила", emoji:"🐉", img:"drakon.png", color:"#F44336" }
    ];
    const LEGEND = { power:"Возрождение", emoji:"🐦‍🔥", img:"feniks.png", color:"#FF6F00" };

    let state = {
      childName: '', nick: '',
      collectedBase: [],
      collectedRare: [],
      collectedEpic: [],
      legendaryUnlocked: false,
      currentBaseIdx: 0,
      goldProgress: 0,
      diamondKeys: 0,
      rubyKeys: 0,
      lastClaimDate: null,
      weekCount: 0,
      weekStart: null
    };
    let docId = '';

    function saveToLocal() {
      if (!docId) return;
      const save = {
        collectedBase: state.collectedBase,
        collectedRare: state.collectedRare,
        collectedEpic: state.collectedEpic,
        legendaryUnlocked: state.legendaryUnlocked,
        currentBaseIdx: state.currentBaseIdx,
        goldProgress: state.goldProgress,
        diamondKeys: state.diamondKeys,
        rubyKeys: state.rubyKeys,
        lastClaimDate: state.lastClaimDate,
        weekCount: state.weekCount,
        weekStart: state.weekStart
      };
      localStorage.setItem(`active_stop_${docId}`, JSON.stringify(save));
    }

    function loadFromLocal() {
      if (!docId) return false;
      const raw = localStorage.getItem(`active_stop_${docId}`);
      if (!raw) return false;
      try {
        const data = JSON.parse(raw);
        state.collectedBase = data.collectedBase || [];
        state.collectedRare = data.collectedRare || [];
        state.collectedEpic = data.collectedEpic || [];
        state.legendaryUnlocked = !!data.legendaryUnlocked;
        state.currentBaseIdx = data.currentBaseIdx ?? 0;
        state.goldProgress = data.goldProgress ?? 0;
        state.diamondKeys = data.diamondKeys ?? 0;
        state.rubyKeys = data.rubyKeys ?? 0;
        state.lastClaimDate = data.lastClaimDate ? new Date(data.lastClaimDate) : null;
        state.weekCount = data.weekCount ?? 0;
        state.weekStart = data.weekStart ?? null;
        if(state.collectedBase.length === 0 && BASE.length) state.currentBaseIdx = Math.floor(Math.random() * BASE.length);
        return true;
      } catch(e) { return false; }
    }

    function getWeekStart(date) {
      const d = new Date(date);
      const day = d.getDay();
      const diff = d.getDate() - day + (day === 0 ? -6 : 1);
      d.setDate(diff);
      d.setHours(0,0,0,0);
      return d.getTime();
    }

    function getRank() {
      const b = state.collectedBase.length;
      const r = state.collectedRare.length;
      const e = state.collectedEpic.length;
      if(b>=8 && r>=4 && e>=2) return "👑 МАСТЕР";
      if(b>=6) return "⭐ ПРОФИ";
      if(b>=3) return "📖 УЧЕНИК";
      return "🌱 НОВИЧОК";
    }

    function decl(n, one, two, five) {
      n = Math.abs(n) % 100;
      if (n>=11 && n<=19) return five;
      const last = n % 10;
      if (last === 1) return one;
      if (last >=2 && last <=4) return two;
      return five;
    }

    function renderGame() {
      const currentChar = BASE[state.currentBaseIdx];
      const needProgress = (state.goldProgress >= 4);
      const allBasesDone = state.collectedBase.length === BASE.length;
      const allRaresDone = state.collectedRare.length === RARE.length;
      const allEpicsDone = state.collectedEpic.length === EPIC.length;
      if(!state.legendaryUnlocked && allBasesDone && allRaresDone && allEpicsDone){
        state.legendaryUnlocked = true;
        saveToLocal();
        alert("🏆 ПУТЬ ПРОЙДЕН! 🏆\nТы — ЛЕГЕНДА!");
      }

      let html = `
        <div class="card">
          <div class="top-row">
            <div class="rank">${getRank()}</div>
            <div class="key-icons">
              <div class="key-icon"><img src="${blueKeySvg}" style="width:24px;height:24px"> ${state.diamondKeys}</div>
              <div class="key-icon"><img src="${redKeySvg}" style="width:24px;height:24px"> ${state.rubyKeys}</div>
            </div>
          </div>
          <div class="greeting">Привет, ${state.childName || 'игрок'}! 👋</div>
          <div class="progress">
            ${ needProgress ? '✨ Суперсила открыта!' : `🔑 До суперсилы: ${4-state.goldProgress} ${decl(4-state.goldProgress, 'зарядка', 'зарядки', 'зарядок')}` }
          </div>
          <div class="key-slots">
            ${ [0,1,2,3].map(i => `<div class="slot ${i < state.goldProgress ? 'filled' : ''}">${i < state.goldProgress ? '<img src="'+goldKeySvg+'" style="width:40px;height:40px">' : ''}</div>`).join('') }
          </div>
          ${ needProgress ? `<div style="margin:12px 0"><img src="${currentChar.img}" style="width:140px; height:140px; object-fit:contain" alt="персонаж"></div>` : '' }
          <button id="workoutBtn">Я сделал(а) зарядку!</button>
          ${ (needProgress && (state.collectedBase.length < BASE.length || state.diamondKeys>=4 || state.rubyKeys>=4)) ? `
            <div class="shop">
              ${ state.diamondKeys>=4 && state.collectedRare.length < RARE.length ? `<button id="unlockRareBtn">✨ Открыть РЕДКОГО (4 синих ключа)</button>` : '' }
              ${ state.rubyKeys>=4 && state.collectedEpic.length < EPIC.length ? `<button id="unlockEpicBtn">🔥 Открыть ЭПИЧЕСКОГО (4 красных ключа)</button>` : '' }
            </div>
          ` : '' }
          <div class="cooldown" id="cooldownMsg">Отличная работа! Приходи завтра 🌙<br><span id="cooldownTimer"></span></div>
          <button class="collection-btn" id="collectionBtn">🏅 Мои суперсилы →</button>
          <button id="changeNameBtn" style="background:none; color:#aaa; font-size:12px; margin-top:10px">Это не я → сменить имя</button>
        </div>
      `;
      document.getElementById('app').innerHTML = html;

      document.getElementById('workoutBtn').onclick = () => claimWorkout();
      if(document.getElementById('unlockRareBtn')) document.getElementById('unlockRareBtn').onclick = () => unlockRare();
      if(document.getElementById('unlockEpicBtn')) document.getElementById('unlockEpicBtn').onclick = () => unlockEpic();
      document.getElementById('collectionBtn').onclick = () => showCollection();
      document.getElementById('changeNameBtn').onclick = () => startOver();
      updateCooldownDisplay();
    }

    function claimWorkout() {
      const now = new Date();
      const currentWeekStart = getWeekStart(now);
      if(state.lastClaimDate && (now - state.lastClaimDate) < 24*3600*1000){
        showCooldown();
        return;
      }
      if(!state.weekStart || state.weekStart !== currentWeekStart){
        state.weekStart = currentWeekStart;
        state.weekCount = 1;
      } else {
        state.weekCount++;
      }
      state.lastClaimDate = now;

      if(state.weekCount <= 3){
        if(state.goldProgress < 4){
          state.goldProgress++;
          if(state.goldProgress === 4){
            if(!state.collectedBase.includes(state.currentBaseIdx)){
              state.collectedBase.push(state.currentBaseIdx);
              const left = BASE.map((_,idx)=>idx).filter(i=>!state.collectedBase.includes(i));
              if(left.length) state.currentBaseIdx = left[Math.floor(Math.random()*left.length)];
              else state.currentBaseIdx = 0;
              state.goldProgress = 0;
            } else {
              state.goldProgress = 4;
            }
          }
        }
      } else if(state.weekCount === 5 || state.weekCount === 6){
        state.diamondKeys++;
      } else if(state.weekCount === 7){
        state.rubyKeys++;
      }
      saveToLocal();
      renderGame();
    }

    function unlockRare(){
      if(state.diamondKeys>=4 && state.collectedRare.length < RARE.length){
        state.diamondKeys -= 4;
        const left = RARE.map((_,idx)=>idx).filter(i=>!state.collectedRare.includes(i));
        const rand = left[Math.floor(Math.random()*left.length)];
        state.collectedRare.push(rand);
        saveToLocal();
        renderGame();
      }
    }

    function unlockEpic(){
      if(state.rubyKeys>=4 && state.collectedEpic.length < EPIC.length){
        state.rubyKeys -= 4;
        const left = EPIC.map((_,idx)=>idx).filter(i=>!state.collectedEpic.includes(i));
        const rand = left[Math.floor(Math.random()*left.length)];
        state.collectedEpic.push(rand);
        saveToLocal();
        renderGame();
      }
    }

    function showCooldown(){
      const msgDiv = document.getElementById('cooldownMsg');
      const timerSpan = document.getElementById('cooldownTimer');
      if(msgDiv && state.lastClaimDate){
        msgDiv.style.display = 'block';
        const next = new Date(state.lastClaimDate.getTime() + 24*3600*1000);
        const updateTimer = ()=>{
          const diff = next - new Date();
          if(diff<=0){
            msgDiv.style.display = 'none';
            renderGame();
            return;
          }
          const h = Math.floor(diff/3600000);
          const m = Math.floor((diff%3600000)/60000);
          timerSpan.innerText = `${h} ч ${m} мин`;
        };
        updateTimer();
        const interval = setInterval(()=>{
          if(!msgDiv || msgDiv.style.display !== 'block') { clearInterval(interval); return; }
          updateTimer();
        }, 60000);
      }
    }

    function updateCooldownDisplay(){
      if(state.lastClaimDate){
        const now = new Date();
        if(now - state.lastClaimDate < 24*3600*1000) showCooldown();
      }
    }

    function showCollection(){
      const allBase = BASE.map((c,i)=> ({ ...c, collected: state.collectedBase.includes(i) }));
      const allRare = RARE.map((c,i)=> ({ ...c, collected: state.collectedRare.includes(i) }));
      const allEpic = EPIC.map((c,i)=> ({ ...c, collected: state.collectedEpic.includes(i) }));
      const legendaryObj = { ...LEGEND, collected: state.legendaryUnlocked };
      const total = [...allBase, ...allRare, ...allEpic, legendaryObj];
      const collectedCount = total.filter(t=>t.collected).length;
      let html = `<div class="card">
        <h1>🏅 Мои суперсилы</h1>
        <div class="sub">Собрано ${collectedCount} из ${total.length}</div>
        <div class="gallery-grid">
          ${total.map(t => `
            <div class="gallery-card" style="border:2px solid ${t.collected ? t.color : '#ddd'}; opacity:${t.collected ? 1 : 0.5}">
              ${t.collected ? `<img src="${t.img}" alt="${t.power}">` : `<div style="font-size:48px;">❓</div>`}
              <div><strong>${t.power}</strong></div>
            </div>
          `).join('')}
        </div>
        <button class="back-btn" id="backBtn">← Назад</button>
      </div>`;
      document.getElementById('app').innerHTML = html;
      document.getElementById('backBtn').onclick = () => renderGame();
    }

    function startOver(){
      localStorage.removeItem(`active_stop_${docId}`);
      renderNameScreen();
    }

    function renderNameScreen(){
      let html = `<div class="card">
        <h1>👣 Активные Стопы</h1>
        <div class="sub">Собери все суперсилы!</div>
        <div class="field-label">Твоё имя</div>
        <input id="playerName" placeholder="Например: Саша">
        <div class="field-label">Придумай ник</div>
        <input id="playerNick" placeholder="Например: Ракета">
        <button id="startGameBtn">Вперёд! 🚀</button>
      </div>`;
      document.getElementById('app').innerHTML = html;
      document.getElementById('startGameBtn').onclick = () => {
        const name = document.getElementById('playerName').value.trim();
        const nick = document.getElementById('playerNick').value.trim();
        if(!name || !nick) return;
        state.childName = name;
        state.nick = nick;
        docId = `${name}_${nick}`.toLowerCase().replace(/[^a-z0-9_]/g,'_');
        const loaded = loadFromLocal();
        if(!loaded){
          state.collectedBase = [];
          state.collectedRare = [];
          state.collectedEpic = [];
          state.legendaryUnlocked = false;
          state.currentBaseIdx = Math.floor(Math.random() * BASE.length);
          state.goldProgress = 0;
          state.diamondKeys = 0;
          state.rubyKeys = 0;
          state.lastClaimDate = null;
          state.weekCount = 0;
          state.weekStart = null;
          saveToLocal();
        }
        renderGame();
      };
    }
    renderNameScreen();
  })();
</script>
</body>
</html>
