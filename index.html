<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Активные Стопы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    color: #2d2d2d;
  }
  .card {
    background: #fff;
    border-radius: 28px;
    padding: 24px 20px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  h1 { font-family: 'Fredoka One', cursive; font-size: 24px; color: #2d2d2d; margin-bottom: 4px; line-height: 1.2; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 700; }
  
  /* Кнопки */
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 14px 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    cursor: pointer;
    width: 100%;
    transition: transform .1s, opacity .2s;
    box-shadow: 0 6px 20px rgba(102,126,234,.4);
    margin-top: 10px;
    touch-action: manipulation;
  }
  .btn:active { transform: scale(0.96); }
  .btn:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(1); box-shadow: none; }
  .btn-green { background: linear-gradient(135deg, #2E7D32, #4CAF50); box-shadow: 0 6px 20px rgba(46,125,50,.4); }
  
  /* Поля ввода */
  .field-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; text-align: left; }
  .field-input {
    width: 100%;
    border: 2px solid #e0e4ef;
    border-radius: 12px;
    padding: 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 700;
    outline: none;
    text-align: center;
    margin-bottom: 14px;
    transition: border-color .2s;
  }
  .field-input:focus { border-color: #667eea; }

  /* Верхняя панель */
  .top-bar { 
    display: flex; 
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px; 
  }
  .rank-row { display: flex; justify-content: space-between; align-items: center; }
  .rank-badge {
    padding: 6px 12px;
    border-radius: 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 12px;
    text-transform: uppercase;
  }
  .rank-novice { background: #e8f5e9; color: #2E7D32; }
  .rank-student { background: #FFF8E1; color: #F57F17; border: 1px solid #FFE082; }
  .rank-pro { background: #E3F2FD; color: #1565C0; border: 1px solid #90CAF9; }
  .rank-master { background: #2d2d2d; color: #FFD700; border: 1px solid #555; }
  
  .wallet { 
    display: flex; 
    gap: 10px; 
    background: #f5f5f5; 
    border-radius: 30px; 
    padding: 4px 12px; 
    font-size: 14px;
    font-weight: 800;
  }
  .w-slot { display: flex; align-items: center; gap: 4px; }
  .w-star { color: #F9A825; }
  .w-shiny { color: #FF6F00; }

  /* Прогресс дня */
  .day-counter {
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: #667eea;
    margin-bottom: 12px;
    background: #f0f4ff;
    display: inline-block;
    padding: 6px 16px;
    border-radius: 20px;
  }

  /* Сетка ключей */
  .keys-grid { 
    display: grid; 
    grid-template-columns: repeat(4, 1fr); 
    gap: 10px; 
    margin-bottom: 16px; 
  }
  .key-slot {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    border: 2px dashed #ddd;
    background: #fafafa;
    transition: all .3s ease;
  }
  .key-slot.filled { 
    border: 2px solid #FFD700; 
    background: linear-gradient(135deg, #fffde7, #fff9c4); 
    box-shadow: 0 4px 10px rgba(255,215,0,.3); 
    animation: popIn .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  @keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }

  /* Таймер */
  .cooldown-box { 
    background: #f0f4ff; 
    border-radius: 16px; 
    padding: 16px; 
    margin-top: 10px;
    display: none;
  }
  .cd-text { font-size: 14px; font-weight: 700; color: #667eea; margin-bottom: 4px; }
  .cd-time { font-family: 'Fredoka One', cursive; font-size: 22px; color: #2d2d2d; }

  /* Коллекция ссылка */
  .col-link { 
    margin-top: 20px; 
    padding-top: 15px; 
    border-top: 2px solid #f0f0f0; 
    cursor: pointer; 
    font-weight: 800; 
    color: #888;
    transition: color .2s;
  }
  .col-link:hover { color: #667eea; }

  /* Галерея */
  #galleryScreen { display: none; text-align: left; }
  .gallery-header { text-align: center; margin-bottom: 20px; }
  .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 15px; }
  .tab { 
    flex: 1; 
    text-align: center; 
    padding: 10px 0; 
    font-weight: 800; 
    font-size: 12px; 
    color: #ccc; 
    cursor: pointer; 
    border-bottom: 3px solid transparent;
  }
  .tab.active { color: #667eea; border-bottom-color: #667eea; }
  
  .g-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .g-card { 
    border: 2px solid #eee; 
    border-radius: 16px; 
    padding: 10px; 
    text-align: center; 
    background: #fff;
    position: relative;
  }
  .g-card.locked { background: #f9f9f9; opacity: 0.8; }
  .g-card.unlocked { border-color: #667eea; background: #f4f7ff; }
  .g-icon { font-size: 32px; margin-bottom: 5px; display: block; }
  .g-name { font-size: 12px; font-weight: 700; line-height: 1.2; margin-bottom: 5px; height: 28px; display: flex; align-items: center; justify-content: center;}
  .g-price { 
    font-size: 11px; 
    font-weight: 800; 
    color: #888; 
    background: #eee; 
    padding: 4px 8px; 
    border-radius: 10px; 
    display: inline-block;
  }
  .buy-btn {
    background: #FFD700; color: #5d4037; border: none; padding: 6px 10px; 
    border-radius: 8px; font-weight: 800; font-size: 11px; cursor: pointer; margin-top: 5px; width: 100%;
  }

  /* Модалка успеха */
  .modal {
    display: none; position: fixed; top:0; left:0; width:100%; height:100%;
    background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center;
  }
  .modal.show { display: flex; animation: fadeIn .2s; }
  .modal-box { 
    background: #fff; width: 85%; max-width: 320px; padding: 25px 20px; 
    border-radius: 24px; text-align: center; animation: slideUp .3s;
  }
  .m-emoji { font-size: 50px; display: block; margin-bottom: 10px; }
  .m-title { font-family: 'Fredoka One'; font-size: 22px; margin-bottom: 8px; color: #2d2d2d; }
  .m-desc { font-size: 14px; color: #666; margin-bottom: 20px; line-height: 1.4; }
  
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }

  .reset-link { font-size: 10px; color: #ccc; margin-top: 15px; text-decoration: underline; cursor: pointer; }
</style>
</head>
<body>

<!-- Экран входа -->
<div class="card" id="loginScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Как тебя зовут?</div>
  <input type="text" class="field-input" id="inpName" placeholder="Имя" maxlength="12">
  <div class="field-label">Твой никнейм</div>
  <input type="text" class="field-input" id="inpNick" placeholder="Ник" maxlength="12">
  <button class="btn" id="startBtn" onclick="initGame()" disabled>Вперёд! 🚀</button>
</div>

<!-- Экран игры -->
<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div class="rank-row">
      <div id="rankBadge" class="rank-badge rank-novice">Новичок</div>
      <div class="wallet">
        <div class="w-slot w-star">⭐ <span id="valStar">0</span></div>
        <div class="w-slot w-shiny">🌟 <span id="valShiny">0</span></div>
      </div>
    </div>
  </div>

  <div class="day-counter">День <span id="dayNum">1</span> из 56</div>
  
  <h2 id="greeting" style="font-size:18px; margin-bottom:10px;">Привет!</h2>
  <p id="taskText" style="font-size:14px; color:#666; margin-bottom:15px; min-height:40px;"></p>

  <!-- Сетка для ключей (показывается только в дни ключей) -->
  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="k0"></div>
    <div class="key-slot" id="k1"></div>
    <div class="key-slot" id="k2"></div>
    <div class="key-slot" id="k3"></div>
  </div>

  <button class="btn btn-green" id="actionBtn" onclick="doDailyTask()">Я сделал(а) зарядку! 🏃</button>
  
  <div class="cooldown-box" id="cooldownBox">
    <div class="cd-text">Следующая зарядка через:</div>
    <div class="cd-time" id="timerDisplay">00:00:00</div>
  </div>

  <div class="col-link" onclick="openGallery()">🏅 Моя коллекция →</div>
  <div class="reset-link" onclick="hardReset()">Сбросить прогресс</div>
</div>

<!-- Экран галереи -->
<div class="card" id="galleryScreen">
  <div class="gallery-header">
    <h1>Коллекция сил</h1>
    <div style="font-size:12px; color:#888; margin-top:5px;">Накопи звезды и открывай!</div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('base')">Базовые</div>
    <div class="tab" onclick="switchTab('rare')">Редкие</div>
    <div class="tab" onclick="switchTab('epic')">Эпик</div>
    <div class="tab" onclick="switchTab('legend')">Легенда</div>
  </div>
  <div id="galleryContent" class="g-grid"></div>
  <button class="btn" style="margin-top:20px; background:#eee; color:#555; box-shadow:none;" onclick="closeGallery()">← Назад к игре</button>
</div>

<!-- Модальное окно награды -->
<div class="modal" id="rewardModal">
  <div class="modal-box">
    <span class="m-emoji" id="mEmoji">🎉</span>
    <div class="m-title" id="mTitle">Отлично!</div>
    <div class="m-desc" id="mDesc">Ты получил награду.</div>
    <button class="btn" onclick="closeModal()">Ура!</button>
  </div>
</div>

<script>
// --- ДАННЫЕ ИГРЫ ---

// Дни для наград
const GOLD_DAYS = [1,2,3,4, 8,9,10,11, 15,16,17,18, 22,23,24,25, 29,30,31,32, 36,37,38,39, 43,44,45,46, 50,51,52,53];
const STAR_DAYS = [5,6, 12,13, 19,20, 26,27, 33,34, 40,41, 47,48, 54,55];
const SHINY_DAYS = [7, 14, 21, 28, 35, 42, 49, 56];

// Персонажи
const BASE_CHARS = [
  {n:"Гепард", p:"Скорость", i:"🐆"}, {n:"Колибри", p:"Лёгкость", i:"🐦"},
  {n:"Муравей", p:"Сила", i:"🐜"}, {n:"Фламинго", p:"Баланс", i:"🦩"},
  {n:"Ленивец", p:"Покой", i:"🦥"}, {n:"Обезьяна", p:"Ловкость", i:"🐒"},
  {n:"Верблюд", p:"Выносливость", i:"🐫"}, {n:"Кошка", p:"Гибкость", i:"🐱"}
];
const RARE_CHARS = [
  {n:"Кенгуру", p:"Прыжок", i:"🦘", cost:4}, {n:"Осьминог", p:"Хватка", i:"🐙", cost:4},
  {n:"Краб", p:"Защита", i:"🦀", cost:4}, {n:"Улитка", p:"Мудрость", i:"🐌", cost:4}
];
const EPIC_CHARS = [
  {n:"Единорог", p:"Магия", i:"🦄", cost:4}, {n:"Дракон", p:"Огонь", i:"🐉", cost:4}
];
const LEGEND_CHAR = {n:"Феникс", p:"Возрождение", i:"🔥"};

// --- СОСТОЯНИЕ ---
let state = {
  name: "", nick: "",
  day: 1, // Текущий день (1-56)
  lastDate: null, // Дата последнего входа (строка)
  stars: 0, shiny: 0,
  keysCollected: 0, // Сколько ключей собрано в текущей пачке (0-4)
  unlocked: { base:[], rare:[], epic:[], legend:false },
  weekKeysIdx: 0 // Индекс пачки ключей (0-7)
};

// --- ИНИЦИАЛИЗАЦИЯ ---
function initGame() {
  const name = document.getElementById('inpName').value.trim();
  const nick = document.getElementById('inpNick').value.trim();
  if(!name || !nick) return;
  
  // Пробуем загрузить сохранение по нику
  const saved = localStorage.getItem('as_save_' + nick);
  if(saved) {
    state = JSON.parse(saved);
  } else {
    state.name = name; state.nick = nick;
    state.day = 1; state.lastDate = null; state.keysCollected = 0;
  }
  
  saveState();
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  renderGame();
  startTimerLoop();
}

// Проверка полей ввода
document.querySelectorAll('.field-input').forEach(inp => {
  inp.addEventListener('input', () => {
    const n = document.getElementById('inpName').value.trim();
    const k = document.getElementById('inpNick').value.trim();
    document.getElementById('startBtn').disabled = !(n && k);
  });
});

// Автозаполнение если есть активная сессия
const lastUser = localStorage.getItem('as_lastUser');
if(lastUser) {
    // Можно реализовать авто-вход, но пока оставим ручной старт для надежности
}

// --- ЛОГИКА ИГРЫ ---

function getRank(day) {
  if(day >= 50) return {t:"МАСТЕР", c:"rank-master"};
  if(day >= 36) return {t:"ПРОФИ", c:"rank-pro"};
  if(day >= 15) return {t:"УЧЕНИК", c:"rank-student"};
  return {t:"НОВИЧОК", c:"rank-novice"};
}

function isKeyDay(d) { return GOLD_DAYS.includes(d); }
function isStarDay(d) { return STAR_DAYS.includes(d); }
function isShinyDay(d) { return SHINY_DAYS.includes(d); }

function renderGame() {
  const d = state.day;
  const rank = getRank(d);
  
  // Обновляем бейджи
  const badge = document.getElementById('rankBadge');
  badge.className = `rank-badge ${rank.c}`;
  badge.innerText = rank.t;
  
  document.getElementById('dayNum').innerText = d;
  document.getElementById('greeting').innerText = `Привет, ${state.name}!`;
  document.getElementById('valStar').innerText = state.stars;
  document.getElementById('valShiny').innerText = state.shiny;

  // Сетка ключей
  const grid = document.getElementById('keysGrid');
  const taskText = document.getElementById('taskText');
  
  if(isKeyDay(d)) {
    grid.style.display = 'grid';
    // Определяем, какой это ключ по счету в этой пачке (0,1,2,3)
    // Используем state.keysCollected для отображения заполненности
    for(let i=0; i<4; i++) {
      const slot = document.getElementById('k'+i);
      if(i < state.keysCollected) {
        slot.classList.add('filled');
        slot.innerHTML = '🔑';
      } else {
        slot.classList.remove('filled');
        slot.innerHTML = '';
      }
    }
    
    const keysLeft = 4 - state.keysCollected;
    if(keysLeft > 0) {
        taskText.innerText = `Собери ещё ${keysLeft} ключ(а), чтобы открыть Суперсилу!`;
    } else {
        taskText.innerText = `Последний рывок! Получи 4-й ключ!`;
    }

  } else {
    grid.style.display = 'none';
    if(isStarDay(d)) taskText.innerText = "Выполни зарядку и получи Звезду ⭐";
    else if(isShinyDay(d)) taskText.innerText = "Супер-день! Светящаяся звезда 🌟 ждёт тебя!";
    else taskText.innerText = "Продолжай заниматься, чтобы стать сильнее!";
  }

  checkAvailability();
}

function checkAvailability() {
  const btn = document.getElementById('actionBtn');
  const cdBox = document.getElementById('cooldownBox');
  
  const todayStr = new Date().toDateString();
  
  if(state.lastDate === todayStr) {
    // Уже сделал сегодня
    btn.style.display = 'none';
    cdBox.style.display = 'block';
  } else {
    // Можно делать
    btn.style.display = 'block';
    cdBox.style.display = 'none';
  }
}

function doDailyTask() {
  const todayStr = new Date().toDateString();
  if(state.lastDate === todayStr) return; // Защита от двойного клика
  
  state.lastDate = todayStr;
  
  let rewardText = "";
  let emoji = "🏃";
  let title = "Зарядка принята!";

  // Логика наград
  if(isKeyDay(state.day)) {
    state.keysCollected++;
    playSound('pop');
    
    // Если собрали 4 ключа
    if(state.keysCollected >= 4) {
      // Открываем базового персонажа
      const charIndex = state.unlocked.base.length % BASE_CHARS.length;
      const newChar = BASE_CHARS[charIndex];
      state.unlocked.base.push(charIndex);
      
      emoji = newChar.i;
      title = "СУПЕРСИЛА!";
      rewardText = `Ты открыл силу: ${newChar.p} (${newChar.n})!`;
      playSound('win');
      
      // Сброс ключей для следующей пачки
      state.keysCollected = 0;
    } else {
      rewardText = `Ключ ${state.keysCollected} из 4 получен!`;
    }
  } 
  else if(isStarDay(state.day)) {
    state.stars++;
    rewardText = `Ты получил звезду! Всего: ${state.stars} ⭐`;
    emoji = "⭐";
    playSound('coin');
  } 
  else if(isShinyDay(state.day)) {
    state.shiny++;
    rewardText = `Сияющая звезда получена! Всего: ${state.shiny} 🌟`;
    emoji = "🌟";
    playSound('magic');
  }

  // Переход к следующему дню
  if(state.day < 56) {
    state.day++;
  } else {
    // Конец игры
    if(!state.unlocked.legend) {
        state.unlocked.legend = true;
        title = "ТЫ ЛЕГЕНДА!";
        emoji = "👑";
        rewardText = "Все 56 дней пройдены! Феникс твой!";
    }
  }

  saveState();
  renderGame();
  
  // Показ модалки
  showModal(emoji, title, rewardText);
}

// --- ТАЙМЕР ---
function startTimerLoop() {
  setInterval(() => {
    if(state.lastDate === new Date().toDateString()) {
      // Вычисляем время до полуночи (или до следующего утра)
      const now = new Date();
      const tomorrow = new Date(now);
      tomorrow.setDate(tomorrow.getDate() + 1);
      tomorrow.setHours(0,0,0,0); // Следующая доступность в 00:00
      
      // Или можно сделать строго 24 часа, но для детской игры лучше "до завтра"
      // Допустим, зарядка доступна с 8 утра? 
      // Сделаем просто: следующий клик доступен после 00:00 след. дня
      
      const diff = tomorrow - now;
      const h = Math.floor(diff / (1000 * 60 * 60));
      const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const s = Math.floor((diff % (1000 * 60)) / 1000);
      
      document.getElementById('timerDisplay').innerText = 
        `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
    } else {
      checkAvailability(); // Перерисовать, если наступил новый день
    }
  }, 1000);
}

// --- ГАЛЕРЕЯ ---
let currentTab = 'base';

function openGallery() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('galleryScreen').style.display = 'block';
  renderGallery();
}
function closeGallery() {
  document.getElementById('galleryScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  renderGallery();
}

function renderGallery() {
  const container = document.getElementById('galleryContent');
  container.innerHTML = '';
  
  let items = [];
  if(currentTab === 'base') items = BASE_CHARS.map((c,i) => ({...c, type:'base', idx:i, unlocked: state.unlocked.base.includes(i)}));
  if(currentTab === 'rare') items = RARE_CHARS.map((c,i) => ({...c, type:'rare', idx:i, unlocked: state.unlocked.rare.includes(i)}));
  if(currentTab === 'epic') items = EPIC_CHARS.map((c,i) => ({...c, type:'epic', idx:i, unlocked: state.unlocked.epic.includes(i)}));
  if(currentTab === 'legend') items = [{...LEGEND_CHAR, type:'legend', unlocked: state.unlocked.legend}];

  items.forEach(item => {
    const div = document.createElement('div');
    div.className = `g-card ${item.unlocked ? 'unlocked' : 'locked'}`;
    
    let html = `<span class="g-icon">${item.unlocked ? item.i : '❓'}</span>`;
    html += `<div class="g-name">${item.unlocked ? item.n : '???'}</div>`;
    
    if(!item.unlocked) {
      if(item.type === 'base') {
        html += `<div class="g-price">Пройди игру</div>`;
      } else if (item.type === 'rare') {
        html += `<div class="g-price">⭐ ${item.cost}</div>`;
        if(state.stars >= item.cost) {
            html += `<button class="buy-btn" onclick="buyItem('rare', ${item.idx})">Купить</button>`;
        }
      } else if (item.type === 'epic') {
        html += `<div class="g-price">🌟 ${item.cost}</div>`;
        if(state.shiny >= item.cost) {
            html += `<button class="buy-btn" onclick="buyItem('epic', ${item.idx})">Купить</button>`;
        }
      } else if (item.type === 'legend') {
         html += `<div class="g-price">Собери всё</div>`;
      }
    } else {
        html += `<div style="color:#2E7D32; font-weight:800; font-size:10px;">ЕСТЬ</div>`;
    }
    
    div.innerHTML = html;
    container.appendChild(div);
  });
}

function buyItem(type, idx) {
  if(type === 'rare') {
    if(state.stars >= 4 && !state.unlocked.rare.includes(idx)) {
      state.stars -= 4;
      state.unlocked.rare.push(idx);
      saveState();
      showModal(RARE_CHARS[idx].i, "Открыто!", `Ты получил силу: ${RARE_CHARS[idx].p}`);
      renderGallery();
      renderGame(); // обновить счетчик звезд
    }
  } else if (type === 'epic') {
    if(state.shiny >= 4 && !state.unlocked.epic.includes(idx)) {
      state.shiny -= 4;
      state.unlocked.epic.push(idx);
      saveState();
      showModal(EPIC_CHARS[idx].i, "ЭПИК!", `Ты получил силу: ${EPIC_CHARS[idx].p}`);
      renderGallery();
      renderGame();
    }
  }
}

// --- УТИЛИТЫ ---
function saveState() {
  localStorage.setItem('as_save_' + state.nick, JSON.stringify(state));
  localStorage.setItem('as_lastUser', state.nick);
}

function hardReset() {
  if(confirm("Точно сбросить весь прогресс?")) {
    localStorage.removeItem('as_save_' + state.nick);
    location.reload();
  }
}

function showModal(emoji, title, desc) {
  document.getElementById('mEmoji').innerText = emoji;
  document.getElementById('mTitle').innerText = title;
  document.getElementById('mDesc').innerText = desc;
  document.getElementById('rewardModal').classList.add('show');
}
window.closeModal = function() {
  document.getElementById('rewardModal').classList.remove('show');
}

function playSound(type) {
  // Простая звуковая индикация через Web Audio API (без внешних файлов)
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    if(type === 'pop') {
      osc.frequency.setValueAtTime(600, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);
      osc.start(); osc.stop(ctx.currentTime + 0.1);
    } else if (type === 'coin') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(1800, ctx.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.3);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'win') {
       // Арпеджио
       [523, 659, 784, 1046].forEach((freq, i) => {
         const o = ctx.createOscillator();
         const g = ctx.createGain();
         o.connect(g); g.connect(ctx.destination);
         o.frequency.value = freq;
         g.gain.setValueAtTime(0.1, ctx.currentTime + i*0.1);
         g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.1 + 0.3);
         o.start(ctx.currentTime + i*0.1);
         o.stop(ctx.currentTime + i*0.1 + 0.3);
       });
    }
  } catch(e){}
}
</script>
