<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы — Коллекция</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 32px;
    padding: 32px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 { font-family: 'Fredoka One', cursive; font-size: 28px; color: #2d2d2d; margin-bottom: 4px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 24px; font-weight: 700; }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 16px;
    padding: 14px 28px; font-family: 'Fredoka One', cursive;
    font-size: 20px; cursor: pointer; width: 100%;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(102,126,234,0.4); margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn-green { background: linear-gradient(135deg, #2E7D32, #4CAF50); box-shadow: 0 4px 16px rgba(46,125,50,0.4); }
  #nameScreen input {
    width: 100%; border: 3px solid #e0e4ef; border-radius: 16px;
    padding: 14px 18px; font-family: 'Nunito', sans-serif;
    font-size: 18px; font-weight: 700; outline: none;
    text-align: center; margin-bottom: 16px; transition: border-color 0.2s;
  }
  #nameScreen input:focus { border-color: #667eea; }
  .input-label { font-size: 13px; color: #aaa; font-weight: 700; margin-bottom: 6px; text-align: left; padding-left: 4px; }
  .greeting { font-size: 22px; font-weight: 900; color: #2d2d2d; margin-bottom: 4px; }
  .char-name { font-family: 'Fredoka One', cursive; font-size: 22px; margin-bottom: 12px; }
  .progress-text { font-size: 13px; color: #888; font-weight: 700; margin-bottom: 16px; }
  .squares-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .square { aspect-ratio: 1; border-radius: 16px; transition: all 0.5s ease; border: 3px solid #e0e4ef; background: #e0e4ef; }
  .square.unlocked { border-color: transparent; box-shadow: 0 4px 16px rgba(0,0,0,0.15); animation: popIn 0.5s ease; }
  @keyframes popIn { 0%{transform:scale(0)} 70%{transform:scale(1.15)} 100%{transform:scale(1)} }
  .char-image-wrap { border-radius: 20px; overflow: hidden; margin-bottom: 16px; display: none; background: #f5f5f5; }
  .char-image-wrap img { width: 100%; height: 220px; object-fit: contain; display: block; }
  .char-image-wrap.show { display: block; animation: zoomIn 0.6s ease; }
  @keyframes zoomIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .cooldown-msg { background: #f0f4ff; border-radius: 16px; padding: 14px; font-size: 14px; font-weight: 700; color: #667eea; display: none; margin-top: 8px; }
  .cooldown-time { font-family: 'Fredoka One', cursive; font-size: 22px; display: block; margin-top: 4px; }
  .change-name { font-size: 12px; color: #bbb; margin-top: 16px; cursor: pointer; font-weight: 700; }
  .change-name:hover { color: #667eea; }
  .collection-btn { background: none; border: 2px solid #e0e4ef; border-radius: 12px; padding: 8px 16px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: #888; cursor: pointer; margin-top: 12px; transition: all 0.2s; }
  .collection-btn:hover { border-color: #667eea; color: #667eea; }
  #galleryScreen { display: none; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 16px 0; }
  .gallery-item { border-radius: 16px; overflow: hidden; border: 3px solid #e0e4ef; background: #f5f5f5; }
  .gallery-item img { width: 100%; height: 120px; object-fit: contain; display: block; }
  .gallery-item-name { font-family: 'Fredoka One', cursive; font-size: 14px; padding: 6px; text-align: center; }
  .gallery-item.locked-item { opacity: 0.4; }
  .celebration { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .celebration.show { display: flex; }
  .celebration-box { background: white; border-radius: 32px; padding: 32px 28px; text-align: center; max-width: 360px; width: 100%; animation: zoomIn 0.4s ease; }
  .celebration-emoji { font-size: 60px; display: block; margin-bottom: 12px; }
  .celebration-title { font-family: 'Fredoka One', cursive; font-size: 26px; color: #2d2d2d; margin-bottom: 8px; }
  .celebration-img { width: 100%; max-height: 180px; object-fit: contain; border-radius: 16px; margin: 12px 0; display: none; }
  .celebration-text { font-size: 15px; color: #888; font-weight: 700; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Коллекция персонажей</div>
  <p style="font-size:15px;color:#555;font-weight:700;margin-bottom:20px;">Как тебя зовут?</p>
  <div class="input-label">Твоё имя</div>
  <input type="text" id="nameInput" placeholder="Например: Настя" maxlength="20">
  <div class="input-label">Придумай ник</div>
  <input type="text" id="nickInput" placeholder="Например: ЛисичкаОгонь" maxlength="20" onkeypress="if(event.key==='Enter')startGame()">
  <button class="btn" onclick="startGame()">Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none;">
  <div class="greeting" id="greetingText">Привет!</div>
  <div class="char-name" id="charName"></div>
  <div class="progress-text" id="progressText"></div>
  <div class="squares-grid" id="squaresGrid">
    <div class="square" id="sq0"></div>
    <div class="square" id="sq1"></div>
    <div class="square" id="sq2"></div>
    <div class="square" id="sq3"></div>
  </div>
  <div class="char-image-wrap" id="charImageWrap">
    <img id="charImage" src="" alt="персонаж">
  </div>
  <button class="btn btn-green" id="claimBtn" style="display:none;">💪 Я сделал зарядку!</button>
  <div class="cooldown-msg" id="cooldownMsg">
    Молодец! Приходи завтра 🌙
    <span class="cooldown-time" id="cooldownTime"></span>
  </div>
  <button class="collection-btn" onclick="showGallery()">🏆 Моя коллекция</button>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<div class="card" id="galleryScreen">
  <h1 style="margin-bottom:8px;">🏆 Коллекция</h1>
  <div class="subtitle" id="gallerySubtitle"></div>
  <div class="gallery-grid" id="galleryGrid"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-box">
    <span class="celebration-emoji" id="celebEmoji">🎉</span>
    <div class="celebration-title" id="celebTitle">Ура!</div>
    <img class="celebration-img" id="celebImg" src="" alt="">
    <div class="celebration-text" id="celebText"></div>
    <button class="btn" onclick="closeCelebration()">Ура! 🎉</button>
  </div>
</div>

<script>
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let ctx = null;
  function getCtx() { if (!ctx) ctx = new AudioCtx(); return ctx; }

  window.playClickSound = function() {
    const c = getCtx();
    const o = c.createOscillator(); const g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(520, c.currentTime);
    o.frequency.exponentialRampToValueAtTime(780, c.currentTime + 0.1);
    g.gain.setValueAtTime(0.3, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.3);
    o.start(); o.stop(c.currentTime + 0.3);
  };

  window.playSquareSound = function() {
    const c = getCtx();
    [440, 550, 660].forEach((freq, i) => {
      const o = c.createOscillator(); const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'triangle'; o.frequency.value = freq;
      const t = c.currentTime + i * 0.08;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.2, t + 0.03);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      o.start(t); o.stop(t + 0.25);
    });
  };

  window.playFanfare = function() {
    const c = getCtx();
    const notes = [523, 659, 784, 1047];
    notes.forEach((freq, i) => {
      const o = c.createOscillator(); const g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'square'; o.frequency.value = freq;
      const t = c.currentTime + i * 0.15;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.15, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  };
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB5wc1u9TR31jKCV6ds1T3So7v2vux-NCo",
    authDomain: "aktivnye-stopy.firebaseapp.com",
    projectId: "aktivnye-stopy",
    storageBucket: "aktivnye-stopy.firebasestorage.app",
    messagingSenderId: "154203578895",
    appId: "1:154203578895:web:fa18ecc7e7d4a7a23bf97a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const CHARACTERS = [
    { name: "Солнышки", color: "#FFD700", image: "solnyshki.png" },
    { name: "Шустрики", color: "#E07000", image: "shystriki.png" },
    { name: "Силачи",   color: "#CC0000", image: "silachi.png"   },
    { name: "Грации",   color: "#1565C0", image: "gratsii.png"   },
    { name: "Сони",     color: "#2E7D32", image: "soni.png"      },
  ];

  const TOTAL_STEPS = 5;
  const urlParams = new URLSearchParams(window.location.search);
  const kitId = urlParams.get('kit') || 'demo';
  let playerData = null;
  let childName = '';
  let childNick = '';

  window.startGame = async function() {
    const nameVal = document.getElementById('nameInput').value.trim();
    const nickVal = document.getElementById('nickInput').value.trim();
    if (!nameVal) { alert('Введи своё имя!'); return; }
    if (!nickVal) { alert('Придумай ник!'); return; }
    childName = nameVal;
    childNick = nickVal;
    localStorage.setItem('child_name_' + kitId, childName);
    localStorage.setItem('child_nick_' + kitId, childNick);
    await loadPlayer();
  };

  function makeDocId() {
    const safeName = childName.toLowerCase().replace(/\s+/g, '_');
    const safeNick = childNick.toLowerCase().replace(/\s+/g, '_');
    return kitId + '_' + safeName + '_' + safeNick;
  }

  async function loadPlayer() {
    document.getElementById('nameScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    document.getElementById('greetingText').textContent = 'Привет, ' + childName + '! 👋';
    const ref = doc(db, 'players', makeDocId());
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        playerData = snap.data();
      } else {
        const charIndex = Math.floor(Math.random() * CHARACTERS.length);
        playerData = { name: childName, nick: childNick, kitId, charIndex, step: 0, collectedChars: [], lastClaim: null, createdAt: serverTimestamp() };
        await setDoc(ref, playerData);
      }
      renderGame();
    } catch(e) {
      alert('Ошибка загрузки. Проверь интернет.');
    }
  }

  function declension(n, one, few, many) {
    const m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
    return many;
  }

  function renderGame() {
    const char = CHARACTERS[playerData.charIndex];
    const step = playerData.step || 0;
    const charNameEl = document.getElementById('charName');

    // Скрываем имя персонажа до финала
    if (step >= TOTAL_STEPS) {
      charNameEl.textContent = char.name;
      charNameEl.style.color = char.color;
    } else {
      charNameEl.textContent = '??? 🔒';
      charNameEl.style.color = '#bbb';
    }

    const grid = document.getElementById('squaresGrid');
    const imageWrap = document.getElementById('charImageWrap');
    const claimBtn = document.getElementById('claimBtn');

    if (step >= TOTAL_STEPS) {
      grid.style.display = 'none';
      imageWrap.classList.add('show');
      document.getElementById('charImage').src = char.image;
      document.getElementById('progressText').textContent = char.name + ' собраны! 🎉';
      claimBtn.style.display = 'block';
      claimBtn.textContent = '🎊 Начать нового персонажа!';
      claimBtn.onclick = startNewChar;
      document.getElementById('cooldownMsg').style.display = 'none';
    } else {
      grid.style.display = 'grid';
      imageWrap.classList.remove('show');
      claimBtn.onclick = claimPart;
      claimBtn.textContent = '💪 Я сделал зарядку!';

      for (let i = 0; i < 4; i++) {
        const sq = document.getElementById('sq' + i);
        if (i < step) {
          sq.classList.add('unlocked');
          sq.style.background = '#667eea';
        } else {
          sq.classList.remove('unlocked');
          sq.style.background = '';
        }
      }

      const remaining = TOTAL_STEPS - step;
      document.getElementById('progressText').textContent =
        'До персонажа: ' + remaining + ' ' + declension(remaining, 'день', 'дня', 'дней');
      checkCooldown();
    }
    renderGallery();
  }

  function checkCooldown() {
    const claimBtn = document.getElementById('claimBtn');
    const cooldownMsg = document.getElementById('cooldownMsg');
    if (!playerData.lastClaim) {
      claimBtn.style.display = 'block';
      cooldownMsg.style.display = 'none';
      return;
    }
    const last = playerData.lastClaim.toDate ? playerData.lastClaim.toDate() : new Date(playerData.lastClaim);
    const next = new Date(last.getTime() + 24 * 3600 * 1000);
    if (new Date() >= next) {
      claimBtn.style.display = 'block';
      cooldownMsg.style.display = 'none';
    } else {
      claimBtn.style.display = 'none';
      cooldownMsg.style.display = 'block';
      updateCountdown(next);
      const iv = setInterval(() => {
        if (new Date() >= next) { clearInterval(iv); renderGame(); }
        else updateCountdown(next);
      }, 30000);
    }
  }

  function updateCountdown(next) {
    const diff = next - new Date();
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    document.getElementById('cooldownTime').textContent = h + ' ч ' + m + ' мин';
  }

  window.claimPart = async function() {
    playClickSound();
    const ref = doc(db, 'players', makeDocId());
    const newStep = (playerData.step || 0) + 1;
    const char = CHARACTERS[playerData.charIndex];
    try {
      await updateDoc(ref, { step: newStep, lastClaim: serverTimestamp() });
      playerData.step = newStep;
      playerData.lastClaim = new Date();
      if (newStep >= TOTAL_STEPS) {
        playFanfare();
        const collected = playerData.collectedChars || [];
        if (!collected.includes(playerData.charIndex)) {
          collected.push(playerData.charIndex);
          await updateDoc(ref, { collectedChars: collected });
          playerData.collectedChars = collected;
        }
        document.getElementById('celebEmoji').textContent = '🎉';
        document.getElementById('celebTitle').textContent = char.name + ' собраны!';
        const img = document.getElementById('celebImg');
        img.src = char.image; img.style.display = 'block';
        document.getElementById('celebText').textContent = 'Поздравляем! Персонаж добавлен в коллекцию!';
      } else {
        playSquareSound();
        document.getElementById('celebEmoji').textContent = '✨';
        document.getElementById('celebTitle').textContent = 'Отлично!';
        document.getElementById('celebImg').style.display = 'none';
        document.getElementById('celebText').textContent =
          'Часть ' + newStep + ' из 4 открыта! До персонажа осталось ' +
          (TOTAL_STEPS - newStep) + ' ' + declension(TOTAL_STEPS - newStep, 'день', 'дня', 'дней') + '!';
      }
      document.getElementById('celebration').classList.add('show');
    } catch(e) { alert('Ошибка сохранения. Проверь интернет.'); }
  };

  window.closeCelebration = function() {
    document.getElementById('celebration').classList.remove('show');
    renderGame();
  };

  async function startNewChar() {
    const ref = doc(db, 'players', makeDocId());
    const collected = playerData.collectedChars || [];
    let available = CHARACTERS.map((_,i) => i).filter(i => !collected.includes(i));
    if (available.length === 0) available = CHARACTERS.map((_,i) => i);
    const newChar = available[Math.floor(Math.random() * available.length)];
    await updateDoc(ref, { charIndex: newChar, step: 0, lastClaim: null });
    playerData.charIndex = newChar; playerData.step = 0; playerData.lastClaim = null;
    renderGame();
  }

  function renderGallery() {
    const collected = playerData.collectedChars || [];
    document.getElementById('gallerySubtitle').textContent = 'Собрано ' + collected.length + ' из ' + CHARACTERS.length;
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    CHARACTERS.forEach((char, i) => {
      const isCollected = collected.includes(i);
      const div = document.createElement('div');
      div.className = 'gallery-item' + (isCollected ? '' : ' locked-item');
      const img = document.createElement('img');
      img.src = isCollected ? char.image : '';
      img.alt = char.name;
      const name = document.createElement('div');
      name.className = 'gallery-item-name';
      name.style.color = isCollected ? char.color : '#bbb';
      name.textContent = isCollected ? char.name : '???';
      div.appendChild(img); div.appendChild(name);
      grid.appendChild(div);
    });
  }

  window.showGallery = function() {
    renderGallery();
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('galleryScreen').style.display = 'block';
  };

  window.hideGallery = function() {
    document.getElementById('galleryScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
  };

  window.changeName = function() {
    localStorage.removeItem('child_name_' + kitId);
    localStorage.removeItem('child_nick_' + kitId);
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('nameScreen').style.display = 'block';
    document.getElementById('nameInput').value = '';
    document.getElementById('nickInput').value = '';
  };

  const savedName = localStorage.getItem('child_name_' + kitId);
  const savedNick = localStorage.getItem('child_nick_' + kitId);
  if (savedName && savedNick) {
    childName = savedName;
    childNick = savedNick;
    document.getElementById('nameInput').value = savedName;
    document.getElementById('nickInput').value = savedNick;
    loadPlayer();
  }
</script>
</body>
</html>
