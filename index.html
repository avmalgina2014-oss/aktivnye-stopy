<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Активные Стопы — просто и понятно</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 40px;
    padding: 24px 20px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }
  h1 {
    font-size: 26px;
    margin-bottom: 5px;
  }
  .subtitle {
    font-size: 13px;
    color: #888;
    margin-bottom: 20px;
  }
  .btn {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border: none;
    width: 100%;
    padding: 14px;
    border-radius: 60px;
    font-size: 18px;
    font-weight: bold;
    color: white;
    cursor: pointer;
    margin-top: 12px;
  }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.5; }
  .btn-green { background: linear-gradient(135deg, #10b981, #059669); }
  .btn-star { background: linear-gradient(135deg, #f59e0b, #d97706); }
  .btn-shiny { background: linear-gradient(135deg, #f97316, #ea580c); }
  .field-label { text-align: left; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 16px;
    border: 2px solid #ddd;
    border-radius: 60px;
    font-size: 16px;
    text-align: center;
    outline: none;
  }
  input:focus { border-color: #6366f1; }
  .top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .rank {
    background: #f0f0f0;
    padding: 6px 16px;
    border-radius: 40px;
    font-size: 12px;
    font-weight: bold;
  }
  .wallet {
    display: flex;
    gap: 12px;
    background: #f0f0f0;
    padding: 5px 16px;
    border-radius: 40px;
  }
  .greeting {
    font-size: 18px;
    font-weight: bold;
    margin: 10px 0;
  }
  .day-info {
    background: #e8eaf6;
    padding: 10px;
    border-radius: 60px;
    font-size: 14px;
    font-weight: bold;
    margin: 10px 0;
  }
  .progress-text {
    background: #f5f5f5;
    padding: 12px;
    border-radius: 60px;
    font-size: 14px;
    margin: 12px 0;
  }
  .keys-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 15px 0;
  }
  .key-slot {
    aspect-ratio: 1;
    background: #f5f5f5;
    border: 3px dashed #ccc;
    border-radius: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
  }
  .key-slot.filled {
    background: #fff8e1;
    border: 3px solid gold;
    animation: bounce 0.3s;
  }
  @keyframes bounce {
    0% { transform: scale(0.7); }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  .char-block {
    background: #fef9e3;
    border-radius: 30px;
    margin: 12px 0;
    padding: 10px;
    display: none;
  }
  .char-block.show { display: block; }
  .char-block img {
    width: 100%;
    height: 160px;
    object-fit: contain;
  }
  .motivation {
    background: #e8f5e9;
    color: #2e7d32;
    padding: 15px;
    border-radius: 28px;
    margin: 12px 0;
    display: none;
  }
  .cooldown {
    background: #e8eaf6;
    padding: 12px;
    border-radius: 28px;
    margin-top: 10px;
    display: none;
  }
  .cooldown-time {
    font-size: 22px;
    font-weight: bold;
    display: block;
  }
  .collection {
    border-top: 1px solid #eee;
    padding-top: 16px;
    margin-top: 16px;
    cursor: pointer;
    color: #666;
    font-weight: bold;
  }
  .change-name {
    font-size: 11px;
    color: #ccc;
    margin-top: 12px;
    cursor: pointer;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    margin: 18px 0;
  }
  .g-item {
    background: #f5f5f5;
    border-radius: 24px;
    padding: 12px;
    text-align: center;
    border: 2px solid #e0e0e0;
  }
  .g-item.got { background: white; border-color: gold; }
  .g-item img { width: 100%; height: 100px; object-fit: contain; }
  .g-name { font-weight: bold; font-size: 13px; margin-top: 6px; }
  .g-price { font-size: 12px; margin: 6px 0; }
  .g-btn {
    background: #facc15;
    border: none;
    border-radius: 30px;
    padding: 5px 12px;
    font-weight: bold;
    cursor: pointer;
  }
  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .celebration.show { display: flex; }
  .celeb-box {
    background: white;
    border-radius: 40px;
    padding: 24px;
    text-align: center;
    max-width: 280px;
  }
  .celeb-emoji { font-size: 50px; }
  .celeb-title { font-size: 22px; font-weight: bold; margin: 8px 0; }
  .celeb-img { width: 100%; max-height: 120px; object-fit: contain; margin: 10px 0; }
  .gallery-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 16px;
  }
  .tab {
    flex: 1;
    background: #e0e0e0;
    border: none;
    padding: 8px;
    border-radius: 30px;
    font-weight: bold;
    cursor: pointer;
  }
  .tab.active { background: #6366f1; color: white; }
</style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div class="card" id="enterScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input type="text" id="playerName" placeholder="Саша" maxlength="15">
  <div class="field-label">Твой ник</div>
  <input type="text" id="playerNick" placeholder="Ракета 🚀" maxlength="20">
  <button class="btn" id="startBtn" disabled>Вперёд! 🚀</button>
</div>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <span class="rank" id="rank">🌱 НОВИЧОК</span>
    <div class="wallet">
      <span>⭐ <span id="starCount">0</span></span>
      <span>🌟 <span id="shinyCount">0</span></span>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="day-info" id="dayInfo"></div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="k0"></div>
    <div class="key-slot" id="k1"></div>
    <div class="key-slot" id="k2"></div>
    <div class="key-slot" id="k3"></div>
  </div>
  <div class="char-block" id="charBlock">
    <img id="charImg" src="">
  </div>
  <div class="motivation" id="motivation">
    🏆 Ты собрал(а) всех базовых героев!<br>🔥 Продолжай собирать звёзды!
  </div>
  <button class="btn btn-green" id="workoutBtn">🏃‍♀️ Я сделал(а) зарядку!</button>
  <div class="cooldown" id="cooldownMsg"></div>
  <div class="collection" id="galleryBtn">🏅 Моя коллекция →</div>
  <div class="change-name" id="resetBtn">Сменить имя</div>
</div>

<!-- ГАЛЕРЕЯ -->
<div class="card" id="galleryScreen" style="display:none">
  <h2>🏅 Моя коллекция</h2>
  <div class="gallery-tabs" id="galleryTabs"></div>
  <div id="galleryContent"></div>
  <button class="btn" id="backBtn" style="margin-top:16px">← На главную</button>
</div>

<!-- ПОЗДРАВЛЕНИЕ -->
<div class="celebration" id="celebration">
  <div class="celeb-box">
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title" id="celebTitle"></div>
    <img class="celeb-img" id="celebImg" src="">
    <div class="celeb-text" id="celebText"></div>
    <button class="btn" id="closeCelebBtn" style="margin-top:8px">Ура!</button>
  </div>
</div>

<script>
// ██████████████████████████████████████████████████████████████
// ПЕРСОНАЖИ
// ██████████████████████████████████████████████████████████████
const BASE = [
  { name:"Гепард", power:"Скорость", img:"gepard.png" },
  { name:"Колибри", power:"Лёгкость", img:"kolibri.png" },
  { name:"Муравей", power:"Сила", img:"muravey.png" },
  { name:"Фламинго", power:"Баланс", img:"flamingo.png" },
  { name:"Ленивец", power:"Восстановление", img:"lenivec.png" },
  { name:"Обезьяна", power:"Координация", img:"obeziana.png" },
  { name:"Верблюд", power:"Выносливость", img:"verblyud.png" },
  { name:"Кошка", power:"Гибкость", img:"koshka.png" }
];
const RARE = [
  { name:"Кенгуру", power:"Прыгучесть", img:"kenguru.png" },
  { name:"Осьминог", power:"Цепкость", img:"osminog.png" },
  { name:"Краб", power:"Устойчивость", img:"krab.png" },
  { name:"Улитка", power:"Чуткость", img:"ulitka.png" }
];
const EPIC = [
  { name:"Пегас", power:"Полёт", img:"pegas.png" },
  { name:"Дракон", power:"Суперсила", img:"drakon.png" }
];
const LEGEND = { name:"Феникс", power:"Возрождение", img:"feniks.png" };

// ██████████████████████████████████████████████████████████████
// ПРОСТАЯ ЛОГИКА: дни 1-7 повторяются по кругу
// 1-4: ключи (4 ключа = базовая суперсила)
// 5-6: звезда
// 7: сияющая звезда
// ██████████████████████████████████████████████████████████████

let game = {
  name: "", nick: "",
  totalDays: 0,           // сколько дней прошло (всего зарядок)
  currentKeyStep: 0,      // ключей в текущем цикле (0-4)
  stars: 0,               // обычные звёзды
  shinyStars: 0,          // сияющие звёзды
  gotBase: [],            // открытые базовые (индексы)
  gotRare: [],            // открытые редкие
  gotEpic: [],            // открытые эпические
  gotLegend: false,       // открыта ли легенда
  nextBaseIdx: 0,         // следующий базовый для открытия
  lastDate: null          // дата последней зарядки
};

let playerId = "";

// РАНГ (по общему количеству дней)
function getRank(days) {
  if (days >= 50) return "👑 МАСТЕР";
  if (days >= 36) return "⚡ ПРОФИ";
  if (days >= 15) return "📖 УЧЕНИК";
  return "🌱 НОВИЧОК";
}

// КУЛДАУН: можно ли сегодня делать зарядку?
function canWorkoutToday() {
  if (!game.lastDate) return true;
  let last = new Date(game.lastDate);
  let now = new Date();
  return last.getDate() !== now.getDate() ||
         last.getMonth() !== now.getMonth() ||
         last.getFullYear() !== now.getFullYear();
}

// ВРЕМЯ ДО СЛЕДУЮЩЕГО ДНЯ
function getTimeToTomorrow() {
  let now = new Date();
  let tomorrow = new Date(now);
  tomorrow.setDate(now.getDate() + 1);
  tomorrow.setHours(0, 0, 0, 0);
  let diff = tomorrow - now;
  return { h: Math.floor(diff / 3600000), m: Math.floor((diff % 3600000) / 60000) };
}

// ПОЗДРАВЛЕНИЕ
function celebrate(emoji, title, text, img) {
  document.getElementById("celebEmoji").innerHTML = emoji;
  document.getElementById("celebTitle").innerHTML = title;
  document.getElementById("celebText").innerHTML = text;
  let imgEl = document.getElementById("celebImg");
  if (img) { imgEl.src = img; imgEl.style.display = "block"; }
  else imgEl.style.display = "none";
  document.getElementById("celebration").classList.add("show");
}
function closeCeleb() {
  document.getElementById("celebration").classList.remove("show");
  renderGame();
}

// ПРОВЕРКА ЛЕГЕНДЫ
function checkLegend() {
  if (!game.gotLegend && 
      game.gotBase.length === BASE.length &&
      game.gotRare.length === RARE.length &&
      game.gotEpic.length === EPIC.length) {
    game.gotLegend = true;
    saveGame();
    setTimeout(() => celebrate("🔥", "ЛЕГЕНДА!", "Все суперсилы собраны! Ты — легенда!", LEGEND.img), 500);
  }
}

// ОТКРЫТЬ БАЗОВОГО ПЕРСОНАЖА
function openBase() {
  let idx = game.nextBaseIdx;
  if (!game.gotBase.includes(idx)) game.gotBase.push(idx);
  let free = BASE.map((_, i) => i).filter(i => !game.gotBase.includes(i));
  game.nextBaseIdx = free.length ? free[Math.floor(Math.random() * free.length)] : 0;
  saveGame();
  let char = BASE[idx];
  celebrate("🎉", char.power + " открыта!", char.name + " в коллекции!", char.img);
  checkLegend();
}

// СОХРАНЕНИЕ
function saveGame() {
  if (playerId) localStorage.setItem("as_simple_" + playerId, JSON.stringify(game));
}
function loadGame() {
  let raw = localStorage.getItem("as_simple_" + playerId);
  if (!raw) return false;
  try {
    let data = JSON.parse(raw);
    game = data;
    if (!game.gotBase) game.gotBase = [];
    if (!game.gotRare) game.gotRare = [];
    if (!game.gotEpic) game.gotEpic = [];
    if (game.gotLegend === undefined) game.gotLegend = false;
    if (game.currentKeyStep === undefined) game.currentKeyStep = 0;
    if (game.totalDays === undefined) game.totalDays = 0;
    if (game.stars === undefined) game.stars = 0;
    if (game.shinyStars === undefined) game.shinyStars = 0;
    if (game.nextBaseIdx === undefined) game.nextBaseIdx = Math.floor(Math.random() * BASE.length);
    return true;
  } catch(e) { return false; }
}

// ГЛАВНАЯ ФУНКЦИЯ - ЗАРЯДКА
function doWorkout() {
  if (!canWorkoutToday()) {
    renderGame();
    return;
  }
  
  game.totalDays++;
  game.lastDate = new Date().toISOString();
  
  // Определяем день в 7-дневном цикле (1-7)
  let dayInCycle = ((game.totalDays - 1) % 7) + 1;
  let isBaseCompleted = game.gotBase.length === BASE.length;
  
  if (dayInCycle >= 1 && dayInCycle <= 4) {
    // КЛЮЧЕВЫЕ ДНИ
    if (!isBaseCompleted) {
      game.currentKeyStep++;
      if (game.currentKeyStep >= 4) {
        openBase();
        game.currentKeyStep = 0;
      }
      saveGame();
      let left = 4 - game.currentKeyStep;
      if (left === 0) {
        celebrate("🎉", "Суперсила открыта!", BASE[game.gotBase[game.gotBase.length-1]]?.name + " в коллекции!", BASE[game.gotBase[game.gotBase.length-1]]?.img);
      } else {
        celebrate("🔑", "Ключ " + game.currentKeyStep + "/4", "Осталось " + left + " зарядк" + (left===1?"а":"и"), "");
      }
    } else {
      // База уже открыта — просто молодец
      celebrate("💪", "Молодец!", "Так держать!", "");
    }
  }
  else if (dayInCycle === 5 || dayInCycle === 6) {
    // ЗВЁЗДНЫЕ ДНИ
    game.stars++;
    saveGame();
    let need = 4 - (game.stars % 4 || 4);
    celebrate("⭐", "Звезда получена!", "Всего ⭐: " + game.stars + ". До редкого: " + need + " ⭐", "");
  }
  else if (dayInCycle === 7) {
    // СИЯЮЩИЙ ДЕНЬ
    game.shinyStars++;
    saveGame();
    let need = 4 - (game.shinyStars % 4 || 4);
    celebrate("🌟", "Сияющая звезда!", "Всего 🌟: " + game.shinyStars + ". До эпического: " + need + " 🌟", "");
  }
  
  renderGame();
}

// ОТРИСОВКА
function renderGame() {
  let days = game.totalDays;
  let dayInCycle = ((days) % 7) + 1;
  let nextDayInCycle = ((days) % 7) + 1;
  let isBaseCompleted = game.gotBase.length === BASE.length;
  
  document.getElementById("rank").innerHTML = getRank(days);
  document.getElementById("starCount").innerHTML = game.stars;
  document.getElementById("shinyCount").innerHTML = game.shinyStars;
  document.getElementById("greeting").innerHTML = "Привет, " + (game.name || "") + "!";
  document.getElementById("dayInfo").innerHTML = `📅 День ${days+1} в 7-дневном цикле: день ${nextDayInCycle} из 7`;
  
  // Показываем текущего персонажа или мотивацию
  let charBlock = document.getElementById("charBlock");
  let motivation = document.getElementById("motivation");
  let charImg = document.getElementById("charImg");
  
  if (isBaseCompleted) {
    charBlock.classList.remove("show");
    motivation.style.display = "block";
  } else if (game.gotBase.length > 0) {
    motivation.style.display = "none";
    let lastChar = BASE[game.gotBase[game.gotBase.length - 1]];
    if (lastChar) {
      charImg.src = lastChar.img;
      charBlock.classList.add("show");
    }
  } else {
    motivation.style.display = "none";
    charBlock.classList.remove("show");
  }
  
  // КНОПКА И ПРОГРЕСС
  let btn = document.getElementById("workoutBtn");
  let progressText = document.getElementById("progressText");
  let keysGrid = document.getElementById("keysGrid");
  
  if (nextDayInCycle >= 1 && nextDayInCycle <= 4) {
    // КЛЮЧЕВЫЕ ДНИ — показываем окошки
    keysGrid.style.display = "grid";
    for (let i=0; i<4; i++) {
      let slot = document.getElementById("k"+i);
      if (i < game.currentKeyStep) {
        slot.classList.add("filled");
        slot.innerHTML = "🔑";
      } else {
        slot.classList.remove("filled");
        slot.innerHTML = "";
      }
    }
    let left = 4 - game.currentKeyStep;
    if (left === 0) {
      progressText.innerHTML = "✨ Сегодня откроется новая суперсила! ✨";
    } else {
      progressText.innerHTML = "🔑 Собери 4 ключа: " + game.currentKeyStep + "/4 • Осталось " + left + " зарядк" + (left===1?"а":"и");
    }
    btn.className = "btn btn-green";
    btn.innerHTML = "🏃‍♀️ Я сделал(а) зарядку!";
  } 
  else if (nextDayInCycle === 5 || nextDayInCycle === 6) {
    keysGrid.style.display = "none";
    progressText.innerHTML = "⭐ Сегодня ты получишь ЗВЕЗДУ! ⭐";
    btn.className = "btn btn-star";
    btn.innerHTML = "⭐ Я сделал(а) зарядку!";
  }
  else if (nextDayInCycle === 7) {
    keysGrid.style.display = "none";
    progressText.innerHTML = "🌟 Сегодня ты получишь СИЯЮЩУЮ ЗВЕЗДУ! 🌟";
    btn.className = "btn btn-shiny";
    btn.innerHTML = "🌟 Я сделал(а) зарядку!";
  }
  
  // КУЛДАУН
  let coolDiv = document.getElementById("cooldownMsg");
  if (!canWorkoutToday()) {
    btn.style.display = "none";
    coolDiv.style.display = "block";
    let { h, m } = getTimeToTomorrow();
    coolDiv.innerHTML = "⏳ Следующая зарядка <span class='cooldown-time'>через " + h + "ч " + m + "мин</span>";
  } else {
    btn.style.display = "block";
    coolDiv.style.display = "none";
  }
}

// ГАЛЕРЕЯ
let currentTab = "base";

function renderGallery() {
  let items = [], collected = [];
  if (currentTab === "base") { items = BASE; collected = game.gotBase; }
  else if (currentTab === "rare") { items = RARE; collected = game.gotRare; }
  else if (currentTab === "epic") { items = EPIC; collected = game.gotEpic; }
  else { items = [LEGEND]; collected = game.gotLegend ? [0] : []; }
  
  let html = '<div class="gallery-grid">';
  for (let i=0; i<items.length; i++) {
    let c = items[i];
    let owned = (currentTab === "legend") ? game.gotLegend : collected.includes(i);
    html += '<div class="g-item ' + (owned ? "got" : "") + '">';
    if (owned) {
      html += '<img src="' + c.img + '" onerror="this.parentElement.innerHTML=\'❓\'">';
      html += '<div class="g-name">' + c.power + '</div>';
    } else {
      html += '<div style="font-size:40px; padding:20px;">❓</div>';
      if (currentTab === "rare" || currentTab === "epic") {
        let cost = 4;
        let have = currentTab === "rare" ? game.stars : game.shinyStars;
        let icon = currentTab === "rare" ? "⭐" : "🌟";
        html += '<div class="g-price">' + icon + ' ' + have + '/' + cost + '</div>';
        if (have >= cost) {
          html += '<button class="g-btn" onclick="unlockChar(' + i + ')">Открыть за ' + icon + cost + '</button>';
        }
      } else if (currentTab === "legend") {
        html += '<div style="font-size:11px;">Собери всех героев!</div>';
      }
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById("galleryContent").innerHTML = html;
}

window.unlockChar = function(idx) {
  if (currentTab === "rare" && game.stars >= 4 && !game.gotRare.includes(idx)) {
    game.stars -= 4;
    game.gotRare.push(idx);
    saveGame();
    celebrate("⭐", RARE[idx].power + " открыта!", RARE[idx].name + " в коллекции!", RARE[idx].img);
    renderGallery();
    renderGame();
    checkLegend();
  } else if (currentTab === "epic" && game.shinyStars >= 4 && !game.gotEpic.includes(idx)) {
    game.shinyStars -= 4;
    game.gotEpic.push(idx);
    saveGame();
    celebrate("🌟", EPIC[idx].power + " открыт!", EPIC[idx].name + " в коллекции!", EPIC[idx].img);
    renderGallery();
    renderGame();
    checkLegend();
  }
};

function initTabs() {
  let cont = document.getElementById("galleryTabs");
  cont.innerHTML = "";
  let tabs = ["base","rare","epic","legend"];
  let names = ["Базовые","Редкие","Эпические","Легенда"];
  tabs.forEach((t, i) => {
    let btn = document.createElement("button");
    btn.innerText = names[i];
    btn.className = "tab" + (i === 0 ? " active" : "");
    btn.onclick = () => {
      document.querySelectorAll("#galleryTabs .tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentTab = t;
      renderGallery();
    };
    cont.appendChild(btn);
  });
}

function showGallery() {
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("galleryScreen").style.display = "block";
  initTabs();
  renderGallery();
}
function hideGallery() {
  document.getElementById("galleryScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  renderGame();
}

// СТАРТ
function checkInputs() {
  let name = document.getElementById("playerName").value.trim();
  let nick = document.getElementById("playerNick").value.trim();
  document.getElementById("startBtn").disabled = !(name && nick);
}

function startGame() {
  let name = document.getElementById("playerName").value.trim();
  let nick = document.getElementById("playerNick").value.trim();
  if (!name || !nick) return;
  playerId = (name + "_" + nick).toLowerCase().replace(/[^a-z0-9_]/g, '_');
  localStorage.setItem("as_who", JSON.stringify({name, nick}));
  if (!loadGame()) {
    game = {
      name: name, nick: nick,
      totalDays: 0, currentKeyStep: 0,
      stars: 0, shinyStars: 0,
      gotBase: [], gotRare: [], gotEpic: [], gotLegend: false,
      nextBaseIdx: Math.floor(Math.random() * BASE.length),
      lastDate: null
    };
  } else {
    game.name = name;
    game.nick = nick;
  }
  saveGame();
  document.getElementById("enterScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  renderGame();
}

function resetGame() {
  localStorage.removeItem("as_simple_" + playerId);
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("enterScreen").style.display = "block";
  document.getElementById("playerName").value = "";
  document.getElementById("playerNick").value = "";
  checkInputs();
}

document.getElementById("startBtn").onclick = startGame;
document.getElementById("workoutBtn").onclick = doWorkout;
document.getElementById("galleryBtn").onclick = showGallery;
document.getElementById("backBtn").onclick = hideGallery;
document.getElementById("resetBtn").onclick = resetGame;
document.getElementById("closeCelebBtn").onclick = closeCeleb;
document.getElementById("playerName").oninput = checkInputs;
document.getElementById("playerNick").oninput = checkInputs;

let saved = localStorage.getItem("as_who");
if (saved) {
  try {
    let d = JSON.parse(saved);
    if (d.name && d.nick) {
      document.getElementById("playerName").value = d.name;
      document.getElementById("playerNick").value = d.nick;
      checkInputs();
    }
  } catch(e) {}
}
checkInputs();
</script>
</body>
</html>
