<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Активные Стопы — Дни силы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #1e2b6e, #311b5a);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    background: #fff;
    border-radius: 44px;
    padding: 24px 20px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 25px 50px rgba(0, 0, 0, 0.25);
    text-align: center;
    transition: all 0.2s;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: #1f2937;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: #6c757d;
    font-weight: 800;
    margin-bottom: 18px;
  }

  .btn {
    background: linear-gradient(135deg, #3b4bae, #7c3aed);
    color: white;
    border: none;
    border-radius: 60px;
    padding: 14px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    font-weight: normal;
    cursor: pointer;
    width: 100%;
    transition: transform 0.15s ease, box-shadow 0.1s;
    box-shadow: 0 6px 14px rgba(59, 75, 174, 0.3);
    margin-top: 10px;
  }

  .btn:hover {
    transform: translateY(-2px);
  }

  .btn:disabled {
    opacity: 0.5;
    transform: none;
    cursor: not-allowed;
  }

  .btn-green {
    background: linear-gradient(135deg, #0f6e3f, #2b9348);
    box-shadow: 0 6px 14px rgba(15, 110, 63, 0.3);
  }

  .btn-star {
    background: linear-gradient(135deg, #e6a017, #f4c542);
    box-shadow: 0 6px 14px rgba(230, 160, 23, 0.4);
    color: #2d1f00;
  }

  .btn-shiny {
    background: linear-gradient(135deg, #f97316, #ffb347);
    box-shadow: 0 6px 14px rgba(249, 115, 22, 0.4);
  }

  .field-label {
    font-size: 12px;
    font-weight: 800;
    color: #4b5563;
    text-align: left;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .field-input {
    width: 100%;
    border: 2.5px solid #e2e8f0;
    border-radius: 40px;
    padding: 12px 16px;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 18px;
    text-align: center;
    margin-bottom: 16px;
    outline: none;
    transition: border 0.2s;
  }

  .field-input:focus {
    border-color: #7c3aed;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 16px;
    border-radius: 100px;
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    background: #eef2ff;
    color: #1e293b;
  }

  .rank-novice { background: #e0f2fe; color: #155e75; }
  .rank-student { background: #fff3e3; color: #b45309; }
  .rank-pro { background: #e0e7ff; color: #3730a3; }
  .rank-master { background: #f3e8ff; color: #6b21a5; }

  .keys-wallet {
    display: flex;
    gap: 14px;
    background: #f1f5f9;
    padding: 6px 20px;
    border-radius: 60px;
  }

  .wallet-slot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    font-weight: bold;
  }

  .wallet-slot.star { color: #f59e0b; }
  .wallet-slot.shiny { color: #ea580c; }

  .greeting {
    font-size: 18px;
    font-weight: 900;
    color: #0f172a;
    margin-bottom: 6px;
  }

  .day-badge {
    background: #f1f1f1;
    border-radius: 40px;
    padding: 6px 12px;
    font-weight: 800;
    font-size: 13px;
    display: inline-block;
    margin-bottom: 12px;
    color: #334155;
  }

  .progress-text {
    font-weight: 800;
    color: #334155;
    margin: 10px 0;
    font-size: 15px;
  }

  .keys-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 18px 0;
  }

  .key-slot {
    aspect-ratio: 1;
    background: #f8fafc;
    border: 3px dashed #cbd5e1;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    transition: all 0.3s ease;
  }

  .key-slot.filled {
    border: 3px solid #fbbf24;
    background: #fffbeb;
    box-shadow: 0 4px 10px rgba(251, 191, 36, 0.3);
    animation: bounce 0.4s;
  }

  @keyframes bounce {
    0% { transform: scale(0.8); opacity: 0; }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .char-wrap {
    background: #fef9e3;
    border-radius: 32px;
    margin: 15px 0;
    padding: 8px;
    display: none;
  }

  .char-wrap.show {
    display: block;
    animation: fadePop 0.5s;
  }

  @keyframes fadePop {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .char-wrap img {
    width: 100%;
    height: 200px;
    object-fit: contain;
    border-radius: 24px;
  }

  .cooldown-msg {
    background: #eef2ff;
    padding: 16px;
    border-radius: 30px;
    font-weight: 700;
    margin-top: 12px;
    font-size: 14px;
    display: none;
  }

  .cooldown-time {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    display: block;
    margin-top: 4px;
  }

  .info-box {
    background: #fff9e6;
    padding: 10px 14px;
    border-radius: 24px;
    font-weight: 700;
    font-size: 13px;
    margin-top: 12px;
    display: none;
    color: #b45309;
  }

  .collection-bar {
    margin-top: 20px;
    border-top: 2px solid #eef2ff;
    padding-top: 16px;
    cursor: pointer;
    font-weight: 800;
    color: #475569;
  }

  .change-name {
    font-size: 12px;
    color: #94a3b8;
    margin-top: 14px;
    cursor: pointer;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin: 18px 0;
  }

  .g-item {
    background: #f8fafc;
    border-radius: 28px;
    overflow: hidden;
    text-align: center;
    border: 2px solid #e2e8f0;
    transition: 0.2s;
    padding-bottom: 10px;
  }

  .g-item.got {
    background: white;
    border-color: #ffd966;
  }

  .g-item img {
    width: 100%;
    height: 130px;
    object-fit: contain;
  }

  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .celebration.show {
    display: flex;
  }

  .celeb-box {
    background: white;
    border-radius: 48px;
    padding: 24px;
    text-align: center;
    max-width: 320px;
    width: 90%;
  }

  .celeb-emoji {
    font-size: 58px;
  }

  .gallery-tabs {
    display: flex;
    gap: 4px;
    background: #f1f5f9;
    border-radius: 60px;
    padding: 4px;
    margin-bottom: 20px;
  }

  .tab-btn {
    flex: 1;
    border: none;
    background: transparent;
    padding: 8px 0;
    font-weight: 800;
    border-radius: 40px;
    font-size: 13px;
    cursor: pointer;
  }

  .tab-btn.active {
    background: white;
    box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    color: #6d28d9;
  }

  .rarity-label {
    font-size: 9px;
    font-weight: 900;
    padding: 2px 10px;
    border-radius: 20px;
    display: inline-block;
    margin: 8px 0 4px;
  }

  .rarity-base { background: #dbeafe; color: #1e40af; }
  .rarity-rare { background: #fef3c7; color: #b45309; }
  .rarity-epic { background: #ffe4e6; color: #be123c; }
  .rarity-legendary { background: #f3e8ff; color: #7e22ce; }
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">56 дней силы ✨</div>
  <div class="field-label">Твоё имя</div>
  <input class="field-input" id="nameInput" placeholder="Например: София" maxlength="15">
  <div class="field-label">Твой ник</div>
  <input class="field-input" id="nickInput" placeholder="Молния 🚀" maxlength="20">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🎯</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div class="rank-badge" id="rankBadge">🌱 НОВИЧОК</div>
    <div class="keys-wallet">
      <div class="wallet-slot star">⭐ <span id="starCount">0</span></div>
      <div class="wallet-slot shiny">🌟 <span id="shinyCount">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="day-badge" id="dayDisplay">ДЕНЬ 1 / 56</div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid"></div>
  <div class="char-wrap" id="charWrap"><img id="charImg" src=""></div>
  <button class="btn btn-green" id="claimBtn" onclick="doWorkout()">🏃‍♀️ Я сделал(а) зарядку!</button>
  <div class="cooldown-msg" id="cooldownMsg"></div>
  <div class="info-box" id="infoBox"></div>
  <div class="collection-bar" onclick="showGallery()">🏅 Моя коллекция →</div>
  <div class="change-name" onclick="resetProfile()">🔄 Сменить героя</div>
</div>

<div class="card" id="galleryScreen" style="display:none">
  <h1 style="margin-bottom:12px">🌟 Все герои</h1>
  <div class="gallery-tabs" id="galleryTabs"></div>
  <div id="galleryContent"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration" onclick="closeCeleb()">
  <div class="celeb-box" onclick="event.stopPropagation()">
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title" id="celebTitle" style="font-weight:900; font-size:22px;"></div>
    <img class="celeb-img" id="celebImg" style="width:100%; margin:10px 0; display:none;">
    <div class="celeb-text" id="celebText" style="margin:12px 0;"></div>
    <button class="btn" onclick="closeCeleb()">Отлично! 🎉</button>
  </div>
</div>

<script>
  // ======================= ПЕРСОНАЖИ =========================
  const BASE_CHARS = [
    { animal:"🐆", power:"Скорость", name:"Гепард", img:"gepard.png" },
    { animal:"🐦", power:"Лёгкость", name:"Колибри", img:"kolibri.png" },
    { animal:"🐜", power:"Сила", name:"Муравей", img:"muravey.png" },
    { animal:"🦩", power:"Баланс", name:"Фламинго", img:"flamingo.png" },
    { animal:"🦥", power:"Восстановление", name:"Ленивец", img:"lenivec.png" },
    { animal:"🐒", power:"Координация", name:"Обезьяна", img:"obeziana.png" },
    { animal:"🐫", power:"Выносливость", name:"Верблюд", img:"verblyud.png" },
    { animal:"🐱", power:"Гибкость", name:"Кошка", img:"koshka.png" },
  ];
  const RARE_CHARS = [
    { animal:"🦘", power:"Прыгучесть", name:"Кенгуру", img:"kenguru.png" },
    { animal:"🐙", power:"Цепкость", name:"Осьминог", img:"osminog.png" },
    { animal:"🦀", power:"Устойчивость", name:"Краб", img:"krab.png" },
    { animal:"🐌", power:"Чуткость", name:"Улитка", img:"ulitka.png" },
  ];
  const EPIC_CHARS = [
    { animal:"🦄", power:"Суперлёгкость", name:"Единорог", img:"edinorog.png" },
    { animal:"🐉", power:"Суперсила", name:"Дракон", img:"drakon.png" },
  ];
  const LEGEND_CHAR = { animal:"🔥", power:"Возрождение", name:"Феникс", img:"feniks.png" };

  function getDayType(dayNumber) {
    if (dayNumber < 1 || dayNumber > 56) return 'finished';
    const weekPos = ((dayNumber - 1) % 7) + 1;
    if (weekPos >= 1 && weekPos <= 4) return 'key';
    if (weekPos === 5 || weekPos === 6) return 'star';
    if (weekPos === 7) return 'shiny';
    return 'none';
  }

  let state = {};
  let currentPlayerKey = "";

  function defaultState(name = "", nick = "") {
    return {
      name: name,
      nick: nick,
      totalDays: 0,
      stars: 0,
      shinyStars: 0,
      currentKeyStep: 0,
      currentBaseIndex: Math.floor(Math.random() * BASE_CHARS.length),
      collectedBase: [],
      collectedRare: [],
      collectedEpic: [],
      hasLegend: false,
      lastClaimDate: null,
    };
  }

  function saveState() {
    if (!currentPlayerKey) return;
    localStorage.setItem(`active_stop_${currentPlayerKey}`, JSON.stringify(state));
  }

  function loadState(key) {
    const raw = localStorage.getItem(`active_stop_${key}`);
    if (!raw) return false;
    try {
      const data = JSON.parse(raw);
      state = data;
      if (!state.collectedBase) state.collectedBase = [];
      if (!state.collectedRare) state.collectedRare = [];
      if (!state.collectedEpic) state.collectedEpic = [];
      if (state.hasLegend === undefined) state.hasLegend = false;
      if (state.currentKeyStep === undefined) state.currentKeyStep = 0;
      if (!state.currentBaseIndex && state.currentBaseIndex !== 0) state.currentBaseIndex = Math.floor(Math.random() * BASE_CHARS.length);
      return true;
    } catch(e) { return false; }
  }

  function adoptFresh(name, nick) {
    state = defaultState(name, nick);
    saveState();
  }

  function canClaimToday() {
    if (!state.lastClaimDate) return true;
    const last = new Date(state.lastClaimDate);
    const now = new Date();
    const diffHours = (now - last) / (1000 * 60 * 60);
    return diffHours >= 24;
  }

  function getRemainingTimeText() {
    if (!state.lastClaimDate) return null;
    const last = new Date(state.lastClaimDate);
    const next = new Date(last.getTime() + 24 * 3600 * 1000);
    const diff = next - new Date();
    if (diff <= 0) return null;
    const hours = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    return `${hours} ч ${mins} мин`;
  }

  function nextUnlockedBaseIndex() {
    const allIndices = BASE_CHARS.map((_, i) => i);
    const free = allIndices.filter(i => !state.collectedBase.includes(i));
    if (free.length === 0) return allIndices[0];
    return free[Math.floor(Math.random() * free.length)];
  }

  function addBaseCharacter() {
    const newIdx = nextUnlockedBaseIndex();
    if (!state.collectedBase.includes(newIdx)) state.collectedBase.push(newIdx);
    state.currentBaseIndex = newIdx;
  }

  function updateRankWeeks() {
    const weeks = Math.floor(state.totalDays / 7);
    let badge = "🌱 НОВИЧОК", cls = "rank-novice";
    if (weeks >= 8) { badge = "👑 МАСТЕР"; cls = "rank-master"; }
    else if (weeks >= 6) { badge = "⚡ ПРОФИ"; cls = "rank-pro"; }
    else if (weeks >= 3) { badge = "📖 УЧЕНИК"; cls = "rank-student"; }
    const el = document.getElementById("rankBadge");
    if (el) { el.textContent = badge; el.className = `rank-badge ${cls}`; }
  }

  function showCelebration(emoji, title, text, imgSrc, soundType) {
    const box = document.getElementById("celebration");
    document.getElementById("celebEmoji").innerText = emoji;
    document.getElementById("celebTitle").innerText = title;
    document.getElementById("celebText").innerText = text;
    const imgEl = document.getElementById("celebImg");
    if (imgSrc) {
      imgEl.src = imgSrc;
      imgEl.style.display = "block";
    } else imgEl.style.display = "none";
    box.classList.add("show");
    if (soundType) playSound(soundType);
  }

  function playSound(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = { key: [[880,0.1,'sine']], base: [[523,0.2],[659,0.2],[784,0.2]], rare: [[659,0.15],[880,0.15]], epic: [[523,0.2],[784,0.2],[1047,0.2]], legend: [[392,0.2],[523,0.2],[659,0.2],[784,0.2]] };
      const seq = notes[type];
      if(!seq) return;
      seq.forEach(([f, dur], idx) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value = f;
        gain.gain.value = 0.2;
        const start = ctx.currentTime + idx * 0.15;
        osc.start(start);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + 0.4);
        osc.stop(start + 0.4);
      });
    } catch(e) {}
  }

  async function doWorkout() {
    const btn = document.getElementById("claimBtn");
    if (!canClaimToday()) {
      const remain = getRemainingTimeText();
      document.getElementById("cooldownMsg").style.display = "block";
      document.getElementById("cooldownMsg").innerHTML = `🌀 Отдыхай! Следующая зарядка через <span class="cooldown-time">${remain}</span>`;
      return;
    }
    if (state.totalDays >= 56) {
      showCelebration("🏆", "Ты легенда!", "Все 56 дней пройдены! Ты настоящий герой!", "", "legend");
      return;
    }
    
    state.totalDays++;
    state.lastClaimDate = new Date().toISOString();
    const todayType = getDayType(state.totalDays);
    const dayNum = state.totalDays;
    
    if (todayType === 'key') {
      state.currentKeyStep++;
      playSound("key");
      if (state.currentKeyStep >= 4) {
        // открываем базового персонажа
        addBaseCharacter();
        const openedChar = BASE_CHARS[state.currentBaseIndex];
        showCelebration("🔓", openedChar.power + " открыта!", openedChar.name + " в твоей команде!", openedChar.img, "base");
        state.currentKeyStep = 0;
        checkLegendaryCollect();
      } else {
        showCelebration("🔑", `Ключ ${state.currentKeyStep} / 4`, `Осталось ${4-state.currentKeyStep} зарядок до суперсилы!`, null, "key");
      }
    } 
    else if (todayType === 'star') {
      state.stars++;
      playSound("rare");
      showCelebration("⭐", "Звезда силы!", `У тебя ${state.stars} ⭐. 4 звезды = редкий герой!`, null, "rare");
    } 
    else if (todayType === 'shiny') {
      state.shinyStars++;
      playSound("epic");
      showCelebration("🌟", "Сияющая звезда!", `У тебя ${state.shinyStars} 🌟. 4 сияющих = эпический герой!`, null, "epic");
    }
    
    saveState();
    renderGameUI();
    updateCooldownDisplay();
  }
  
  function checkLegendaryCollect() {
    const allBase = state.collectedBase.length === BASE_CHARS.length;
    const allRare = state.collectedRare.length === RARE_CHARS.length;
    const allEpic = state.collectedEpic.length === EPIC_CHARS.length;
    if (!state.hasLegend && allBase && allRare && allEpic) {
      state.hasLegend = true;
      saveState();
      setTimeout(() => {
        showCelebration("🔥🌿", "ФЕНИКС ВОЗРОЖДЕНИЕ", "Ты собрал всех героев! Легендарная сила!", LEGEND_CHAR.img, "legend");
      }, 500);
    }
  }
  
  function renderGameUI() {
    if (!document.getElementById("gameScreen") || document.getElementById("gameScreen").style.display !== "block") return;
    document.getElementById("greeting").innerHTML = `Привет, ${state.name || "Герой"} ✨`;
    document.getElementById("starCount").innerText = state.stars;
    document.getElementById("shinyCount").innerText = state.shinyStars;
    const dayNum = state.totalDays + 1;
    const displayDay = dayNum > 56 ? 56 : dayNum;
    document.getElementById("dayDisplay").innerHTML = `📅 ДЕНЬ ${displayDay} / 56`;
    updateRankWeeks();
    
    const todayType = (state.totalDays >= 56) ? 'finished' : getDayType(state.totalDays + 1);
    const infoBox = document.getElementById("infoBox");
    if (state.totalDays >= 56) {
      infoBox.style.display = "block";
      infoBox.innerHTML = "🏁 Ты прошёл 56 дней! Ты чемпион!";
      document.getElementById("claimBtn").style.display = "none";
      return;
    } else {
      document.getElementById("claimBtn").style.display = "block";
      if (todayType === 'star') {
        document.getElementById("claimBtn").className = "btn btn-star";
        document.getElementById("claimBtn").innerHTML = "⭐ Зарядка + звезда!";
        infoBox.style.display = "block";
        infoBox.innerHTML = "⭐ Сегодня даст звёздочку!";
      } else if (todayType === 'shiny') {
        document.getElementById("claimBtn").className = "btn btn-shiny";
        document.getElementById("claimBtn").innerHTML = "🌟 Зарядка + сияющая звезда!";
        infoBox.style.display = "block";
        infoBox.innerHTML = "🌟 Сегодня сияющая звезда!";
      } else if (todayType === 'key') {
        document.getElementById("claimBtn").className = "btn btn-green";
        document.getElementById("claimBtn").innerHTML = "🏃‍♀️ Зарядка → золотой ключ!";
        infoBox.style.display = "none";
      } else {
        document.getElementById("claimBtn").className = "btn btn-green";
        document.getElementById("claimBtn").innerHTML = "🏃‍♀️ Я сделал(а) зарядку!";
      }
    }
    
    // ключевая сетка или отображение персонажа
    const keysGrid = document.getElementById("keysGrid");
    const charWrap = document.getElementById("charWrap");
    const charImg = document.getElementById("charImg");
    
    const upcomingDayType = getDayType(state.totalDays + 1);
    const isKeyWeek = (upcomingDayType === 'key');
    const showCharacterInsteadOfKeys = (!isKeyWeek && state.collectedBase.length > 0) || (state.totalDays % 7 >= 4 && state.totalDays % 7 !== 0);
    
    if (!isKeyWeek && state.collectedBase.length > 0) {
      keysGrid.style.display = "none";
      charWrap.classList.add("show");
      const lastBase = state.collectedBase[state.collectedBase.length-1];
      const lastChar = BASE_CHARS[lastBase];
      charImg.src = lastChar.img;
      document.getElementById("progressText").innerHTML = `✨ ${lastChar.power} — твоя суперсила готова!`;
    } 
    else if (isKeyWeek) {
      charWrap.classList.remove("show");
      keysGrid.style.display = "grid";
      keysGrid.innerHTML = "";
      const step = state.currentKeyStep;
      for(let i=0;i<4;i++){
        const slot = document.createElement("div");
        slot.className = "key-slot" + (i < step ? " filled" : "");
        slot.innerText = i < step ? "🔑" : "⚜️";
        keysGrid.appendChild(slot);
      }
      const left = 4 - step;
      document.getElementById("progressText").innerHTML = `🔐 Осталось ${left} ${left===1?"зарядка":(left<5?"зарядки":"зарядок")} до новой суперсилы!`;
    } else {
      keysGrid.style.display = "none";
      charWrap.classList.remove("show");
      document.getElementById("progressText").innerHTML = "🎯 Продолжай завтра!";
    }
  }
  
  function updateCooldownDisplay() {
    const coolDiv = document.getElementById("cooldownMsg");
    if (!canClaimToday() && state.totalDays < 56) {
      const remain = getRemainingTimeText();
      coolDiv.style.display = "block";
      coolDiv.innerHTML = `⏳ Следующая тренировка через <span class="cooldown-time">${remain}</span>`;
    } else {
      coolDiv.style.display = "none";
    }
  }
  
  function renderGallery(tab) {
    const container = document.getElementById("galleryContent");
    let list = [];
    let type = tab;
    if (tab === "base") list = BASE_CHARS;
    else if (tab === "rare") list = RARE_CHARS;
    else if (tab === "epic") list = EPIC_CHARS;
    else list = [LEGEND_CHAR];
    container.innerHTML = "";
    const grid = document.createElement("div");
    grid.className = "gallery-grid";
    for (let i = 0; i < list.length; i++) {
      const ch = list[i];
      let isOwned = false;
      if (tab === "base") isOwned = state.collectedBase.includes(i);
      else if (tab === "rare") isOwned = state.collectedRare.includes(i);
      else if (tab === "epic") isOwned = state.collectedEpic.includes(i);
      else isOwned = state.hasLegend;
      
      const div = document.createElement("div");
      div.className = "g-item " + (isOwned ? "got" : "");
      const imgDiv = document.createElement("div");
      if (isOwned) {
        const img = document.createElement("img");
        img.src = ch.img;
        img.alt = ch.power;
        imgDiv.appendChild(img);
      } else {
        imgDiv.innerHTML = '<div style="font-size:48px; padding:20px;">❓</div>';
      }
      div.appendChild(imgDiv);
      const nameSpan = document.createElement("div");
      nameSpan.innerText = ch.power;
      nameSpan.style.fontWeight = "bold";
      nameSpan.style.padding = "6px";
      div.appendChild(nameSpan);
      
      if (!isOwned && (tab === "rare" || tab === "epic")) {
        const needed = 4;
        const current = tab === "rare" ? state.stars : state.shinyStars;
        if (current >= needed) {
          const btn = document.createElement("button");
          btn.innerText = `✨ Открыть (${needed})`;
          btn.style.margin = "8px";
          btn.style.borderRadius = "40px";
          btn.style.padding = "6px 12px";
          btn.style.border = "none";
          btn.style.background = "#facc15";
          btn.style.fontWeight = "bold";
          btn.onclick = (e) => {
            e.stopPropagation();
            if (tab === "rare" && state.stars >= 4 && !state.collectedRare.includes(i)) {
              state.stars -= 4;
              state.collectedRare.push(i);
              saveState();
              showCelebration("⭐", ch.power, `${ch.name} в коллекции!`, ch.img, "rare");
              renderGallery(tab);
              renderGameUI();
              checkLegendaryCollect();
            } else if (tab === "epic" && state.shinyStars >= 4 && !state.collectedEpic.includes(i)) {
              state.shinyStars -= 4;
              state.collectedEpic.push(i);
              saveState();
              showCelebration("🌟", ch.power, `${ch.name} пополнил арсенал!`, ch.img, "epic");
              renderGallery(tab);
              renderGameUI();
              checkLegendaryCollect();
            }
          };
          div.appendChild(btn);
        } else {
          const need = document.createElement("div");
          need.innerText = `⭐ ${current}/${needed}`;
          need.style.fontSize = "12px";
          need.style.margin = "6px";
          div.appendChild(need);
        }
      }
      grid.appendChild(div);
    }
    container.appendChild(grid);
  }
  
  function initGalleryTabs() {
    const tabsDiv = document.getElementById("galleryTabs");
    tabsDiv.innerHTML = "";
    const tabs = ["base","rare","epic","legend"];
    const names = ["Базовые","Редкие","Эпические","Легенда"];
    tabs.forEach((t, idx) => {
      const btn = document.createElement("button");
      btn.innerText = names[idx];
      btn.className = "tab-btn" + (idx===0 ? " active" : "");
      btn.onclick = () => {
        document.querySelectorAll("#galleryTabs .tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderGallery(t);
      };
      tabsDiv.appendChild(btn);
    });
  }
  
  function showGallery() {
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("galleryScreen").style.display = "block";
    initGalleryTabs();
    renderGallery("base");
  }
  
  function hideGallery() {
    document.getElementById("galleryScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    renderGameUI();
    updateCooldownDisplay();
  }
  
  function resetProfile() {
    localStorage.removeItem(`active_stop_${currentPlayerKey}`);
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("nameScreen").style.display = "block";
    document.getElementById("nameInput").value = "";
    document.getElementById("nickInput").value = "";
    document.getElementById("startBtn").disabled = true;
  }
  
  function startGame() {
    const name = document.getElementById("nameInput").value.trim();
    const nick = document.getElementById("nickInput").value.trim();
    if (!name || !nick) return;
    currentPlayerKey = btoa(`${name}_${nick}`).slice(0, 24);
    const loaded = loadState(currentPlayerKey);
    if (!loaded) {
      adoptFresh(name, nick);
    } else {
      state.name = name;
      state.nick = nick;
      saveState();
    }
    document.getElementById("nameScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    renderGameUI();
    updateCooldownDisplay();
    setInterval(() => { updateCooldownDisplay(); renderGameUI(); }, 30000);
  }
  
  function closeCeleb() { document.getElementById("celebration").classList.remove("show");}
  
  window.startGame = startGame;
  window.doWorkout = doWorkout;
  window.showGallery = showGallery;
  window.hideGallery = hideGallery;
  window.resetProfile = resetProfile;
  window.closeCeleb = closeCeleb;
  
  function checkInputs() {
    const name = document.getElementById("nameInput").value.trim();
    const nick = document.getElementById("nickInput").value.trim();
    document.getElementById("startBtn").disabled = !(name && nick);
  }
  document.getElementById("nameInput").addEventListener("input", checkInputs);
  document.getElementById("nickInput").addEventListener("input", checkInputs);
  checkInputs();
  
  const savedWho = localStorage.getItem("as_who") || "";
  if(savedWho) {
    try {
      const old = JSON.parse(savedWho);
      if(old.name && old.nick) {
        document.getElementById("nameInput").value = old.name;
        document.getElementById("nickInput").value = old.nick;
        checkInputs();
      }
    } catch(e) {}
  }
</script>
</body>
</html>
