<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Активные Стопы — Собери суперсилы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: #fff;
    border-radius: 40px;
    padding: 24px 20px;
    max-width: 450px;
    width: 100%;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    text-align: center;
    transition: all 0.2s;
  }

  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: #1e293b;
    margin-bottom: 5px;
  }

  .subtitle {
    font-size: 13px;
    color: #7c8ba0;
    font-weight: 800;
    margin-bottom: 20px;
  }

  .btn {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    border: none;
    width: 100%;
    padding: 14px;
    border-radius: 60px;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    color: white;
    cursor: pointer;
    transition: all 0.15s;
    box-shadow: 0 6px 14px rgba(99, 102, 241, 0.3);
    margin-top: 12px;
  }

  .btn:active {
    transform: scale(0.96);
  }

  .btn:disabled {
    opacity: 0.5;
    transform: none;
    cursor: not-allowed;
  }

  .btn-green {
    background: linear-gradient(135deg, #10b981, #059669);
    box-shadow: 0 6px 14px rgba(16, 185, 129, 0.3);
  }

  .btn-star {
    background: linear-gradient(135deg, #f59e0b, #d97706);
    box-shadow: 0 6px 14px rgba(245, 158, 11, 0.3);
  }

  .btn-shiny {
    background: linear-gradient(135deg, #f97316, #ea580c);
    box-shadow: 0 6px 14px rgba(249, 115, 22, 0.3);
  }

  .field-label {
    text-align: left;
    font-size: 12px;
    font-weight: 800;
    color: #556;
    margin-bottom: 6px;
    letter-spacing: 0.5px;
  }

  .field-input {
    width: 100%;
    border: 2.5px solid #e2e8f0;
    border-radius: 60px;
    padding: 12px 16px;
    font-size: 17px;
    font-weight: 700;
    text-align: center;
    margin-bottom: 16px;
    outline: none;
    font-family: 'Nunito', sans-serif;
  }

  .field-input:focus {
    border-color: #8b5cf6;
  }

  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 8px;
  }

  .rank-badge {
    background: #f1f5f9;
    padding: 6px 16px;
    border-radius: 40px;
    font-weight: 800;
    font-size: 13px;
    font-family: 'Fredoka One', cursive;
  }

  .rank-novice { background: #dcfce7; color: #166534; }
  .rank-student { background: #fef9c3; color: #854d0e; }
  .rank-pro { background: #dbeafe; color: #1e40af; }
  .rank-master { background: #e9d5ff; color: #6b21a5; }

  .keys-wallet {
    display: flex;
    gap: 12px;
    background: #f8fafc;
    padding: 5px 20px;
    border-radius: 60px;
  }

  .wallet-slot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    font-weight: bold;
  }

  .wallet-slot.star { color: #f59e0b; }
  .wallet-slot.shiny { color: #ea580c; }

  .greeting {
    font-size: 18px;
    font-weight: 900;
    color: #0f172a;
    margin-bottom: 8px;
  }

  .progress-text {
    font-weight: 800;
    color: #475569;
    background: #f8fafc;
    padding: 10px 14px;
    border-radius: 60px;
    font-size: 14px;
    margin: 12px 0;
  }

  .keys-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin: 12px 0;
  }

  .key-slot {
    aspect-ratio: 1;
    background: #f8fafc;
    border: 3px dashed #cbd5e1;
    border-radius: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 34px;
    transition: all 0.2s;
  }

  .key-slot.filled {
    background: #fffbeb;
    border: 3px solid #fbbf24;
    box-shadow: 0 2px 12px rgba(251, 191, 36, 0.3);
    animation: bounce 0.35s ease;
  }

  @keyframes bounce {
    0% { transform: scale(0.7); opacity: 0; }
    80% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  .char-wrap {
    background: #fef9e3;
    border-radius: 32px;
    margin: 12px 0;
    padding: 8px;
    display: none;
  }

  .char-wrap.show {
    display: block;
    animation: fadeZoom 0.4s;
  }

  @keyframes fadeZoom {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .char-wrap img {
    width: 100%;
    height: 200px;
    object-fit: contain;
    border-radius: 24px;
  }

  .cooldown-msg {
    background: #eff6ff;
    padding: 12px;
    border-radius: 28px;
    font-weight: 700;
    font-size: 13px;
    margin-top: 10px;
    display: none;
    color: #2563eb;
  }

  .cooldown-time {
    font-family: 'Fredoka One', cursive;
    font-size: 22px;
    display: block;
    margin-top: 5px;
  }

  .info-box {
    background: #fefce8;
    padding: 10px;
    border-radius: 28px;
    font-weight: 700;
    font-size: 12px;
    margin-top: 10px;
    display: none;
    color: #b45309;
  }

  .collection-bar {
    border-top: 2px solid #eef2ff;
    padding-top: 16px;
    margin-top: 20px;
    cursor: pointer;
    font-weight: 800;
    color: #4b5563;
  }

  .change-name {
    font-size: 11px;
    color: #94a3b8;
    margin-top: 14px;
    cursor: pointer;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin: 18px 0;
  }

  .g-item {
    background: #f8fafc;
    border-radius: 28px;
    overflow: hidden;
    text-align: center;
    border: 2px solid #e2e8f0;
    transition: 0.2s;
    padding-bottom: 12px;
  }

  .g-item.got {
    background: white;
    border-color: #facc15;
  }

  .g-item img {
    width: 100%;
    height: 130px;
    object-fit: contain;
  }

  .g-name {
    font-weight: 900;
    font-size: 16px;
    margin: 6px 0 4px;
    color: #312e81;
  }

  .g-price {
    background: #fef9e3;
    display: inline-block;
    padding: 4px 12px;
    border-radius: 30px;
    font-weight: 800;
    font-size: 12px;
    margin: 6px 0;
  }

  .g-btn {
    background: #facc15;
    border: none;
    border-radius: 60px;
    padding: 6px 14px;
    font-weight: 800;
    font-size: 12px;
    margin: 6px auto 0;
    cursor: pointer;
    width: 85%;
  }

  .celebration {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.85);
    align-items: center;
    justify-content: center;
    z-index: 200;
  }

  .celebration.show {
    display: flex;
  }

  .celeb-box {
    background: white;
    border-radius: 48px;
    padding: 24px;
    text-align: center;
    max-width: 300px;
    width: 85%;
  }

  .celeb-emoji {
    font-size: 56px;
  }

  .celeb-title {
    font-size: 24px;
    font-weight: 900;
    margin: 8px 0;
  }

  .gallery-tabs {
    display: flex;
    gap: 6px;
    background: #f1f5f9;
    border-radius: 60px;
    padding: 5px;
    margin-bottom: 20px;
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 8px 0;
    font-weight: 800;
    border-radius: 40px;
    font-size: 13px;
    cursor: pointer;
  }

  .tab-btn.active {
    background: white;
    box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    color: #6d28d9;
  }

  .rarity-label {
    font-size: 9px;
    font-weight: 900;
    padding: 2px 10px;
    border-radius: 20px;
    display: inline-block;
    margin: 4px 0;
  }
  .rarity-base { background: #dbeafe; color: #1e3a8a; }
  .rarity-rare { background: #fef3c7; color: #92400e; }
  .rarity-epic { background: #fce7f3; color: #9d174d; }
  .rarity-legendary { background: #f3e8ff; color: #6b21a5; }
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15">
  <div class="field-label">Придумай ник</div>
  <input class="field-input" id="nickInput" placeholder="Ракета 🚀" maxlength="20">
  <button class="btn" id="startBtn" disabled>Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div class="rank-badge rank-novice" id="rankBadge">🌱 НОВИЧОК</div>
    <div class="keys-wallet">
      <div class="wallet-slot star">⭐ <span id="starCount">0</span></div>
      <div class="wallet-slot shiny">🌟 <span id="shinyCount">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid"></div>
  <div class="char-wrap" id="charWrap"><img id="charImg" src=""></div>
  <button class="btn btn-green" id="claimBtn">🏃‍♀️ Я сделал(а) зарядку!</button>
  <div class="cooldown-msg" id="cooldownMsg"></div>
  <div class="info-box" id="infoBox"></div>
  <div class="collection-bar" id="collectionBar">🏅 Моя коллекция →</div>
  <div class="change-name" id="changeNameBtn">🔄 Сменить имя</div>
</div>

<div class="card" id="galleryScreen" style="display:none">
  <h1>🏅 Галерея сил</h1>
  <div class="gallery-tabs" id="galleryTabs"></div>
  <div id="galleryContent"></div>
  <button class="btn" id="backToGameBtn">← На главную</button>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-box">
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title" id="celebTitle"></div>
    <img class="celeb-img" id="celebImg" style="width:100%; margin:8px 0; display:none;">
    <div class="celeb-text" id="celebText" style="margin:10px 0;"></div>
    <button class="btn" id="closeCelebBtn">Класс!</button>
  </div>
</div>

<script>
  // ======================= ПЕРСОНАЖИ =========================
  const BASE_CHARS = [
    { animal:"🐆", power:"Скорость", name:"Гепард", img:"gepard.png" },
    { animal:"🐦", power:"Лёгкость", name:"Колибри", img:"kolibri.png" },
    { animal:"🐜", power:"Сила", name:"Муравей", img:"muravey.png" },
    { animal:"🦩", power:"Баланс", name:"Фламинго", img:"flamingo.png" },
    { animal:"🦥", power:"Восстановление", name:"Ленивец", img:"lenivec.png" },
    { animal:"🐒", power:"Координация", name:"Обезьяна", img:"obeziana.png" },
    { animal:"🐫", power:"Выносливость", name:"Верблюд", img:"verblyud.png" },
    { animal:"🐱", power:"Гибкость", name:"Кошка", img:"koshka.png" }
  ];
  const RARE_CHARS = [
    { animal:"🦘", power:"Прыгучесть", name:"Кенгуру", img:"kenguru.png" },
    { animal:"🐙", power:"Цепкость", name:"Осьминог", img:"osminog.png" },
    { animal:"🦀", power:"Устойчивость", name:"Краб", img:"krab.png" },
    { animal:"🐌", power:"Чуткость", name:"Улитка", img:"ulitka.png" }
  ];
  const EPIC_CHARS = [
    { animal:"🦄✨", power:"Полёт", name:"Пегас", img:"pegas.png" },
    { animal:"🐉", power:"Суперсила", name:"Дракон", img:"drakon.png" }
  ];
  const LEGEND_CHAR = { animal:"🔥", power:"Возрождение", name:"Феникс", img:"feniks.png" };

  // -----  Дни (скрыты от ребёнка)  1-56 ------
  const KEY_DAYS = [1,2,3,4,8,9,10,11,15,16,17,18,22,23,24,25,29,30,31,32,36,37,38,39,43,44,45,46,50,51,52,53];
  const STAR_DAYS = [5,6,12,13,19,20,26,27,33,34,40,41,47,48,54,55];
  const SHINY_DAYS = [7,14,21,28,35,42,49,56];

  function getDayType(dayNum) {
    if (dayNum > 56) return 'finished';
    if (KEY_DAYS.includes(dayNum)) return 'key';
    if (STAR_DAYS.includes(dayNum)) return 'star';
    if (SHINY_DAYS.includes(dayNum)) return 'shiny';
    return 'key';
  }

  function getRank(dayNum) {
    if (dayNum >= 50) return { label:"👑 МАСТЕР", cls:"rank-master" };
    if (dayNum >= 36) return { label:"⚡ ПРОФИ", cls:"rank-pro" };
    if (dayNum >= 15) return { label:"📖 УЧЕНИК", cls:"rank-student" };
    return { label:"🌱 НОВИЧОК", cls:"rank-novice" };
  }

  // ------ Кулдаун по календарю ---------
  function isNewDay(lastDate) {
    if (!lastDate) return true;
    const last = new Date(lastDate);
    const now = new Date();
    return (last.getDate() !== now.getDate() || last.getMonth() !== now.getMonth() || last.getFullYear() !== now.getFullYear());
  }

  function getTimeToTomorrow() {
    const now = new Date();
    const tomorrow = new Date(now);
    tomorrow.setDate(now.getDate() + 1);
    tomorrow.setHours(0,0,0,0);
    const diff = tomorrow - now;
    const hours = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    return { hours, mins };
  }

  // ----------- СОСТОЯНИЕ ------------
  let state = {};
  let currentPlayerKey = "";

  function defaultState(name, nick) {
    return {
      name: name, nick: nick,
      startDate: null,
      lastWorkoutDate: null,
      currentKeyStep: 0,
      stars: 0,
      shinyStars: 0,
      collectedBase: [],
      collectedRare: [],
      collectedEpic: [],
      legendUnlocked: false,
      nextBaseIndex: Math.floor(Math.random() * BASE_CHARS.length)
    };
  }

  function saveGame() {
    if (!currentPlayerKey) return;
    localStorage.setItem(`active_foot_${currentPlayerKey}`, JSON.stringify(state));
  }

  function loadGame(key) {
    const raw = localStorage.getItem(`active_foot_${key}`);
    if (!raw) return false;
    try {
      const data = JSON.parse(raw);
      state = data;
      if (!state.collectedBase) state.collectedBase = [];
      if (!state.collectedRare) state.collectedRare = [];
      if (!state.collectedEpic) state.collectedEpic = [];
      if (state.legendUnlocked === undefined) state.legendUnlocked = false;
      if (state.currentKeyStep === undefined) state.currentKeyStep = 0;
      if (state.stars === undefined) state.stars = 0;
      if (state.shinyStars === undefined) state.shinyStars = 0;
      if (!state.nextBaseIndex && state.nextBaseIndex !== 0) state.nextBaseIndex = Math.floor(Math.random() * BASE_CHARS.length);
      return true;
    } catch(e) { return false; }
  }

  function getCurrentDayNumber() {
    if (!state.startDate) return 1;
    const start = new Date(state.startDate);
    start.setHours(0,0,0,0);
    const today = new Date();
    today.setHours(0,0,0,0);
    let diffDays = Math.floor((today - start) / (1000*60*60*24));
    let day = diffDays + 1;
    if (day > 56) day = 56;
    return day;
  }

  function canWorkoutToday() {
    if (!state.lastWorkoutDate) return true;
    return isNewDay(state.lastWorkoutDate);
  }

  function openBaseCharacter() {
    const newIdx = state.nextBaseIndex;
    if (!state.collectedBase.includes(newIdx)) state.collectedBase.push(newIdx);
    const free = BASE_CHARS.map((_,i)=>i).filter(i => !state.collectedBase.includes(i));
    state.nextBaseIndex = free.length ? free[Math.floor(Math.random() * free.length)] : 0;
    saveGame();
    const opened = BASE_CHARS[newIdx];
    celebrate("🎉", opened.power + " открыта!", opened.name + " в коллекции!", opened.img, "base");
    checkLegend();
  }

  function checkLegend() {
    if (!state.legendUnlocked && 
        state.collectedBase.length === BASE_CHARS.length &&
        state.collectedRare.length === RARE_CHARS.length &&
        state.collectedEpic.length === EPIC_CHARS.length) {
      state.legendUnlocked = true;
      saveGame();
      setTimeout(() => {
        celebrate("🔥", "ЛЕГЕНДАРНЫЙ ФЕНИКС!", "Все суперсилы собраны. Ты — легенда!", LEGEND_CHAR.img, "legend");
      }, 300);
    }
  }

  function playSound(type) {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const sounds = {
        key: [[880,0.12,'sine']],
        base: [[523,0.16],[659,0.16],[784,0.16]],
        rare: [[659,0.13],[880,0.13]],
        epic: [[523,0.18],[784,0.18],[1047,0.18]],
        legend: [[262,0.2],[392,0.2],[523,0.2]]
      };
      const seq = sounds[type];
      if(!seq) return;
      seq.forEach(([f,dur,sh],i)=>{
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = sh || 'sine';
        osc.frequency.value = f;
        gain.gain.value = 0.2;
        const start = ctx.currentTime + i * 0.14;
        osc.start(start);
        gain.gain.exponentialRampToValueAtTime(0.001, start+0.4);
        osc.stop(start+0.4);
      });
    } catch(e) {}
  }

  function celebrate(emoji, title, text, img, soundType) {
    const celebDiv = document.getElementById("celebration");
    document.getElementById("celebEmoji").innerText = emoji;
    document.getElementById("celebTitle").innerText = title;
    document.getElementById("celebText").innerHTML = text;
    const imgEl = document.getElementById("celebImg");
    if (img) { imgEl.src = img; imgEl.style.display = "block"; imgEl.onerror = () => imgEl.style.display = "none"; }
    else imgEl.style.display = "none";
    celebDiv.classList.add("show");
    if (soundType) playSound(soundType);
  }

  function closeCeleb() {
    document.getElementById("celebration").classList.remove("show");
    renderUI();
  }

  async function doWorkout() {
    if (getCurrentDayNumber() >= 56) {
      celebrate("🏆", "Игра пройдена!", "Ты собрал(а) все суперсилы!", "", "legend");
      return;
    }
    if (!canWorkoutToday()) {
      renderUI();
      return;
    }

    const todayNum = getCurrentDayNumber();
    const rewardType = getDayType(todayNum);

    if (!state.startDate) {
      state.startDate = new Date().toISOString();
    }
    state.lastWorkoutDate = new Date().toISOString();

    if (rewardType === 'key') {
      state.currentKeyStep++;
      playSound("key");
      if (state.currentKeyStep >= 4) {
        openBaseCharacter();
        state.currentKeyStep = 0;
      } else {
        const left = 4 - state.currentKeyStep;
        celebrate("🔑", `Ключ ${state.currentKeyStep}/4`, `Осталось ${left} зарядк${left===1?"а":"и"} до суперсилы`, null, "key");
      }
    } 
    else if (rewardType === 'star') {
      state.stars++;
      playSound("rare");
      const need = 4 - ((state.stars % 4) || 4);
      celebrate("⭐", "Звезда силы!", `Всего ⭐: ${state.stars}. До редкого героя: ${need} ⭐`, null, "rare");
    } 
    else if (rewardType === 'shiny') {
      state.shinyStars++;
      playSound("epic");
      const need = 4 - ((state.shinyStars % 4) || 4);
      celebrate("🌟", "Сияющая звезда!", `Всего 🌟: ${state.shinyStars}. До эпического: ${need} 🌟`, null, "epic");
    }

    saveGame();
    renderUI();
  }

  function renderUI() {
    const today = getCurrentDayNumber();
    const rank = getRank(today);
    document.getElementById("rankBadge").className = `rank-badge ${rank.cls}`;
    document.getElementById("rankBadge").innerText = rank.label;
    document.getElementById("starCount").innerText = state.stars;
    document.getElementById("shinyCount").innerText = state.shinyStars;
    document.getElementById("greeting").innerHTML = `Привет, ${state.name || "герой"} ✨`;

    const finished = today > 56;
    if (finished) {
      document.getElementById("progressText").innerHTML = "✨ Все суперсилы собраны. Ты — легенда! ✨";
      document.getElementById("keysGrid").style.display = "none";
      document.getElementById("charWrap").classList.remove("show");
      document.getElementById("claimBtn").style.display = "none";
      document.getElementById("infoBox").style.display = "block";
      document.getElementById("infoBox").innerHTML = "🏆 Поздравляем! 56 дней силы позади!";
      return;
    }

    const rewardToday = getDayType(today);
    const infoBox = document.getElementById("infoBox");
    const claimBtn = document.getElementById("claimBtn");
    if (rewardToday === 'star') {
      infoBox.style.display = "block";
      infoBox.innerHTML = "⭐ Сегодня за зарядку ты получишь ЗВЕЗДУ! ⭐";
      claimBtn.className = "btn btn-star";
      claimBtn.innerHTML = "⭐ Зарядка!";
    } else if (rewardToday === 'shiny') {
      infoBox.style.display = "block";
      infoBox.innerHTML = "🌟 Сегодня за зарядку — СИЯЮЩАЯ ЗВЕЗДА! 🌟";
      claimBtn.className = "btn btn-shiny";
      claimBtn.innerHTML = "🌟 Зарядка!";
    } else {
      infoBox.style.display = "none";
      claimBtn.className = "btn btn-green";
      claimBtn.innerHTML = "🏃‍♀️ Я сделал(а) зарядку!";
    }

    const keysGrid = document.getElementById("keysGrid");
    const charWrap = document.getElementById("charWrap");
    const charImg = document.getElementById("charImg");

    if (rewardToday === 'key') {
      keysGrid.style.display = "grid";
      charWrap.classList.remove("show");
      keysGrid.innerHTML = "";
      for (let i = 0; i < 4; i++) {
        const slot = document.createElement("div");
        slot.className = "key-slot" + (i < state.currentKeyStep ? " filled" : "");
        slot.innerText = i < state.currentKeyStep ? "🔑" : "🔲";
        keysGrid.appendChild(slot);
      }
      const left = 4 - state.currentKeyStep;
      if (left === 0) document.getElementById("progressText").innerHTML = "✨ Забери новую суперсилу!";
      else document.getElementById("progressText").innerHTML = `🔐 Собери 4 ключа: ${state.currentKeyStep}/4 • Осталось ${left} ${left===1?"зарядка":"зарядки"}`;
    } 
    else {
      keysGrid.style.display = "none";
      charWrap.classList.remove("show");
      if (rewardToday === 'star') {
        const need = 4 - (state.stars % 4 || 4);
        document.getElementById("progressText").innerHTML = `⭐ У тебя ${state.stars} звезд. До редкой суперсилы: ${need} ⭐`;
      } else if (rewardToday === 'shiny') {
        const need = 4 - (state.shinyStars % 4 || 4);
        document.getElementById("progressText").innerHTML = `🌟 У тебя ${state.shinyStars} сияющих. До эпической: ${need} 🌟`;
      }
    }

    const coolDiv = document.getElementById("cooldownMsg");
    if (!canWorkoutToday()) {
      claimBtn.style.display = "none";
      coolDiv.style.display = "block";
      const { hours, mins } = getTimeToTomorrow();
      coolDiv.innerHTML = `⏳ Следующая зарядка будет <span class="cooldown-time">через ${hours}ч ${mins}мин</span>`;
    } else {
      claimBtn.style.display = "block";
      coolDiv.style.display = "none";
    }
  }

  // ГАЛЕРЕЯ
  function renderGallery(tab) {
    const container = document.getElementById("galleryContent");
    container.innerHTML = "";

    let items = [];
    if (tab === "base") items = BASE_CHARS;
    else if (tab === "rare") items = RARE_CHARS;
    else if (tab === "epic") items = EPIC_CHARS;
    else items = [LEGEND_CHAR];

    const grid = document.createElement("div");
    grid.className = "gallery-grid";

    for (let i = 0; i < items.length; i++) {
      const ch = items[i];
      let isOwned = false;
      if (tab === "base") isOwned = state.collectedBase.includes(i);
      else if (tab === "rare") isOwned = state.collectedRare.includes(i);
      else if (tab === "epic") isOwned = state.collectedEpic.includes(i);
      else isOwned = state.legendUnlocked;

      const card = document.createElement("div");
      card.className = "g-item" + (isOwned ? " got" : "");

      const imgDiv = document.createElement("div");
      if (isOwned && ch.img) {
        const img = document.createElement("img");
        img.src = ch.img;
        img.alt = ch.power;
        imgDiv.appendChild(img);
      } else {
        imgDiv.innerHTML = `<div style="font-size:48px; padding:20px;">❓</div>`;
      }
      card.appendChild(imgDiv);

      const nameSpan = document.createElement("div");
      nameSpan.className = "g-name";
      nameSpan.innerText = ch.power;
      card.appendChild(nameSpan);

      if (!isOwned && (tab === "rare" || tab === "epic")) {
        const cost = 4;
        const current = tab === "rare" ? state.stars : state.shinyStars;
        const icon = tab === "rare" ? "⭐" : "🌟";
        const priceDiv = document.createElement("div");
        priceDiv.className = "g-price";
        priceDiv.innerText = `${icon} ${current}/${cost}`;
        card.appendChild(priceDiv);

        if (current >= cost) {
          const unlockBtn = document.createElement("button");
          unlockBtn.className = "g-btn";
          unlockBtn.innerText = `Открыть за ${icon}${cost}`;
          unlockBtn.onclick = (e) => {
            e.stopPropagation();
            if (tab === "rare" && state.stars >= cost && !state.collectedRare.includes(i)) {
              state.stars -= cost;
              state.collectedRare.push(i);
              saveGame();
              celebrate("⭐", ch.power + " получен!", ch.name + " теперь в коллекции!", ch.img, "rare");
              renderGallery(tab);
              renderUI();
              checkLegend();
            } else if (tab === "epic" && state.shinyStars >= cost && !state.collectedEpic.includes(i)) {
              state.shinyStars -= cost;
              state.collectedEpic.push(i);
              saveGame();
              celebrate("🌟", ch.power + " открыт!", ch.name + " в твоей команде!", ch.img, "epic");
              renderGallery(tab);
              renderUI();
              checkLegend();
            }
          };
          card.appendChild(unlockBtn);
        }
      }

      if (!isOwned && tab === "legend") {
        const hint = document.createElement("div");
        hint.style.fontSize = "11px";
        hint.style.margin = "8px";
        hint.style.color = "#aaa";
        hint.innerText = "Собери всех героев!";
        card.appendChild(hint);
      }

      if (!isOwned && tab !== "legend") {
        const raritySpan = document.createElement("span");
        raritySpan.className = `rarity-label rarity-${tab}`;
        const names = { base:"базовый", rare:"редкий", epic:"эпический" };
        raritySpan.innerText = names[tab];
        card.appendChild(raritySpan);
      }
      grid.appendChild(card);
    }
    container.appendChild(grid);
  }

  function initGalleryTabs() {
    const tabsDiv = document.getElementById("galleryTabs");
    tabsDiv.innerHTML = "";
    const tabs = ["base","rare","epic","legend"];
    const titles = ["Базовые","Редкие","Эпические","Легенда"];
    tabs.forEach((t, idx) => {
      const btn = document.createElement("button");
      btn.innerText = titles[idx];
      btn.className = "tab-btn" + (idx === 0 ? " active" : "");
      btn.onclick = () => {
        document.querySelectorAll("#galleryTabs .tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderGallery(t);
      };
      tabsDiv.appendChild(btn);
    });
  }

  function showGallery() {
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("galleryScreen").style.display = "block";
    initGalleryTabs();
    renderGallery("base");
  }
  
  function hideGallery() {
    document.getElementById("galleryScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    renderUI();
  }
  
  function resetProfile() {
    localStorage.removeItem(`active_foot_${currentPlayerKey}`);
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("nameScreen").style.display = "block";
    document.getElementById("nameInput").value = "";
    document.getElementById("nickInput").value = "";
    document.getElementById("startBtn").disabled = true;
  }

  // ----- ИНИЦИАЛИЗАЦИЯ КНОПОК -----
  function checkInputs() {
    const name = document.getElementById("nameInput").value.trim();
    const nick = document.getElementById("nickInput").value.trim();
    document.getElementById("startBtn").disabled = !(name && nick);
  }

  function startGame() {
    const name = document.getElementById("nameInput").value.trim();
    const nick = document.getElementById("nickInput").value.trim();
    if (!name || !nick) return;
    currentPlayerKey = btoa(`${name}_${nick}`).slice(0, 24);
    const loaded = loadGame(currentPlayerKey);
    if (!loaded) {
      state = defaultState(name, nick);
    } else {
      state.name = name;
      state.nick = nick;
    }
    saveGame();
    document.getElementById("nameScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    renderUI();
  }

  // ПРИВЯЗКА СОБЫТИЙ
  document.getElementById("startBtn").onclick = startGame;
  document.getElementById("claimBtn").onclick = doWorkout;
  document.getElementById("collectionBar").onclick = showGallery;
  document.getElementById("backToGameBtn").onclick = hideGallery;
  document.getElementById("changeNameBtn").onclick = resetProfile;
  document.getElementById("closeCelebBtn").onclick = closeCeleb;
  document.getElementById("nameInput").addEventListener("input", checkInputs);
  document.getElementById("nickInput").addEventListener("input", checkInputs);
  
  // Восстановление имени при загрузке
  const savedMeta = localStorage.getItem("as_who");
  if (savedMeta) {
    try {
      const old = JSON.parse(savedMeta);
      if (old.name && old.nick) {
        document.getElementById("nameInput").value = old.name;
        document.getElementById("nickInput").value = old.nick;
        checkInputs();
      }
    } catch(e) {}
  }
  
  checkInputs();
  setInterval(() => { if(document.getElementById("gameScreen").style.display === "block") renderUI(); }, 30000);
</script>
</body>
</html>
