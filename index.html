<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:32px;padding:24px 20px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
h1{font-family:'Fredoka One',cursive;font-size:26px;color:#2d2d2d;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:20px;font-weight:700}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;padding:13px 24px;font-family:'Fredoka One',cursive;font-size:19px;cursor:pointer;width:100%;transition:transform .15s;box-shadow:0 4px 16px rgba(102,126,234,.4);margin-top:8px}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-green{background:linear-gradient(135deg,#2E7D32,#4CAF50);box-shadow:0 4px 16px rgba(46,125,50,.4)}
.btn-gold{background:linear-gradient(135deg,#F9A825,#FF6F00);box-shadow:0 4px 16px rgba(249,168,37,.4)}
.btn-rare{background:linear-gradient(135deg,#1565C0,#42A5F5);box-shadow:0 4px 16px rgba(21,101,192,.3)}
.btn-ruby{background:linear-gradient(135deg,#B71C1C,#EF5350);box-shadow:0 4px 16px rgba(183,28,28,.3)}
.field-label{font-size:12px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;text-align:left}
.field-input{width:100%;border:3px solid #e0e4ef;border-radius:14px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;outline:none;text-align:center;margin-bottom:14px;transition:border-color .2s}
.field-input:focus{border-color:#667eea}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.rank-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:20px;font-family:'Fredoka One',cursive;font-size:14px}
.rank-novice{background:#e8f5e9;color:#2E7D32}
.rank-student{background:linear-gradient(135deg,#FFF8E1,#FFE082);color:#F57F17}
.rank-pro{background:linear-gradient(135deg,#E3F2FD,#90CAF9);color:#1565C0}
.rank-master{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff}
.keys-wallet{display:flex;gap:8px}
.wallet-slot{display:flex;align-items:center;gap:4px;background:#f5f5f5;border-radius:20px;padding:4px 12px;font-family:'Fredoka One',cursive;font-size:15px}
.wallet-slot.diamond{background:#E3F2FD;color:#1565C0}
.wallet-slot.ruby{background:#FFEBEE;color:#C62828}
.greeting{font-size:18px;font-weight:900;color:#2d2d2d;margin-bottom:4px}
.progress-text{font-size:13px;color:#888;font-weight:700;margin-bottom:12px;line-height:1.7}
.keys-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.key-slot{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px dashed #e0e4ef;background:#f9f9f9;transition:all .4s ease}
.key-slot.filled{border:3px solid gold;background:linear-gradient(135deg,#fffde7,#fff9c4);box-shadow:0 4px 12px rgba(255,215,0,.4);animation:popIn .5s ease}
@keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.char-wrap{border-radius:18px;overflow:hidden;margin-bottom:12px;display:none;background:#f5f5f5}
.char-wrap img{width:100%;height:200px;object-fit:contain;display:block}
.char-wrap.show{display:block;animation:zoomIn .6s ease}
@keyframes zoomIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.cooldown-msg{background:#f0f4ff;border-radius:14px;padding:12px;font-size:13px;font-weight:700;color:#667eea;display:none;margin-top:8px}
.cooldown-time{font-family:'Fredoka One',cursive;font-size:20px;display:block;margin-top:4px}
.collection-bar{margin-top:14px;border-top:2px solid #f0f0f0;padding-top:12px;cursor:pointer}
.collection-bar:hover .col-title{color:#667eea}
.col-title{font-family:'Fredoka One',cursive;font-size:15px;color:#888;margin-bottom:8px;transition:color .2s}
.change-name{font-size:11px;color:#ccc;margin-top:10px;cursor:pointer;font-weight:700}
.change-name:hover{color:#667eea}
.key-img{height:28px;width:auto;vertical-align:middle;margin-right:3px}
#galleryScreen{display:none}
.gallery-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #e0e4ef}
.tab-btn{flex:1;background:none;border:none;padding:10px 4px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:#aaa;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:#667eea;border-bottom-color:#667eea}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
.g-item{border-radius:18px;border:2px solid #e8e8e8;background:#f0f0f0;padding:0;text-align:center;overflow:hidden;display:flex;flex-direction:column;transition:all .3s;min-height:180px}
.g-item.got{background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.1);border-color:transparent}
.g-item.locked{padding:20px 8px;align-items:center;justify-content:center}
.g-item .g-img{flex:1;width:100%;display:flex;align-items:center;justify-content:center}
.g-item .g-img img{width:100%;height:200px;object-fit:contain;display:block}
.g-item .g-name{font-family:'Fredoka One',cursive;font-size:18px;padding:8px 8px 12px;line-height:1.2}
.g-item .g-q{font-size:44px;color:#ddd;margin-bottom:6px}
.rarity-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
.rarity-base{background:#e8f5e9;color:#2E7D32}
.rarity-rare{background:#E3F2FD;color:#1565C0}
.rarity-epic{background:#FFEBEE;color:#C62828}
.rarity-legendary{background:linear-gradient(135deg,#FF6F00,#F9A825);color:#fff}
.celebration{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:20px}
.celebration.show{display:flex}
.celeb-box{background:#fff;border-radius:32px;padding:28px 24px;text-align:center;max-width:340px;width:100%;animation:zoomIn .4s ease}
.celeb-emoji{font-size:60px;display:block;margin-bottom:10px}
.celeb-title{font-family:'Fredoka One',cursive;font-size:24px;color:#2d2d2d;margin-bottom:6px}
.celeb-img{width:100%;max-height:160px;object-fit:contain;border-radius:14px;margin:10px 0;display:none}
.celeb-text{font-size:14px;color:#888;font-weight:700;margin-bottom:18px}
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15" oninput="checkBtn()" onchange="checkBtn()">
  <div class="field-label">Придумай ник</div>
  <input class="field-input" id="nickInput" placeholder="Например: Ракета 🚀" maxlength="20" oninput="checkBtn()" onchange="checkBtn()">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱 НОВИЧОК</div>
    <div class="keys-wallet">
      <div class="wallet-slot diamond"><img src="key_diamond.png" class="key-img"> <span id="dKeys">0</span></div>
      <div class="wallet-slot ruby"><img src="key_ruby.png" class="key-img"> <span id="rKeys">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="ks0"></div>
    <div class="key-slot" id="ks1"></div>
    <div class="key-slot" id="ks2"></div>
    <div class="key-slot" id="ks3"></div>
  </div>
  <div class="char-wrap" id="charWrap">
    <img id="charImg" src="" alt="">
  </div>
  <button class="btn btn-green" id="claimBtn" onclick="doWorkout()">Я сделал(а) зарядку! 🏃</button>
  <div class="cooldown-msg" id="cooldown">Отличная работа! Приходи завтра 🌙<span class="cooldown-time" id="cooldownTime"></span></div>
  <div class="collection-bar" onclick="showGallery()"><div class="col-title">🏅 Моя коллекция →</div></div>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<div class="card" id="galleryScreen">
  <h1 style="margin-bottom:12px">🏅 Моя коллекция</h1>
  <div class="gallery-tabs">
    <button class="tab-btn active" onclick="switchTab('base',this)">Базовые</button>
    <button class="tab-btn" onclick="switchTab('rare',this)">Редкие</button>
    <button class="tab-btn" onclick="switchTab('epic',this)">Эпические</button>
    <button class="tab-btn" onclick="switchTab('legend',this)">Легенда</button>
  </div>
  <div id="galleryContent"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-box">
    <span class="celeb-emoji" id="celebEmoji">🎉</span>
    <div class="celeb-title" id="celebTitle"></div>
    <img class="celeb-img" id="celebImg" src="" alt="">
    <div class="celeb-text" id="celebText"></div>
    <button class="btn" onclick="closeCeleb()">Ура! 🎉</button>
  </div>
</div>

<script>
const BASE = [
  { animal:"🐆", power:"Скорость",       name:"Гепард",   color:"#E07000", img:"gepard.png"    },
  { animal:"🐦", power:"Лёгкость",       name:"Колибри",  color:"#00ACC1", img:"kolibri.png"   },
  { animal:"🐜", power:"Сила",           name:"Муравей",  color:"#CC0000", img:"muravey.png"   },
  { animal:"🦩", power:"Баланс",         name:"Фламинго", color:"#E91E8C", img:"flamingo.png"  },
  { animal:"🦥", power:"Восстановление", name:"Ленивец",  color:"#2E7D32", img:"lenivec.png"   },
  { animal:"🐒", power:"Координация",    name:"Обезьяна", color:"#8D6E63", img:"obeziana.png"  },
  { animal:"🐫", power:"Выносливость",   name:"Верблюд",  color:"#D4A373", img:"verblyud.png"  },
  { animal:"🐱", power:"Гибкость",       name:"Кошка",    color:"#FF9800", img:"koshka.png"    },
];
const RARE = [
  { animal:"🦘", power:"Прыгучесть",   name:"Кенгуру",  color:"#FF5722", img:"kenguru.png"   },
  { animal:"🐙", power:"Цепкость",     name:"Осьминог", color:"#7B1FA2", img:"osminog.png"   },
  { animal:"🦀", power:"Устойчивость", name:"Краб",     color:"#D32F2F", img:"krab.png"      },
  { animal:"🐌", power:"Чуткость",     name:"Улитка",   color:"#4CAF50", img:"ulitka.png"    },
];
const EPIC = [
  { animal:"🦄", power:"Суперлёгкость", name:"Единорог", color:"#E040FB", img:"edinorog.png"  },
  { animal:"🐉", power:"Суперсила",     name:"Дракон",   color:"#F44336", img:"drakon.png"    },
];
const LEGEND = { animal:"🔥", power:"Возрождение", name:"Феникс", color:"#FF6F00", img:"feniks.png" };

let st = {};
let playerKey = '';

function freshState() {
  return {
    charIdx: Math.floor(Math.random() * BASE.length),
    step: 0,
    lastClaim: null,
    weekCount: 0,
    weekStart: null,
    dKeys: 0,
    rKeys: 0,
    gotBase: [],
    gotRare: [],
    gotEpic: [],
    gotLegend: false,
    weeksPlayed: 0,
  };
}

function save() { localStorage.setItem('as_' + playerKey, JSON.stringify(st)); }
function load() {
  const raw = localStorage.getItem('as_' + playerKey);
  if (!raw) return false;
  try { st = JSON.parse(raw); return true; } catch(e) { return false; }
}

function sound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const seq = {
      start:   [[440,.12],[550,.12],[660,.12]],
      key:     [[900,0,'tri']],
      base:    [[523,.18],[659,.18],[784,.18],[1047,.18]],
      rare:    [[440,.15],[554,.15],[659,.15],[880,.15],[1109,.15]],
      epic:    [[330,.2],[415,.2],[523,.2],[659,.2],[830,.2],[1047,.2]],
      legend:  [[262,.25],[330,.25],[392,.25],[523,.25],[659,.25],[784,.25]],
    };
    const p = seq[type];
    if (!p) return;
    p.forEach(([f, dt, sh], i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = sh || 'sine';
      o.frequency.setValueAtTime(f, ctx.currentTime + i * (dt||0.18));
      g.gain.setValueAtTime(0.3, ctx.currentTime + i * (dt||0.18));
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * (dt||0.18) + 0.4);
      o.start(ctx.currentTime + i * (dt||0.18));
      o.stop(ctx.currentTime + i * (dt||0.18) + 0.4);
    });
  } catch(e) {}
}

function weekStart(date) {
  const d = new Date(date);
  const day = d.getDay();
  d.setDate(d.getDate() - day + (day === 0 ? -6 : 1));
  d.setHours(0,0,0,0);
  return d.getTime();
}

function decl(n, a, b, c) {
  const m = n % 10, mm = n % 100;
  if (m === 1 && mm !== 11) return a;
  if (m >= 2 && m <= 4 && (mm < 10 || mm >= 20)) return b;
  return c;
}

function getRank() {
  const w = st.weeksPlayed || 0;
  if (w >= 8) return {label:'👑 МАСТЕР', cls:'rank-master'};
  if (w >= 6) return {label:'⚡ ПРОФИ', cls:'rank-pro'};
  if (w >= 3) return {label:'📖 УЧЕНИК', cls:'rank-student'};
  return {label:'🌱 НОВИЧОК', cls:'rank-novice'};
}

function celebrate(emoji, title, text, img, snd) {
  const el = document.getElementById('celebImg');
  if (img) { el.src = img; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
  document.getElementById('celebEmoji').innerHTML = emoji;
  document.getElementById('celebTitle').innerHTML = title;
  document.getElementById('celebText').innerHTML = text;
  document.getElementById('celebration').classList.add('show');
  if (snd) sound(snd);
}
window.closeCeleb = function() { document.getElementById('celebration').classList.remove('show'); render(); };

function render() {
  const char = BASE[st.charIdx];
  const rank = getRank();
  const badge = document.getElementById('rankBadge');
  badge.className = 'rank-badge ' + rank.cls;
  badge.textContent = rank.label;
  document.getElementById('dKeys').innerText = st.dKeys || 0;
  document.getElementById('rKeys').innerText = st.rKeys || 0;
  document.getElementById('greeting').innerHTML = 'Привет, ' + (st.name || '') + '!';

  if (st.step < 4) {
    document.getElementById('keysGrid').style.display = 'grid';
    document.getElementById('charWrap').classList.remove('show');
    document.getElementById('progressText').innerHTML = 'До суперсилы: ' + (4 - st.step) + ' ' + decl(4 - st.step, 'зарядка', 'зарядки', 'зарядок');
    for (let i = 0; i < 4; i++) {
      const sl = document.getElementById('ks' + i);
      if (i < st.step) { sl.classList.add('filled'); sl.innerHTML = '🔑'; }
      else { sl.classList.remove('filled'); sl.innerHTML = ''; }
    }
    checkCooldown();
  } else {
    document.getElementById('keysGrid').style.display = 'none';
    document.getElementById('charWrap').classList.add('show');
    document.getElementById('charImg').src = char.img;
    document.getElementById('progressText').innerHTML = '<div style="font-family:Fredoka One,cursive;font-size:26px;font-weight:900;color:' + char.color + ';margin:12px 0 6px">' + char.power + '</div><div style="font-size:13px;color:#aaa">суперсила открыта ✨</div>';
    const nowWeek = weekStart(new Date());
    const lastW = st.lastUnlockWeek || 0;
    const wc = st.weekCount || 0;
    const claimBtn = document.getElementById('claimBtn');
    const coolEl = document.getElementById('cooldown');
    if (lastW >= nowWeek) {
      if (wc === 5 || wc === 6) {
        coolEl.style.display = 'none';
        claimBtn.style.display = 'block';
        claimBtn.innerHTML = 'Я сделал(а) зарядку! (+💎)';
        claimBtn.className = 'btn btn-rare';
      } else if (wc === 7) {
        coolEl.style.display = 'none';
        claimBtn.style.display = 'block';
        claimBtn.innerHTML = 'Я сделал(а) зарядку! (+❤️)';
        claimBtn.className = 'btn btn-ruby';
      } else {
        claimBtn.style.display = 'none';
        coolEl.style.display = 'block';
        coolEl.innerHTML = wc >= 8 ? 'Неделя завершена! 🎉<span class="cooldown-time">Новый персонаж на следующей неделе →</span>' : 'Суперсила открыта! 🎉<span class="cooldown-time">С 5-й зарядки — бриллиантовый ключ 💎</span>';
      }
    } else {
      coolEl.style.display = 'none';
      claimBtn.style.display = 'block';
      claimBtn.innerHTML = '✨ Следующая суперсила!';
      claimBtn.className = 'btn btn-gold';
      claimBtn.onclick = nextChar;
    }
  }
}

function checkCooldown() {
  const claimBtn = document.getElementById('claimBtn');
  const coolEl = document.getElementById('cooldown');
  if (!st.lastClaim) {
    claimBtn.style.display = 'block';
    claimBtn.className = 'btn btn-green';
    claimBtn.innerHTML = 'Я сделал(а) зарядку! 🏃';
    claimBtn.onclick = doWorkout;
    coolEl.style.display = 'none';
    return;
  }
  const last = new Date(st.lastClaim);
  const next = new Date(last.getTime() + 24 * 3600 * 1000);
  if (new Date() >= next) {
    claimBtn.style.display = 'block';
    claimBtn.className = 'btn btn-green';
    claimBtn.innerHTML = 'Я сделал(а) зарядку! 🏃';
    claimBtn.onclick = doWorkout;
    coolEl.style.display = 'none';
  } else {
    claimBtn.style.display = 'none';
    coolEl.style.display = 'block';
    updateCountdown(next);
    const iv = setInterval(() => { if (new Date() >= next) { clearInterval(iv); render(); } else updateCountdown(next); }, 30000);
  }
}

function updateCountdown(next) {
  const diff = next - new Date();
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const el = document.getElementById('cooldownTime');
  if (el) el.innerText = h + ' ч ' + m + ' мин';
}

function doWorkout() {
  const now = new Date();
  if (st.lastClaim && (now - new Date(st.lastClaim)) < 24 * 3600 * 1000) {
    const next = new Date(new Date(st.lastClaim).getTime() + 24 * 3600 * 1000);
    document.getElementById('claimBtn').style.display = 'none';
    document.getElementById('cooldown').style.display = 'block';
    updateCountdown(next);
    return;
  }
  const nowWeek = weekStart(now);
  if (!st.weekStart || st.weekStart < nowWeek) {
    st.weekStart = nowWeek;
    st.weekCount = 0;
    if (st.lastClaim) st.weeksPlayed = (st.weeksPlayed || 0) + 1;
  }
  st.weekCount++;
  st.lastClaim = now.toISOString();
  const wc = st.weekCount;
  if (wc <= 4) {
    st.step++;
    sound('key');
    if (st.step >= 4) {
      if (!st.gotBase.includes(st.charIdx)) st.gotBase.push(st.charIdx);
      st.lastUnlockWeek = nowWeek;
      save();
      sound('base');
      celebrate('🎉', BASE[st.charIdx].power + ' открыта!', 'Суперсила добавлена в коллекцию!', BASE[st.charIdx].img);
      checkLegendary();
      return;
    } else {
      const left = 4 - st.step;
      celebrate('🔑', 'Ключ ' + st.step + ' из 4!', 'До суперсилы: ещё ' + left + ' ' + decl(left,'зарядка','зарядки','зарядок'));
    }
  } else if (wc === 5 || wc === 6) {
    st.dKeys++;
    save();
    sound('rare');
    celebrate('💎', 'Бриллиантовый ключ!', 'У тебя ' + st.dKeys + ' бриллиант. ' + decl(st.dKeys,'ключ','ключа','ключей') + '. За 4 — открой редкого персонажа!');
    return;
  } else if (wc === 7) {
    st.rKeys++;
    save();
    sound('rare');
    celebrate('❤️', 'Рубиновый ключ!', 'У тебя ' + st.rKeys + ' рубин. ' + decl(st.rKeys,'ключ','ключа','ключей') + '. За 4 — открой эпического персонажа!');
    return;
  } else {
    celebrate('🏃', 'Зарядка засчитана!', 'Новая неделя — новый персонаж! Жди понедельника 🗓️');
  }
  save();
  render();
}

function nextChar() {
  const available = BASE.map((_,i) => i).filter(i => !st.gotBase.includes(i));
  st.charIdx = available.length ? available[Math.floor(Math.random() * available.length)] : Math.floor(Math.random() * BASE.length);
  st.step = 0;
  st.lastClaim = null;
  save();
  render();
}

function checkLegendary() {
  if (!st.gotLegend && st.gotBase.length >= BASE.length && st.gotRare.length >= RARE.length && st.gotEpic.length >= EPIC.length) {
    st.gotLegend = true;
    save();
    setTimeout(() => celebrate('🔥', 'ЛЕГЕНДА! Феникс получен!', 'Ты собрал(а) все суперсилы! Ты — Легенда!', LEGEND.img, 'legend'), 2000);
  }
}

window.switchTab = function(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(tab);
};

function renderGallery(tab) {
  const cont = document.getElementById('galleryContent');
  cont.innerHTML = '';
  let chars, rarity;
  if (tab === 'base') { chars = BASE; rarity = 'base'; }
  if (tab === 'rare') { chars = RARE; rarity = 'rare'; }
  if (tab === 'epic') { chars = EPIC; rarity = 'epic'; }
  if (tab === 'legend') { chars = [LEGEND]; rarity = 'legendary'; }
  const grid = document.createElement('div'); grid.className = 'gallery-grid';
  chars.forEach((c, i) => {
    const got = tab === 'legend' ? st.gotLegend : (tab === 'base' ? st.gotBase.includes(i) : (tab === 'rare' ? st.gotRare.includes(i) : st.gotEpic.includes(i)));
    const div = document.createElement('div');
    div.className = 'g-item' + (got ? ' got' : ' locked');
    if (got) { div.style.borderColor = c.color + '99'; div.style.background = c.color + '10'; }
    const area = document.createElement('div'); area.className = 'g-img';
    if (got) {
      const img = document.createElement('img'); img.src = c.img; img.alt = c.power;
      img.onerror = () => { img.style.display='none'; area.innerHTML='<span style="font-size:40px">'+c.animal+'</span>'; };
      area.appendChild(img);
    } else {
      area.innerHTML = '<span class="g-q">❓</span>';
    }
    div.appendChild(area);
    if (got) {
      const nm = document.createElement('div'); nm.className = 'g-name'; nm.style.color = c.color; nm.textContent = c.power; div.appendChild(nm);
    }
    if (!got && (tab === 'rare' || tab === 'epic')) {
      const costD = tab === 'rare' ? 4 : 8;
      const costR = tab === 'rare' ? 2 : 4;
      const canD = (st.dKeys||0) >= costD;
      const canR = (st.rKeys||0) >= costR;
      if (canD || canR) {
        const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;margin-top:6px;width:100%';
        if (canD) {
          const btn = document.createElement('button');
          btn.style.cssText = 'border:none;border-radius:10px;padding:6px 8px;font-family:Nunito,sans-serif;font-weight:800;font-size:11px;cursor:pointer;background:#E3F2FD;color:#1565C0;display:flex;align-items:center;justify-content:center;gap:4px';
          btn.innerHTML = '<img src="key_diamond.png" style="height:14px"> ' + costD + ' → Открыть!';
          btn.onclick = (e) => { e.stopPropagation(); spendKeys(tab, 'diamond', i); };
          wrap.appendChild(btn);
        }
        if (canR) {
          const btn = document.createElement('button');
          btn.style.cssText = 'border:none;border-radius:10px;padding:6px 8px;font-family:Nunito,sans-serif;font-weight:800;font-size:11px;cursor:pointer;background:#FFEBEE;color:#C62828;display:flex;align-items:center;justify-content:center;gap:4px';
          btn.innerHTML = '<img src="key_ruby.png" style="height:14px"> ' + costR + ' → Открыть!';
          btn.onclick = (e) => { e.stopPropagation(); spendKeys(tab, 'ruby', i); };
          wrap.appendChild(btn);
        }
        div.appendChild(wrap);
      } else {
        const price = document.createElement('div');
        price.style.cssText = 'font-size:10px;font-weight:700;color:#bbb;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:4px';
        price.innerHTML = '<img src="key_diamond.png" style="height:12px;opacity:.4"> ' + costD + ' <span style="color:#ddd">или</span> <img src="key_ruby.png" style="height:12px;opacity:.4"> ' + costR;
        div.appendChild(price);
      }
    }
    if (tab === 'legend' && !got) {
      const hint = document.createElement('div'); hint.style.cssText = 'font-size:11px;font-weight:700;color:#aaa;margin-top:6px;text-align:center'; hint.innerText = 'Собери всех персонажей!'; div.appendChild(hint);
    }
    if (!got && tab !== 'base') {
      const rl = document.createElement('span'); rl.className = 'rarity-label rarity-' + rarity;
      const labels = {base:'базовый', rare:'редкий', epic:'эпический', legendary:'легендарный'};
      rl.innerText = labels[rarity];
      div.appendChild(rl);
    }
    grid.appendChild(div);
  });
  cont.appendChild(grid);
}

function spendKeys(tab, currency, charIdx) {
  const costD = tab === 'rare' ? 4 : 8;
  const costR = tab === 'rare' ? 2 : 4;
  const cost = currency === 'diamond' ? costD : costR;
  const field = currency === 'diamond' ? 'dKeys' : 'rKeys';
  const coll = tab === 'rare' ? 'gotRare' : 'gotEpic';
  const chars = tab === 'rare' ? RARE : EPIC;
  if ((st[field]||0) < cost) return;
  if (st[coll].includes(charIdx)) return;
  st[field] -= cost;
  st[coll].push(charIdx);
  save();
  const char = chars[charIdx];
  const snd = tab === 'epic' ? 'epic' : 'rare';
  const icon = tab === 'epic' ? '🔥' : '✨';
  celebrate(icon, char.power + ' открыта!', char.name + ' теперь в твоей коллекции!', char.img, snd);
  checkLegendary();
}

window.showGallery = function() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('galleryScreen').style.display = 'block';
  renderGallery('base');
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
};

window.hideGallery = function() {
  document.getElementById('galleryScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
};

function checkBtn() {
  const n = document.getElementById('nameInput').value.trim();
  const k = document.getElementById('nickInput').value.trim();
  document.getElementById('startBtn').disabled = !(n && k);
}

let _ac = 0;
const _at = setInterval(() => { checkBtn(); if (++_ac >= 20) clearInterval(_at); }, 200);

window.startGame = function() {
  const name = document.getElementById('nameInput').value.trim();
  const nick = document.getElementById('nickInput').value.trim();
  if (!name || !nick) return;
  playerKey = (name + '_' + nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
  localStorage.setItem('as_who', JSON.stringify({name, nick}));
  if (!load()) st = freshState();
  st.name = name; st.nick = nick;
  save();
  sound('start');
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  render();
};

window.changeName = function() {
  localStorage.removeItem('as_who');
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('nameScreen').style.display = 'block';
  document.getElementById('nameInput').value = '';
  document.getElementById('nickInput').value = '';
  checkBtn();
};

const _who = localStorage.getItem('as_who');
if (_who) {
  try {
    const d = JSON.parse(_who);
    if (d.name && d.nick) {
      document.getElementById('nameInput').value = d.name;
      document.getElementById('nickInput').value = d.nick;
      checkBtn();
    }
  } catch(e) {}
}
</script>
</body>
</html>
