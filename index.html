<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Активные Стопы — дни подряд</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 48px;
      padding: 24px 20px;
      max-width: 450px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
    }

    h1 {
      font-family: 'Fredoka One', cursive;
      font-size: 28px;
      color: #1e293b;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #7c8ba0;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .btn {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 60px;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      color: white;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      margin-top: 12px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn:disabled {
      opacity: 0.5;
      transform: none;
      cursor: not-allowed;
    }

    .btn-green {
      background: linear-gradient(135deg, #10b981, #059669);
    }

    .btn-star {
      background: linear-gradient(135deg, #f59e0b, #d97706);
    }

    .btn-shiny {
      background: linear-gradient(135deg, #f97316, #ea580c);
    }

    .field-label {
      text-align: left;
      font-size: 12px;
      font-weight: 800;
      color: #556;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 16px;
      border: 2.5px solid #e2e8f0;
      border-radius: 60px;
      font-size: 16px;
      font-weight: 700;
      text-align: center;
      outline: none;
    }

    input:focus {
      border-color: #8b5cf6;
    }

    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .rank-badge {
      background: #f1f5f9;
      padding: 6px 16px;
      border-radius: 40px;
      font-size: 12px;
      font-weight: 800;
    }

    .rank-novice { background: #dcfce7; color: #166534; }
    .rank-student { background: #fef9c3; color: #854d0e; }
    .rank-pro { background: #dbeafe; color: #1e40af; }
    .rank-master { background: #e9d5ff; color: #6b21a5; }

    .keys-wallet {
      display: flex;
      gap: 14px;
      background: #f8fafc;
      padding: 5px 20px;
      border-radius: 60px;
    }

    .wallet-slot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'Fredoka One', cursive;
      font-size: 18px;
      font-weight: bold;
    }

    .wallet-slot.key { color: #fbbf24; }
    .wallet-slot.star { color: #f59e0b; }
    .wallet-slot.shiny { color: #ea580c; }

    .greeting {
      font-size: 18px;
      font-weight: 900;
      margin: 10px 0;
    }

    .streak-info {
      background: #e0e7ff;
      padding: 8px 14px;
      border-radius: 60px;
      font-size: 13px;
      font-weight: 800;
      display: inline-block;
      margin-bottom: 12px;
    }

    .progress-text {
      background: #f8fafc;
      padding: 12px;
      border-radius: 60px;
      font-size: 14px;
      font-weight: 600;
      margin: 12px 0;
    }

    .keys-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    .key-slot {
      aspect-ratio: 1;
      background: #f8fafc;
      border: 3px dashed #cbd5e1;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
    }

    .key-slot.filled {
      background: #fffbeb;
      border: 3px solid #fbbf24;
      animation: bounce 0.3s;
    }

    @keyframes bounce {
      0% { transform: scale(0.7); }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    .char-wrap {
      background: #fef9e3;
      border-radius: 32px;
      margin: 12px 0;
      padding: 8px;
      display: none;
    }

    .char-wrap.show {
      display: block;
      animation: fade 0.4s;
    }

    .char-wrap img {
      width: 100%;
      height: 180px;
      object-fit: contain;
      border-radius: 24px;
    }

    @keyframes fade {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .motivation-box {
      background: #e8f5e9;
      color: #2e7d32;
      padding: 15px;
      border-radius: 28px;
      margin: 12px 0;
      font-size: 14px;
      font-weight: 700;
      display: none;
    }

    .cooldown-msg {
      background: #eff6ff;
      padding: 12px;
      border-radius: 28px;
      font-size: 13px;
      margin-top: 10px;
      display: none;
      color: #2563eb;
      font-weight: 600;
    }

    .cooldown-time {
      font-size: 22px;
      font-weight: bold;
      display: block;
      margin-top: 5px;
    }

    .info-box {
      background: #fefce8;
      padding: 10px;
      border-radius: 28px;
      font-size: 12px;
      margin-top: 10px;
      display: none;
      color: #b45309;
      font-weight: 600;
    }

    .collection-bar {
      border-top: 2px solid #eef2ff;
      padding-top: 16px;
      margin-top: 20px;
      cursor: pointer;
      font-weight: bold;
      color: #4b5563;
    }

    .change-name {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 12px;
      cursor: pointer;
    }

    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
      margin: 18px 0;
    }

    .g-item {
      background: #f8fafc;
      border-radius: 28px;
      overflow: hidden;
      text-align: center;
      border: 2px solid #e2e8f0;
      padding-bottom: 12px;
    }

    .g-item.got {
      background: white;
      border-color: #facc15;
    }

    .g-item img {
      width: 100%;
      height: 120px;
      object-fit: contain;
    }

    .g-name {
      font-weight: 900;
      font-size: 14px;
      margin: 8px 0 4px;
    }

    .g-price {
      background: #fef9e3;
      display: inline-block;
      padding: 4px 14px;
      border-radius: 30px;
      font-size: 12px;
      margin: 6px 0;
      font-weight: 700;
    }

    .g-btn {
      background: #facc15;
      border: none;
      border-radius: 60px;
      padding: 6px 12px;
      font-weight: bold;
      font-size: 12px;
      margin: 6px auto;
      cursor: pointer;
      width: 85%;
    }

    .celebration {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      align-items: center;
      justify-content: center;
      z-index: 200;
    }

    .celebration.show {
      display: flex;
    }

    .celeb-box {
      background: white;
      border-radius: 48px;
      padding: 24px;
      text-align: center;
      max-width: 300px;
      width: 85%;
    }

    .celeb-emoji {
      font-size: 56px;
    }

    .celeb-title {
      font-size: 24px;
      font-weight: bold;
      margin: 8px 0;
    }

    .celeb-img {
      width: 100%;
      max-height: 140px;
      object-fit: contain;
      margin: 10px 0;
      display: none;
    }

    .gallery-tabs {
      display: flex;
      gap: 6px;
      background: #f1f5f9;
      border-radius: 60px;
      padding: 5px;
      margin-bottom: 20px;
    }

    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      padding: 8px 0;
      font-weight: 800;
      border-radius: 40px;
      font-size: 12px;
      cursor: pointer;
    }

    .tab-btn.active {
      background: white;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
      color: #6d28d9;
    }

    .rarity-label {
      font-size: 9px;
      font-weight: 900;
      padding: 2px 10px;
      border-radius: 20px;
      display: inline-block;
      margin: 6px 0;
    }

    .rarity-base { background: #dbeafe; color: #1e3a8a; }
    .rarity-rare { background: #fef3c7; color: #92400e; }
    .rarity-epic { background: #fce7f3; color: #9d174d; }
  </style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div class="card" id="enterScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input type="text" id="playerName" placeholder="Саша" maxlength="15">
  <div class="field-label">Твой ник</div>
  <input type="text" id="playerNick" placeholder="Ракета 🚀" maxlength="20">
  <button class="btn" id="startBtn" disabled>Вперёд! 🚀</button>
</div>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <span class="rank-badge rank-novice" id="rankBadge">🌱 НОВИЧОК</span>
    <div class="keys-wallet">
      <div class="wallet-slot key">🔑 <span id="keyCount">0</span></div>
      <div class="wallet-slot star">⭐ <span id="starCount">0</span></div>
      <div class="wallet-slot shiny">🌟 <span id="shinyCount">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="streak-info" id="streakInfo">Дней подряд: 0</div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="k0"></div><div class="key-slot" id="k1"></div>
    <div class="key-slot" id="k2"></div><div class="key-slot" id="k3"></div>
  </div>
  <div class="char-wrap" id="charWrap"><img id="charImg" src=""></div>
  <div class="motivation-box" id="motivationBox">🏆 Ты собрал(а) всех базовых героев!<br>🔥 Продолжай собирать звёзды!</div>
  <button class="btn btn-green" id="workoutBtn">🏃‍♀️ Я сделал(а) зарядку!</button>
  <div class="cooldown-msg" id="cooldownMsg"></div>
  <div class="info-box" id="infoBox"></div>
  <div class="collection-bar" id="galleryBtn">🏅 Моя коллекция →</div>
  <div class="change-name" id="resetBtn">Сменить имя</div>
</div>

<!-- ГАЛЕРЕЯ -->
<div class="card" id="galleryScreen" style="display:none">
  <h2>🏅 Моя коллекция</h2>
  <div class="gallery-tabs" id="galleryTabs"></div>
  <div id="galleryContent"></div>
  <button class="btn" id="backBtn">← На главную</button>
</div>

<!-- ПОЗДРАВЛЕНИЕ -->
<div class="celebration" id="celebration">
  <div class="celeb-box">
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div class="celeb-title" id="celebTitle"></div>
    <img class="celeb-img" id="celebImg" src="">
    <div class="celeb-text" id="celebText"></div>
    <button class="btn" id="closeCelebBtn">Ура!</button>
  </div>
</div>

<script>
  // ██████████████████████████████████████████████████████████████
  // ПЕРСОНАЖИ
  // ██████████████████████████████████████████████████████████████
  const BASE = [
    { name:"Гепард", power:"Скорость", img:"gepard.png" },
    { name:"Колибри", power:"Лёгкость", img:"kolibri.png" },
    { name:"Муравей", power:"Сила", img:"muravey.png" },
    { name:"Фламинго", power:"Баланс", img:"flamingo.png" },
    { name:"Ленивец", power:"Восстановление", img:"lenivec.png" },
    { name:"Обезьяна", power:"Координация", img:"obeziana.png" },
    { name:"Верблюд", power:"Выносливость", img:"verblyud.png" },
    { name:"Кошка", power:"Гибкость", img:"koshka.png" }
  ];
  const RARE = [
    { name:"Кенгуру", power:"Прыгучесть", img:"kenguru.png" },
    { name:"Осьминог", power:"Цепкость", img:"osminog.png" },
    { name:"Краб", power:"Устойчивость", img:"krab.png" },
    { name:"Улитка", power:"Чуткость", img:"ulitka.png" }
  ];
  const EPIC = [
    { name:"Пегас", power:"Суперлёгкость", img:"pegas.png" },
    { name:"Дракон", power:"Суперсила", img:"drakon.png" }
  ];
  const LEGEND = { name:"Феникс", power:"Возрождение", img:"feniks.png" };

  // ██████████████████████████████████████████████████████████████
  // СОСТОЯНИЕ
  // ██████████████████████████████████████████████████████████████
  let game = {
    name: "", nick: "",
    streak: 0,
    keys: 0,
    stars: 0,
    shiny: 0,
    gotBase: [],
    gotRare: [],
    gotEpic: [],
    gotLegend: false,
    nextBaseIdx: 0,
    lastDate: null
  };
  let playerId = "";

  function saveGame() { if (playerId) localStorage.setItem("as_streak_" + playerId, JSON.stringify(game)); }
  function loadGame() {
    let raw = localStorage.getItem("as_streak_" + playerId);
    if (!raw) return false;
    try {
      let data = JSON.parse(raw);
      game = data;
      if (!game.gotBase) game.gotBase = [];
      if (!game.gotRare) game.gotRare = [];
      if (!game.gotEpic) game.gotEpic = [];
      if (game.gotLegend === undefined) game.gotLegend = false;
      if (game.keys === undefined) game.keys = 0;
      if (game.stars === undefined) game.stars = 0;
      if (game.shiny === undefined) game.shiny = 0;
      if (game.streak === undefined) game.streak = 0;
      if (game.nextBaseIdx === undefined) game.nextBaseIdx = Math.floor(Math.random() * BASE.length);
      return true;
    } catch(e) { return false; }
  }

  function getRandomBaseIdx() {
    let free = BASE.map((_, i) => i).filter(i => !game.gotBase.includes(i));
    return free.length ? free[Math.floor(Math.random() * free.length)] : 0;
  }

  function getRank() {
    let total = game.gotBase.length + game.gotRare.length + game.gotEpic.length + (game.gotLegend ? 1 : 0);
    if (total >= 15) return { label:"👑 МАСТЕР", cls:"rank-master" };
    if (total >= 11) return { label:"⚡ ПРОФИ", cls:"rank-pro" };
    if (total >= 6) return { label:"📖 УЧЕНИК", cls:"rank-student" };
    return { label:"🌱 НОВИЧОК", cls:"rank-novice" };
  }

  function canWorkoutToday() {
    if (!game.lastDate) return true;
    let last = new Date(game.lastDate);
    let now = new Date();
    return last.getDate() !== now.getDate() || last.getMonth() !== now.getMonth() || last.getFullYear() !== now.getFullYear();
  }

  function getTimeToNextDay() {
    let now = new Date();
    let tomorrow = new Date(now);
    tomorrow.setDate(now.getDate() + 1);
    tomorrow.setHours(0, 0, 0, 0);
    let diff = tomorrow - now;
    return { h: Math.floor(diff / 3600000), m: Math.floor((diff % 3600000) / 60000) };
  }

  function playSound(type) {
    try {
      let ctx = new (window.AudioContext || window.webkitAudioContext)();
      let sounds = {
        key: [[880, 0.1, 'sine']],
        base: [[523, 0.15], [659, 0.15], [784, 0.15]],
        star: [[523, 0.12], [659, 0.12]],
        shiny: [[659, 0.15], [880, 0.15]],
        legend: [[262, 0.18], [392, 0.18], [523, 0.18]]
      };
      let seq = sounds[type];
      if (!seq) return;
      seq.forEach(([f, d, sh], i) => {
        let o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g);
        g.connect(ctx.destination);
        o.type = sh || 'sine';
        o.frequency.value = f;
        g.gain.value = 0.2;
        let t = ctx.currentTime + i * 0.12;
        o.start(t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
        o.stop(t + 0.35);
      });
    } catch(e) {}
  }

  function celebrate(emoji, title, text, img, snd) {
    document.getElementById("celebEmoji").innerHTML = emoji;
    document.getElementById("celebTitle").innerHTML = title;
    document.getElementById("celebText").innerHTML = text;
    let imgEl = document.getElementById("celebImg");
    if (img) { imgEl.src = img; imgEl.style.display = "block"; imgEl.onerror = () => imgEl.style.display = "none"; }
    else imgEl.style.display = "none";
    document.getElementById("celebration").classList.add("show");
    if (snd) playSound(snd);
  }
  function closeCeleb() {
    document.getElementById("celebration").classList.remove("show");
    renderGame();
  }

  function openBase() {
    let idx = game.nextBaseIdx;
    if (!game.gotBase.includes(idx)) game.gotBase.push(idx);
    game.nextBaseIdx = getRandomBaseIdx();
    saveGame();
    let char = BASE[idx];
    celebrate("🎉", char.power + " открыта!", char.name + " в коллекции!", char.img, "base");
    checkLegend();
  }

  function checkLegend() {
    if (!game.gotLegend && game.gotBase.length === BASE.length && game.gotRare.length === RARE.length && game.gotEpic.length === EPIC.length) {
      game.gotLegend = true;
      saveGame();
      setTimeout(() => celebrate("🔥", "ЛЕГЕНДА!", "Все суперсилы собраны! Ты — легенда!", LEGEND.img, "legend"), 500);
    }
  }

  function tryOpenBaseFromKeys() {
    if (game.keys >= 4) {
      let wasKeys = game.keys;
      game.keys -= 4;
      openBase();
      if (wasKeys > 4) {
        setTimeout(() => celebrate("🔑", "Ключи", "Осталось " + game.keys + " ключ(ей) для следующего героя", null), 300);
      }
      saveGame();
    }
  }

  function addReward(rewardType, dayNum) {
    if (rewardType === 'key') {
      game.keys++;
      saveGame();
      tryOpenBaseFromKeys();
      if (dayNum === 4) {
        celebrate("🔑🎉", "Ключ + суперсила!", "Ты собрал(а) 4 ключа и открыл(а) героя!", null, "key");
      } else {
        celebrate("🔑", "Ключ получен!", "Всего ключей: " + game.keys, null, "key");
      }
    }
    else if (rewardType === 'star') {
      game.stars++;
      saveGame();
      let need = 4 - (game.stars % 4);
      if (need === 4) need = 4;
      celebrate("⭐", "Звезда получена!", "Всего ⭐: " + game.stars + "\nДо редкого: " + need + " ⭐", null, "star");
    }
    else if (rewardType === 'shiny') {
      game.shiny++;
      saveGame();
      let need = 4 - (game.shiny % 4);
      if (need === 4) need = 4;
      celebrate("🌟", "Сияющая звезда!", "Всего 🌟: " + game.shiny + "\nДо эпического: " + need + " 🌟", null, "shiny");
    }
  }

  function doWorkout() {
    if (!canWorkoutToday()) {
      renderGame();
      return;
    }

    let today = new Date().toISOString();
    game.lastDate = today;
    
    if (game.lastDate) {
      let last = new Date(game.lastDate);
      let yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      let wasYesterday = false;
      if (game.workoutHistory && game.workoutHistory.length) {
        let lastWorkout = new Date(game.workoutHistory[game.workoutHistory.length - 1]);
        wasYesterday = (lastWorkout.getDate() === yesterday.getDate() &&
                        lastWorkout.getMonth() === yesterday.getMonth() &&
                        lastWorkout.getFullYear() === yesterday.getFullYear());
      }
      if (!game.workoutHistory) game.workoutHistory = [];
      let lastWorkout = game.workoutHistory.length ? new Date(game.workoutHistory[game.workoutHistory.length - 1]) : null;
      let isConsecutive = false;
      if (lastWorkout) {
        let yesterday2 = new Date(today);
        yesterday2.setDate(yesterday2.getDate() - 1);
        isConsecutive = (lastWorkout.getDate() === yesterday2.getDate() &&
                         lastWorkout.getMonth() === yesterday2.getMonth() &&
                         lastWorkout.getFullYear() === yesterday2.getFullYear());
      }
      if (isConsecutive) game.streak++;
      else game.streak = 1;
    } else {
      game.streak = 1;
    }
    if (!game.workoutHistory) game.workoutHistory = [];
    game.workoutHistory.push(today);
    if (game.workoutHistory.length > 100) game.workoutHistory = game.workoutHistory.slice(-100);

    let baseCompleted = game.gotBase.length === BASE.length;
    let todayStreak = Math.min(game.streak, 7);
    
    if (!baseCompleted) {
      if (todayStreak === 1 || todayStreak === 2 || todayStreak === 3) {
        addReward('key', todayStreak);
      } else if (todayStreak === 4) {
        addReward('key', 4);
      } else if (todayStreak === 5 || todayStreak === 6) {
        addReward('star', todayStreak);
      } else if (todayStreak === 7) {
        addReward('shiny', 7);
        game.streak = 0;
        saveGame();
        celebrate("🌟💫", "Сияющая звезда!", "Streak сброшен до 0! Начинай новый цикл!", null, "shiny");
      }
    } else {
      if (todayStreak === 5 || todayStreak === 6) {
        addReward('star', todayStreak);
      } else if (todayStreak === 7) {
        addReward('shiny', 7);
        game.streak = 0;
        saveGame();
        celebrate("🌟💫", "Сияющая звезда!", "Streak сброшен до 0! Начинай новый цикл!", null, "shiny");
      } else {
        celebrate("💪", "Молодец!", "Так держать!", null);
      }
    }
    
    saveGame();
    renderGame();
  }

  function renderGame() {
    let rank = getRank();
    let baseCompleted = game.gotBase.length === BASE.length;
    let todayStreak = game.streak;
    let nextReward = "";
    if (!baseCompleted) {
      if (todayStreak === 0 || todayStreak === 1 || todayStreak === 2 || todayStreak === 3) nextReward = "🔑 ключ";
      else if (todayStreak === 4) nextReward = "🔑 ключ + открытие героя";
      else if (todayStreak === 5 || todayStreak === 6) nextReward = "⭐ звезда";
      else if (todayStreak === 7) nextReward = "🌟 сияющая звезда (сброс)";
    } else {
      if (todayStreak === 5 || todayStreak === 6) nextReward = "⭐ звезда";
      else if (todayStreak === 7) nextReward = "🌟 сияющая звезда (сброс)";
      else nextReward = "💪 похвала";
    }

    document.getElementById("rankBadge").className = "rank-badge " + rank.cls;
    document.getElementById("rankBadge").innerHTML = rank.label;
    document.getElementById("keyCount").innerHTML = game.keys;
    document.getElementById("starCount").innerHTML = game.stars;
    document.getElementById("shinyCount").innerHTML = game.shiny;
    document.getElementById("greeting").innerHTML = "Привет, " + (game.name || "") + "!";
    document.getElementById("streakInfo").innerHTML = "🔥 Дней подряд: " + game.streak;
    
    let infoBox = document.getElementById("infoBox");
    let btn = document.getElementById("workoutBtn");
    if (nextReward.includes("⭐")) {
      infoBox.style.display = "block";
      infoBox.innerHTML = "⭐ Сегодня ты получишь ЗВЕЗДУ! ⭐";
      btn.className = "btn btn-star";
      btn.innerHTML = "⭐ Зарядка!";
    } else if (nextReward.includes("🌟")) {
      infoBox.style.display = "block";
      infoBox.innerHTML = "🌟 Сегодня ты получишь СИЯЮЩУЮ ЗВЕЗДУ! 🌟";
      btn.className = "btn btn-shiny";
      btn.innerHTML = "🌟 Зарядка!";
    } else {
      infoBox.style.display = "none";
      btn.className = "btn btn-green";
      btn.innerHTML = "🏃‍♀️ Зарядка!";
    }

    let showKeys = (!baseCompleted && game.keys > 0);
    let keysGrid = document.getElementById("keysGrid");
    let charWrap = document.getElementById("charWrap");
    let motivBox = document.getElementById("motivationBox");
    let progressText = document.getElementById("progressText");

    if (showKeys) {
      keysGrid.style.display = "grid";
      charWrap.classList.remove("show");
      motivBox.style.display = "none";
      for (let i = 0; i < 4; i++) {
        let slot = document.getElementById("k" + i);
        if (i < game.keys) {
          slot.classList.add("filled");
          slot.innerHTML = "🔑";
        } else {
          slot.classList.remove("filled");
          slot.innerHTML = "";
        }
      }
      progressText.innerHTML = "🔑 Ключей в копилке: " + game.keys + "/4";
    } else if (baseCompleted) {
      keysGrid.style.display = "none";
      charWrap.classList.remove("show");
      motivBox.style.display = "block";
      progressText.innerHTML = "🏆 Ты собрал(а) всех базовых героев! Продолжай собирать звёзды!";
    } else if (game.gotBase.length > 0) {
      keysGrid.style.display = "none";
      motivBox.style.display = "none";
      let lastChar = BASE[game.gotBase[game.gotBase.length - 1]];
      document.getElementById("charImg").src = lastChar.img;
      charWrap.classList.add("show");
      progressText.innerHTML = "✨ " + lastChar.power + " — твоя суперсила! ✨";
    } else {
      keysGrid.style.display = "none";
      charWrap.classList.remove("show");
      motivBox.style.display = "none";
      progressText.innerHTML = "🔥 Сделай зарядку 4 дня подряд, чтобы получить суперсилу!";
    }

    let coolDiv = document.getElementById("cooldownMsg");
    if (!canWorkoutToday()) {
      btn.style.display = "none";
      coolDiv.style.display = "block";
      let { h, m } = getTimeToNextDay();
      coolDiv.innerHTML = "⏳ Следующая зарядка <span class='cooldown-time'>через " + h + "ч " + m + "мин</span>";
    } else {
      btn.style.display = "block";
      coolDiv.style.display = "none";
    }
  }

  // ГАЛЕРЕЯ
  let currentTab = "base";
  function renderGallery() {
    let items, collected;
    if (currentTab === "base") { items = BASE; collected = game.gotBase; }
    else if (currentTab === "rare") { items = RARE; collected = game.gotRare; }
    else if (currentTab === "epic") { items = EPIC; collected = game.gotEpic; }
    else { items = [LEGEND]; collected = game.gotLegend ? [0] : []; }
    
    let html = '<div class="gallery-grid">';
    for (let i = 0; i < items.length; i++) {
      let c = items[i];
      let owned = (currentTab === "legend") ? game.gotLegend : collected.includes(i);
      html += '<div class="g-item ' + (owned ? "got" : "") + '">';
      if (owned) {
        html += '<img src="' + c.img + '" onerror="this.parentElement.innerHTML=\'❓\'">';
        html += '<div class="g-name">' + c.power + '</div>';
      } else {
        html += '<div style="font-size:40px; padding:20px;">❓</div>';
        if (currentTab === "rare" || currentTab === "epic") {
          let cost = 4;
          let have = currentTab === "rare" ? game.stars : game.shiny;
          let icon = currentTab === "rare" ? "⭐" : "🌟";
          html += '<div class="g-price">' + icon + ' ' + have + '/' + cost + '</div>';
          if (have >= cost) {
            html += '<button class="g-btn" onclick="unlockChar(' + i + ')">Открыть за ' + icon + cost + '</button>';
          }
        } else if (currentTab === "legend") {
          html += '<div style="font-size:11px; margin:10px;">Собери всех героев!</div>';
        }
      }
      html += '</div>';
    }
    html += '</div>';
    document.getElementById("galleryContent").innerHTML = html;
  }

  window.unlockChar = function(idx) {
    if (currentTab === "rare" && game.stars >= 4 && !game.gotRare.includes(idx)) {
      game.stars -= 4;
      game.gotRare.push(idx);
      saveGame();
      celebrate("⭐", RARE[idx].power + " открыта!", RARE[idx].name + " в коллекции!", RARE[idx].img, "star");
      renderGallery();
      renderGame();
      checkLegend();
    } else if (currentTab === "epic" && game.shiny >= 4 && !game.gotEpic.includes(idx)) {
      game.shiny -= 4;
      game.gotEpic.push(idx);
      saveGame();
      celebrate("🌟", EPIC[idx].power + " открыт!", EPIC[idx].name + " в коллекции!", EPIC[idx].img, "shiny");
      renderGallery();
      renderGame();
      checkLegend();
    }
  };

  function initTabs() {
    let cont = document.getElementById("galleryTabs");
    cont.innerHTML = "";
    let tabs = ["base", "rare", "epic", "legend"];
    let names = ["Базовые", "Редкие", "Эпические", "Легенда"];
    tabs.forEach((t, i) => {
      let btn = document.createElement("button");
      btn.innerText = names[i];
      btn.className = "tab-btn" + (i === 0 ? " active" : "");
      btn.onclick = () => {
        document.querySelectorAll("#galleryTabs .tab-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        currentTab = t;
        renderGallery();
      };
      cont.appendChild(btn);
    });
  }

  function showGallery() {
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("galleryScreen").style.display = "block";
    initTabs();
    renderGallery();
  }
  function hideGallery() {
    document.getElementById("galleryScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    renderGame();
  }

  // СТАРТ И СБРОС
  function checkInputs() {
    let name = document.getElementById("playerName").value.trim();
    let nick = document.getElementById("playerNick").value.trim();
    document.getElementById("startBtn").disabled = !(name && nick);
  }

  function startGame() {
    let name = document.getElementById("playerName").value.trim();
    let nick = document.getElementById("playerNick").value.trim();
    if (!name || !nick) return;
    playerId = (name + "_" + nick).toLowerCase().replace(/[^a-zа-яё0-9_]/gi, '_');
    localStorage.setItem("as_who", JSON.stringify({ name, nick }));
    if (!loadGame()) {
      game = {
        name: name, nick: nick,
        streak: 0, keys: 0, stars: 0, shiny: 0,
        gotBase: [], gotRare: [], gotEpic: [], gotLegend: false,
        nextBaseIdx: Math.floor(Math.random() * BASE.length),
        lastDate: null,
        workoutHistory: []
      };
    } else {
      game.name = name;
      game.nick = nick;
    }
    saveGame();
    document.getElementById("enterScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";
    renderGame();
  }

  function resetGame() {
    localStorage.removeItem("as_streak_" + playerId);
    document.getElementById("gameScreen").style.display = "none";
    document.getElementById("enterScreen").style.display = "block";
    document.getElementById("playerName").value = "";
    document.getElementById("playerNick").value = "";
    checkInputs();
  }

  document.getElementById("startBtn").onclick = startGame;
  document.getElementById("workoutBtn").onclick = doWorkout;
  document.getElementById("galleryBtn").onclick = showGallery;
  document.getElementById("backBtn").onclick = hideGallery;
  document.getElementById("resetBtn").onclick = resetGame;
  document.getElementById("closeCelebBtn").onclick = closeCeleb;
  document.getElementById("playerName").oninput = checkInputs;
  document.getElementById("playerNick").oninput = checkInputs;

  let saved = localStorage.getItem("as_who");
  if (saved) {
    try {
      let d = JSON.parse(saved);
      if (d.name && d.nick) {
        document.getElementById("playerName").value = d.name;
        document.getElementById("playerNick").value = d.nick;
        checkInputs();
      }
    } catch(e) {}
  }
  checkInputs();
</script>
</body>
</html>
