<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 30px;
    padding: 25px;
    max-width: 400px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }
  h1 {
    font-size: 28px;
    color: #333;
    margin-bottom: 5px;
  }
  .subtitle {
    color: #888;
    font-size: 13px;
    margin-bottom: 20px;
  }
  input {
    width: 100%;
    padding: 12px;
    margin-bottom: 15px;
    border: 2px solid #ddd;
    border-radius: 30px;
    font-size: 16px;
    text-align: center;
    outline: none;
  }
  input:focus {
    border-color: #667eea;
  }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 30px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    margin-top: 10px;
  }
  button:active {
    transform: scale(0.97);
  }
  button:disabled {
    opacity: 0.5;
    transform: none;
  }
  .btn-green {
    background: linear-gradient(135deg, #2e7d32, #4caf50);
  }
  .btn-star {
    background: linear-gradient(135deg, #f9a825, #ffb300);
  }
  .btn-shiny {
    background: linear-gradient(135deg, #ff6f00, #ff8f00);
  }
  .top-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 15px;
  }
  .rank {
    background: #f0f0f0;
    padding: 5px 15px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
  }
  .wallet {
    display: flex;
    gap: 15px;
    background: #f0f0f0;
    padding: 5px 15px;
    border-radius: 30px;
  }
  .keys-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin: 20px 0;
  }
  .key-slot {
    aspect-ratio: 1;
    background: #f5f5f5;
    border: 3px dashed #ccc;
    border-radius: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }
  .key-slot.filled {
    border: 3px solid gold;
    background: #fff8e1;
  }
  .char-img {
    width: 100%;
    height: 180px;
    object-fit: contain;
    background: #f9f9f9;
    border-radius: 20px;
    margin: 10px 0;
    display: none;
  }
  .char-img.show {
    display: block;
  }
  .cooldown {
    background: #e8eaf6;
    padding: 12px;
    border-radius: 20px;
    margin-top: 10px;
    display: none;
  }
  .info {
    background: #fff8e1;
    padding: 10px;
    border-radius: 20px;
    margin-top: 10px;
    font-size: 13px;
    display: none;
  }
  .collection-bar {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid #eee;
    cursor: pointer;
    color: #666;
  }
  .change-name {
    margin-top: 10px;
    font-size: 11px;
    color: #ccc;
    cursor: pointer;
  }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
    margin: 15px 0;
  }
  .gallery-item {
    background: #f5f5f5;
    border-radius: 20px;
    padding: 10px;
    text-align: center;
  }
  .gallery-item.got {
    background: #fff;
    border: 2px solid gold;
  }
  .gallery-item img {
    width: 100%;
    height: 100px;
    object-fit: contain;
  }
  .celebration {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 100;
  }
  .celebration.show {
    display: flex;
  }
  .celeb-box {
    background: white;
    border-radius: 30px;
    padding: 25px;
    text-align: center;
    max-width: 280px;
  }
  .celeb-emoji {
    font-size: 50px;
  }
  .hide {
    display: none;
  }
</style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div class="card" id="enterScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <input type="text" id="playerName" placeholder="Твоё имя" maxlength="15">
  <input type="text" id="playerNick" placeholder="Твой ник" maxlength="20">
  <button id="startBtn" disabled>Вперёд! 🚀</button>
</div>

<!-- ГЛАВНЫЙ ЭКРАН -->
<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <span class="rank" id="rankBadge">🌱 НОВИЧОК</span>
    <div class="wallet">
      <span>⭐ <span id="starCount">0</span></span>
      <span>🌟 <span id="shinyCount">0</span></span>
    </div>
  </div>
  <div id="greeting" style="font-size:18px; font-weight:bold; margin:10px 0"></div>
  <div id="progressText" style="font-size:14px; color:#666; margin:10px 0"></div>
  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="k0"></div>
    <div class="key-slot" id="k1"></div>
    <div class="key-slot" id="k2"></div>
    <div class="key-slot" id="k3"></div>
  </div>
  <img class="char-img" id="charImage" src="">
  <button id="workoutBtn">🏃‍♀️ Я сделал(а) зарядку!</button>
  <div class="cooldown" id="cooldownMsg"></div>
  <div class="info" id="infoBox"></div>
  <div class="collection-bar" id="galleryBtn">🏅 Моя коллекция →</div>
  <div class="change-name" id="resetBtn">Сменить имя</div>
</div>

<!-- ГАЛЕРЕЯ -->
<div class="card" id="galleryScreen" style="display:none">
  <h2>🏅 Коллекция</h2>
  <div style="display:flex; gap:5px; margin:15px 0">
    <button id="tabBase" style="flex:1; background:#667eea; margin:0">Базовые</button>
    <button id="tabRare" style="flex:1; background:#ccc; margin:0">Редкие</button>
    <button id="tabEpic" style="flex:1; background:#ccc; margin:0">Эпические</button>
    <button id="TabLegend" style="flex:1; background:#ccc; margin:0">Легенда</button>
  </div>
  <div id="galleryContent"></div>
  <button id="backBtn">← Назад</button>
</div>

<!-- ПОЗДРАВЛЕНИЕ -->
<div class="celebration" id="celebration">
  <div class="celeb-box">
    <div class="celeb-emoji" id="celebEmoji">🎉</div>
    <div id="celebTitle" style="font-size:22px; font-weight:bold"></div>
    <img id="celebImg" style="width:100%; margin:10px 0">
    <div id="celebText"></div>
    <button id="closeCeleb">Ура!</button>
  </div>
</div>

<script>
// █████████████████ ПЕРСОНАЖИ █████████████████
const BASE = [
  { name:"Гепард", power:"Скорость", emoji:"🐆", img:"gepard.png" },
  { name:"Колибри", power:"Лёгкость", emoji:"🐦", img:"kolibri.png" },
  { name:"Муравей", power:"Сила", emoji:"🐜", img:"muravey.png" },
  { name:"Фламинго", power:"Баланс", emoji:"🦩", img:"flamingo.png" },
  { name:"Ленивец", power:"Восстановление", emoji:"🦥", img:"lenivec.png" },
  { name:"Обезьяна", power:"Координация", emoji:"🐒", img:"obeziana.png" },
  { name:"Верблюд", power:"Выносливость", emoji:"🐫", img:"verblyud.png" },
  { name:"Кошка", power:"Гибкость", emoji:"🐱", img:"koshka.png" }
];
const RARE = [
  { name:"Кенгуру", power:"Прыгучесть", emoji:"🦘", img:"kenguru.png" },
  { name:"Осьминог", power:"Цепкость", emoji:"🐙", img:"osminog.png" },
  { name:"Краб", power:"Устойчивость", emoji:"🦀", img:"krab.png" },
  { name:"Улитка", power:"Чуткость", emoji:"🐌", img:"ulitka.png" }
];
const EPIC = [
  { name:"Пегас", power:"Полёт", emoji:"🦄✨", img:"pegas.png" },
  { name:"Дракон", power:"Суперсила", emoji:"🐉", img:"drakon.png" }
];
const LEGEND = { name:"Феникс", power:"Возрождение", emoji:"🔥", img:"feniks.png" };

// █████████████████ НАСТРОЙКИ ДНЕЙ █████████████████
const KEY_DAYS = [1,2,3,4,8,9,10,11,15,16,17,18,22,23,24,25,29,30,31,32,36,37,38,39,43,44,45,46,50,51,52,53];
const STAR_DAYS = [5,6,12,13,19,20,26,27,33,34,40,41,47,48,54,55];
const SHINY_DAYS = [7,14,21,28,35,42,49,56];

function getDayType(day) {
  if (day > 56) return 'end';
  if (KEY_DAYS.includes(day)) return 'key';
  if (STAR_DAYS.includes(day)) return 'star';
  if (SHINY_DAYS.includes(day)) return 'shiny';
  return 'key';
}

function getRank(day) {
  if (day >= 50) return "👑 МАСТЕР";
  if (day >= 36) return "⚡ ПРОФИ";
  if (day >= 15) return "📖 УЧЕНИК";
  return "🌱 НОВИЧОК";
}

// █████████████████ СОСТОЯНИЕ █████████████████
let game = {
  name: "", nick: "",
  startDate: null,
  lastDate: null,
  keyStep: 0,
  stars: 0,
  shiny: 0,
  gotBase: [],
  gotRare: [],
  gotEpic: [],
  gotLegend: false,
  nextBase: 0
};

let playerId = "";

function saveGame() {
  if (playerId) localStorage.setItem("as_" + playerId, JSON.stringify(game));
}

function loadGame() {
  let raw = localStorage.getItem("as_" + playerId);
  if (!raw) return false;
  try {
    let data = JSON.parse(raw);
    game = data;
    if (!game.gotBase) game.gotBase = [];
    if (!game.gotRare) game.gotRare = [];
    if (!game.gotEpic) game.gotEpic = [];
    if (!game.nextBase && game.nextBase !== 0) game.nextBase = Math.floor(Math.random() * BASE.length);
    return true;
  } catch(e) { return false; }
}

// ВЫЧИСЛЕНИЕ ДНЯ
function getCurrentDay() {
  if (!game.startDate) return 1;
  let start = new Date(game.startDate);
  start.setHours(0,0,0,0);
  let now = new Date();
  now.setHours(0,0,0,0);
  let diff = Math.floor((now - start) / (1000*60*60*24));
  let day = diff + 1;
  return day > 56 ? 56 : day;
}

// МОЖНО ЛИ СЕГОДНЯ?
function canWorkout() {
  if (!game.lastDate) return true;
  let last = new Date(game.lastDate);
  let now = new Date();
  return last.getDate() != now.getDate() || last.getMonth() != now.getMonth() || last.getFullYear() != now.getFullYear();
}

// ВРЕМЯ ДО ЗАВТРА
function timeToTomorrow() {
  let now = new Date();
  let tomorrow = new Date(now);
  tomorrow.setDate(now.getDate() + 1);
  tomorrow.setHours(0,0,0,0);
  let diff = tomorrow - now;
  return { h: Math.floor(diff/3600000), m: Math.floor((diff%3600000)/60000) };
}

// ОТКРЫТЬ БАЗОВОГО
function openBase() {
  let idx = game.nextBase;
  if (!game.gotBase.includes(idx)) game.gotBase.push(idx);
  let free = BASE.map((_,i)=>i).filter(i=>!game.gotBase.includes(i));
  game.nextBase = free.length ? free[Math.floor(Math.random()*free.length)] : 0;
  saveGame();
  let char = BASE[idx];
  showCelebration("🎉", char.power + " открыта!", char.name + " в коллекции!", char.img);
  checkLegend();
}

function checkLegend() {
  if (!game.gotLegend && game.gotBase.length == BASE.length && game.gotRare.length == RARE.length && game.gotEpic.length == EPIC.length) {
    game.gotLegend = true;
    saveGame();
    setTimeout(() => showCelebration("🔥", "ЛЕГЕНДА!", "Все суперсилы собраны! Ты — легенда!", LEGEND.img), 500);
  }
}

function showCelebration(emoji, title, text, img) {
  document.getElementById("celebEmoji").innerHTML = emoji;
  document.getElementById("celebTitle").innerHTML = title;
  document.getElementById("celebText").innerHTML = text;
  let imgEl = document.getElementById("celebImg");
  if (img) { imgEl.src = img; imgEl.style.display = "block"; }
  else imgEl.style.display = "none";
  document.getElementById("celebration").classList.add("show");
}

function closeCeleb() {
  document.getElementById("celebration").classList.remove("show");
  renderGame();
}

// ГЛАВНАЯ ФУНКЦИЯ - ЗАРЯДКА
function doWorkout() {
  if (getCurrentDay() > 56) {
    showCelebration("🏆", "Игра пройдена!", "Ты собрал(а) все суперсилы!", "");
    return;
  }
  if (!canWorkout()) {
    renderGame();
    return;
  }

  let day = getCurrentDay();
  let type = getDayType(day);

  if (!game.startDate) game.startDate = new Date().toISOString();
  game.lastDate = new Date().toISOString();

  if (type == 'key') {
    game.keyStep++;
    if (game.keyStep >= 4) {
      openBase();
      game.keyStep = 0;
    } else {
      let left = 4 - game.keyStep;
      showCelebration("🔑", "Ключ " + game.keyStep + "/4", "Осталось " + left + " зарядк" + (left==1?"а":"и"), "");
    }
  }
  else if (type == 'star') {
    game.stars++;
    let need = 4 - (game.stars % 4);
    if (need == 4) need = 4;
    showCelebration("⭐", "Звезда получена!", "Всего: " + game.stars + " ⭐. До редкого: " + need + " ⭐", "");
  }
  else if (type == 'shiny') {
    game.shiny++;
    let need = 4 - (game.shiny % 4);
    if (need == 4) need = 4;
    showCelebration("🌟", "Сияющая звезда!", "Всего: " + game.shiny + " 🌟. До эпического: " + need + " 🌟", "");
  }

  saveGame();
  renderGame();
}

// ОТРИСОВКА
function renderGame() {
  let day = getCurrentDay();
  let finished = day > 56;
  
  document.getElementById("rankBadge").innerHTML = getRank(day);
  document.getElementById("starCount").innerHTML = game.stars;
  document.getElementById("shinyCount").innerHTML = game.shiny;
  document.getElementById("greeting").innerHTML = "Привет, " + (game.name || "") + "!";
  
  if (finished) {
    document.getElementById("progressText").innerHTML = "✨ Все суперсилы собраны. Ты — легенда! ✨";
    document.getElementById("keysGrid").style.display = "none";
    document.getElementById("charImage").classList.remove("show");
    document.getElementById("workoutBtn").style.display = "none";
    document.getElementById("infoBox").style.display = "block";
    document.getElementById("infoBox").innerHTML = "🏆 Ты прошёл(а) все 56 дней!";
    return;
  }
  
  let type = getDayType(day);
  let btn = document.getElementById("workoutBtn");
  let info = document.getElementById("infoBox");
  
  if (type == 'star') {
    info.style.display = "block";
    info.innerHTML = "⭐ Сегодня ты получишь ЗВЕЗДУ! ⭐";
    btn.className = "btn-star";
  } else if (type == 'shiny') {
    info.style.display = "block";
    info.innerHTML = "🌟 Сегодня ты получишь СИЯЮЩУЮ ЗВЕЗДУ! 🌟";
    btn.className = "btn-shiny";
  } else {
    info.style.display = "none";
    btn.className = "btn-green";
  }
  
  if (type == 'key') {
    document.getElementById("keysGrid").style.display = "grid";
    document.getElementById("charImage").classList.remove("show");
    for (let i=0; i<4; i++) {
      let slot = document.getElementById("k"+i);
      if (i < game.keyStep) {
        slot.classList.add("filled");
        slot.innerHTML = "🔑";
      } else {
        slot.classList.remove("filled");
        slot.innerHTML = "";
      }
    }
    let left = 4 - game.keyStep;
    if (left == 0) document.getElementById("progressText").innerHTML = "✨ Сегодня откроется новая суперсила! ✨";
    else document.getElementById("progressText").innerHTML = "🔑 Нужно ещё " + left + " зарядк" + (left==1?"а":"и") + " до суперсилы";
  } else {
    document.getElementById("keysGrid").style.display = "none";
    document.getElementById("charImage").classList.remove("show");
    if (type == 'star') {
      let need = 4 - (game.stars % 4 || 4);
      document.getElementById("progressText").innerHTML = "⭐ У тебя " + game.stars + " звёзд. До редкого: " + need + " ⭐";
    } else if (type == 'shiny') {
      let need = 4 - (game.shiny % 4 || 4);
      document.getElementById("progressText").innerHTML = "🌟 У тебя " + game.shiny + " сияющих. До эпического: " + need + " 🌟";
    }
  }
  
  if (!canWorkout()) {
    btn.style.display = "none";
    let {h,m} = timeToTomorrow();
    document.getElementById("cooldownMsg").style.display = "block";
    document.getElementById("cooldownMsg").innerHTML = "⏳ Следующая зарядка через <span style='font-size:22px'>" + h + "ч " + m + "мин</span>";
  } else {
    btn.style.display = "block";
    document.getElementById("cooldownMsg").style.display = "none";
  }
}

// ГАЛЕРЕЯ
let currentTab = "base";

function renderGallery() {
  let items = [], collected = [];
  if (currentTab == "base") { items = BASE; collected = game.gotBase; }
  else if (currentTab == "rare") { items = RARE; collected = game.gotRare; }
  else if (currentTab == "epic") { items = EPIC; collected = game.gotEpic; }
  else { items = [LEGEND]; collected = game.gotLegend ? [0] : []; }
  
  let html = '<div class="gallery-grid">';
  for (let i=0; i<items.length; i++) {
    let c = items[i];
    let owned = (currentTab == "legend") ? game.gotLegend : collected.includes(i);
    html += '<div class="gallery-item ' + (owned ? "got" : "") + '">';
    if (owned) {
      html += '<img src="' + c.img + '" onerror="this.style.display=\'none\';this.parentElement.innerHTML=\''+c.emoji+'<br>'+c.power+'\'">';
      html += '<div>' + c.power + '</div>';
    } else {
      html += '<div style="font-size:40px; padding:20px;">❓</div>';
      if (currentTab == "rare" || currentTab == "epic") {
        let cost = 4;
        let have = currentTab == "rare" ? game.stars : game.shiny;
        let icon = currentTab == "rare" ? "⭐" : "🌟";
        html += '<div>' + icon + ' ' + have + '/' + cost + '</div>';
        if (have >= cost) {
          html += '<button onclick="unlock(' + i + ')">Открыть за ' + icon + cost + '</button>';
        }
      } else if (currentTab == "legend") {
        html += '<div style="font-size:11px; color:#aaa">Собери всех!</div>';
      }
    }
    html += '</div>';
  }
  html += '</div>';
  document.getElementById("galleryContent").innerHTML = html;
}

window.unlock = function(idx) {
  if (currentTab == "rare" && game.stars >= 4 && !game.gotRare.includes(idx)) {
    game.stars -= 4;
    game.gotRare.push(idx);
    saveGame();
    showCelebration("⭐", RARE[idx].power + " открыта!", RARE[idx].name + " в коллекции!", RARE[idx].img);
    renderGallery();
    renderGame();
    checkLegend();
  } else if (currentTab == "epic" && game.shiny >= 4 && !game.gotEpic.includes(idx)) {
    game.shiny -= 4;
    game.gotEpic.push(idx);
    saveGame();
    showCelebration("🌟", EPIC[idx].power + " открыт!", EPIC[idx].name + " в коллекции!", EPIC[idx].img);
    renderGallery();
    renderGame();
    checkLegend();
  }
};

function showGallery() {
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("galleryScreen").style.display = "block";
  renderGallery();
}
function hideGallery() {
  document.getElementById("galleryScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  renderGame();
}

// СТАРТ
function checkStart() {
  let name = document.getElementById("playerName").value.trim();
  let nick = document.getElementById("playerNick").value.trim();
  document.getElementById("startBtn").disabled = !(name && nick);
}

function startGame() {
  let name = document.getElementById("playerName").value.trim();
  let nick = document.getElementById("playerNick").value.trim();
  if (!name || !nick) return;
  playerId = (name + "_" + nick).toLowerCase().replace(/[^a-z0-9_]/g, '_');
  localStorage.setItem("as_who", JSON.stringify({name,nick}));
  if (!loadGame()) {
    game = { name:name, nick:nick, startDate:null, lastDate:null, keyStep:0, stars:0, shiny:0, gotBase:[], gotRare:[], gotEpic:[], gotLegend:false, nextBase:Math.floor(Math.random()*BASE.length) };
  } else {
    game.name = name;
    game.nick = nick;
  }
  saveGame();
  document.getElementById("enterScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  renderGame();
}

function resetGame() {
  localStorage.removeItem("as_" + playerId);
  document.getElementById("gameScreen").style.display = "none";
  document.getElementById("enterScreen").style.display = "block";
  document.getElementById("playerName").value = "";
  document.getElementById("playerNick").value = "";
  checkStart();
}

// ПРИВЯЗКА КНОПОК
document.getElementById("startBtn").onclick = startGame;
document.getElementById("workoutBtn").onclick = doWorkout;
document.getElementById("galleryBtn").onclick = showGallery;
document.getElementById("backBtn").onclick = hideGallery;
document.getElementById("resetBtn").onclick = resetGame;
document.getElementById("closeCeleb").onclick = closeCeleb;

document.getElementById("tabBase").onclick = () => { currentTab="base"; renderGallery(); };
document.getElementById("tabRare").onclick = () => { currentTab="rare"; renderGallery(); };
document.getElementById("tabEpic").onclick = () => { currentTab="epic"; renderGallery(); };
document.getElementById("TabLegend").onclick = () => { currentTab="legend"; renderGallery(); };

document.getElementById("playerName").oninput = checkStart;
document.getElementById("playerNick").oninput = checkStart;

let saved = localStorage.getItem("as_who");
if (saved) {
  try {
    let d = JSON.parse(saved);
    if (d.name && d.nick) {
      document.getElementById("playerName").value = d.name;
      document.getElementById("playerNick").value = d.nick;
      checkStart();
    }
  } catch(e) {}
}
checkStart();
</script>
</body>
</html>
