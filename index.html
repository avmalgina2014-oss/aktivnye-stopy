<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы — Суперсилы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 32px;
    padding: 28px 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: #2d2d2d; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 700; }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 16px;
    padding: 13px 24px; font-family: 'Fredoka One', cursive;
    font-size: 19px; cursor: pointer; width: 100%;
    transition: transform 0.15s;
    box-shadow: 0 4px 16px rgba(102,126,234,0.4); margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-green { background: linear-gradient(135deg, #2E7D32, #4CAF50); box-shadow: 0 4px 16px rgba(46,125,50,0.4); }
  .field-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; text-align: left; }
  .field-input { width: 100%; border: 3px solid #e0e4ef; border-radius: 14px; padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 700; outline: none; text-align: center; margin-bottom: 14px; transition: border-color 0.2s; }
  .field-input:focus { border-color: #667eea; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .rank-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-family: 'Fredoka One', cursive; font-size: 14px; }
  .rank-novice { background: #e8f5e9; color: #2E7D32; }
  .rank-student { background: linear-gradient(135deg, #FFF8E1, #FFE082); color: #F57F17; }
  .rank-pro { background: linear-gradient(135deg, #E3F2FD, #90CAF9); color: #1565C0; }
  .rank-master { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; }
  .keys-panel { display: flex; gap: 12px; align-items: center; }
  .key-icon { font-size: 22px; line-height: 1; display: inline-flex; align-items: center; gap: 4px; background: #f5f5f5; padding: 4px 10px; border-radius: 30px; }
  .greeting { font-size: 18px; font-weight: 900; color: #2d2d2d; margin-bottom: 10px; }
  .progress-text { font-size: 12px; color: #888; font-weight: 700; margin-bottom: 12px; line-height: 1.6; }
  .keys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .key-slot { aspect-ratio: 1; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 3px dashed #e0e4ef; background: #f9f9f9; transition: all 0.4s ease; }
  .key-slot.filled { border: 3px solid gold; background: linear-gradient(135deg, #fffde7, #fff9c4); box-shadow: 0 4px 12px rgba(255,215,0,0.4); animation: popIn 0.5s ease; }
  @keyframes popIn { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }
  .char-image-wrap { border-radius: 18px; overflow: hidden; margin-bottom: 14px; display: none; background: #f5f5f5; }
  .char-image-wrap img { width: 100%; height: 200px; object-fit: contain; display: block; }
  .char-image-wrap.show { display: block; animation: zoomIn 0.6s ease; }
  @keyframes zoomIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }
  .cooldown-msg { background: #f0f4ff; border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: #667eea; display: none; margin-top: 8px; }
  .cooldown-time { font-family: 'Fredoka One', cursive; font-size: 20px; display: block; margin-top: 4px; }
  .collection-section { margin-top: 16px; border-top: 2px solid #f0f0f0; padding-top: 14px; cursor: pointer; }
  .collection-section:hover .collection-title { color: #667eea; }
  .collection-title { font-family: 'Fredoka One', cursive; font-size: 15px; color: #888; margin-bottom: 10px; transition: color 0.2s; }
  .shop-buttons { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }
  .shop-btn { width: 100%; padding: 10px; border-radius: 14px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; cursor: pointer; border: none; transition: all 0.2s; }
  .shop-btn.rare { background: #E3F2FD; color: #1565C0; border: 2px solid #42A5F5; }
  .shop-btn.epic { background: #FFEBEE; color: #C62828; border: 2px solid #EF5350; }
  .shop-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .gallery-tabs { display: flex; gap: 8px; margin-bottom: 16px; border-bottom: 2px solid #e0e4ef; }
  .tab-btn { background: none; border: none; padding: 8px 16px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 14px; color: #888; cursor: pointer; transition: all 0.2s; }
  .tab-btn.active { color: #667eea; border-bottom: 3px solid #667eea; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin: 14px 0; }
  .gallery-item { border-radius: 18px; border: 2px solid #e8e8e8; background: #f0f0f0; padding: 10px 8px; text-align: center; transition: all 0.3s; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .gallery-item.unlocked { background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,0.10); }
  .gallery-power-name { font-family: 'Fredoka One', cursive; font-size: 14px; margin-top: 8px; }
  .gallery-image-area { height: 100px; width: 100%; display: flex; align-items: center; justify-content: center; }
  .celebration { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .celebration.show { display: flex; }
  .celebration-box { background: white; border-radius: 32px; padding: 28px 24px; text-align: center; max-width: 360px; width: 100%; animation: zoomIn 0.4s ease; }
  .celebration-emoji { font-size: 56px; display: block; margin-bottom: 10px; }
  .celebration-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #2d2d2d; margin-bottom: 6px; }
  .celebration-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 14px; margin: 10px 0; display: none; }
  .celebration-text { font-size: 14px; color: #888; font-weight: 700; margin-bottom: 18px; }
  .change-name { font-size: 11px; color: #ccc; margin-top: 10px; cursor: pointer; font-weight: 700; }
  .change-name:hover { color: #667eea; }
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input type="text" class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15" oninput="updatePreview()">
  <div class="field-label">Придумай ник</div>
  <input type="text" class="field-input" id="nickInput" placeholder="Например: Ракета или 🚀" maxlength="20" oninput="updatePreview()">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none;">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱 НОВИЧОК</div>
    <div class="keys-panel">
      <span class="key-icon">🔷 <span id="diamondKeys">0</span></span>
      <span class="key-icon">🔶 <span id="rubyKeys">0</span></span>
    </div>
  </div>
  <div class="greeting" id="greetingText">Привет!</div>

  <div class="progress-text" id="progressText"></div>

  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="key0"></div><div class="key-slot" id="key1"></div>
    <div class="key-slot" id="key2"></div><div class="key-slot" id="key3"></div>
  </div>

  <div class="char-image-wrap" id="charImageWrap"><img id="charImage" src="" alt="суперсила"></div>

  <button class="btn btn-green" id="claimBtn" style="display:block;">🔑 Я сделал(а) зарядку!</button>

  <div class="shop-buttons" id="shopButtons" style="display:none;">
    <button class="shop-btn rare" id="unlockRareBtn">✨ Открыть РЕДКОГО (4 🔷)</button>
    <button class="shop-btn epic" id="unlockEpicBtn">🔥 Открыть ЭПИЧЕСКОГО (4 🔶)</button>
  </div>

  <div class="cooldown-msg" id="cooldownMsg">
    Отличная работа! Приходи завтра 🌙
    <span class="cooldown-time" id="cooldownTime"></span>
  </div>

  <div class="collection-section" onclick="showGallery()">
    <div class="collection-title">🏅 Мои суперсилы →</div>
  </div>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<div class="card" id="galleryScreen" style="display:none;">
  <h1>🏅 Мои суперсилы</h1>
  <div class="gallery-tabs">
    <button class="tab-btn active" data-tab="base">Базовые</button>
    <button class="tab-btn" data-tab="rareEpic">Редкие + Эпические</button>
    <button class="tab-btn" data-tab="legendary">Легенда</button>
  </div>
  <div id="galleryContent"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration">
  <div class="celebration-box">
    <span class="celebration-emoji" id="celebEmoji">🎉</span>
    <div class="celebration-title" id="celebTitle">Ура!</div>
    <img class="celebration-img" id="celebImg" src="" alt="">
    <div class="celebration-text" id="celebText"></div>
    <button class="btn" onclick="closeCelebration()">Ура! 🎉</button>
  </div>
</div>

<script>
  // ========================
  // ПЕРСОНАЖИ
  // ========================
  const BASE_CHARS = [
    { animal: "🐆", power: "Скорость", name: "Гепард", color: "#E07000", image: "gepard.png" },
    { animal: "🐦", power: "Лёгкость", name: "Колибри", color: "#00ACC1", image: "kolibri.png" },
    { animal: "🐜", power: "Сила", name: "Муравей", color: "#CC0000", image: "muravey.png" },
    { animal: "🦩", power: "Баланс", name: "Фламинго", color: "#E91E8C", image: "flamingo.png" },
    { animal: "🦥", power: "Восстановление", name: "Ленивец", color: "#2E7D32", image: "lenivec.png" },
    { animal: "🐒", power: "Координация", name: "Обезьяна", color: "#8D6E63", image: "obeziana.png" },
    { animal: "🐫", power: "Выносливость", name: "Верблюд", color: "#D4A373", image: "verblyud.png" },
    { animal: "🐱", power: "Гибкость", name: "Кошка", color: "#FF9800", image: "koshka.png" }
  ];

  const RARE_CHARS = [
    { animal: "🦘", power: "Прыгучесть", name: "Кенгуру", color: "#FF5722", image: "kenguru.png" },
    { animal: "🐙", power: "Цепкость", name: "Осьминог", color: "#7B1FA2", image: "osminog.png" },
    { animal: "🦀", power: "Устойчивость", name: "Краб", color: "#D32F2F", image: "krab.png" },
    { animal: "🐌", power: "Чуткость", name: "Улитка", color: "#4CAF50", image: "ulitka.png" }
  ];

  const EPIC_CHARS = [
    { animal: "🦄", power: "Суперлёгкость", name: "Пегас", color: "#E040FB", image: "pegas.png" },
    { animal: "🐉", power: "Суперсила", name: "Дракон", color: "#F44336", image: "drakon.png" }
  ];

  const LEGENDARY = { animal: "🐦‍🔥", power: "Возрождение", name: "Феникс", color: "#FF6F00", image: "feniks.png" };

  // ========================
  // ДАННЫЕ ИГРОКА
  // ========================
  let currentBaseCharIndex = 0;
  let collectedBase = [];
  let collectedRare = [];
  let collectedEpic = [];
  let goldKeys = 0;
  let diamondKeys = 0;
  let rubyKeys = 0;
  let currentStep = 0;
  let lastClaim = null;
  let weekCount = 0;
  let weekStart = null;
  let childName = "";
  let childNick = "";
  let docId = "";
  let legendaryUnlocked = false;

  // ========================
  // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
  // ========================
  function getWeekStart(date) {
    let d = new Date(date);
    let day = d.getDay();
    let diff = d.getDate() - day + (day === 0 ? -6 : 1);
    d.setDate(diff);
    d.setHours(0,0,0,0);
    return d.getTime();
  }

  function getRank() {
    if (collectedBase.length >= 8 && collectedRare.length >= 4 && collectedEpic.length >= 2) return { name: "МАСТЕР", class: "rank-master", icon: "👑" };
    if (collectedBase.length >= 6) return { name: "ПРОФИ", class: "rank-pro", icon: "⭐" };
    if (collectedBase.length >= 3) return { name: "УЧЕНИК", class: "rank-student", icon: "📖" };
    return { name: "НОВИЧОК", class: "rank-novice", icon: "🌱" };
  }

  function declension(n, one, few, many) {
    let m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
    return many;
  }

  function playSound(type) {
    try {
      let ctx = new (window.AudioContext || window.webkitAudioContext)();
      if (type === 'start') {
        [440, 550, 660].forEach((f, i) => {
          let o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.12);
          g.gain.setValueAtTime(0.25, ctx.currentTime + i * 0.12);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
          o.start(ctx.currentTime + i * 0.12);
          o.stop(ctx.currentTime + i * 0.12 + 0.3);
        });
      } else if (type === 'key') {
        let o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'triangle';
        o.frequency.setValueAtTime(900, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.25);
        g.gain.setValueAtTime(0.3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.25);
        o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.25);
      } else if (type === 'win') {
        [523, 659, 784, 1047].forEach((f, i) => {
          let o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.18);
          g.gain.setValueAtTime(0.3, ctx.currentTime + i * 0.18);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.18 + 0.4);
          o.start(ctx.currentTime + i * 0.18);
          o.stop(ctx.currentTime + i * 0.18 + 0.4);
        });
      } else if (type === 'legendary') {
        [262, 330, 392, 523, 659].forEach((f, i) => {
          let o = ctx.createOscillator(), g = ctx.createGain();
          o.connect(g); g.connect(ctx.destination);
          o.type = 'sine';
          o.frequency.setValueAtTime(f, ctx.currentTime + i * 0.25);
          g.gain.setValueAtTime(0.4, ctx.currentTime + i * 0.25);
          g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.25 + 0.6);
          o.start(ctx.currentTime + i * 0.25);
          o.stop(ctx.currentTime + i * 0.25 + 0.6);
        });
      }
    } catch(e) {}
  }

  function showCelebration(title, text, emoji = "🎉", imgSrc = null) {
    document.getElementById('celebEmoji').innerHTML = emoji;
    document.getElementById('celebTitle').innerHTML = title;
    const imgEl = document.getElementById('celebImg');
    if (imgSrc) {
      imgEl.src = imgSrc;
      imgEl.style.display = 'block';
    } else {
      imgEl.style.display = 'none';
    }
    document.getElementById('celebText').innerHTML = text;
    document.getElementById('celebration').classList.add('show');
  }

  function updateUI() {
    document.getElementById('diamondKeys').innerText = diamondKeys;
    document.getElementById('rubyKeys').innerText = rubyKeys;

    const rank = getRank();
    const rankBadge = document.getElementById('rankBadge');
    rankBadge.className = `rank-badge ${rank.class}`;
    rankBadge.textContent = `${rank.icon} ${rank.name}`;

    const allBasesCollected = collectedBase.length === BASE_CHARS.length;
    const allRaresCollected = collectedRare.length === RARE_CHARS.length;
    const allEpicsCollected = collectedEpic.length === EPIC_CHARS.length;

    if (!legendaryUnlocked && allBasesCollected && allRaresCollected && allEpicsCollected) {
      legendaryUnlocked = true;
      playSound('legendary');
      showCelebration("🏆 ПУТЬ ПРОЙДЕН! 🏆", "Ты — ЛЕГЕНДА!", "🐦‍🔥", LEGENDARY.image);
      localStorage.setItem(`legendary_${docId}`, 'true');
    }

    if (currentStep < 4) {
      document.getElementById('keysGrid').style.display = 'grid';
      document.getElementById('charImageWrap').classList.remove('show');
      document.getElementById('shopButtons').style.display = 'none';
      for (let i = 0; i < 4; i++) {
        const slot = document.getElementById(`key${i}`);
        if (i < currentStep) {
          slot.classList.add('filled');
          slot.innerHTML = '🔑';
        } else {
          slot.classList.remove('filled');
          slot.innerHTML = '';
        }
      }
      const remaining = 4 - currentStep;
      document.getElementById('progressText').innerHTML = `🔑 До суперсилы: ${remaining} ${declension(remaining, 'зарядка', 'зарядки', 'зарядок')}`;
    } else {
      document.getElementById('keysGrid').style.display = 'none';
      document.getElementById('charImageWrap').classList.add('show');
      document.getElementById('charImage').src = BASE_CHARS[currentBaseCharIndex].image;
      document.getElementById('progressText').innerHTML = `✨ Суперсила открыта!`;
      if (collectedBase.length < BASE_CHARS.length || diamondKeys >= 4 || rubyKeys >= 4) {
        document.getElementById('shopButtons').style.display = 'flex';
      } else {
        document.getElementById('shopButtons').style.display = 'none';
      }
    }
  }

  async function claimWorkout() {
    const now = new Date();
    const currentWeekStart = getWeekStart(now);
    if (lastClaim && (now - lastClaim) < 24 * 3600 * 1000) {
      const next = new Date(lastClaim.getTime() + 24 * 3600 * 1000);
      const diff = next - now;
      const h = Math.floor(diff / 3600000);
      const m = Math.floor((diff % 3600000) / 60000);
      document.getElementById('cooldownMsg').style.display = 'block';
      document.getElementById('cooldownTime').innerText = `${h} ч ${m} мин`;
      return;
    }
    playSound('key');
    lastClaim = now;
    if (!weekStart || weekStart !== currentWeekStart) {
      weekStart = currentWeekStart;
      weekCount = 1;
    } else {
      weekCount++;
    }
    if (weekCount <= 3) {
      goldKeys++;
      if (goldKeys >= 4) {
        goldKeys -= 4;
        if (currentStep < 4) {
          currentStep++;
        }
        if (currentStep >= 4 && !collectedBase.includes(currentBaseCharIndex)) {
          collectedBase.push(currentBaseCharIndex);
          playSound('win');
          if (collectedBase.length < BASE_CHARS.length) {
            let available = [];
            for (let i = 0; i < BASE_CHARS.length; i++) {
              if (!collectedBase.includes(i)) available.push(i);
            }
            currentBaseCharIndex = available[Math.floor(Math.random() * available.length)];
            currentStep = 0;
          }
        }
      }
    } else if (weekCount === 5 || weekCount === 6) {
      diamondKeys++;
    } else if (weekCount === 7) {
      rubyKeys++;
    }
    updateUI();
    saveProgress();
  }

  function unlockRare() {
    if (diamondKeys >= 4 && collectedRare.length < RARE_CHARS.length) {
      diamondKeys -= 4;
      let available = [];
      for (let i = 0; i < RARE_CHARS.length; i++) {
        if (!collectedRare.includes(i)) available.push(i);
      }
      const newRare = available[Math.floor(Math.random() * available.length)];
      collectedRare.push(newRare);
      playSound('win');
      updateUI();
      saveProgress();
    }
  }

  function unlockEpic() {
    if (rubyKeys >= 4 && collectedEpic.length < EPIC_CHARS.length) {
      rubyKeys -= 4;
      let available = [];
      for (let i = 0; i < EPIC_CHARS.length; i++) {
        if (!collectedEpic.includes(i)) available.push(i);
      }
      const newEpic = available[Math.floor(Math.random() * available.length)];
      collectedEpic.push(newEpic);
      playSound('win');
      updateUI();
      saveProgress();
    }
  }

  function saveProgress() {
    const data = {
      goldKeys, diamondKeys, rubyKeys, currentStep, lastClaim, weekCount, weekStart,
      collectedBase, collectedRare, collectedEpic, currentBaseCharIndex, legendaryUnlocked
    };
    localStorage.setItem(`progress_${docId}`, JSON.stringify(data));
    localStorage.setItem('child_active_stop', JSON.stringify({ name: childName, nick: childNick }));
  }

  function loadProgress() {
    const saved = localStorage.getItem(`progress_${docId}`);
    if (saved) {
      try {
        const data = JSON.parse(saved);
        goldKeys = data.goldKeys || 0;
        diamondKeys = data.diamondKeys || 0;
        rubyKeys = data.rubyKeys || 0;
        currentStep = data.currentStep || 0;
        lastClaim = data.lastClaim ? new Date(data.lastClaim) : null;
        weekCount = data.weekCount || 0;
        weekStart = data.weekStart || null;
        collectedBase = data.collectedBase || [];
        collectedRare = data.collectedRare || [];
        collectedEpic = data.collectedEpic || [];
        currentBaseCharIndex = data.currentBaseCharIndex || 0;
        legendaryUnlocked = data.legendaryUnlocked || false;
        if (collectedBase.length === 0 && BASE_CHARS.length > 0) {
          currentBaseCharIndex = Math.floor(Math.random() * BASE_CHARS.length);
        }
        return true;
      } catch(e) {}
    }
    return false;
  }

  function resetGame() {
    goldKeys = 0;
    diamondKeys = 0;
    rubyKeys = 0;
    currentStep = 0;
    lastClaim = null;
    weekCount = 0;
    weekStart = null;
    collectedBase = [];
    collectedRare = [];
    collectedEpic = [];
    currentBaseCharIndex = Math.floor(Math.random() * BASE_CHARS.length);
    legendaryUnlocked = false;
    localStorage.removeItem(`progress_${docId}`);
    localStorage.removeItem(`legendary_${docId}`);
    updateUI();
  }

  function updatePreview() {
    const name = document.getElementById('nameInput').value.trim();
    const nick = document.getElementById('nickInput').value.trim();
    document.getElementById('startBtn').disabled = !(name && nick);
  }

  function renderGallery(tab) {
    const container = document.getElementById('galleryContent');
    container.innerHTML = '';
    let chars = [];
    if (tab === 'base') {
      chars = BASE_CHARS.map((c, i) => ({ ...c, collected: collectedBase.includes(i) }));
    } else if (tab === 'rareEpic') {
      const rare = RARE_CHARS.map((c, i) => ({ ...c, collected: collectedRare.includes(i) }));
      const epic = EPIC_CHARS.map((c, i) => ({ ...c, collected: collectedEpic.includes(i) }));
      chars = [...rare, ...epic];
    } else {
      chars = [{ ...LEGENDARY, collected: legendaryUnlocked }];
    }
    const grid = document.createElement('div');
    grid.className = 'gallery-grid';
    for (const c of chars) {
      const div = document.createElement('div');
      div.className = `gallery-item ${c.collected ? 'unlocked' : ''}`;
      const area = document.createElement('div');
      area.className = 'gallery-image-area';
      if (c.collected) {
        const img = document.createElement('img');
        img.src = c.image;
        img.alt = c.power;
        area.appendChild(img);
      } else {
        const q = document.createElement('div');
        q.style.cssText = 'font-size:36px;color:#ccc;';
        q.textContent = '❓';
        area.appendChild(q);
      }
      div.appendChild(area);
      if (c.collected) {
        const pname = document.createElement('div');
        pname.className = 'gallery-power-name';
        pname.style.color = c.color;
        pname.textContent = c.power;
        div.appendChild(pname);
      }
      grid.appendChild(div);
    }
    container.appendChild(grid);
  }

  window.showGallery = function() {
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('galleryScreen').style.display = 'block';
    renderGallery('base');
    const btns = document.querySelectorAll('.tab-btn');
    btns.forEach(btn => {
      btn.addEventListener('click', () => {
        btns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(btn.dataset.tab);
      });
    });
  };

  window.hideGallery = function() {
    document.getElementById('galleryScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
  };

  window.startGame = function() {
    childName = document.getElementById('nameInput').value.trim();
    childNick = document.getElementById('nickInput').value.trim();
    if (!childName || !childNick) return;
    docId = `${childName}_${childNick}`.toLowerCase().replace(/[^a-z0-9_]/g, '_');
    playSound('start');
    document.getElementById('nameScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    document.getElementById('claimBtn').innerHTML = `🔑 Я сделал(а) зарядку!`;
    document.getElementById('greetingText').innerHTML = `Привет, ${childName}! 👋`;
    if (!loadProgress()) {
      resetGame();
    }
    updateUI();
    document.getElementById('claimBtn').onclick = claimWorkout;
    document.getElementById('unlockRareBtn').onclick = unlockRare;
    document.getElementById('unlockEpicBtn').onclick = unlockEpic;
  };

  window.changeName = function() {
    localStorage.removeItem(`progress_${docId}`);
    localStorage.removeItem(`legendary_${docId}`);
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('nameScreen').style.display = 'block';
    document.getElementById('nameInput').value = '';
    document.getElementById('nickInput').value = '';
    updatePreview();
  };

  window.closeCelebration = function() {
    document.getElementById('celebration').classList.remove('show');
  };

  const saved = localStorage.getItem('child_active_stop');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      if (data.name && data.nick) {
        document.getElementById('nameInput').value = data.name;
        document.getElementById('nickInput').value = data.nick;
        updatePreview();
      }
    } catch(e) {}
  }
</script>
</body>
</html>
