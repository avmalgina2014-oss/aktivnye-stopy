<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы — Коллекция</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 32px;
    padding: 32px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 {
    font-family: 'Fredoka One', cursive;
    font-size: 28px;
    color: #2d2d2d;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 24px;
    font-weight: 700;
  }

  /* Name screen */
  #nameScreen input {
    width: 100%;
    border: 3px solid #e0e4ef;
    border-radius: 16px;
    padding: 14px 18px;
    font-family: 'Nunito', sans-serif;
    font-size: 18px;
    font-weight: 700;
    outline: none;
    text-align: center;
    margin-bottom: 16px;
    transition: border-color 0.2s;
  }
  #nameScreen input:focus { border-color: #667eea; }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 16px;
    padding: 14px 28px;
    font-family: 'Fredoka One', cursive;
    font-size: 20px;
    cursor: pointer;
    width: 100%;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(102,126,234,0.4);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.5); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .btn-green {
    background: linear-gradient(135deg, #2E7D32, #4CAF50);
    box-shadow: 0 4px 16px rgba(46,125,50,0.4);
  }

  /* Collection screen */
  .greeting {
    font-size: 22px;
    font-weight: 900;
    color: #2d2d2d;
    margin-bottom: 4px;
  }
  .progress-text {
    font-size: 14px;
    color: #888;
    font-weight: 700;
    margin-bottom: 20px;
  }

  /* Character display */
  .character-box {
    background: linear-gradient(135deg, #f8f9ff, #e8ecff);
    border-radius: 24px;
    padding: 24px;
    margin-bottom: 20px;
    position: relative;
    min-height: 200px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  .parts-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    width: 100%;
    margin-bottom: 16px;
  }
  .part {
    aspect-ratio: 1;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: all 0.3s;
  }
  .part.locked {
    background: #e0e4ef;
    font-size: 20px;
  }
  .part.unlocked {
    background: linear-gradient(135deg, #667eea, #764ba2);
    box-shadow: 0 4px 12px rgba(102,126,234,0.4);
    animation: pop 0.4s ease;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .complete-badge {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: white;
    border-radius: 20px;
    padding: 8px 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 16px;
    display: none;
    margin-bottom: 12px;
  }

  /* Action button */
  .action-area { margin-top: 8px; }
  .cooldown-msg {
    background: #f0f4ff;
    border-radius: 16px;
    padding: 16px;
    font-size: 15px;
    font-weight: 700;
    color: #667eea;
    display: none;
  }
  .cooldown-msg .time { font-size: 24px; font-family: 'Fredoka One', cursive; display: block; margin-top: 4px; }

  /* Celebration */
  .celebration {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .celebration.show { display: flex; }
  .celebration-box {
    background: white;
    border-radius: 32px;
    padding: 40px 32px;
    text-align: center;
    max-width: 320px;
    animation: zoomIn 0.4s ease;
  }
  @keyframes zoomIn {
    from { transform: scale(0.5); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .celebration-emoji { font-size: 80px; display: block; margin-bottom: 16px; }
  .celebration-title { font-family: 'Fredoka One', cursive; font-size: 28px; color: #2d2d2d; margin-bottom: 8px; }
  .celebration-part { font-size: 60px; margin: 16px 0; }
  .celebration-text { font-size: 15px; color: #888; font-weight: 700; margin-bottom: 24px; }

  /* Loading */
  .loading { color: #888; font-weight: 700; font-size: 16px; padding: 20px; }

  /* Change name */
  .change-name { font-size: 12px; color: #bbb; margin-top: 16px; cursor: pointer; font-weight: 700; }
  .change-name:hover { color: #667eea; }
</style>
</head>
<body>

<!-- NAME SCREEN -->
<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Коллекция персонажей</div>
  <p style="font-size:15px;color:#555;font-weight:700;margin-bottom:20px;">Как тебя зовут?</p>
  <input type="text" id="nameInput" placeholder="Введи своё имя" maxlength="20" onkeypress="if(event.key==='Enter')startGame()">
  <button class="btn" onclick="startGame()">Вперёд! 🚀</button>
</div>

<!-- COLLECTION SCREEN -->
<div class="card" id="collectionScreen" style="display:none;">
  <div class="greeting" id="greetingText">Привет!</div>
  <div class="progress-text" id="progressText">Загрузка...</div>

  <div class="character-box">
    <div id="completeBadge" class="complete-badge">🎉 Персонаж собран!</div>
    <div class="parts-grid" id="partsGrid"></div>
    <div id="loadingMsg" class="loading">Загрузка...</div>
  </div>

  <div class="action-area">
    <button class="btn btn-green" id="claimBtn" onclick="claimPart()" style="display:none;">
      💪 Я сделал зарядку!
    </button>
    <div class="cooldown-msg" id="cooldownMsg">
      Отличная работа! Следующая часть откроется завтра 🌙
      <span class="time" id="cooldownTime"></span>
    </div>
  </div>

  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<!-- CELEBRATION -->
<div class="celebration" id="celebration">
  <div class="celebration-box">
    <span class="celebration-emoji">🎊</span>
    <div class="celebration-title">Ура! Новая часть!</div>
    <div class="celebration-part" id="celebrationPart"></div>
    <div class="celebration-text" id="celebrationText"></div>
    <button class="btn" onclick="closeCelebration()">Ура! 🎉</button>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  // ⚠️ ЗАМЕНИТЕ НА СВОИ ДАННЫЕ ИЗ FIREBASE
  const firebaseConfig = {
     apiKey: "AIzaSyB5wc1u9TR31jKCV6ds1T3So7v2vux-NCo",
    authDomain: "aktivnye-stopy.firebaseapp.com",
    projectId: "aktivnye-stopy",
    storageBucket: "aktivnye-stopy.firebasestorage.app",
    messagingSenderId: "154203578895",
    appId: "1:154203578895:web:fa18ecc7e7d4a7a23bf97a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Персонажи — части коллекции
  const CHARACTERS = [
    { name: "Весёлый Осьминог", parts: ["🐙","🦑","🌊","💙","⭐","🫧"] },
    { name: "Лесной Ёжик",      parts: ["🦔","🍄","🌿","🍂","🌰","🍃"] },
    { name: "Космический Кот",  parts: ["🐱","🚀","⭐","🌙","🪐","✨"] },
    { name: "Морская Черепаха", parts: ["🐢","🌊","🐚","🪸","💚","🐠"] },
  ];

  // Получаем kit ID из URL (?kit=123)
  const urlParams = new URLSearchParams(window.location.search);
  const kitId = urlParams.get('kit') || 'demo';

  let playerData = null;
  let childName = '';

  // ── Запуск игры ──
  window.startGame = async function() {
    const input = document.getElementById('nameInput').value.trim();
    if (!input) { alert('Введи своё имя!'); return; }
    childName = input;
    localStorage.setItem('childName_' + kitId, childName);
    await loadPlayer();
  };

  // ── Загрузка данных игрока ──
  async function loadPlayer() {
    document.getElementById('nameScreen').style.display = 'none';
    document.getElementById('collectionScreen').style.display = 'block';
    document.getElementById('greetingText').textContent = 'Привет, ' + childName + '! 👋';

    const docId = kitId + '_' + childName.toLowerCase().replace(/\s+/g, '_');
    const ref = doc(db, 'players', docId);

    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        playerData = snap.data();
      } else {
        // Новый игрок — выбираем случайного персонажа
        const charIndex = Math.floor(Math.random() * CHARACTERS.length);
        playerData = {
          name: childName,
          kitId: kitId,
          charIndex: charIndex,
          unlockedParts: [],
          lastClaim: null,
          createdAt: serverTimestamp()
        };
        await setDoc(ref, playerData);
      }
      renderCollection();
    } catch(e) {
      document.getElementById('loadingMsg').textContent = 'Ошибка загрузки. Проверь интернет.';
    }
  }

  // ── Отрисовка коллекции ──
  function renderCollection() {
    const char = CHARACTERS[playerData.charIndex];
    const unlocked = playerData.unlockedParts || [];
    const total = char.parts.length;
    const done = unlocked.length;

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('progressText').textContent =
      char.name + ' — собрано ' + done + ' из ' + total;

    // Сетка частей
    const grid = document.getElementById('partsGrid');
    grid.innerHTML = '';
    char.parts.forEach((part, i) => {
      const div = document.createElement('div');
      div.className = 'part ' + (unlocked.includes(i) ? 'unlocked' : 'locked');
      div.textContent = unlocked.includes(i) ? part : '🔒';
      grid.appendChild(div);
    });

    // Персонаж собран полностью
    if (done >= total) {
      document.getElementById('completeBadge').style.display = 'inline-block';
      // Начинаем нового персонажа
      showNewCharacterOption();
      return;
    }

    // Проверяем можно ли получить часть сегодня
    checkCooldown();
  }

  // ── Проверка кулдауна (1 раз в день) ──
  function checkCooldown() {
    const claimBtn = document.getElementById('claimBtn');
    const cooldownMsg = document.getElementById('cooldownMsg');

    if (!playerData.lastClaim) {
      claimBtn.style.display = 'block';
      return;
    }

    const lastClaim = playerData.lastClaim.toDate ? playerData.lastClaim.toDate() : new Date(playerData.lastClaim);
    const now = new Date();
    const nextClaim = new Date(lastClaim);
    nextClaim.setHours(nextClaim.getHours() + 24);

    if (now >= nextClaim) {
      claimBtn.style.display = 'block';
    } else {
      claimBtn.style.display = 'none';
      cooldownMsg.style.display = 'block';
      // Показываем обратный отсчёт
      updateCountdown(nextClaim);
      setInterval(() => updateCountdown(nextClaim), 60000);
    }
  }

  function updateCountdown(nextClaim) {
    const now = new Date();
    const diff = nextClaim - now;
    const hours = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    document.getElementById('cooldownTime').textContent = hours + ' ч ' + mins + ' мин';
  }

  // ── Получить новую часть ──
  window.claimPart = async function() {
    const char = CHARACTERS[playerData.charIndex];
    const unlocked = playerData.unlockedParts || [];
    const allParts = char.parts.map((_, i) => i);
    const remaining = allParts.filter(i => !unlocked.includes(i));

    if (remaining.length === 0) return;

    // Случайная часть из оставшихся
    const randomPart = remaining[Math.floor(Math.random() * remaining.length)];
    const newUnlocked = [...unlocked, randomPart];

    const docId = kitId + '_' + childName.toLowerCase().replace(/\s+/g, '_');
    const ref = doc(db, 'players', docId);

    try {
      await updateDoc(ref, {
        unlockedParts: newUnlocked,
        lastClaim: serverTimestamp()
      });
      playerData.unlockedParts = newUnlocked;
      playerData.lastClaim = new Date();

      // Показываем праздник
      showCelebration(char, randomPart, newUnlocked.length, char.parts.length);
    } catch(e) {
      alert('Ошибка сохранения. Проверь интернет.');
    }
  };

  // ── Праздник открытия ──
  function showCelebration(char, partIndex, done, total) {
    document.getElementById('celebrationPart').textContent = char.parts[partIndex];
    document.getElementById('celebrationText').textContent =
      'Собрано ' + done + ' из ' + total + ' частей ' + char.name + '!';
    document.getElementById('celebration').classList.add('show');
  }

  window.closeCelebration = function() {
    document.getElementById('celebration').classList.remove('show');
    renderCollection();
  };

  // ── Новый персонаж после завершения ──
  function showNewCharacterOption() {
    const claimBtn = document.getElementById('claimBtn');
    claimBtn.style.display = 'block';
    claimBtn.textContent = '🎊 Начать нового персонажа!';
    claimBtn.onclick = startNewCharacter;
  }

  async function startNewCharacter() {
    const newCharIndex = Math.floor(Math.random() * CHARACTERS.length);
    const docId = kitId + '_' + childName.toLowerCase().replace(/\s+/g, '_');
    const ref = doc(db, 'players', docId);
    await updateDoc(ref, { charIndex: newCharIndex, unlockedParts: [], lastClaim: null });
    playerData.charIndex = newCharIndex;
    playerData.unlockedParts = [];
    playerData.lastClaim = null;
    document.getElementById('completeBadge').style.display = 'none';
    document.getElementById('claimBtn').onclick = claimPart;
    renderCollection();
  }

  // ── Сменить имя ──
  window.changeName = function() {
    localStorage.removeItem('childName_' + kitId);
    document.getElementById('collectionScreen').style.display = 'none';
    document.getElementById('nameScreen').style.display = 'block';
    document.getElementById('nameInput').value = '';
  };

  // ── Авто-вход если имя сохранено ──
  const savedName = localStorage.getItem('childName_' + kitId);
  if (savedName) {
    childName = savedName;
    document.getElementById('nameInput').value = savedName;
    loadPlayer();
  }
</script>
</body>
</html>
