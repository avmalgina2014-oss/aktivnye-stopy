<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы — Суперсилы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: white;
    border-radius: 32px;
    padding: 28px 24px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: #2d2d2d; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 700; }

  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white; border: none; border-radius: 16px;
    padding: 13px 24px; font-family: 'Fredoka One', cursive;
    font-size: 19px; cursor: pointer; width: 100%;
    transition: transform 0.15s;
    box-shadow: 0 4px 16px rgba(102,126,234,0.4); margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .btn-green { background: linear-gradient(135deg, #2E7D32, #4CAF50); box-shadow: 0 4px 16px rgba(46,125,50,0.4); }
  .btn-gold { background: linear-gradient(135deg, #F9A825, #FF6F00); box-shadow: 0 4px 16px rgba(249,168,37,0.4); }
  .btn-outline { background: none; border: 2px solid #e0e4ef; border-radius: 12px; padding: 8px 16px; font-family: 'Nunito', sans-serif; font-size: 13px; font-weight: 800; color: #888; cursor: pointer; margin-top: 10px; transition: all 0.2s; width: auto; box-shadow: none; }
  .btn-outline:hover { border-color: #667eea; color: #667eea; transform: none; }

  /* Экран входа */
  .field-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; text-align: left; }
  .field-input { width: 100%; border: 3px solid #e0e4ef; border-radius: 14px; padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 700; outline: none; text-align: center; margin-bottom: 14px; transition: border-color 0.2s; }
  .field-input:focus { border-color: #667eea; }
  .nick-preview { background: #f0f4ff; border-radius: 12px; padding: 10px; font-family: 'Fredoka One', cursive; font-size: 17px; color: #667eea; margin-bottom: 14px; min-height: 42px; }

  /* Топ-бар */
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .rank-badge { display: inline-flex; align-items: center; gap: 4px; padding: 4px 12px; border-radius: 20px; font-family: 'Fredoka One', cursive; font-size: 14px; }
  .rank-novice { background: #e8f5e9; color: #2E7D32; }
  .rank-student { background: linear-gradient(135deg, #FFF8E1, #FFE082); color: #F57F17; }
  .rank-master { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; }
  .coins-display { display: flex; align-items: center; gap: 4px; background: #fffde7; border: 2px solid #FFE082; border-radius: 20px; padding: 4px 12px; font-family: 'Fredoka One', cursive; font-size: 15px; color: #F57F17; }

  .greeting { font-size: 18px; font-weight: 900; color: #2d2d2d; margin-bottom: 10px; }
  .char-name { font-family: 'Fredoka One', cursive; font-size: 19px; margin-bottom: 6px; }
  .progress-text { font-size: 12px; color: #888; font-weight: 700; margin-bottom: 12px; }

  /* Ключи */
  .keys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .key-slot { aspect-ratio: 1; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 3px dashed #e0e4ef; background: #f9f9f9; transition: all 0.4s ease; }
  .key-slot.filled { border: 3px solid gold; background: linear-gradient(135deg, #fffde7, #fff9c4); box-shadow: 0 4px 12px rgba(255,215,0,0.4); animation: popIn 0.5s ease; }
  @keyframes popIn { 0%{transform:scale(0)} 70%{transform:scale(1.2)} 100%{transform:scale(1)} }

  .char-image-wrap { border-radius: 18px; overflow: hidden; margin-bottom: 14px; display: none; background: #f5f5f5; }
  .char-image-wrap img { width: 100%; height: 200px; object-fit: contain; display: block; }
  .char-image-wrap.show { display: block; animation: zoomIn 0.6s ease; }
  @keyframes zoomIn { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }

  .cooldown-msg { background: #f0f4ff; border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: #667eea; display: none; margin-top: 8px; }
  .cooldown-time { font-family: 'Fredoka One', cursive; font-size: 20px; display: block; margin-top: 4px; }
  .change-name { font-size: 11px; color: #ccc; margin-top: 10px; cursor: pointer; font-weight: 700; }
  .change-name:hover { color: #667eea; }

  /* Коллекция */
  .collection-section { margin-top: 16px; border-top: 2px solid #f0f0f0; padding-top: 14px; }
  .collection-title { font-family: 'Fredoka One', cursive; font-size: 15px; color: #888; margin-bottom: 10px; }
  .powers-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
  .power-slot { border-radius: 12px; border: 2px solid #e0e4ef; background: #f9f9f9; padding: 6px 4px; text-align: center; transition: all 0.3s; }
  .power-slot.unlocked { border-color: transparent; box-shadow: 0 3px 10px rgba(0,0,0,0.12); }
  .power-slot img { width: 100%; height: 50px; object-fit: contain; display: block; }
  .power-slot .power-q { font-size: 22px; height: 50px; display: flex; align-items: center; justify-content: center; }
  .power-slot .power-name { font-size: 9px; font-weight: 800; margin-top: 3px; color: #bbb; }
  .power-slot.unlocked .power-name { color: #555; }

  /* Витрина (УЧЕНИК) */
  #galleryScreen { display: none; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 14px 0; }
  .gallery-item { border-radius: 14px; overflow: hidden; border: 3px solid #e0e4ef; background: #f5f5f5; }
  .gallery-item img { width: 100%; height: 110px; object-fit: contain; display: block; }
  .gallery-item-name { font-family: 'Fredoka One', cursive; font-size: 13px; padding: 5px; text-align: center; }

  /* Праздник */
  .celebration { display: none; position: fixed; top:0;left:0;right:0;bottom:0; background: rgba(0,0,0,0.75); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .celebration.show { display: flex; }
  .celebration-box { background: white; border-radius: 32px; padding: 28px 24px; text-align: center; max-width: 360px; width: 100%; animation: zoomIn 0.4s ease; }
  .celebration-emoji { font-size: 56px; display: block; margin-bottom: 10px; }
  .celebration-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #2d2d2d; margin-bottom: 6px; }
  .celebration-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 14px; margin: 10px 0; display: none; }
  .celebration-text { font-size: 14px; color: #888; font-weight: 700; margin-bottom: 18px; }
</style>
</head>
<body>

<!-- ЭКРАН ВХОДА -->
<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input type="text" class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15" oninput="updatePreview()">
  <div class="field-label">Придумай ник</div>
  <input type="text" class="field-input" id="nickInput" placeholder="Например: Ракета или 🚀" maxlength="20" oninput="updatePreview()">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🚀</button>
</div>

<!-- ЭКРАН ИГРЫ -->
<div class="card" id="gameScreen" style="display:none;">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱 НОВИЧОК</div>
    <div class="coins-display">🪙 <span id="coinsCount">0</span></div>
  </div>
  <div class="greeting" id="greetingText">Привет!</div>
  <div class="char-name" id="charName"></div>
  <div class="progress-text" id="progressText"></div>

  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="key0"></div>
    <div class="key-slot" id="key1"></div>
    <div class="key-slot" id="key2"></div>
  </div>

  <div class="char-image-wrap" id="charImageWrap">
    <img id="charImage" src="" alt="суперсила">
  </div>

  <button class="btn btn-green" id="claimBtn" style="display:none;">🔑 Я сделал зарядку!</button>

  <div class="cooldown-msg" id="cooldownMsg">
    Отличная работа! Приходи завтра 🌙
    <span class="cooldown-time" id="cooldownTime"></span>
  </div>

  <!-- Коллекция — всегда видна -->
  <div class="collection-section">
    <div class="collection-title">🏅 Моя коллекция суперсил</div>
    <div class="powers-grid" id="powersGrid"></div>
  </div>

  <!-- Витрина — только для УЧЕНИКА -->
  <button class="btn-outline" id="galleryBtn" onclick="showGallery()" style="display:none;">🏆 Витрина</button>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<!-- ВИТРИНА -->
<div class="card" id="galleryScreen">
  <div class="rank-badge rank-student" style="margin-bottom:10px; display:inline-block;">⭐ УЧЕНИК</div>
  <h1 style="margin-bottom:6px;">🏆 Витрина суперсил</h1>
  <div class="subtitle" id="gallerySubtitle"></div>
  <div class="gallery-grid" id="galleryGrid"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<!-- ПРАЗДНИК -->
<div class="celebration" id="celebration">
  <div class="celebration-box">
    <span class="celebration-emoji" id="celebEmoji">🎉</span>
    <div class="celebration-title" id="celebTitle">Ура!</div>
    <img class="celebration-img" id="celebImg" src="" alt="">
    <div class="celebration-text" id="celebText"></div>
    <button class="btn" onclick="closeCelebration()">Ура! 🎉</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc, updateDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB5wc1u9TR31jKCV6ds1T3So7v2vux-NCo",
    authDomain: "aktivnye-stopy.firebaseapp.com",
    projectId: "aktivnye-stopy",
    storageBucket: "aktivnye-stopy.firebasestorage.app",
    messagingSenderId: "154203578895",
    appId: "1:154203578895:web:fa18ecc7e7d4a7a23bf97a"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const CHARACTERS = [
    { name: "Лёгкость",       color: "#FFD700", image: "solnyshki.png" },
    { name: "Скорость ⚡",    color: "#E07000", image: "shystriki.png" },
    { name: "Сила 💪",        color: "#CC0000", image: "silachi.png"   },
    { name: "Баланс 🎯",      color: "#1565C0", image: "gratsii.png"   },
    { name: "Восстановление", color: "#2E7D32", image: "soni.png"      },
  ];

  const KEYS_NEEDED = 3;  // 3 ключа → на 4й день персонаж
  const TOTAL_CHARS = CHARACTERS.length;
  const urlParams = new URLSearchParams(window.location.search);
  const kitId = urlParams.get('kit') || 'demo';

  let playerData = null;
  let childName = '';
  let childNick = '';
  let docId = '';

  // ── Превью ника ──
  window.updatePreview = function() {
    const name = document.getElementById('nameInput').value.trim();
    const nick = document.getElementById('nickInput').value.trim();
    const preview = document.getElementById('nickPreview');
    const startBtn = document.getElementById('startBtn');
    if (name && nick) {
      preview.textContent = name + ' · ' + nick;
      startBtn.disabled = false;
    } else {
      preview.textContent = name ? name + ' · введи ник' : 'Введи имя и ник';
      startBtn.disabled = true;
    }
  };

  // ── Старт ──
  window.startGame = async function() {
    const name = document.getElementById('nameInput').value.trim();
    const nick = document.getElementById('nickInput').value.trim();
    if (!name || !nick) { alert('Введи имя и ник!'); return; }
    childName = name;
    childNick = nick;
    docId = kitId + '_' + (name + nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
    localStorage.setItem('child_' + kitId, JSON.stringify({ name, nick }));
    await loadPlayer();
  };

  async function loadPlayer() {
    document.getElementById('nameScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    document.getElementById('greetingText').textContent = childName + ' · ' + childNick;

    const ref = doc(db, 'players', docId);
    try {
      const snap = await getDoc(ref);
      if (snap.exists()) {
        playerData = snap.data();
      } else {
        const charIndex = Math.floor(Math.random() * TOTAL_CHARS);
        playerData = {
          name: childName, nick: childNick, kitId,
          charIndex, step: 0, collectedChars: [],
          coins: 0, weekCount: 0, weekStart: null,
          lastClaim: null, createdAt: serverTimestamp()
        };
        await setDoc(ref, playerData);
      }
      renderGame();
    } catch(e) {
      alert('Ошибка загрузки. Проверь интернет.');
    }
  }

  function declension(n, one, few, many) {
    const m10 = n % 10, m100 = n % 100;
    if (m10 === 1 && m100 !== 11) return one;
    if (m10 >= 2 && m10 <= 4 && (m100 < 10 || m100 >= 20)) return few;
    return many;
  }

  function getWeekStart(date) {
    const d = new Date(date);
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    d.setDate(diff);
    d.setHours(0,0,0,0);
    return d.getTime();
  }

  function renderGame() {
    const char = CHARACTERS[playerData.charIndex];
    const step = playerData.step || 0;
    const collected = playerData.collectedChars || [];
    const coins = playerData.coins || 0;

    document.getElementById('charName').textContent = char.name;
    document.getElementById('charName').style.color = char.color;
    document.getElementById('coinsCount').textContent = coins;

    // Звание
    const badge = document.getElementById('rankBadge');
    const galleryBtn = document.getElementById('galleryBtn');
    if (collected.length >= TOTAL_CHARS) {
      badge.className = 'rank-badge rank-student';
      badge.textContent = '⭐ УЧЕНИК';
      galleryBtn.style.display = 'inline-block';
    } else {
      badge.className = 'rank-badge rank-novice';
      badge.textContent = '🌱 НОВИЧОК';
      galleryBtn.style.display = 'none';
    }

    // Коллекция — всегда видна
    renderPowersGrid(collected);

    const keysGrid = document.getElementById('keysGrid');
    const imageWrap = document.getElementById('charImageWrap');
    const claimBtn = document.getElementById('claimBtn');

    if (step > KEYS_NEEDED) {
      // Суперсила открыта
      keysGrid.style.display = 'none';
      imageWrap.classList.add('show');
      document.getElementById('charImage').src = char.image;
      document.getElementById('progressText').textContent = char.name + ' открыта! 🎉';
      claimBtn.style.display = 'block';
      claimBtn.textContent = '✨ Следующая суперсила!';
      claimBtn.className = 'btn btn-gold';
      claimBtn.onclick = startNewChar;
      document.getElementById('cooldownMsg').style.display = 'none';
    } else {
      keysGrid.style.display = 'grid';
      imageWrap.classList.remove('show');
      claimBtn.className = 'btn btn-green';
      claimBtn.onclick = claimPart;
      claimBtn.textContent = '🔑 Я сделал зарядку!';

      for (let i = 0; i < KEYS_NEEDED; i++) {
        const slot = document.getElementById('key' + i);
        if (slot) {
          if (i < step) {
            slot.classList.add('filled');
            slot.textContent = '🔑';
          } else {
            slot.classList.remove('filled');
            slot.textContent = '';
          }
        }
      }

      const remaining = KEYS_NEEDED + 1 - step;
      document.getElementById('progressText').textContent =
        'До суперсилы: ' + remaining + ' ' + declension(remaining, 'день', 'дня', 'дней');
      checkCooldown();
    }
  }

  function renderPowersGrid(collected) {
    const grid = document.getElementById('powersGrid');
    grid.innerHTML = '';
    CHARACTERS.forEach((char, i) => {
      const isCollected = collected.includes(i);
      const div = document.createElement('div');
      div.className = 'power-slot' + (isCollected ? ' unlocked' : '');
      if (isCollected) div.style.borderColor = char.color + '88';

      if (isCollected) {
        const img = document.createElement('img');
        img.src = char.image;
        img.alt = char.name;
        div.appendChild(img);
      } else {
        const q = document.createElement('div');
        q.className = 'power-q';
        q.textContent = '❓';
        div.appendChild(q);
      }

      const name = document.createElement('div');
      name.className = 'power-name';
      name.style.color = isCollected ? char.color : '#bbb';
      name.textContent = isCollected ? char.name : '???';
      div.appendChild(name);
      grid.appendChild(div);
    });
  }

  function checkCooldown() {
    const claimBtn = document.getElementById('claimBtn');
    const cooldownMsg = document.getElementById('cooldownMsg');
    if (!playerData.lastClaim) {
      claimBtn.style.display = 'block';
      cooldownMsg.style.display = 'none';
      return;
    }
    const last = playerData.lastClaim.toDate ? playerData.lastClaim.toDate() : new Date(playerData.lastClaim);
    const next = new Date(last.getTime() + 24 * 3600 * 1000);
    if (new Date() >= next) {
      claimBtn.style.display = 'block';
      cooldownMsg.style.display = 'none';
    } else {
      claimBtn.style.display = 'none';
      cooldownMsg.style.display = 'block';
      updateCountdown(next);
      const iv = setInterval(() => {
        if (new Date() >= next) { clearInterval(iv); renderGame(); }
        else updateCountdown(next);
      }, 30000);
    }
  }

  function updateCountdown(next) {
    const diff = next - new Date();
    const h = Math.floor(diff / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    document.getElementById('cooldownTime').textContent = h + ' ч ' + m + ' мин';
  }

  window.claimPart = async function() {
    const ref = doc(db, 'players', docId);
    const newStep = (playerData.step || 0) + 1;
    const char = CHARACTERS[playerData.charIndex];
    const now = new Date();

    // Считаем недельный счётчик
    const currentWeekStart = getWeekStart(now);
    let weekCount = playerData.weekCount || 0;
    const storedWeekStart = playerData.weekStart;

    if (!storedWeekStart || storedWeekStart < currentWeekStart) {
      weekCount = 1; // новая неделя
    } else {
      weekCount += 1;
    }

    // Бонусные монетки за 5-7й день
    let bonusCoins = 0;
    if (weekCount === 5) bonusCoins = 1;
    else if (weekCount === 6) bonusCoins = 2;
    else if (weekCount === 7) bonusCoins = 3;

    const newCoins = (playerData.coins || 0) + bonusCoins;

    try {
      await updateDoc(ref, {
        step: newStep,
        lastClaim: serverTimestamp(),
        weekCount,
        weekStart: currentWeekStart,
        coins: newCoins
      });
      playerData.step = newStep;
      playerData.lastClaim = now;
      playerData.weekCount = weekCount;
      playerData.weekStart = currentWeekStart;
      playerData.coins = newCoins;

      if (newStep > KEYS_NEEDED) {
        // Суперсила открыта!
        const collected = playerData.collectedChars || [];
        if (!collected.includes(playerData.charIndex)) {
          collected.push(playerData.charIndex);
          await updateDoc(ref, { collectedChars: collected });
          playerData.collectedChars = collected;
        }
        const isStudent = collected.length >= TOTAL_CHARS;
        document.getElementById('celebEmoji').textContent = isStudent ? '🏆' : '🎉';
        document.getElementById('celebTitle').textContent = isStudent ? 'Ты УЧЕНИК! ⭐' : char.name + ' открыта!';
        const img = document.getElementById('celebImg');
        img.src = char.image; img.style.display = 'block';
        document.getElementById('celebText').textContent = isStudent
          ? 'Все суперсилы собраны! Открыта Витрина! 🏆'
          : 'Суперсила добавлена в коллекцию!';
      } else {
        let celebText = 'Ключей: ' + newStep + ' из ' + KEYS_NEEDED + '. До суперсилы: ' +
          (KEYS_NEEDED + 1 - newStep) + ' ' + declension(KEYS_NEEDED + 1 - newStep, 'день', 'дня', 'дней') + '!';
        if (bonusCoins > 0) celebText += '\n+' + bonusCoins + ' 🪙 в копилку!';
        document.getElementById('celebEmoji').textContent = bonusCoins > 0 ? '🪙' : '🔑';
        document.getElementById('celebTitle').textContent = bonusCoins > 0 ? 'Бонус!' : 'Ключ ' + newStep + ' из ' + KEYS_NEEDED + '!';
        document.getElementById('celebImg').style.display = 'none';
        document.getElementById('celebText').textContent = celebText;
      }
      document.getElementById('celebration').classList.add('show');
    } catch(e) { alert('Ошибка сохранения. Проверь интернет.'); }
  };

  window.closeCelebration = function() {
    document.getElementById('celebration').classList.remove('show');
    renderGame();
  };

  async function startNewChar() {
    const ref = doc(db, 'players', docId);
    const collected = playerData.collectedChars || [];
    let available = CHARACTERS.map((_,i) => i).filter(i => !collected.includes(i));
    if (available.length === 0) available = CHARACTERS.map((_,i) => i);
    const newChar = available[Math.floor(Math.random() * available.length)];
    await updateDoc(ref, { charIndex: newChar, step: 0, lastClaim: null });
    playerData.charIndex = newChar; playerData.step = 0; playerData.lastClaim = null;
    renderGame();
  }

  window.showGallery = function() {
    const collected = playerData.collectedChars || [];
    document.getElementById('gallerySubtitle').textContent = 'Собрано ' + collected.length + ' из ' + TOTAL_CHARS + ' суперсил';
    const grid = document.getElementById('galleryGrid');
    grid.innerHTML = '';
    CHARACTERS.forEach((char, i) => {
      const isCollected = collected.includes(i);
      const div = document.createElement('div');
      div.className = 'gallery-item';
      const img = document.createElement('img');
      img.src = isCollected ? char.image : '';
      if (!isCollected) img.style.display = 'none';
      const name = document.createElement('div');
      name.className = 'gallery-item-name';
      name.style.color = isCollected ? char.color : '#bbb';
      name.textContent = isCollected ? char.name : '🔒';
      div.appendChild(img); div.appendChild(name);
      grid.appendChild(div);
    });
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('galleryScreen').style.display = 'block';
  };

  window.hideGallery = function() {
    document.getElementById('galleryScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
  };

  window.changeName = function() {
    localStorage.removeItem('child_' + kitId);
    document.getElementById('gameScreen').style.display = 'none';
    document.getElementById('nameScreen').style.display = 'block';
    document.getElementById('nameInput').value = '';
    document.getElementById('nickInput').value = '';
    updatePreview();
  };

  // Авто-вход
  const saved = localStorage.getItem('child_' + kitId);
  if (saved) {
    try {
      const data = JSON.parse(saved);
      childName = data.name;
      childNick = data.nick;
      docId = kitId + '_' + (data.name + data.nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
      loadPlayer();
    } catch(e) { localStorage.removeItem('child_' + kitId); }
  }
</script>
</body>
</html>
