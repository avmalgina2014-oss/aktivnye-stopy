<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 32px;
    padding: 24px 20px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    text-align: center;
  }
  h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: #2d2d2d; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 700; }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 13px 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 19px;
    cursor: pointer;
    width: 100%;
    transition: transform .15s;
    box-shadow: 0 4px 16px rgba(102,126,234,.4);
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .field-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; text-align: left; }
  .field-input {
    width: 100%;
    border: 3px solid #e0e4ef;
    border-radius: 14px;
    padding: 11px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    outline: none;
    text-align: center;
    margin-bottom: 14px;
    transition: border-color .2s;
  }
  .field-input:focus { border-color: #667eea; }

</style>
</head>
<body>

<div class="card" id="nameScreen">
