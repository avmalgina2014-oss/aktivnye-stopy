<!DOCTYPE html> 
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #fff; border-radius: 32px; padding: 24px 20px; max-width: 420px; width: 100%; box-shadow: 0 20px 60px rgba(0,0,0,.2); text-align: center; }
  h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: #2d2d2d; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 700; }
  .btn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 16px; padding: 13px 24px; font-family: 'Fredoka One', cursive; font-size: 19px; cursor: pointer; width: 100%; transition: transform .15s; box-shadow: 0 4px 16px rgba(102,126,234,.4); margin-top: 8px; }
  .btn:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-green { background: linear-gradient(135deg, #2E7D32, #4CAF50); box-shadow: 0 4px 16px rgba(46,125,50,.4); }
  .btn-gold { background: linear-gradient(135deg, #F9A825, #FF6F00); box-shadow: 0 4px 16px rgba(249,168,37,.4); animation: pulseGold 2s infinite; }
  @keyframes pulseGold { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }
  /* ✅ Пульсация Феникса */
  @keyframes pulseFeniks {
    0%   { transform: scale(1);    box-shadow: 0 0 30px rgba(255,165,0,.6); }
    50%  { transform: scale(1.06); box-shadow: 0 0 70px rgba(255,80,0,.95); }
    100% { transform: scale(1);    box-shadow: 0 0 30px rgba(255,165,0,.6); }
  }
  .celeb-img-feniks { animation: pulseFeniks 1.4s ease-in-out infinite; }
  .field-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; text-align: left; }
  .field-input { width: 100%; border: 3px solid #e0e4ef; border-radius: 14px; padding: 11px 14px; font-family: 'Nunito', sans-serif; font-size: 17px; font-weight: 700; outline: none; text-align: center; margin-bottom: 14px; transition: border-color .2s; }
  .field-input:focus { border-color: #667eea; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .rank-badge { display: inline-flex; align-items: center; gap: 4px; padding: 5px 14px; border-radius: 20px; font-family: 'Fredoka One', cursive; font-size: 14px; }
  .rank-novice { background: #e8f5e9; color: #2E7D32; }
  .rank-student { background: linear-gradient(135deg, #FFF8E1, #FFE082); color: #F57F17; }
  .rank-pro { background: linear-gradient(135deg, #E3F2FD, #90CAF9); color: #1565C0; }
  .rank-master { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; }
  .keys-wallet { display: flex; gap: 12px; background: #f5f5f5; border-radius: 40px; padding: 6px 16px; }
  .wallet-slot { display: flex; align-items: center; gap: 6px; font-family: 'Fredoka One', cursive; font-size: 18px; }
  .wallet-slot.star { color: #F9A825; }
  .wallet-slot.star-shiny { color: #FF6F00; }
  .greeting { font-size: 18px; font-weight: 900; color: #2d2d2d; margin-bottom: 4px; }
  .progress-text { font-size: 13px; color: #888; font-weight: 700; margin-bottom: 12px; line-height: 1.7; }
  .keys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .key-slot { aspect-ratio: 1; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 26px; border: 3px dashed #e0e4ef; background: #f9f9f9; transition: all .4s ease; }
  .key-slot.filled { border: 3px solid gold; background: linear-gradient(135deg, #fffde7, #fff9c4); box-shadow: 0 4px 12px rgba(255,215,0,.4); animation: popIn .5s ease; }
  @keyframes popIn { 0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)} }
  .char-wrap { border-radius: 18px; overflow: hidden; margin-bottom: 12px; display: none; background: #f5f5f5; }
  .char-wrap img { width: 100%; height: 200px; object-fit: contain; display: block; }
  .char-wrap.show { display: block; animation: zoomIn .6s ease; }
  @keyframes zoomIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .cooldown-msg { background: #f0f4ff; border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: #667eea; display: none; margin-top: 8px; }
  .cooldown-time { font-family: 'Fredoka One', cursive; font-size: 20px; display: block; margin-top: 4px; }
  .collection-bar { margin-top: 14px; border-top: 2px solid #f0f0f0; padding-top: 12px; cursor: pointer; }
  .collection-bar:hover .col-title { color: #667eea; }
  .col-title { font-family: 'Fredoka One', cursive; font-size: 15px; color: #888; margin-bottom: 8px; transition: color .2s; }
  .change-name { font-size: 11px; color: #ccc; margin-top: 10px; cursor: pointer; font-weight: 700; }
  .change-name:hover { color: #667eea; }
  #galleryScreen { display: none; }
  .gallery-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid #e0e4ef; }
  .tab-btn { flex: 1; background: none; border: none; padding: 10px 4px; font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 12px; color: #aaa; cursor: pointer; transition: all .2s; border-bottom: 3px solid transparent; margin-bottom: -2px; }
  .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
  .g-item { border-radius: 18px; border: 2px solid #e8e8e8; background: #f0f0f0; padding: 0; text-align: center; overflow: hidden; display: flex; flex-direction: column; transition: all .3s; }
  .g-item.got { background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.1); border-color: transparent; }
  .g-item.locked { padding: 20px 8px; align-items: center; justify-content: center; }
  .g-item .g-img { width: 100%; }
  .g-item .g-img img { width: 100%; height: auto; display: block; }
  .g-item .g-name { font-family: 'Fredoka One', cursive; font-size: 14px; padding: 8px 8px 12px; line-height: 1.3; color: #667eea; word-break: break-word; }
  .g-item .g-q { font-size: 44px; color: #ddd; margin-bottom: 6px; }
  .celebration { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .celebration.show { display: flex; }
  .celeb-box { background: transparent; border-radius: 32px; padding: 0; text-align: center; width: 100%; animation: zoomIn .4s ease; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .celeb-emoji { font-size: 60px; display: block; margin-bottom: 10px; }
  .celeb-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #2d2d2d; margin-bottom: 6px; }
  .celeb-img { width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 0 30px rgba(255, 165, 0, 0.6); }
  .celeb-text { font-size: 14px; color: #888; font-weight: 700; margin-bottom: 18px; }
  .motivational { background: linear-gradient(135deg, #fff9c4, #ffecb3); border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: #F57F17; display: none; margin: 8px 0; }
  .debug-btn { margin-top: 15px; font-size: 10px; color: #bbb; background: none; border: 1px dashed #ccc; padding: 5px; border-radius: 8px; width: 100%; cursor: pointer; }
  .debug-popup-btn { background: #eee; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; margin-top: 8px; font-weight: 700; width: 100%; }
  .debug-popup-btn.test { background: #E3F2FD; color: #1565C0; border: 1px solid #90CAF9; }
  .debug-popup-btn.reset { background: #FFEBEE; color: #C62828; border: 1px solid #EF5350; }
  .debug-popup-btn.close { background: #f5f5f5; color: #666; }
  #legendBtn { display: none; }
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15" oninput="checkBtn()">
  <div class="field-label">Придумай ник</div>
  <input class="field-input" id="nickInput" placeholder="Например: Ракета 🚀" maxlength="20" oninput="checkBtn()">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱 НОВИЧОК</div>
    <div class="keys-wallet">
      <div class="wallet-slot star">⭐ <span id="starCount">0</span></div>
      <div class="wallet-slot star-shiny">🌟 <span id="starShinyCount">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="ks0"></div><div class="key-slot" id="ks1"></div>
    <div class="key-slot" id="ks2"></div><div class="key-slot" id="ks3"></div>
  </div>
  <div class="char-wrap" id="charWrap"><img id="charImg" src="" alt=""></div>
  <div class="motivational" id="motivationalBlock"></div>
  <button class="btn btn-gold" id="legendBtn" onclick="openLegend()">🔥 Открыть Легенду!</button>
  <button class="btn btn-green" id="claimBtn" onclick="doWorkout()">Я сделал(а) зарядку! 🏃</button>
  <div class="cooldown-msg" id="cooldown"></div>
  <div class="collection-bar" onclick="showGallery()"><div class="col-title">🏅 Моя коллекция →</div></div>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>

</div>

<div class="card" id="galleryScreen">
  <h1 style="margin-bottom:12px">🏅 Моя коллекция</h1>
  <div class="gallery-tabs">
    <button class="tab-btn active" onclick="switchTab('base',this)">Базовые</button>
    <button class="tab-btn" onclick="switchTab('rare',this)">Редкие</button>
    <button class="tab-btn" onclick="switchTab('epic',this)">Эпические</button>
    <button class="tab-btn" onclick="switchTab('legend',this)">Легенда</button>
  </div>
  <div id="galleryContent"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-box" id="celebBox">
    <img class="celeb-img" id="celebImg" src="" alt="">
    <button class="btn btn-gold" id="celebBtn" onclick="closeCeleb()" style="margin-top:20px; width: 200px;">Ты Легенда! 🔥</button>
  </div>
</div>

<script>
const BASE = [
  { animal:"🐆", power:"Скорость", name:"Гепард", img:"gepard.png" },
  { animal:"🐦", power:"Лёгкость", name:"Колибри", img:"kolibri.png" },
  { animal:"🐜", power:"Сила", name:"Муравей", img:"muravey.png" },
  { animal:"🦩", power:"Баланс", name:"Фламинго", img:"flamingo.png" },
  { animal:"🦥", power:"Восстановление", name:"Ленивец", img:"lenivec.png" },
  { animal:"🐒", power:"Координация", name:"Обезьяна", img:"obeziana.png" },
  { animal:"🐫", power:"Выносливость", name:"Верблюд", img:"verblyud.png" },
  { animal:"🐱", power:"Гибкость", name:"Кошка", img:"koshka.png" },
];
const RARE = [
  { animal:"🦘", power:"Прыгучесть", name:"Кенгуру", img:"kenguru.png" },
  { animal:"🐙", power:"Цепкость", name:"Осьминог", img:"osminog.png" },
  { animal:"🦀", power:"Устойчивость", name:"Краб", img:"krab.png" },
  { animal:"🐌", power:"Чуткость", name:"Улитка", img:"ulitka.png" },
];
const EPIC = [
  { animal:"🦄✨", power:"Суперлёгкость", name:"Пегас", img:"pegas.png" },
  { animal:"🐉", power:"Суперсила", name:"Дракон", img:"drakon.png" },
];
const LEGEND = { animal:"🔥", power:"Возрождение", name:"Феникс", img:"feniks.png" };
const PRAISE_PHRASES = ["💪 «Отлично! Продолжай!»", "💪 «Ты супер!»", "💪 «Молодец!»"];

let st = {};
let playerKey = '';
let justUnlockedChar = null;

// ✅ Перемешивает массив индексов (Fisher-Yates)
function shuffleIndices(len) {
  const a = Array.from({length: len}, (_, i) => i);
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function isConsecutiveDay(date1, date2) {
  if (!date1 || !date2) return false;
  const [y1, m1, d1] = date1.split('-').map(Number);
  const [y2, m2, d2] = date2.split('-').map(Number);
  const dt1 = new Date(y1, m1 - 1, d1);
  const dt2 = new Date(y2, m2 - 1, d2);
  const diffTime = dt2.getTime() - dt1.getTime();
  const diffDays = Math.round(diffTime / (1000 * 3600 * 24));
  return diffDays === 1;
}

function calculateCurrentStreak() {
  const today = getToday();
  if (!st.lastWorkout) return 0;
  if (st.lastWorkout === today) return st.streak || 0;
  if (isConsecutiveDay(st.lastWorkout, today)) return (st.streak || 0) + 1;
  return 0;
}

function freshState() {
  return {
    streak: 0, keys: 0, stars: 0, shinyStars: 0,
    gotBase: [], gotRare: [], gotEpic: [], gotLegend: false,
    lastWorkout: null, name: '', nick: '',
    charIdx: Math.floor(Math.random() * BASE.length),
    // ✅ Уникальный порядок редких и эпических для каждого игрока
    rareOrder: shuffleIndices(RARE.length),
    epicOrder: shuffleIndices(EPIC.length)
  };
}

function save() { if (playerKey) localStorage.setItem('as_' + playerKey, JSON.stringify(st)); }

function load() {
  if (!playerKey) return false;
  const raw = localStorage.getItem('as_' + playerKey);
  if (!raw) return false;
  try {
    let data = JSON.parse(raw);
    ['step','weekCount','weekStart','weeksPlayed','lastClaim','lastUnlockWeek'].forEach(k => { if (data[k] !== undefined) delete data[k]; });
    ['streak','keys','stars','shinyStars'].forEach(k => { if (data[k] === undefined) data[k] = 0; });
    ['gotBase','gotRare','gotEpic'].forEach(k => { if (!Array.isArray(data[k])) data[k] = []; });
    // ✅ Миграция: если у старого игрока нет порядка — генерируем
    if (!Array.isArray(data.rareOrder) || data.rareOrder.length !== RARE.length) data.rareOrder = shuffleIndices(RARE.length);
    if (!Array.isArray(data.epicOrder) || data.epicOrder.length !== EPIC.length) data.epicOrder = shuffleIndices(EPIC.length);
    st = data;
    return true;
  } catch(e) { return false; }
}

function sound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const seq = {
      start:[[440,.12],[550,.12],[660,.12]],
      key:[[900,0,'tri']],
      base:[[523,.18],[659,.18],[784,.18],[1047,.18]],
      rare:[[440,.15],[554,.15],[659,.15],[880,.15],[1109,.15]],
      epic:[[330,.2],[415,.2],[523,.2],[659,.2],[830,.2],[1047,.2]],
      legend:[[262,.25],[330,.25],[392,.25],[523,.25],[659,.25],[784,.25]]
    };
    const p = seq[type];
    if (!p) return;
    p.forEach(([f, dt, sh], i) => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type=sh||'sine';
      const t=ctx.currentTime+i*(dt||0.18);
      o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(0.3,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.start(t); o.stop(t+0.4);
    });
  } catch(e) {}
}

// ✅ Звук Феникса — оригинальная мелодия, но дольше
function fanfare() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const notes = [262, 330, 392, 523, 659, 784];
    const dt = 0.32;
    notes.forEach((f, i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      const t = ctx.currentTime + i * dt;
      const dur = i === notes.length - 1 ? 1.8 : 0.65;
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.35, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start(t); o.stop(t + dur);
    });
  } catch(e) {}
}

function decl(n, a, b, c) {
  const m=n%10, mm=n%100;
  if(m===1&&mm!==11) return a;
  if(m>=2&&m<=4&&(mm<10||mm>=20)) return b;
  return c;
}

function getRank() {
  const total=(st.gotBase?.length||0)+(st.gotRare?.length||0)+(st.gotEpic?.length||0)+(st.gotLegend?1:0);
  if(total>=10) return {label:'👑 МАСТЕР', cls:'rank-master'};
  if(total>=6) return {label:'⚡ ПРОФИ', cls:'rank-pro'};
  if(total>=3) return {label:'📖 УЧЕНИК', cls:'rank-student'};
  return {label:'🌱 НОВИЧОК', cls:'rank-novice'};
}

function canOpenLegend() {
  return (st.gotBase?.length >= BASE.length) &&
         (st.gotRare?.length >= RARE.length) &&
         (st.gotEpic?.length >= EPIC.length) &&
         !st.gotLegend;
}

function celebrate(emoji, title, text, img, snd) {
  const el = document.getElementById('celebImg');
  el.className = 'celeb-img';
  el.style.display = 'block';
  document.getElementById('celebBtn').style.display = 'block';
  document.getElementById('celebBtn').innerText = 'Ура! 🎉';
  if(img) { el.src=img; el.style.display='block'; } else el.style.display='none';
  document.getElementById('celebration').classList.add('show');
  if(snd) sound(snd);
}

// ✅ Открытие Легенды с пульсацией Феникса
window.openLegend = function() {
  if (!canOpenLegend()) {
    alert("Сначала собери всех базовых, редких и эпических персонажей!");
    return;
  }
  st.gotLegend = true;
  save();
  const el = document.getElementById('celebImg');
  el.src = LEGEND.img;
  el.style.display = 'block';
  el.className = 'celeb-img celeb-img-feniks'; // ✅ пульсация
  document.getElementById('celebBtn').innerText = 'Ты Легенда! 🔥';
  document.getElementById('celebration').classList.add('show');
  fanfare(); // ✅ Фанфары!
};

window.closeCeleb = function() {
  // Снимаем пульсацию при закрытии
  document.getElementById('celebImg').className = 'celeb-img';
  document.getElementById('celebration').classList.remove('show');
  if(justUnlockedChar) setTimeout(()=>{justUnlockedChar=null;render();},100);
  else render();
};

function render() {
  const currentStreak = calculateCurrentStreak();
  const rank = getRank();
  document.getElementById('rankBadge').className = 'rank-badge ' + rank.cls;
  document.getElementById('rankBadge').textContent = rank.label;
  document.getElementById('starCount').innerText = st.stars || 0;
  document.getElementById('starShinyCount').innerText = st.shinyStars || 0;
  document.getElementById('greeting').innerHTML = 'Привет, ' + (st.name || '') + '!';
  const keysGrid = document.getElementById('keysGrid');
  const charWrap = document.getElementById('charWrap');
  const progressText = document.getElementById('progressText');
  const motivational = document.getElementById('motivationalBlock');
  const legendBtn = document.getElementById('legendBtn');

  keysGrid.style.display = 'none'; charWrap.style.display = 'none'; charWrap.classList.remove('show'); motivational.style.display = 'none'; progressText.innerHTML = '';

  legendBtn.style.display = canOpenLegend() ? 'block' : 'none';

  if (justUnlockedChar) {
    charWrap.style.display = 'block'; charWrap.classList.add('show');
    document.getElementById('charImg').src = justUnlockedChar.img;
    progressText.innerHTML = `<div style="font-family:Fredoka One,cursive;font-size:26px;font-weight:900;color:#667eea;margin:12px 0 6px">${justUnlockedChar.power}</div><div style="font-size:13px;color:#aaa">суперсила открыта ✨</div>`;
    return;
  }
  if (st.gotBase?.length >= BASE.length) { motivational.style.display = 'block'; motivational.innerHTML = '🏆 Ты собрал(а) все базовые суперсилы! Круто!'; }
  if (currentStreak >= 5 && currentStreak <= 6) {
    progressText.innerHTML = '⭐ Сегодня ты получишь ЗВЕЗДУ! ⭐';
  } else if (currentStreak === 7) {
    progressText.innerHTML = '🌟 Сегодня ты получишь СИЯЮЩУЮ ЗВЕЗДУ! 🌟';
  } else {
    keysGrid.style.display = 'grid';
    const keys = Math.min(st.keys || 0, 4);
    const needed = 4 - keys;
    progressText.innerHTML = 'До суперсилы: ' + needed + ' ' + decl(needed, 'зарядка', 'зарядки', 'зарядок');
    for (let i = 0; i < 4; i++) {
      const sl = document.getElementById('ks' + i);
      if (i < keys) { sl.classList.add('filled'); sl.innerHTML = '🔑'; } else { sl.classList.remove('filled'); sl.innerHTML = ''; }
    }
  }
  checkCooldown();
}

function checkCooldown() {
  const claimBtn = document.getElementById('claimBtn');
  const coolEl = document.getElementById('cooldown');
  const today = getToday();
  if (st.lastWorkout === today) {
    claimBtn.style.display = 'none'; coolEl.style.display = 'block';
    const now = new Date(); const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate()+1);
    const diff = midnight - now; const hours = Math.floor(diff/3600000); const minutes = Math.floor((diff%3600000)/60000);
    const timeString = hours > 0 ? `${hours} ч ${minutes} мин` : `${minutes} мин`;
    let message = diff > 12*3600000 ? 'Отличная работа! Приходи завтра 🌙' : (diff > 5*3600000 ? `Скоро! Осталось: ${timeString}` : (diff > 3600000 ? `Совсем скоро! Осталось: ${timeString}` : `Уже почти! Осталось: ${timeString}`));
    coolEl.innerHTML = `${message}<span class="cooldown-time">${timeString}</span>`;
  } else {
    claimBtn.style.display = 'block'; claimBtn.className = 'btn btn-green'; claimBtn.innerHTML = 'Я сделал(а) зарядку! 🏃'; claimBtn.onclick = doWorkout; coolEl.style.display = 'none';
  }
}

function doWorkout() {
  const today = getToday();
  if (st.lastWorkout === today) { checkCooldown(); return; }
  let newStreak = 1;
  if (st.lastWorkout && isConsecutiveDay(st.lastWorkout, today)) newStreak = (st.streak || 0) + 1;
  st.streak = newStreak;
  st.lastWorkout = today;
  if (newStreak >= 1 && newStreak <= 4) {
    st.keys = (st.keys || 0) + 1; save(); sound('key');
    if (st.keys >= 4) {
      const available = BASE.map((_,i) => i).filter(i => !st.gotBase.includes(i));
      if (available.length > 0) {
        const idx = available[Math.floor(Math.random() * available.length)];
        st.gotBase.push(idx); st.charIdx = idx; st.keys = 0; save(); sound('base');
        justUnlockedChar = BASE[idx];
        celebrate('🎉', BASE[idx].power + ' открыта!', 'Суперсила добавлена!', BASE[idx].img);
        render(); return;
      }
    } else { celebrate('🔑', 'Ключ ' + st.keys + ' из 4!', PRAISE_PHRASES[Math.floor(Math.random()*PRAISE_PHRASES.length)]); }
  } else if (newStreak === 5 || newStreak === 6) {
    st.stars = (st.stars || 0) + 1; save(); sound('rare');
    celebrate('⭐', 'Звезда получена!', 'У тебя ' + st.stars + ' ⭐.');
  } else if (newStreak === 7) {
    st.shinyStars = (st.shinyStars || 0) + 1; st.streak = 0; save(); sound('rare');
    celebrate('🌟', 'Сияющая звезда!', 'У тебя ' + st.shinyStars + ' 🌟.');
  }
  save(); render();
}

window.switchTab = function(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(tab);
};

function renderGallery(tab) {
  const cont = document.getElementById('galleryContent');
  cont.innerHTML = '';
  let chars, collection, order;

  if (tab === 'base') {
    chars = BASE; collection = st.gotBase || [];
    // Базовые — без кастомного порядка, просто массив индексов
    order = BASE.map((_,i) => i);
  }
  if (tab === 'rare') {
    chars = RARE; collection = st.gotRare || [];
    // ✅ Уникальный порядок для этого игрока
    order = st.rareOrder || RARE.map((_,i) => i);
  }
  if (tab === 'epic') {
    chars = EPIC; collection = st.gotEpic || [];
    // ✅ Уникальный порядок для этого игрока
    order = st.epicOrder || EPIC.map((_,i) => i);
  }
  if (tab === 'legend') {
    chars = [LEGEND]; collection = st.gotLegend ? [0] : [];
    order = [0];
  }

  const grid = document.createElement('div'); grid.className = 'gallery-grid';

  order.forEach((realIdx) => {
    const c = chars[realIdx];
    const got = collection.includes(realIdx);
    const div = document.createElement('div');
    div.className = 'g-item' + (got ? ' got' : ' locked');
    if(got){div.style.borderColor='#667eea';div.style.background='#EDF2FF';}
    const area = document.createElement('div'); area.className='g-img';
    if(got){
      const img=document.createElement('img');
      img.src=c.img; img.alt=c.power;
      img.onerror=()=>{img.style.display='none';area.innerHTML='<span style="font-size:40px">'+c.animal+'</span>';};
      area.appendChild(img);
    } else {
      area.innerHTML='<span class="g-q">❓</span>';
    }
    div.appendChild(area);
    if(got){
      const nm=document.createElement('div'); nm.className='g-name'; nm.textContent=c.power; div.appendChild(nm);
    }
    if(!got&&(tab==='rare'||tab==='epic')){
      const cost=4;
      const can=tab==='rare'?((st.stars||0)>=cost):((st.shinyStars||0)>=cost);
      if(can){
        const btn=document.createElement('button');
        btn.innerHTML=(tab==='rare'?'⭐':'🌟')+' '+cost+' → Открыть!';
        btn.style.cssText='border:none;background:#FFF8E1;color:#F9A825;border-radius:10px;padding:8px;font-weight:800;font-size:12px;cursor:pointer;margin:8px 8px 12px;';
        btn.onclick=(e)=>{e.stopPropagation();spendStars(tab, realIdx, cost);};
        div.appendChild(btn);
      } else {
        const p=document.createElement('div');
        p.innerHTML=(tab==='rare'?'⭐':'🌟')+' '+cost;
        p.style.cssText='font-size:11px;font-weight:700;color:#bbb;margin-top:6px;';
        div.appendChild(p);
      }
    }
    if(tab==='legend'&&!got){
      const h=document.createElement('div'); h.innerHTML='Собери всех!'; h.style.cssText='font-size:11px;color:#aaa;margin-top:6px;'; div.appendChild(h);
    }
    grid.appendChild(div);
  });
  cont.appendChild(grid);
}

function spendStars(tab, idx, cost) {
  if(tab==='rare'){
    if((st.stars||0)<cost) { alert('Недостаточно звёзд!'); return; }
    if((st.gotRare||[]).includes(idx)) { alert('Уже открыто!'); return; }
    st.stars-=cost;
    if(!st.gotRare)st.gotRare=[];
    st.gotRare.push(idx); save();
    celebrate('⭐',RARE[idx].power+' открыта!',RARE[idx].name+' теперь в твоей коллекции!',RARE[idx].img,'rare');
    renderGallery(tab);
  } else if(tab==='epic'){
    if((st.shinyStars||0)<cost) { alert('Недостаточно сияющих звёзд!'); return; }
    if((st.gotEpic||[]).includes(idx)) { alert('Уже открыто!'); return; }
    st.shinyStars-=cost;
    if(!st.gotEpic)st.gotEpic=[];
    st.gotEpic.push(idx); save();
    celebrate('🌟',EPIC[idx].power+' открыта!',EPIC[idx].name+' теперь в твоей коллекции!',EPIC[idx].img,'epic');
    renderGallery(tab);
  }
}

window.showGallery = function() {
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('galleryScreen').style.display='block';
  renderGallery('base');
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
};

window.hideGallery = function() {
  document.getElementById('galleryScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  render();
};

window.showDebugPopup = function() {
  const today = getToday();
  const msg = "🕵️ ДАННЫЕ:\n\n" +
              "📅 Сегодня: " + today + "\n" +
              "🏃 Последний клик: " + (st.lastWorkout || "нет") + "\n" +
              "🔥 Стрик: " + st.streak + "\n" +
              "🔑 Ключей: " + (st.keys||0) + "\n" +
              "⭐ Звезд: " + (st.stars||0) + "\n" +
              "🌟 Сияющих: " + (st.shinyStars||0) + "\n" +
              "🎲 Порядок редких: " + (st.rareOrder||[]).join(',') + "\n" +
              "🎲 Порядок эпических: " + (st.epicOrder||[]).join(',');
  let customAlert = document.createElement('div');
  customAlert.style.cssText = "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;padding:20px;border-radius:20px;box-shadow:0 0 20px rgba(0,0,0,0.5);z-index:9999;text-align:center;width:90%;max-width:320px;";
  customAlert.innerHTML = `
    <h3 style="margin-bottom:10px;font-family:'Fredoka One';color:#667eea">Отладка</h3>
    <pre style="text-align:left;font-size:11px;font-family:monospace;background:#f5f5f5;padding:10px;border-radius:8px;margin-bottom:15px;white-space:pre-wrap;">${msg}</pre>
    <button id="debugTestWeek" class="debug-popup-btn test">🧪 ПРОТЕСТИРОВАТЬ НЕДЕЛЮ</button>
    <button id="debugReset" class="debug-popup-btn reset">🗑 СБРОСИТЬ ПРОГРЕСС</button>
    <button class="debug-popup-btn close" onclick="this.parentElement.remove()">Закрыть</button>
  `;
  document.body.appendChild(customAlert);
  document.getElementById('debugTestWeek').onclick = function() {
    const availableBase = BASE.map((_,i) => i).filter(i => !st.gotBase.includes(i));
    let charAdded = false;
    if (availableBase.length > 0) {
      const randomIdx = availableBase[Math.floor(Math.random() * availableBase.length)];
      st.gotBase.push(randomIdx); st.charIdx = randomIdx; charAdded = true;
    }
    st.stars = (st.stars || 0) + 2;
    st.shinyStars = (st.shinyStars || 0) + 1;
    st.keys = 0; st.streak = 0; st.lastWorkout = getToday();
    save(); render(); this.parentElement.remove();
    if(charAdded) { alert("✅ Готово! Открыт: " + BASE[st.charIdx].name + "\nЗвёзд: " + st.stars + "\nСияющих: " + st.shinyStars); }
    else { alert("⚠️ Все базовые открыты! Награды добавлены."); }
  };
  document.getElementById('debugReset').onclick = function() {
    if(confirm("Точно сбросить весь прогресс?")) { localStorage.removeItem('as_' + playerKey); location.reload(); }
  };
};

function checkBtn() { const n=document.getElementById('nameInput').value.trim(); const k=document.getElementById('nickInput').value.trim(); document.getElementById('startBtn').disabled=!(n&&k); }
let _ac=0; const _at=setInterval(()=>{checkBtn();if(++_ac>=20)clearInterval(_at);},200);

window.startGame = function() {
  const name=document.getElementById('nameInput').value.trim(); const nick=document.getElementById('nickInput').value.trim(); if(!name||!nick) return;
  playerKey=(name+'_'+nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi,'_');
  localStorage.setItem('as_who',JSON.stringify({name,nick}));
  if(!load()) st=freshState(); st.name=name; st.nick=nick; save();
  sound('start'); document.getElementById('nameScreen').style.display='none'; document.getElementById('gameScreen').style.display='block'; render();
};

window.changeName = function() { localStorage.removeItem('as_who'); document.getElementById('gameScreen').style.display='none'; document.getElementById('nameScreen').style.display='block'; document.getElementById('nameInput').value=''; document.getElementById('nickInput').value=''; checkBtn(); };

document.addEventListener('DOMContentLoaded', function() {
  const _who = localStorage.getItem('as_who');
  if (_who) {
    try {
      const d = JSON.parse(_who);
      if (d.name && d.nick) {
        document.getElementById('nameInput').value = d.name;
        document.getElementById('nickInput').value = d.nick;
        checkBtn();
        playerKey = (d.name + '_' + d.nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
        if (load()) {
          document.getElementById('nameScreen').style.display = 'none';
          document.getElementById('gameScreen').style.display = 'block';
          render();
        }
      }
    } catch(e) {}
  }
});
</script>
