<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы — Зарядка с суперсилами</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 32px;
    padding: 24px 20px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    text-align: center;
  }
  h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: #2d2d2d; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 700; }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 13px 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 19px;
    cursor: pointer;
    width: 100%;
    transition: transform .15s;
    box-shadow: 0 4px 16px rgba(102,126,234,.4);
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-green { background: linear-gradient(135deg, #2E7D32, #4CAF50); box-shadow: 0 4px 16px rgba(46,125,50,.4); }
  .btn-gold { background: linear-gradient(135deg, #F9A825, #FF6F00); box-shadow: 0 4px 16px rgba(249,168,37,.4); }
  .btn-rare { background: linear-gradient(135deg, #1565C0, #42A5F5); box-shadow: 0 4px 16px rgba(21,101,192,.3); }
  .btn-ruby { background: linear-gradient(135deg, #B71C1C, #EF5350); box-shadow: 0 4px 16px rgba(183,28,28,.3); }
  .field-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; text-align: left; }
  .field-input {
    width: 100%;
    border: 3px solid #e0e4ef;
    border-radius: 14px;
    padding: 11px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    outline: none;
    text-align: center;
    margin-bottom: 14px;
    transition: border-color .2s;
  }
  .field-input:focus { border-color: #667eea; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 14px;
    border-radius: 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
  }
  .rank-novice { background: #e8f5e9; color: #2E7D32; }
  .rank-student { background: linear-gradient(135deg, #FFF8E1, #FFE082); color: #F57F17; }
  .rank-pro { background: linear-gradient(135deg, #E3F2FD, #90CAF9); color: #1565C0; }
  .rank-master { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; }
  .keys-wallet { display: flex; gap: 12px; background: #f5f5f5; border-radius: 40px; padding: 6px 16px; }
  .wallet-slot { display: flex; align-items: center; gap: 6px; font-family: 'Fredoka One', cursive; font-size: 18px; }
  .wallet-slot.star { color: #F9A825; }
  .wallet-slot.star-shiny { color: #FF6F00; }
  .greeting { font-size: 18px; font-weight: 900; color: #2d2d2d; margin-bottom: 4px; }
  .progress-text { font-size: 13px; color: #888; font-weight: 700; margin-bottom: 12px; line-height: 1.7; }
  .motivation-block {
    background: linear-gradient(135deg, #FFF8E1, #FFECB3);
    border-radius: 20px;
    padding: 14px;
    margin-bottom: 12px;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
    color: #F57F17;
  }
  .keys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .key-slot {
    aspect-ratio: 1;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    border: 3px dashed #e0e4ef;
    background: #f9f9f9;
    transition: all .4s ease;
  }
  .key-slot.filled { border: 3px solid gold; background: linear-gradient(135deg, #fffde7, #fff9c4); box-shadow: 0 4px 12px rgba(255,215,0,.4); animation: popIn .5s ease; }
  @keyframes popIn { 0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)} }
  .char-wrap { border-radius: 18px; overflow: hidden; margin-bottom: 12px; display: none; background: #f5f5f5; }
  .char-wrap img { width: 100%; height: 200px; object-fit: contain; display: block; }
  .char-wrap.show { display: block; animation: zoomIn .6s ease; }
  @keyframes zoomIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .cooldown-msg { background: #f0f4ff; border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: #667eea; display: none; margin-top: 8px; }
  .cooldown-time { font-family: 'Fredoka One', cursive; font-size: 20px; display: block; margin-top: 4px; }
  .collection-bar { margin-top: 14px; border-top: 2px solid #f0f0f0; padding-top: 12px; cursor: pointer; }
  .collection-bar:hover .col-title { color: #667eea; }
  .col-title { font-family: 'Fredoka One', cursive; font-size: 15px; color: #888; margin-bottom: 8px; transition: color .2s; }
  .change-name { font-size: 11px; color: #ccc; margin-top: 10px; cursor: pointer; font-weight: 700; }
  .change-name:hover { color: #667eea; }
  #galleryScreen { display: none; }
  .gallery-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid #e0e4ef; }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: all .2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
  .g-item {
    border-radius: 18px;
    border: 2px solid #e8e8e8;
    background: #f0f0f0;
    padding: 0;
    text-align: center;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: all .3s;
  }
  .g-item.got { background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.1); border-color: transparent; }
  .g-item.locked { padding: 20px 8px; align-items: center; justify-content: center; }
  .g-item .g-img { width: 100%; }
  .g-item .g-img img { width: 100%; height: auto; display: block; }
  .g-item .g-name { 
    font-family: 'Fredoka One', cursive; 
    font-size: 14px; 
    padding: 8px 8px 12px; 
    line-height: 1.3; 
    color: #667eea;
    word-break: break-word;
  }
  .g-item .g-q { font-size: 44px; color: #ddd; margin-bottom: 6px; }
  .star-text-block {
    background: linear-gradient(135deg, #FFF8E1, #FFE082);
    border-radius: 24px;
    padding: 16px;
    text-align: center;
    font-family: 'Fredoka One', cursive;
    font-size: 18px;
    margin-bottom: 14px;
  }
  .celebration { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .celebration.show { display: flex; }
  .celeb-box { background: #fff; border-radius: 32px; padding: 28px 24px; text-align: center; max-width: 340px; width: 100%; animation: zoomIn .4s ease; }
  .celeb-emoji { font-size: 60px; display: block; margin-bottom: 10px; }
  .celeb-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #2d2d2d; margin-bottom: 6px; }
  .celeb-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 14px; margin: 10px 0; display: none; }
  .celeb-text { font-size: 14px; color: #888; font-weight: 700; margin-bottom: 18px; }
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15" oninput="checkBtn()">
  <div class="field-label">Придумай ник</div>
  <input class="field-input" id="nickInput" placeholder="Например: Ракета 🚀" maxlength="20" oninput="checkBtn()">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱 НОВИЧОК</div>
    <div class="keys-wallet">
      <div class="wallet-slot star">⭐ <span id="starCount">0</span></div>
      <div class="wallet-slot star-shiny">🌟 <span id="starShinyCount">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div id="dynamicMainArea">
    <!-- сюда динамически вставляем содержимое (ключи / звездный текст / карточка персонажа / мотивация) -->
  </div>
  <button class="btn btn-green" id="claimBtn" onclick="doWorkout()">Я сделал(а) зарядку! 🏃</button>
  <div class="cooldown-msg" id="cooldown"></div>
  <div class="collection-bar" onclick="showGallery()"><div class="col-title">🏅 Моя коллекция →</div></div>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<div class="card" id="galleryScreen">
  <h1 style="margin-bottom:12px">🏅 Моя коллекция</h1>
  <div class="gallery-tabs">
    <button class="tab-btn active" onclick="switchTab('base',this)">Базовые</button>
    <button class="tab-btn" onclick="switchTab('rare',this)">Редкие</button>
    <button class="tab-btn" onclick="switchTab('epic',this)">Эпические</button>
    <button class="tab-btn" onclick="switchTab('legend',this)">Легенда</button>
  </div>
  <div id="galleryContent"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-box">
    <span class="celeb-emoji" id="celebEmoji">🎉</span>
    <div class="celeb-title" id="celebTitle"></div>
    <img class="celeb-img" id="celebImg" src="" alt="">
    <div class="celeb-text" id="celebText"></div>
    <button class="btn" onclick="closeCeleb()">Ура! 🎉</button>
  </div>
</div>

<script>
// ---------- ДАННЫЕ ПЕРСОНАЖЕЙ (по новому ТЗ) ----------
const BASE = [
  { animal:"🐆", power:"Скорость",       name:"Гепард",   img:"gepard.png"    },
  { animal:"🐦", power:"Лёгкость",       name:"Колибри",  img:"kolibri.png"   },
  { animal:"🐜", power:"Сила",           name:"Муравей",  img:"muravey.png"   },
  { animal:"🦩", power:"Баланс",         name:"Фламинго", img:"flamingo.png"  },
  { animal:"🦥", power:"Восстановление", name:"Ленивец",  img:"lenivec.png"   },
  { animal:"🐒", power:"Координация",    name:"Обезьяна", img:"obeziana.png"  },
  { animal:"🐫", power:"Выносливость",   name:"Верблюд",  img:"verblyud.png"  },
  { animal:"🐱", power:"Гибкость",       name:"Кошка",    img:"koshka.png"    },
];
const RARE = [
  { animal:"🦘", power:"Прыгучесть",   name:"Кенгуру",  img:"kenguru.png"   },
  { animal:"🐙", power:"Цепкость",     name:"Осьминог", img:"osminog.png"   },
  { animal:"🦀", power:"Устойчивость", name:"Краб",     img:"krab.png"      },
  { animal:"🐌", power:"Чуткость",     name:"Улитка",   img:"ulitka.png"    },
];
const EPIC = [
  { animal:"🦄✨", power:"Суперлёгкость", name:"Пегас",    img:"pegas.png"     },
  { animal:"🐉", power:"Суперсила",     name:"Дракон",   img:"drakon.png"    },
];
const LEGEND = { animal:"🔥", power:"Возрождение", name:"Феникс", img:"feniks.png" };

// Похвальные фразы (1-4 день после открытия базы)
const PRAISE_PHRASES = [
  "💪 Отлично! Продолжай в том же духе!",
  "💪 Ты супер! Так держать!",
  "💪 Зарядка — это сила! Молодец!"
];

// ---------- Глобальное состояние ----------
let st = {};
let playerKey = '';

// Новая структура: streak (дней подряд), keysCount (текущие ключи от 0 до 3), 
// stars, shinyStars, openedBaseIdx, openedRareIdx, openedEpicIdx, gotLegend
// lastWorkoutDate (ISO), lastStreakDate (для проверки сброса)
function getDefaultState() {
  return {
    streak: 0,            // дни подряд 0..7
    keysCount: 0,         // сколько ключей в копилке (0-3, при 4 открывается база)
    stars: 0,
    shinyStars: 0,
    openedBase: [],       // индексы открытых базовых
    openedRare: [],       // индексы редких
    openedEpic: [],       // индексы эпических
    gotLegend: false,
    lastWorkoutDate: null,  // ISO последней зарядки (для кулдауна)
    lastStreakDate: null,   // дата последнего дня streak (для проверки пропуска)
    tempShowPower: null,     // временно показанная суперсила { img, power, name }
    allBaseOpenedMotivationShown: false
  };
}

// Конвертация старых сохранений в новую структуру (сохраняем прогресс)
function migrateOldState(old) {
  const fresh = getDefaultState();
  // Старая логика: charIdx, step, stars, starsShiny, gotBase, gotRare, gotEpic, gotLegend
  if (old) {
    fresh.stars = old.stars || 0;
    fresh.shinyStars = old.starsShiny || 0;
    if (old.gotBase && Array.isArray(old.gotBase)) fresh.openedBase = [...old.gotBase];
    if (old.gotRare && Array.isArray(old.gotRare)) fresh.openedRare = [...old.gotRare];
    if (old.gotEpic && Array.isArray(old.gotEpic)) fresh.openedEpic = [...old.gotEpic];
    fresh.gotLegend = old.gotLegend || false;
    if (old.lastClaim) fresh.lastWorkoutDate = old.lastClaim;
    // пытаемся восстановить streak из старой логики weekCount или step? но лучше начать заново, 
    // сохранив только ключи? старые ключи не хранились отдельно. step было от 0-4. keysCount сделаем = step если step<4
    if (old.step !== undefined && old.step < 4) fresh.keysCount = old.step;
    fresh.streak = 0; // на новой системе начинаем заново, но накопленное добро остаётся
    if (old.lastClaim) fresh.lastStreakDate = old.lastClaim;
  }
  return fresh;
}

function save() { localStorage.setItem('as_' + playerKey, JSON.stringify(st)); }
function load() {
  const raw = localStorage.getItem('as_' + playerKey);
  if (!raw) return false;
  try { 
    const parsed = JSON.parse(raw);
    // проверяем новая ли структура (есть streak)
    if (parsed.streak !== undefined) st = parsed;
    else st = migrateOldState(parsed);
    return true;
  } catch(e) { return false; }
}

// Звуки (прежняя логика)
function sound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const seq = {
      start:   [[440,.12],[550,.12],[660,.12]],
      key:     [[900,0,'tri']],
      base:    [[523,.18],[659,.18],[784,.18],[1047,.18]],
      rare:    [[440,.15],[554,.15],[659,.15],[880,.15],[1109,.15]],
      epic:    [[330,.2],[415,.2],[523,.2],[659,.2],[830,.2],[1047,.2]],
      legend:  [[262,.25],[330,.25],[392,.25],[523,.25],[659,.25],[784,.25]],
    };
    const p = seq[type];
    if (!p) return;
    p.forEach(([f, dt, sh], i) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = sh || 'sine';
      o.frequency.setValueAtTime(f, ctx.currentTime + i * (dt||0.18));
      g.gain.setValueAtTime(0.3, ctx.currentTime + i * (dt||0.18));
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * (dt||0.18) + 0.4);
      o.start(ctx.currentTime + i * (dt||0.18));
      o.stop(ctx.currentTime + i * (dt||0.18) + 0.4);
    });
  } catch(e) {}
}

function celebrate(emoji, title, text, img, snd) {
  document.getElementById('celebEmoji').innerHTML = emoji;
  document.getElementById('celebTitle').innerHTML = title;
  document.getElementById('celebText').innerHTML = text;
  const el = document.getElementById('celebImg');
  if (img) { el.src = img; el.style.display = 'block'; }
  else { el.style.display = 'none'; }
  document.getElementById('celebration').classList.add('show');
  if (snd) sound(snd);
}
window.closeCeleb = function() { 
  document.getElementById('celebration').classList.remove('show'); 
  render(); 
};

function decl(n, a, b, c) { const m = n % 10, mm = n % 100; if (m === 1 && mm !== 11) return a; if (m >= 2 && m <= 4 && (mm < 10 || mm >= 20)) return b; return c; }

// Открытие базовой суперсилы когда keysCount становится 4
function tryOpenBase() {
  if (st.keysCount >= 4) {
    st.keysCount = 0;
    // находим неоткрытых базовых
    const notOpened = BASE.map((_,idx) => idx).filter(idx => !st.openedBase.includes(idx));
    if (notOpened.length > 0) {
      const randomIdx = notOpened[Math.floor(Math.random() * notOpened.length)];
      st.openedBase.push(randomIdx);
      save();
      sound('base');
      const char = BASE[randomIdx];
      // временно показываем картинку на 3 секунды
      st.tempShowPower = { img: char.img, power: char.power, name: char.name, animal: char.animal };
      celebrate('🎉', char.power + ' открыта!', char.animal + ' ' + char.name + ' — теперь в коллекции!', char.img, 'base');
      // после трёх секунд сбросить tempShowPower
      setTimeout(() => { if (st.tempShowPower) { st.tempShowPower = null; render(); } }, 3000);
    }
    save();
  }
}

// Проверка получения Феникса
function checkLegendary() {
  const allBaseDone = st.openedBase.length === BASE.length;
  const allRareDone = st.openedRare.length === RARE.length;
  const allEpicDone = st.openedEpic.length === EPIC.length;
  if (!st.gotLegend && allBaseDone && allRareDone && allEpicDone) {
    st.gotLegend = true;
    save();
    setTimeout(() => celebrate('🔥', 'ЛЕГЕНДА! Феникс получен!', 'Ты собрал(а) все суперсилы! Ты — Легенда!', LEGEND.img, 'legend'), 200);
  }
}

// Основная логика при нажатии "сделал зарядку"
function doWorkout() {
  const now = new Date();
  now.setHours(0,0,0,0); // для сравнения календарных дней
  
  // Кулдаун: можно раз в календарный день, проверяем lastWorkoutDate
  if (st.lastWorkoutDate) {
    const lastDate = new Date(st.lastWorkoutDate);
    lastDate.setHours(0,0,0,0);
    if (now <= lastDate) {
      // еще не наступил следующий календарный день
      document.getElementById('claimBtn').style.display = 'none';
      document.getElementById('cooldown').style.display = 'block';
      updateCountdownToMidnight();
      return;
    }
  }
  
  // Проверка на пропуск дня для streak
  if (st.lastStreakDate) {
    const lastStreakDay = new Date(st.lastStreakDate);
    lastStreakDay.setHours(0,0,0,0);
    const dayDiff = Math.floor((now - lastStreakDay) / (1000*3600*24));
    if (dayDiff > 1) {
      // пропущен день -> сброс streak
      st.streak = 0;
    } else if (dayDiff === 1) {
      // всё ок, продолжаем
    } else {
      // тот же день? не должно случиться из-за кулдауна
    }
  }
  
  st.lastWorkoutDate = now.toISOString();
  st.lastStreakDate = now.toISOString();
  st.streak++;
  
  let rewardType = null;
  let rewardAmount = 0;
  let showStarMsg = false;
  
  // Награды по дням streak
  if (st.streak <= 4) {
    // 1-4 день: даём ключ
    rewardType = 'key';
    st.keysCount++;
    rewardAmount = 1;
    sound('key');
    celebrate('🔑', 'Ключ получен!', `У тебя ${st.keysCount} из 4 ключей. Ещё ${4-st.keysCount} зарядки до суперсилы!`, null, 'key');
    tryOpenBase(); // если стало 4 ключа — открываем базу
  } 
  else if (st.streak === 5 || st.streak === 6) {
    // звезда
    rewardType = 'star';
    st.stars++;
    rewardAmount = 1;
    sound('rare');
    showStarMsg = true;
    celebrate('⭐', 'Звезда получена!', `У тебя ${st.stars} ⭐. Накопи 4 — открой редкого персонажа в галерее!`, null, 'rare');
  }
  else if (st.streak === 7) {
    // сияющая звезда и сброс streak
    rewardType = 'shiny';
    st.shinyStars++;
    rewardAmount = 1;
    sound('epic');
    showStarMsg = true;
    celebrate('🌟', 'Сияющая звезда получена!', `У тебя ${st.shinyStars} 🌟. Накопи 4 — открой эпического персонажа!`, null, 'epic');
    st.streak = 0; // сброс после 7 дня
  }
  
  if (st.streak > 7) st.streak = 7; // на всякий
  
  // Если открыли базу — tempShowPower уже установлен.
  save();
  render();
}

// Отображение главного экрана по новым правилам
function render() {
  const rank = {label:'🌱 НОВИЧОК', cls:'rank-novice'};
  document.getElementById('rankBadge').className = 'rank-badge ' + rank.cls;
  document.getElementById('rankBadge').textContent = rank.label;
  document.getElementById('starCount').innerText = st.stars;
  document.getElementById('starShinyCount').innerText = st.shinyStars;
  document.getElementById('greeting').innerHTML = `Привет, ${st.name || ''}!`;
  
  const mainArea = document.getElementById('dynamicMainArea');
  // 1. Временный показ открытой суперсилы (3 секунды)
  if (st.tempShowPower) {
    mainArea.innerHTML = `
      <div class="char-wrap show" id="charWrap">
        <img src="${st.tempShowPower.img}" alt="" style="width:100%; height:200px; object-fit:contain;">
      </div>
      <div class="progress-text" style="font-family:'Fredoka One',cursive;font-size:20px;color:#667eea;margin:8px 0;">
        ✨ ${st.tempShowPower.power} ✨
      </div>
    `;
    document.getElementById('claimBtn').style.display = 'block';
    return;
  }
  
  // 2. 5-6 день подряд (звезда)
  if (st.streak === 5 || st.streak === 6) {
    mainArea.innerHTML = `<div class="star-text-block">⭐ Сегодня ты получишь ЗВЕЗДУ! ⭐</div>`;
    document.getElementById('claimBtn').style.display = 'block';
    return;
  }
  // 3. 7 день подряд (сияющая звезда)
  if (st.streak === 7) {
    mainArea.innerHTML = `<div class="star-text-block">🌟 Сегодня ты получишь СИЯЮЩУЮ ЗВЕЗДУ! 🌟</div>`;
    document.getElementById('claimBtn').style.display = 'block';
    return;
  }
  
  // 4. Все базовые открыты → мотивационный блок
  const allBaseOpened = st.openedBase.length === BASE.length;
  if (allBaseOpened && !st.tempShowPower && st.streak < 5) {
    mainArea.innerHTML = `<div class="motivation-block">🏆 Ты собрал(а) все базовые суперсилы! Круто!</div>`;
    // + фраза похвалы случайная
    if (Math.random() < 0.3) { // иногда показываем
      const praise = PRAISE_PHRASES[Math.floor(Math.random() * PRAISE_PHRASES.length)];
      const msgDiv = document.createElement('div');
      msgDiv.className = 'progress-text';
      msgDiv.innerHTML = praise;
      mainArea.appendChild(msgDiv);
    }
    document.getElementById('claimBtn').style.display = 'block';
    return;
  }
  
  // 5. Сбор ключей (streak 1-4 и keysCount <4) ИЛИ если нет прогресса (streak=0)
  if ((st.streak <= 4 || st.streak === 0) && st.keysCount < 4 && !allBaseOpened) {
    const needed = 4 - st.keysCount;
    mainArea.innerHTML = `
      <div class="keys-grid" id="keysGrid">
        ${Array(4).fill().map((_,i) => `<div class="key-slot ${i < st.keysCount ? 'filled' : ''}" id="ks${i}">${i < st.keysCount ? '🔑' : ''}</div>`).join('')}
      </div>
      <div class="progress-text">До суперсилы: ${needed} ${decl(needed, 'зарядка', 'зарядки', 'зарядок')}</div>
    `;
  } 
  else if (st.keysCount >= 4 && !st.tempShowPower) {
    // автоматически откроется база, но этот кейс уже обработан tryOpenBase, но рендер пока не нужен
    mainArea.innerHTML = `<div class="progress-text">✨ Открываем суперсилу... ✨</div>`;
  }
  else {
    mainArea.innerHTML = `<div class="progress-text">🔥 Продолжай заниматься!</div>`;
  }
  
  document.getElementById('claimBtn').style.display = 'block';
  document.getElementById('cooldown').style.display = 'none';
  // проверка кулдауна
  checkCooldown();
}

function checkCooldown() {
  const claimBtn = document.getElementById('claimBtn');
  const coolEl = document.getElementById('cooldown');
  if (!st.lastWorkoutDate) { claimBtn.style.display = 'block'; coolEl.style.display = 'none'; return; }
  const last = new Date(st.lastWorkoutDate);
  const today = new Date();
  last.setHours(0,0,0,0);
  const nextMidnight = new Date(last);
  nextMidnight.setDate(last.getDate() + 1);
  nextMidnight.setHours(0,0,0,0);
  if (today >= nextMidnight) {
    claimBtn.style.display = 'block';
    coolEl.style.display = 'none';
  } else {
    claimBtn.style.display = 'none';
    coolEl.style.display = 'block';
    updateCountdownToMidnight();
  }
}

function updateCountdownToMidnight() {
  const now = new Date();
  const midnight = new Date(now);
  midnight.setDate(now.getDate() + 1);
  midnight.setHours(0,0,0,0);
  const diff = midnight - now;
  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const timeString = (hours > 0 ? `${hours} ч ${minutes} мин` : `${minutes} мин`);
  let msg = '';
  if (diff > 12*3600000) msg = 'Отличная работа! Приходи завтра 🌙';
  else if (diff > 5*3600000) msg = `Скоро можно будет сделать новую зарядку! Осталось: ${timeString}`;
  else if (diff > 3600000) msg = `Совсем скоро! Осталось: ${timeString}`;
  else msg = `Уже почти! Осталось: ${timeString}`;
  document.getElementById('cooldown').innerHTML = `${msg}<span class="cooldown-time">${timeString}</span>`;
}

// ГАЛЕРЕЯ
function renderGallery(tab) {
  const cont = document.getElementById('galleryContent');
  cont.innerHTML = '';
  let items, list, costType, costValue;
  if (tab === 'base') { items = BASE; list = st.openedBase; }
  if (tab === 'rare') { items = RARE; list = st.openedRare; costType = 'star'; costValue = 4; }
  if (tab === 'epic') { items = EPIC; list = st.openedEpic; costType = 'shiny'; costValue = 4; }
  if (tab === 'legend') { items = [LEGEND]; list = st.gotLegend ? [0] : []; }
  const grid = document.createElement('div'); grid.className = 'gallery-grid';
  items.forEach((c, idx) => {
    const got = (tab === 'legend') ? st.gotLegend : list.includes(idx);
    const div = document.createElement('div'); div.className = 'g-item' + (got ? ' got' : ' locked');
    const area = document.createElement('div'); area.className = 'g-img';
    if (got) {
      const img = document.createElement('img'); img.src = c.img; img.alt = c.power;
      img.onerror = () => { img.style.display='none'; area.innerHTML='<span style="font-size:40px">'+c.animal+'</span>'; };
      area.appendChild(img);
    } else { area.innerHTML = '<span class="g-q">❓</span>'; }
    div.appendChild(area);
    if (got) {
      const nm = document.createElement('div'); nm.className = 'g-name'; nm.textContent = c.power; div.appendChild(nm);
    } else if (tab === 'rare' || tab === 'epic') {
      const can = (tab === 'rare') ? (st.stars >= costValue) : (st.shinyStars >= costValue);
      const btn = document.createElement('button');
      btn.style.cssText = 'border:none;border-radius:10px;padding:6px 8px;font-family:Nunito,sans-serif;font-weight:800;font-size:11px;cursor:pointer;margin-top:8px;background:#FFF8E1;color:#F9A825';
      btn.innerHTML = (tab === 'rare' ? '⭐' : '🌟') + ' ' + costValue + ' → Открыть!';
      if (can) btn.onclick = (e) => { e.stopPropagation(); openPower(tab, idx, costValue); };
      else { btn.disabled = true; btn.style.opacity = '0.5'; }
      div.appendChild(btn);
      const price = document.createElement('div'); price.style.cssText = 'font-size:11px;font-weight:700;color:#bbb;margin-top:6px;text-align:center';
      price.innerHTML = (tab === 'rare' ? '⭐' : '🌟') + ' ' + costValue;
      div.appendChild(price);
    }
    if (tab === 'legend' && !got) { const hint = document.createElement('div'); hint.style.cssText = 'font-size:11px;font-weight:700;color:#aaa;margin-top:6px;text-align:center'; hint.innerText = 'Собери всех персонажей!'; div.appendChild(hint); }
    grid.appendChild(div);
  });
  cont.appendChild(grid);
}

function openPower(tab, idx, cost) {
  if (tab === 'rare') {
    if (st.stars < cost || st.openedRare.includes(idx)) return;
    st.stars -= cost;
    st.openedRare.push(idx);
    save();
    const char = RARE[idx];
    celebrate('⭐', char.power + ' открыта!', char.name + ' теперь в твоей коллекции!', char.img, 'rare');
  } else if (tab === 'epic') {
    if (st.shinyStars < cost || st.openedEpic.includes(idx)) return;
    st.shinyStars -= cost;
    st.openedEpic.push(idx);
    save();
    const char = EPIC[idx];
    celebrate('🌟', char.power + ' открыта!', char.name + ' теперь в твоей коллекции!', char.img, 'epic');
  }
  checkLegendary();
  renderGallery(tab);
}

window.switchTab = function(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(tab);
};

window.showGallery = function() { document.getElementById('gameScreen').style.display = 'none'; document.getElementById('galleryScreen').style.display = 'block'; renderGallery('base'); };
window.hideGallery = function() { document.getElementById('galleryScreen').style.display = 'none'; document.getElementById('gameScreen').style.display = 'block'; render(); };

function checkBtn() { const n = document.getElementById('nameInput').value.trim(); const k = document.getElementById('nickInput').value.trim(); document.getElementById('startBtn').disabled = !(n && k); }
let _ac = 0, _at = setInterval(() => { checkBtn(); if (++_ac >= 20) clearInterval(_at); }, 200);

window.startGame = function() {
  const name = document.getElementById('nameInput').value.trim(); const nick = document.getElementById('nickInput').value.trim();
  if (!name || !nick) return;
  playerKey = (name + '_' + nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
  localStorage.setItem('as_who', JSON.stringify({name, nick}));
  if (!load()) st = getDefaultState();
  st.name = name; st.nick = nick;
  if (!st.openedBase) st.openedBase = [];
  if (!st.openedRare) st.openedRare = [];
  if (!st.openedEpic) st.openedEpic = [];
  save();
  sound('start');
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  render();
};
window.changeName = function() { localStorage.removeItem('as_who'); document.getElementById('gameScreen').style.display = 'none'; document.getElementById('nameScreen').style.display = 'block'; document.getElementById('nameInput').value = ''; document.getElementById('nickInput').value = ''; checkBtn(); };
const _who = localStorage.getItem('as_who');
if (_who) { try { const d = JSON.parse(_who); if (d.name && d.nick) { document.getElementById('nameInput').value = d.name; document.getElementById('nickInput').value = d.nick; checkBtn(); } } catch(e) {} }
</script>
