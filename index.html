<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">

<style>
/* ==== ТВОИ СТИЛИ (СОХРАНЕНЫ) ==== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.card {
  background: #fff;
  border-radius: 32px;
  padding: 24px 20px;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(0,0,0,.2);
  text-align: center;
}
h1 { font-family: 'Fredoka One'; font-size: 26px; }
.btn {
  background: linear-gradient(135deg, #667eea, #764ba2);
  color:#fff;
  border:none;
  border-radius:16px;
  padding:13px 24px;
  font-family:'Fredoka One';
  font-size:19px;
  cursor:pointer;
  width:100%;
}
.keys-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:14px;}
.key-slot { aspect-ratio:1; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:26px; border:3px dashed #e0e4ef;}
.key-slot.filled { border:3px solid gold; background:#fff9c4;}
.cooldown-msg { display:none; margin-top:10px; font-size:13px;}
.gallery-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:10px;}
.g-item { padding:10px; border-radius:14px; background:#f0f0f0;}
</style>
</head>

<body>

<div class="card" id="nameScreen">
<h1>👣 Активные Стопы</h1>
<input id="nameInput" placeholder="Имя"><br><br>
<input id="nickInput" placeholder="Ник"><br><br>
<button class="btn" onclick="startGame()">Вперёд 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none">

<div id="progressText"></div>

<div class="keys-grid">
<div class="key-slot" id="ks0"></div>
<div class="key-slot" id="ks1"></div>
<div class="key-slot" id="ks2"></div>
<div class="key-slot" id="ks3"></div>
</div>

<button class="btn" id="claimBtn" onclick="doWorkout()">Я сделал зарядку!</button>
<div class="cooldown-msg" id="cooldown"></div>

<div style="margin-top:10px">⭐ <span id="starCount">0</span> | 🌟 <span id="starShinyCount">0</span></div>

<button class="btn" style="margin-top:10px" onclick="showGallery()">Коллекция</button>

</div>

<div class="card" id="galleryScreen" style="display:none">
<h1>Коллекция</h1>
<div id="galleryContent"></div>
<button class="btn" onclick="hideGallery()">Назад</button>
</div>

<script>

const BASE = ["Скорость","Лёгкость","Сила","Баланс","Восстановление","Координация","Выносливость","Гибкость"];
const RARE = ["Прыгучесть","Цепкость","Устойчивость","Чуткость"];
const EPIC = ["Суперлёгкость","Суперсила"];

let st = {};
let playerKey = '';

function freshState(){
return{
streak:0,
lastDay:null,
keys:0,
stars:0,
starsShiny:0,
gotBase:[],
gotRare:[],
gotEpic:[],
gotLegend:false
};
}

function save(){localStorage.setItem(playerKey,JSON.stringify(st));}
function load(){
const d=localStorage.getItem(playerKey);
if(!d)return false;
st=JSON.parse(d);
return true;
}

function getToday(){
return new Date().toISOString().split('T')[0];
}

function startGame(){
playerKey="as_"+document.getElementById('nameInput').value;
if(!load()) st=freshState();
document.getElementById('nameScreen').style.display='none';
document.getElementById('gameScreen').style.display='block';
render();
}

function doWorkout(){

const today=getToday();
if(st.lastDay===today) return;

const y=new Date();
y.setDate(y.getDate()-1);
const yStr=y.toISOString().split('T')[0];

if(st.lastDay===yStr) st.streak++;
else st.streak=1;

st.lastDay=today;

// НАГРАДЫ
if(st.streak<=4){
st.keys++;
if(st.keys>=4) unlockBase();
else alert("🔑 Ключ! Осталось "+(4-st.keys));

}else if(st.streak===5||st.streak===6){
st.stars++;
alert("⭐ Звезда!");

}else if(st.streak===7){
st.starsShiny++;
alert("🌟 Сияющая звезда!");
st.streak=0;
}

save();
render();
}

function unlockBase(){
const available=BASE.map((_,i)=>i).filter(i=>!st.gotBase.includes(i));
if(!available.length)return;

const idx=available[Math.floor(Math.random()*available.length)];
st.gotBase.push(idx);
st.keys=0;

alert("🎉 Открыта: "+BASE[idx]);
checkLegend();
}

function checkLegend(){
if(st.gotBase.length===8 && st.gotRare.length===4 && st.gotEpic.length===2){
st.gotLegend=true;
alert("🔥 ФЕНИКС!");
}
}

function render(){

document.getElementById('starCount').innerText=st.stars;
document.getElementById('starShinyCount').innerText=st.starsShiny;

const keys=st.keys;
for(let i=0;i<4;i++){
const el=document.getElementById('ks'+i);
if(i<keys){
el.classList.add('filled');
el.innerHTML="🔑";
}else{
el.classList.remove('filled');
el.innerHTML="";
}
}

document.getElementById('progressText').innerText="До суперсилы: "+(4-keys);

// кулдаун
const today=getToday();

if(st.lastDay===today){
const now=new Date();
const midnight=new Date();
midnight.setHours(24,0,0,0);

const diff=midnight-now;
const h=Math.floor(diff/3600000);
const m=Math.floor((diff%3600000)/60000);

document.getElementById('claimBtn').style.display="none";
document.getElementById('cooldown').style.display="block";
document.getElementById('cooldown').innerText="Осталось: "+h+"ч "+m+"м";
}else{
document.getElementById('claimBtn').style.display="block";
document.getElementById('cooldown').style.display="none";
}

}

function showGallery(){
document.getElementById('gameScreen').style.display="none";
document.getElementById('galleryScreen').style.display="block";

let html="<h3>Базовые</h3><div class='gallery-grid'>";
BASE.forEach((c,i)=>{
html+=`<div class="g-item">${st.gotBase.includes(i)?c:"❓"}</div>`;
});
html+="</div>";

html+="<h3>Редкие</h3><div class='gallery-grid'>";
RARE.forEach((c,i)=>{
if(st.gotRare.includes(i)){
html+=`<div class="g-item">${c}</div>`;
}else{
html+=`<div class="g-item">❓<br><button onclick="buyRare(${i})">⭐4</button></div>`;
}
});
html+="</div>";

html+="<h3>Эпические</h3><div class='gallery-grid'>";
EPIC.forEach((c,i)=>{
if(st.gotEpic.includes(i)){
html+=`<div class="g-item">${c}</div>`;
}else{
html+=`<div class="g-item">❓<br><button onclick="buyEpic(${i})">🌟4</button></div>`;
}
});
html+="</div>";

if(st.gotLegend) html+="<h3>🔥 Феникс</h3>";

document.getElementById('galleryContent').innerHTML=html;
}

function hideGallery(){
document.getElementById('galleryScreen').style.display="none";
document.getElementById('gameScreen').style.display="block";
}

function buyRare(i){
if(st.stars<4)return;
st.stars-=4;
st.gotRare.push(i);
save();
showGallery();
checkLegend();
}

function buyEpic(i){
if(st.starsShiny<4)return;
st.starsShiny-=4;
st.gotEpic.push(i);
save();
showGallery();
checkLegend();
}

</script>
</body>
</html>
