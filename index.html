<!DOCTYPE html> 
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 32px;
    padding: 24px 20px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,.2);
    text-align: center;
  }
  h1 { font-family: 'Fredoka One', cursive; font-size: 26px; color: #2d2d2d; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; font-weight: 700; }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
    border: none;
    border-radius: 16px;
    padding: 13px 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 19px;
    cursor: pointer;
    width: 100%;
    transition: transform .15s;
    box-shadow: 0 4px 16px rgba(102,126,234,.4);
    margin-top: 8px;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .btn-green { background: linear-gradient(135deg, #2E7D32, #4CAF50); box-shadow: 0 4px 16px rgba(46,125,50,.4); }
  .btn-gold { background: linear-gradient(135deg, #F9A825, #FF6F00); box-shadow: 0 4px 16px rgba(249,168,37,.4); }
  .btn-rare { background: linear-gradient(135deg, #1565C0, #42A5F5); box-shadow: 0 4px 16px rgba(21,101,192,.3); }
  .btn-ruby { background: linear-gradient(135deg, #B71C1C, #EF5350); box-shadow: 0 4px 16px rgba(183,28,28,.3); }
  .field-label { font-size: 12px; font-weight: 800; color: #888; text-transform: uppercase; letter-spacing: .8px; margin-bottom: 6px; text-align: left; }
  .field-input {
    width: 100%;
    border: 3px solid #e0e4ef;
    border-radius: 14px;
    padding: 11px 14px;
    font-family: 'Nunito', sans-serif;
    font-size: 17px;
    font-weight: 700;
    outline: none;
    text-align: center;
    margin-bottom: 14px;
    transition: border-color .2s;
  }
  .field-input:focus { border-color: #667eea; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
  .rank-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 5px 14px;
    border-radius: 20px;
    font-family: 'Fredoka One', cursive;
    font-size: 14px;
  }
  .rank-novice { background: #e8f5e9; color: #2E7D32; }
  .rank-student { background: linear-gradient(135deg, #FFF8E1, #FFE082); color: #F57F17; }
  .rank-pro { background: linear-gradient(135deg, #E3F2FD, #90CAF9); color: #1565C0; }
  .rank-master { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; }
  .keys-wallet { display: flex; gap: 12px; background: #f5f5f5; border-radius: 40px; padding: 6px 16px; }
  .wallet-slot { display: flex; align-items: center; gap: 6px; font-family: 'Fredoka One', cursive; font-size: 18px; }
  .wallet-slot.star { color: #F9A825; }
  .wallet-slot.star-shiny { color: #FF6F00; }
  .greeting { font-size: 18px; font-weight: 900; color: #2d2d2d; margin-bottom: 4px; }
  .progress-text { font-size: 13px; color: #888; font-weight: 700; margin-bottom: 12px; line-height: 1.7; }
  .keys-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; }
  .key-slot {
    aspect-ratio: 1;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    border: 3px dashed #e0e4ef;
    background: #f9f9f9;
    transition: all .4s ease;
  }
  .key-slot.filled { border: 3px solid gold; background: linear-gradient(135deg, #fffde7, #fff9c4); box-shadow: 0 4px 12px rgba(255,215,0,.4); animation: popIn .5s ease; }
  @keyframes popIn { 0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)} }
  .char-wrap { border-radius: 18px; overflow: hidden; margin-bottom: 12px; display: none; background: #f5f5f5; }
  .char-wrap img { width: 100%; height: 200px; object-fit: contain; display: block; }
  .char-wrap.show { display: block; animation: zoomIn .6s ease; }
  @keyframes zoomIn { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
  .cooldown-msg { background: #f0f4ff; border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: #667eea; display: none; margin-top: 8px; }
  .cooldown-time { font-family: 'Fredoka One', cursive; font-size: 20px; display: block; margin-top: 4px; }
  .collection-bar { margin-top: 14px; border-top: 2px solid #f0f0f0; padding-top: 12px; cursor: pointer; }
  .collection-bar:hover .col-title { color: #667eea; }
  .col-title { font-family: 'Fredoka One', cursive; font-size: 15px; color: #888; margin-bottom: 8px; transition: color .2s; }
  .change-name { font-size: 11px; color: #ccc; margin-top: 10px; cursor: pointer; font-weight: 700; }
  .change-name:hover { color: #667eea; }
  #galleryScreen { display: none; }
  .gallery-tabs { display: flex; gap: 0; margin-bottom: 16px; border-bottom: 2px solid #e0e4ef; }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 12px;
    color: #aaa;
    cursor: pointer;
    transition: all .2s;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
  }
  .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
  .gallery-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
  .g-item {
    border-radius: 18px;
    border: 2px solid #e8e8e8;
    background: #f0f0f0;
    padding: 0;
    text-align: center;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: all .3s;
  }
  .g-item.got { background: #fff; box-shadow: 0 4px 14px rgba(0,0,0,.1); border-color: transparent; }
  .g-item.locked { padding: 20px 8px; align-items: center; justify-content: center; }
  .g-item .g-img { width: 100%; }
  .g-item .g-img img { width: 100%; height: auto; display: block; }
  .g-item .g-name { 
    font-family: 'Fredoka One', cursive; 
    font-size: 14px; 
    padding: 8px 8px 12px; 
    line-height: 1.3; 
    color: #667eea;
    word-break: break-word;
  }
  .g-item .g-q { font-size: 44px; color: #ddd; margin-bottom: 6px; }
  .celebration { display: none; position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
  .celebration.show { display: flex; }
  .celeb-box { background: #fff; border-radius: 32px; padding: 28px 24px; text-align: center; max-width: 340px; width: 100%; animation: zoomIn .4s ease; }
  .celeb-emoji { font-size: 60px; display: block; margin-bottom: 10px; }
  .celeb-title { font-family: 'Fredoka One', cursive; font-size: 24px; color: #2d2d2d; margin-bottom: 6px; }
  .celeb-img { width: 100%; max-height: 160px; object-fit: contain; border-radius: 14px; margin: 10px 0; display: none; }
  .celeb-text { font-size: 14px; color: #888; font-weight: 700; margin-bottom: 18px; }
  .motivational { background: linear-gradient(135deg, #fff9c4, #ffecb3); border-radius: 14px; padding: 12px; font-size: 13px; font-weight: 700; color: #F57F17; display: none; margin: 8px 0; }
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15" oninput="checkBtn()">
  <div class="field-label">Придумай ник</div>
  <input class="field-input" id="nickInput" placeholder="Например: Ракета 🚀" maxlength="20" oninput="checkBtn()">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱 НОВИЧОК</div>
    <div class="keys-wallet">
      <div class="wallet-slot star">⭐ <span id="starCount">0</span></div>
      <div class="wallet-slot star-shiny">🌟 <span id="starShinyCount">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid">
    <div class="key-slot" id="ks0"></div><div class="key-slot" id="ks1"></div>
    <div class="key-slot" id="ks2"></div><div class="key-slot" id="ks3"></div>
  </div>
  <div class="char-wrap" id="charWrap"><img id="charImg" src="" alt=""></div>
  <div class="motivational" id="motivationalBlock"></div>
  <button class="btn btn-green" id="claimBtn" onclick="doWorkout()">Я сделал(а) зарядку! 🏃</button>
  <div class="cooldown-msg" id="cooldown"></div>
  <div class="collection-bar" onclick="showGallery()"><div class="col-title">🏅 Моя коллекция →</div></div>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<div class="card" id="galleryScreen">
  <h1 style="margin-bottom:12px">🏅 Моя коллекция</h1>
  <div class="gallery-tabs">
    <button class="tab-btn active" onclick="switchTab('base',this)">Базовые</button>
    <button class="tab-btn" onclick="switchTab('rare',this)">Редкие</button>
    <button class="tab-btn" onclick="switchTab('epic',this)">Эпические</button>
    <button class="tab-btn" onclick="switchTab('legend',this)">Легенда</button>
  </div>
  <div id="galleryContent"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-box">
    <span class="celeb-emoji" id="celebEmoji">🎉</span>
    <div class="celeb-title" id="celebTitle"></div>
    <img class="celeb-img" id="celebImg" src="" alt="">
    <div class="celeb-text" id="celebText"></div>
    <button class="btn" onclick="closeCeleb()">Ура! 🎉</button>
  </div>
</div>

<script>
const BASE = [
  { animal:"🐆", power:"Скорость",       name:"Гепард",   img:"gepard.png"    },
  { animal:"🐦", power:"Лёгкость",       name:"Колибри",  img:"kolibri.png"   },
  { animal:"🐜", power:"Сила",           name:"Муравей",  img:"muravey.png"   },
  { animal:"🦩", power:"Баланс",         name:"Фламинго", img:"flamingo.png"  },
  { animal:"🦥", power:"Восстановление", name:"Ленивец",  img:"lenivec.png"   },
  { animal:"🐒", power:"Координация",    name:"Обезьяна", img:"obeziana.png"  },
  { animal:"🐫", power:"Выносливость",   name:"Верблюд",  img:"verblyud.png"  },
  { animal:"🐱", power:"Гибкость",       name:"Кошка",    img:"koshka.png"    },
];
const RARE = [
  { animal:"🦘", power:"Прыгучесть",   name:"Кенгуру",  img:"kenguru.png"   },
  { animal:"🐙", power:"Цепкость",     name:"Осьминог", img:"osminog.png"   },
  { animal:"🦀", power:"Устойчивость", name:"Краб",     img:"krab.png"      },
  { animal:"🐌", power:"Чуткость",     name:"Улитка",   img:"ulitka.png"    },
];
const EPIC = [
  { animal:"🦄✨", power:"Суперлёгкость", name:"Пегас", img:"pegas.png"  },
  { animal:"🐉", power:"Суперсила",     name:"Дракон",   img:"drakon.png"    },
];
const LEGEND = { animal:"🔥", power:"Возрождение", name:"Феникс", img:"feniks.png" };

const PRAISE_PHRASES = [
  "💪 «Отлично! Продолжай в том же духе!»",
  "💪 «Ты супер! Так держать!»",
  "💪 «Зарядка — это сила! Молодец!»"
];

let st = {};
let playerKey = '';
let justUnlockedChar = null;

// 🔹 Надёжное получение даты как строки 'YYYY-MM-DD' (без часовых поясов)
function getToday() {
  const d = new Date();
  return d.getFullYear() + '-' + 
         String(d.getMonth()+1).padStart(2,'0') + '-' + 
         String(d.getDate()).padStart(2,'0');
}

// 🔹 Проверяет, является ли date2 следующим днём после date1 (обе в формате 'YYYY-MM-DD')
function isConsecutiveDay(date1, date2) {
  const [y1, m1, d1] = date1.split('-').map(Number);
  const [y2, m2, d2] = date2.split('-').map(Number);
  const dt1 = new Date(y1, m1 - 1, d1);
  const dt2 = new Date(y2, m2 - 1, d2);
  const diff = Math.round((dt2 - dt1) / (24 * 3600 * 1000));
  return diff === 1;
}

function freshState() {
  return {
    streak: 0,
    keys: 0,
    stars: 0,
    shinyStars: 0,
    gotBase: [],
    gotRare: [],
    gotEpic: [],
    gotLegend: false,
    lastWorkout: null,
    name: '',
    nick: '',
    charIdx: Math.floor(Math.random() * BASE.length)
  };
}

function save() { 
  if (playerKey) localStorage.setItem('as_' + playerKey, JSON.stringify(st)); 
}

function load() {
  if (!playerKey) return false;
  const raw = localStorage.getItem('as_' + playerKey);
  if (!raw) return false;
  try { 
    let data = JSON.parse(raw);
    
    // Миграция старых полей
    if (data.step !== undefined) { data.keys = data.step; data.streak = data.step; delete data.step; }
    ['weekCount','weekStart','weeksPlayed','lastClaim','lastUnlockWeek'].forEach(k => { if (data[k] !== undefined) delete data[k]; });
    
    // Инициализация новых полей
    ['streak','keys','stars','shinyStars'].forEach(k => { if (data[k] === undefined) data[k] = 0; });
    ['gotBase','gotRare','gotEpic'].forEach(k => { if (!Array.isArray(data[k])) data[k] = []; });
    
    st = data;
    return true; 
  } catch(e) { 
    console.error('Load error:', e);
    return false; 
  }
}

function sound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const seq = {
      start: [[440,.12],[550,.12],[660,.12]],
      key: [[900,0,'tri']],
      base: [[523,.18],[659,.18],[784,.18],[1047,.18]],
      rare: [[440,.15],[554,.15],[659,.15],[880,.15],[1109,.15]],
      epic: [[330,.2],[415,.2],[523,.2],[659,.2],[830,.2],[1047,.2]],
      legend: [[262,.25],[330,.25],[392,.25],[523,.25],[659,.25],[784,.25]],
    };
    const p = seq[type];
    if (!p) return;
    p.forEach(([f, dt, sh], i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = sh || 'sine';
      const t = ctx.currentTime + i * (dt||0.18);
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.3, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.start(t); o.stop(t + 0.4);
    });
  } catch(e) {}
}

function decl(n, a, b, c) {
  const m = n % 10, mm = n % 100;
  if (m === 1 && mm !== 11) return a;
  if (m >= 2 && m <= 4 && (mm < 10 || mm >= 20)) return b;
  return c;
}

function getRank() {
  const total = (st.gotBase?.length||0) + (st.gotRare?.length||0) + (st.gotEpic?.length||0) + (st.gotLegend?1:0);
  if (total >= 10) return {label:'👑 МАСТЕР', cls:'rank-master'};
  if (total >= 6) return {label:'⚡ ПРОФИ', cls:'rank-pro'};
  if (total >= 3) return {label:'📖 УЧЕНИК', cls:'rank-student'};
  return {label:'🌱 НОВИЧОК', cls:'rank-novice'};
}

function celebrate(emoji, title, text, img, snd) {
  document.getElementById('celebEmoji').innerHTML = emoji;
  document.getElementById('celebTitle').innerHTML = title;
  document.getElementById('celebText').innerHTML = text;
  const el = document.getElementById('celebImg');
  if (img) { el.src = img; el.style.display = 'block'; } else el.style.display = 'none';
  document.getElementById('celebration').classList.add('show');
  if (snd) sound(snd);
}
window.closeCeleb = function() { 
  document.getElementById('celebration').classList.remove('show'); 
  if (justUnlockedChar) setTimeout(() => { justUnlockedChar = null; render(); }, 100);
  else render(); 
};

// 🔹 Рассчитывает, каким БУДЕТ стрик, если игрок сделает зарядку сегодня
function getPotentialStreak() {
  const today = getToday();
  if (!st.lastWorkout) return 1;
  if (st.lastWorkout === today) return st.streak || 1; // уже сделал
  if (isConsecutiveDay(st.lastWorkout, today)) return (st.streak || 0) + 1;
  return 1; // пропустил
}

function render() {
  const rank = getRank();
  document.getElementById('rankBadge').className = 'rank-badge ' + rank.cls;
  document.getElementById('rankBadge').textContent = rank.label;
  document.getElementById('starCount').innerText = st.stars || 0;
  document.getElementById('starShinyCount').innerText = st.shinyStars || 0;
  document.getElementById('greeting').innerHTML = 'Привет, ' + (st.name || '') + '!';

  const keysGrid = document.getElementById('keysGrid');
  const charWrap = document.getElementById('charWrap');
  const progressText = document.getElementById('progressText');
  const motivational = document.getElementById('motivationalBlock');
  
  keysGrid.style.display = 'none';
  charWrap.style.display = 'none';
  charWrap.classList.remove('show');
  motivational.style.display = 'none';
  progressText.innerHTML = '';

  // Показ открытого персонажа (3 сек после получения)
  if (justUnlockedChar) {
    charWrap.style.display = 'block';
    charWrap.classList.add('show');
    document.getElementById('charImg').src = justUnlockedChar.img;
    progressText.innerHTML = `<div style="font-family:Fredoka One,cursive;font-size:26px;font-weight:900;color:#667eea;margin:12px 0 6px">${justUnlockedChar.power}</div><div style="font-size:13px;color:#aaa">суперсила открыта ✨</div>`;
    return;
  }

  // Мотивация после сбора всех базовых
  if (st.gotBase?.length >= BASE.length) {
    motivational.style.display = 'block';
    motivational.innerHTML = '🏆 Ты собрал(а) все базовые суперсилы! Круто!';
  }

  // 🔹 Отображаем награду на основе ПОТЕНЦИАЛЬНОГО стрика (до клика)
  const potential = getPotentialStreak();
  
  if (potential >= 5 && potential <= 6) {
    progressText.innerHTML = '⭐ Сегодня ты получишь ЗВЕЗДУ! ⭐';
  } else if (potential === 7) {
    progressText.innerHTML = '🌟 Сегодня ты получишь СИЯЮЩУЮ ЗВЕЗДУ! 🌟';
  } else {
    // Дни 1-4: сбор ключей
    keysGrid.style.display = 'grid';
    const keys = Math.min(st.keys || 0, 4);
    const needed = 4 - keys;
    progressText.innerHTML = 'До суперсилы: ' + needed + ' ' + decl(needed, 'зарядка', 'зарядки', 'зарядок');
    for (let i = 0; i < 4; i++) {
      const sl = document.getElementById('ks' + i);
      if (i < keys) { sl.classList.add('filled'); sl.innerHTML = '🔑'; }
      else { sl.classList.remove('filled'); sl.innerHTML = ''; }
    }
  }
  
  checkCooldown();
}

function checkCooldown() {
  const claimBtn = document.getElementById('claimBtn');
  const coolEl = document.getElementById('cooldown');
  const today = getToday();
  
  if (st.lastWorkout === today) {
    claimBtn.style.display = 'none';
    coolEl.style.display = 'block';
    updateCountdown();
    const iv = setInterval(() => {
      if (getToday() !== today) { clearInterval(iv); render(); }
      else updateCountdown();
    }, 30000);
  } else {
    claimBtn.style.display = 'block';
    claimBtn.className = 'btn btn-green';
    claimBtn.innerHTML = 'Я сделал(а) зарядку! 🏃';
    claimBtn.onclick = doWorkout;
    coolEl.style.display = 'none';
  }
}

function updateCountdown() {
  const now = new Date();
  const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
  const diff = midnight - now;
  const hours = Math.floor(diff / 3600000);
  const minutes = Math.floor((diff % 3600000) / 60000);
  const timeString = hours > 0 ? `${hours} ч ${minutes} мин` : `${minutes} мин`;
  
  const coolEl = document.getElementById('cooldown');
  if (!coolEl) return;
  
  let message = '';
  if (diff > 12 * 3600000) message = 'Отличная работа! Приходи завтра 🌙';
  else if (diff > 5 * 3600000) message = `Скоро можно будет сделать новую зарядку! Осталось: ${timeString}`;
  else if (diff > 3600000) message = `Совсем скоро! Осталось: ${timeString}`;
  else message = `Уже почти! Осталось: ${timeString}`;
  
  coolEl.innerHTML = `${message}<span class="cooldown-time">${timeString}</span>`;
}

function doWorkout() {
  const today = getToday();
  if (st.lastWorkout === today) { checkCooldown(); return; }
  
  const newStreak = getPotentialStreak(); // то, чем станет стрик после клика
  st.streak = newStreak;
  st.lastWorkout = today;
  
  if (newStreak >= 1 && newStreak <= 4) {
    st.keys = (st.keys || 0) + 1;
    save();
    sound('key');
    
    if (st.keys >= 4) {
      const available = BASE.map((_,i) => i).filter(i => !st.gotBase.includes(i));
      if (available.length > 0) {
        const idx = available[Math.floor(Math.random() * available.length)];
        if (!st.gotBase) st.gotBase = [];
        st.gotBase.push(idx);
        st.charIdx = idx;
        st.keys = 0;
        save();
        sound('base');
        justUnlockedChar = BASE[idx];
        celebrate('🎉', BASE[idx].power + ' открыта!', 'Суперсила добавлена в коллекцию!', BASE[idx].img);
        checkLegendary();
        render();
        return;
      }
    } else {
      const phrase = PRAISE_PHRASES[Math.floor(Math.random() * PRAISE_PHRASES.length)];
      celebrate('🔑', 'Ключ ' + st.keys + ' из 4!', phrase);
    }
  } else if (newStreak === 5 || newStreak === 6) {
    st.stars = (st.stars || 0) + 1;
    save();
    sound('rare');
    celebrate('⭐', 'Звезда получена!', 'У тебя ' + st.stars + ' ⭐. Накопи 4 — открой редкого персонажа!');
  } else if (newStreak === 7) {
    st.shinyStars = (st.shinyStars || 0) + 1;
    st.streak = 0;
    save();
    sound('rare');
    celebrate('🌟', 'Сияющая звезда получена!', 'У тебя ' + st.shinyStars + ' 🌟. Накопи 4 — открой эпического персонажа!');
  }
  
  save();
  render();
}

function checkLegendary() {
  if (!st.gotLegend && 
      st.gotBase?.length >= BASE.length && 
      st.gotRare?.length >= RARE.length && 
      st.gotEpic?.length >= EPIC.length) {
    st.gotLegend = true;
    save();
    setTimeout(() => celebrate('🔥', 'ЛЕГЕНДА! Феникс получен!', 'Ты собрал(а) все суперсилы! Ты — Легенда!', LEGEND.img, 'legend'), 2000);
  }
}

window.switchTab = function(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(tab);
};

function renderGallery(tab) {
  const cont = document.getElementById('galleryContent');
  cont.innerHTML = '';
  let chars, collection;
  if (tab === 'base') { chars = BASE; collection = st.gotBase || []; }
  if (tab === 'rare') { chars = RARE; collection = st.gotRare || []; }
  if (tab === 'epic') { chars = EPIC; collection = st.gotEpic || []; }
  if (tab === 'legend') { chars = [LEGEND]; collection = st.gotLegend ? [0] : []; }
  
  const grid = document.createElement('div'); grid.className = 'gallery-grid';
  chars.forEach((c, i) => {
    const got = collection.includes(i);
    const div = document.createElement('div'); 
    div.className = 'g-item' + (got ? ' got' : ' locked');
    if (got) { div.style.borderColor = '#667eea'; div.style.background = '#EDF2FF'; }
    
    const area = document.createElement('div'); area.className = 'g-img';
    if (got) {
      const img = document.createElement('img'); img.src = c.img; img.alt = c.power;
      img.onerror = () => { img.style.display='none'; area.innerHTML='<span style="font-size:40px">'+c.animal+'</span>'; };
      area.appendChild(img);
    } else {
      area.innerHTML = '<span class="g-q">❓</span>';
    }
    div.appendChild(area);
    
    if (got) {
      const nm = document.createElement('div'); nm.className = 'g-name'; 
      nm.style.cssText = 'font-family:Fredoka One,cursive;font-size:14px;padding:8px 8px 12px;line-height:1.3;color:#667eea;word-break:break-word';
      nm.textContent = c.power; div.appendChild(nm);
    }
    
    if (!got && (tab === 'rare' || tab === 'epic')) {
      const cost = 4;
      const can = tab === 'rare' ? ((st.stars||0) >= cost) : ((st.shinyStars||0) >= cost);
      if (can) {
        const btn = document.createElement('button');
        btn.style.cssText = 'border:none;border-radius:10px;padding:6px 8px;font-family:Nunito,sans-serif;font-weight:800;font-size:11px;cursor:pointer;margin-top:8px;background:#FFF8E1;color:#F9A825';
        btn.innerHTML = (tab === 'rare' ? '⭐' : '🌟') + ' ' + cost + ' → Открыть!';
        btn.onclick = (e) => { e.stopPropagation(); spendStars(tab, i, cost); };
        div.appendChild(btn);
      } else {
        const price = document.createElement('div');
        price.style.cssText = 'font-size:11px;font-weight:700;color:#bbb;margin-top:6px;text-align:center';
        price.innerHTML = (tab === 'rare' ? '⭐' : '🌟') + ' ' + cost;
        div.appendChild(price);
      }
    }
    if (tab === 'legend' && !got) {
      const hint = document.createElement('div'); hint.style.cssText = 'font-size:11px;font-weight:700;color:#aaa;margin-top:6px;text-align:center'; hint.innerText = 'Собери всех персонажей!'; div.appendChild(hint);
    }
    grid.appendChild(div);
  });
  cont.appendChild(grid);
}

function spendStars(tab, idx, cost) {
  if (tab === 'rare') {
    if ((st.stars||0) < cost || (st.gotRare||[]).includes(idx)) return;
    st.stars -= cost;
    if (!st.gotRare) st.gotRare = [];
    st.gotRare.push(idx);
    save();
    celebrate('⭐', RARE[idx].power + ' открыта!', RARE[idx].name + ' теперь в твоей коллекции!', RARE[idx].img, 'rare');
  } else if (tab === 'epic') {
    if ((st.shinyStars||0) < cost || (st.gotEpic||[]).includes(idx)) return;
    st.shinyStars -= cost;
    if (!st.gotEpic) st.gotEpic = [];
    st.gotEpic.push(idx);
    save();
    celebrate('🌟', EPIC[idx].power + ' открыта!', EPIC[idx].name + ' теперь в твоей коллекции!', EPIC[idx].img, 'epic');
  }
  checkLegendary();
  renderGallery(tab);
}

window.showGallery = function() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('galleryScreen').style.display = 'block';
  renderGallery('base');
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', i===0));
};
window.hideGallery = function() {
  document.getElementById('galleryScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  render();
};

function checkBtn() {
  const n = document.getElementById('nameInput').value.trim();
  const k = document.getElementById('nickInput').value.trim();
  document.getElementById('startBtn').disabled = !(n && k);
}
let _ac = 0;
const _at = setInterval(() => { checkBtn(); if (++_ac >= 20) clearInterval(_at); }, 200);

window.startGame = function() {
  const name = document.getElementById('nameInput').value.trim();
  const nick = document.getElementById('nickInput').value.trim();
  if (!name || !nick) return;
  playerKey = (name + '_' + nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
  localStorage.setItem('as_who', JSON.stringify({name, nick}));
  
  if (!load()) st = freshState();
  st.name = name; st.nick = nick;
  save();
  
  sound('start');
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  render();
};

window.changeName = function() {
  localStorage.removeItem('as_who');
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('nameScreen').style.display = 'block';
  document.getElementById('nameInput').value = '';
  document.getElementById('nickInput').value = '';
  checkBtn();
};

// 🔹 ГЛАВНОЕ ИСПРАВЛЕНИЕ: инициализация при загрузке страницы
document.addEventListener('DOMContentLoaded', function() {
  const _who = localStorage.getItem('as_who');
  if (_who) {
    try {
      const d = JSON.parse(_who);
      if (d.name && d.nick) {
        document.getElementById('nameInput').value = d.name;
        document.getElementById('nickInput').value = d.nick;
        checkBtn();
        
        playerKey = (d.name + '_' + d.nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
        if (load()) {
          // Если состояние загрузилось — сразу показываем игру
          document.getElementById('nameScreen').style.display = 'none';
          document.getElementById('gameScreen').style.display = 'block';
          render();
        }
      }
    } catch(e) { console.error('Init error:', e); }
  }
});
</script>
