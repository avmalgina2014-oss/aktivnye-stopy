<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Активные Стопы</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:32px;padding:24px 20px;max-width:420px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);text-align:center}
h1{font-family:'Fredoka One',cursive;font-size:26px;color:#2d2d2d;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:20px;font-weight:700}
.btn{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:16px;padding:13px 24px;font-family:'Fredoka One',cursive;font-size:19px;cursor:pointer;width:100%;transition:transform .15s;box-shadow:0 4px 16px rgba(102,126,234,.4);margin-top:8px}
.btn:hover{transform:translateY(-2px)}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-green{background:linear-gradient(135deg,#2E7D32,#4CAF50);box-shadow:0 4px 16px rgba(46,125,50,.4)}
.btn-gold {background:linear-gradient(135deg,#F9A825,#FF6F00);box-shadow:0 4px 16px rgba(249,168,37,.4)}
.btn-star {background:linear-gradient(135deg,#F9A825,#FFB300);box-shadow:0 4px 16px rgba(249,168,37,.3)}
.btn-shiny{background:linear-gradient(135deg,#FF6F00,#FF8F00);box-shadow:0 4px 16px rgba(255,111,0,.3)}
.field-label{font-size:12px;font-weight:800;color:#888;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;text-align:left}
.field-input{width:100%;border:3px solid #e0e4ef;border-radius:14px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:17px;font-weight:700;outline:none;text-align:center;margin-bottom:14px;transition:border-color .2s}
.field-input:focus{border-color:#667eea}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.rank-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:20px;font-family:'Fredoka One',cursive;font-size:14px}
.rank-novice {background:#e8f5e9;color:#2E7D32}
.rank-student{background:linear-gradient(135deg,#FFF8E1,#FFE082);color:#F57F17}
.rank-pro    {background:linear-gradient(135deg,#E3F2FD,#90CAF9);color:#1565C0}
.rank-master {background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff}
.keys-wallet{display:flex;gap:12px;background:#f5f5f5;border-radius:40px;padding:6px 16px}
.wallet-slot{display:flex;align-items:center;gap:5px;font-family:'Fredoka One',cursive;font-size:18px}
.wallet-slot.star {color:#F9A825}
.wallet-slot.shiny{color:#FF6F00}
.greeting{font-size:18px;font-weight:900;color:#2d2d2d;margin-bottom:4px}
.progress-text{font-size:13px;color:#888;font-weight:700;margin-bottom:12px;line-height:1.7}
.keys-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.key-slot{aspect-ratio:1;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;border:3px dashed #e0e4ef;background:#f9f9f9;transition:all .4s ease}
.key-slot.filled{border:3px solid gold;background:linear-gradient(135deg,#fffde7,#fff9c4);box-shadow:0 4px 12px rgba(255,215,0,.4);animation:popIn .5s ease}
@keyframes popIn{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
.char-wrap{border-radius:18px;overflow:hidden;margin-bottom:12px;display:none;background:#f5f5f5}
.char-wrap img{width:100%;height:200px;object-fit:contain;display:block}
.char-wrap.show{display:block;animation:zoomIn .6s ease}
@keyframes zoomIn{from{transform:scale(.5);opacity:0}to{transform:scale(1);opacity:1}}
.cooldown-msg{background:#f0f4ff;border-radius:14px;padding:12px 16px;font-size:13px;font-weight:700;color:#667eea;display:none;margin-top:8px;line-height:1.6}
.cooldown-time{font-family:'Fredoka One',cursive;font-size:22px;display:block;margin-top:4px;color:#4a5568}
.info-box{background:#fffde7;border-radius:14px;padding:10px 14px;font-size:12px;font-weight:700;color:#F57F17;margin-top:8px;display:none;text-align:center;line-height:1.6}
.collection-bar{margin-top:14px;border-top:2px solid #f0f0f0;padding-top:12px;cursor:pointer}
.collection-bar:hover .col-title{color:#667eea}
.col-title{font-family:'Fredoka One',cursive;font-size:15px;color:#888;transition:color .2s}
.change-name{font-size:11px;color:#ccc;margin-top:10px;cursor:pointer;font-weight:700}
.change-name:hover{color:#667eea}
#galleryScreen{display:none}
.gallery-tabs{display:flex;gap:0;margin-bottom:16px;border-bottom:2px solid #e0e4ef}
.tab-btn{flex:1;background:none;border:none;padding:10px 4px;font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;color:#aaa;cursor:pointer;transition:all .2s;border-bottom:3px solid transparent;margin-bottom:-2px}
.tab-btn.active{color:#667eea;border-bottom-color:#667eea}
.gallery-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:14px}
.g-item{border-radius:18px;border:2px solid #e8e8e8;background:#f0f0f0;padding:0;text-align:center;overflow:hidden;display:flex;flex-direction:column;transition:all .3s;min-height:170px}
.g-item.got{background:#fff;box-shadow:0 4px 14px rgba(0,0,0,.1);border-color:transparent}
.g-item.locked{padding:20px 8px;align-items:center;justify-content:center;min-height:170px}
.g-item .g-img{width:100%}
.g-item .g-img img{width:100%;height:150px;object-fit:cover;display:block}
.g-item .g-name{font-family:'Fredoka One',cursive;font-size:17px;padding:8px 8px 12px;line-height:1.2}
.g-item .g-q{font-size:44px;color:#ddd;margin-bottom:6px}
.rarity-label{font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px;margin-top:6px;display:inline-block}
.rarity-base    {background:#e8f5e9;color:#2E7D32}
.rarity-rare    {background:#FFF8E1;color:#F9A825}
.rarity-epic    {background:#FFF3E0;color:#FF6F00}
.rarity-legendary{background:linear-gradient(135deg,#FF6F00,#F9A825);color:#fff}
.celebration{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.8);z-index:100;align-items:center;justify-content:center;padding:20px}
.celebration.show{display:flex}
.celeb-box{background:#fff;border-radius:32px;padding:28px 24px;text-align:center;max-width:340px;width:100%;animation:zoomIn .4s ease}
.celeb-emoji{font-size:60px;display:block;margin-bottom:10px}
.celeb-title{font-family:'Fredoka One',cursive;font-size:24px;color:#2d2d2d;margin-bottom:6px}
.celeb-img{width:100%;max-height:160px;object-fit:contain;border-radius:14px;margin:10px 0;display:none}
.celeb-text{font-size:14px;color:#888;font-weight:700;margin-bottom:18px}
.day-badge{background:#eef2ff;border-radius:40px;padding:6px 14px;font-size:13px;font-weight:800;color:#667eea;display:inline-block;margin-bottom:12px}
</style>
</head>
<body>

<div class="card" id="nameScreen">
  <h1>👣 Активные Стопы</h1>
  <div class="subtitle">Собери все суперсилы!</div>
  <div class="field-label">Твоё имя</div>
  <input class="field-input" id="nameInput" placeholder="Например: Саша" maxlength="15">
  <div class="field-label">Придумай ник</div>
  <input class="field-input" id="nickInput" placeholder="Например: Ракета 🚀" maxlength="20">
  <button class="btn" id="startBtn" onclick="startGame()" disabled>Вперёд! 🚀</button>
</div>

<div class="card" id="gameScreen" style="display:none">
  <div class="top-bar">
    <div id="rankBadge" class="rank-badge rank-novice">🌱 НОВИЧОК</div>
    <div class="keys-wallet">
      <div class="wallet-slot star">⭐ <span id="starCount">0</span></div>
      <div class="wallet-slot shiny">🌟 <span id="shinyCount">0</span></div>
    </div>
  </div>
  <div class="greeting" id="greeting">Привет!</div>
  <div class="day-badge" id="dayBadge">День 1</div>
  <div class="progress-text" id="progressText"></div>
  <div class="keys-grid" id="keysGrid"></div>
  <div class="char-wrap" id="charWrap"><img id="charImg" src="" alt=""></div>
  <button class="btn btn-green" id="claimBtn" onclick="doWorkout()">Я сделал(а) зарядку! 🏃</button>
  <div class="cooldown-msg" id="cooldown"></div>
  <div class="info-box" id="infoBox"></div>
  <div class="collection-bar" onclick="showGallery()"><div class="col-title">🏅 Моя коллекция →</div></div>
  <div class="change-name" onclick="changeName()">Это не я → сменить имя</div>
</div>

<div class="card" id="galleryScreen">
  <h1 style="margin-bottom:12px">🏅 Моя коллекция</h1>
  <div class="gallery-tabs">
    <button class="tab-btn active" onclick="switchTab('base',this)">Базовые</button>
    <button class="tab-btn" onclick="switchTab('rare',this)">Редкие</button>
    <button class="tab-btn" onclick="switchTab('epic',this)">Эпические</button>
    <button class="tab-btn" onclick="switchTab('legend',this)">Легенда</button>
  </div>
  <div id="galleryContent"></div>
  <button class="btn" onclick="hideGallery()">← Назад</button>
</div>

<div class="celebration" id="celebration">
  <div class="celeb-box">
    <span class="celeb-emoji" id="celebEmoji">🎉</span>
    <div class="celeb-title" id="celebTitle"></div>
    <img class="celeb-img" id="celebImg" src="" alt="">
    <div class="celeb-text" id="celebText"></div>
    <button class="btn" onclick="closeCeleb()">Ура! 🎉</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// ПЕРСОНАЖИ
// ═══════════════════════════════════════════════════
const BASE = [
  {animal:"🐆",power:"Скорость",      name:"Гепард",   color:"#E07000",img:"gepard.png"   },
  {animal:"🐦",power:"Лёгкость",      name:"Колибри",  color:"#00ACC1",img:"kolibri.png"  },
  {animal:"🐜",power:"Сила",          name:"Муравей",  color:"#CC0000",img:"muravey.png"  },
  {animal:"🦩",power:"Баланс",        name:"Фламинго", color:"#E91E8C",img:"flamingo.png" },
  {animal:"🦥",power:"Восстановление",name:"Ленивец",  color:"#2E7D32",img:"lenivec.png"  },
  {animal:"🐒",power:"Координация",   name:"Обезьяна", color:"#8D6E63",img:"obeziana.png" },
  {animal:"🐫",power:"Выносливость",  name:"Верблюд",  color:"#D4A373",img:"verblyud.png" },
  {animal:"🐱",power:"Гибкость",      name:"Кошка",    color:"#FF9800",img:"koshka.png"   },
];
const RARE = [
  {animal:"🦘",power:"Прыгучесть",  name:"Кенгуру", color:"#FF5722",img:"kenguru.png"},
  {animal:"🐙",power:"Цепкость",    name:"Осьминог",color:"#7B1FA2",img:"osminog.png"},
  {animal:"🦀",power:"Устойчивость",name:"Краб",    color:"#D32F2F",img:"krab.png"   },
  {animal:"🐌",power:"Чуткость",    name:"Улитка",  color:"#4CAF50",img:"ulitka.png" },
];
const EPIC = [
  {animal:"🦄",power:"Суперлёгкость",name:"Единорог",color:"#E040FB",img:"edinorog.png"},
  {animal:"🐉",power:"Суперсила",    name:"Дракон",  color:"#F44336",img:"drakon.png" },
];
const LEGEND = {animal:"🔥",power:"Возрождение",name:"Феникс",color:"#FF6F00",img:"feniks.png"};

// ═══════════════════════════════════════════════════
// ЛОГИКА ДНЕЙ (56 дней: 1-56)
// 1-4 → ключи, 5-6 → звезда ⭐, 7 → сияющая 🌟
// ═══════════════════════════════════════════════════
function getDayType(dayNum) {
  if (dayNum < 1 || dayNum > 56) return 'extra';
  const pos = ((dayNum - 1) % 7) + 1;
  if (pos >= 1 && pos <= 4) return 'key';
  if (pos === 5 || pos === 6) return 'star';
  if (pos === 7) return 'shiny';
  return 'extra';
}

let state = {};
let playerKey = '';

function freshState(name, nick) {
  return {
    name: name,
    nick: nick,
    totalDays: 0,
    keyStep: 0,
    currentBaseIdx: Math.floor(Math.random() * BASE.length),
    stars: 0,
    shinyStars: 0,
    gotBase: [],
    gotRare: [],
    gotEpic: [],
    gotLegend: false,
    lastClaim: null,
    weeksPlayed: 0,
  };
}

function save() { if(playerKey) localStorage.setItem('as_'+playerKey, JSON.stringify(state)); }
function load() {
  const raw = localStorage.getItem('as_'+playerKey);
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    state = data;
    if (!state.gotBase) state.gotBase = [];
    if (!state.gotRare) state.gotRare = [];
    if (!state.gotEpic) state.gotEpic = [];
    if (state.gotLegend === undefined) state.gotLegend = false;
    if (state.keyStep === undefined) state.keyStep = 0;
    if (state.stars === undefined) state.stars = 0;
    if (state.shinyStars === undefined) state.shinyStars = 0;
    if (state.currentBaseIdx === undefined || state.currentBaseIdx === null) state.currentBaseIdx = 0;
    if (state.totalDays === undefined) state.totalDays = 0;
    return true;
  } catch(e) { return false; }
}

function randomAvailableBase() {
  const available = BASE.map((_,i)=>i).filter(i=>!state.gotBase.includes(i));
  if(available.length === 0) return 0;
  return available[Math.floor(Math.random() * available.length)];
}

function getRank() {
  const weeks = Math.floor(state.totalDays / 7);
  if(weeks >= 8) return {label:'👑 МАСТЕР', cls:'rank-master'};
  if(weeks >= 6) return {label:'⚡ ПРОФИ', cls:'rank-pro'};
  if(weeks >= 3) return {label:'📖 УЧЕНИК', cls:'rank-student'};
  return {label:'🌱 НОВИЧОК', cls:'rank-novice'};
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const sounds = {
      start: [[440,.12],[550,.12],[660,.12]],
      key: [[880,0.1,'sine']],
      base: [[523,.18],[659,.18],[784,.18],[1047,.18]],
      rare: [[523,.15],[659,.15],[784,.15]],
      epic: [[659,.2],[880,.2],[1047,.2]],
      legend: [[262,.2],[330,.2],[392,.2],[523,.2],[659,.2],[784,.2]],
    };
    const seq = sounds[type];
    if(!seq) return;
    seq.forEach(([f,dt,sh],i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type=sh||'sine';
      const t=ctx.currentTime+i*(dt||0.15);
      o.frequency.setValueAtTime(f,t);
      g.gain.setValueAtTime(0.25,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
      o.start(t); o.stop(t+0.4);
    });
  } catch(e){}
}

function celebrate(emoji, title, text, img, snd) {
  document.getElementById('celebEmoji').textContent = emoji;
  document.getElementById('celebTitle').textContent = title;
  document.getElementById('celebText').textContent = text;
  const imgEl = document.getElementById('celebImg');
  if(img){ imgEl.src = img; imgEl.style.display = 'block'; }
  else imgEl.style.display = 'none';
  document.getElementById('celebration').classList.add('show');
  if(snd) playSound(snd);
}
window.closeCeleb = function(){ document.getElementById('celebration').classList.remove('show'); render(); };

function checkLegendary() {
  const allBase = state.gotBase.length === BASE.length;
  const allRare = state.gotRare.length === RARE.length;
  const allEpic = state.gotEpic.length === EPIC.length;
  if(!state.gotLegend && allBase && allRare && allEpic) {
    state.gotLegend = true;
    save();
    setTimeout(() => {
      celebrate('🔥', 'ЛЕГЕНДА! ФЕНИКС!', 'Все суперсилы собраны. Ты — легенда!', LEGEND.img, 'legend');
    }, 500);
  }
}

function render() {
  const rank = getRank();
  document.getElementById('rankBadge').className = 'rank-badge '+rank.cls;
  document.getElementById('rankBadge').textContent = rank.label;
  document.getElementById('starCount').textContent = state.stars;
  document.getElementById('shinyCount').textContent = state.shinyStars;
  document.getElementById('greeting').textContent = 'Привет, '+(state.name||'')+'!';
  
  const nextDayNum = state.totalDays + 1;
  const isFinished = state.totalDays >= 56;
  document.getElementById('dayBadge').textContent = isFinished ? '🏆 ВСЕ ДНИ ПРОЙДЕНЫ!' : `День ${nextDayNum} / 56`;
  
  const keysGrid = document.getElementById('keysGrid');
  const charWrap = document.getElementById('charWrap');
  const progressDiv = document.getElementById('progressText');
  const infoBox = document.getElementById('infoBox');
  
  if(isFinished) {
    keysGrid.style.display = 'none';
    charWrap.classList.remove('show');
    progressDiv.innerHTML = '✨ Все суперсилы собраны. Ты — легенда! ✨';
    infoBox.style.display = 'block';
    infoBox.innerHTML = '🏆 Ты прошёл(а) все 56 дней! Поздравляем! 🏆';
    document.getElementById('claimBtn').style.display = 'none';
    return;
  }
  
  const dayType = getDayType(nextDayNum);
  
  // Показываем информацию о сегодняшней награде
  if(dayType === 'star') {
    infoBox.style.display = 'block';
    infoBox.innerHTML = '⭐ Сегодня за зарядку ты получишь ЗВЕЗДУ! ⭐';
    document.getElementById('claimBtn').className = 'btn btn-star';
    document.getElementById('claimBtn').innerHTML = 'Я сделал(а) зарядку! (+⭐)';
  } else if(dayType === 'shiny') {
    infoBox.style.display = 'block';
    infoBox.innerHTML = '🌟 Сегодня за зарядку — СИЯЮЩАЯ ЗВЕЗДА! 🌟';
    document.getElementById('claimBtn').className = 'btn btn-shiny';
    document.getElementById('claimBtn').innerHTML = 'Я сделал(а) зарядку! (+🌟)';
  } else if(dayType === 'key') {
    infoBox.style.display = 'none';
    document.getElementById('claimBtn').className = 'btn btn-green';
    document.getElementById('claimBtn').innerHTML = 'Я сделал(а) зарядку! 🏃';
  } else {
    infoBox.style.display = 'block';
    infoBox.innerHTML = '🎉 Ты молодец! Продолжай в том же духе!';
    document.getElementById('claimBtn').className = 'btn btn-green';
    document.getElementById('claimBtn').innerHTML = 'Я сделал(а) зарядку! 🏃';
  }
  
  // Если набираем ключи
  if(dayType === 'key' && state.keyStep < 4) {
    keysGrid.style.display = 'grid';
    charWrap.classList.remove('show');
    keysGrid.innerHTML = '';
    for(let i=0;i<4;i++) {
      const slot = document.createElement('div');
      slot.className = 'key-slot' + (i < state.keyStep ? ' filled' : '');
      slot.textContent = i < state.keyStep ? '🔑' : '◻️';
      keysGrid.appendChild(slot);
    }
    const left = 4 - state.keyStep;
    progressDiv.innerHTML = `🔐 Собери 4 ключа: ${state.keyStep}/4 • Осталось ${left} ${left===1?'зарядка':'зарядки'}`;
  } 
  else if(state.gotBase.length > 0) {
    // Показываем последнего открытого персонажа
    keysGrid.style.display = 'none';
    charWrap.classList.add('show');
    const lastChar = BASE[state.gotBase[state.gotBase.length-1]];
    document.getElementById('charImg').src = lastChar.img;
    progressDiv.innerHTML = `✨ Суперсила: ${lastChar.power} ✨<br><span style="font-size:12px">${lastChar.name} в твоей команде!</span>`;
  } 
  else {
    keysGrid.style.display = 'none';
    charWrap.classList.remove('show');
    progressDiv.innerHTML = '🏃‍♀️ Начни неделю с зарядки — собирай ключи!';
  }
  
  updateCooldown();
}

function updateCooldown() {
  const btn = document.getElementById('claimBtn');
  const coolDiv = document.getElementById('cooldown');
  
  if(state.totalDays >= 56) {
    btn.style.display = 'none';
    coolDiv.style.display = 'none';
    return;
  }
  
  if(!state.lastClaim) {
    btn.style.display = 'block';
    coolDiv.style.display = 'none';
    return;
  }
  
  const last = new Date(state.lastClaim);
  const next = new Date(last.getTime() + 24*3600*1000);
  if(new Date() >= next) {
    btn.style.display = 'block';
    coolDiv.style.display = 'none';
  } else {
    btn.style.display = 'none';
    coolDiv.style.display = 'block';
    const diff = next - new Date();
    const hours = Math.floor(diff / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    coolDiv.innerHTML = `⏳ Следующая зарядка через <span class="cooldown-time">${hours} ч ${mins} мин</span>`;
  }
}

async function doWorkout() {
  if(state.totalDays >= 56) {
    celebrate('🏆', 'Поздравляем!', 'Все 56 дней пройдены! Ты легенда!', null, 'legend');
    return;
  }
  
  if(state.lastClaim) {
    const last = new Date(state.lastClaim);
    const next = new Date(last.getTime() + 24*3600*1000);
    if(new Date() < next) {
      updateCooldown();
      return;
    }
  }
  
  state.totalDays++;
  state.lastClaim = new Date().toISOString();
  const dayType = getDayType(state.totalDays);
  
  if(dayType === 'key') {
    state.keyStep++;
    playSound('key');
    if(state.keyStep >= 4) {
      // Открываем персонажа
      const openedIdx = state.currentBaseIdx;
      const openedChar = BASE[openedIdx];
      if(!state.gotBase.includes(openedIdx)) state.gotBase.push(openedIdx);
      state.keyStep = 0;
      state.currentBaseIdx = randomAvailableBase();
      save();
      celebrate('🎉', openedChar.power+' открыта!', openedChar.name+' в коллекции!', openedChar.img, 'base');
      checkLegendary();
    } else {
      save();
      celebrate('🔑', `Ключ ${state.keyStep}/4`, `Ещё ${4-state.keyStep} зарядки до суперсилы!`, null, 'key');
    }
  } 
  else if(dayType === 'star') {
    state.stars++;
    save();
    celebrate('⭐', 'Звезда получена!', `У тебя ${state.stars} ⭐. 4 звезды = редкий герой!`, null, 'rare');
  } 
  else if(dayType === 'shiny') {
    state.shinyStars++;
    save();
    celebrate('🌟', 'Сияющая звезда!', `У тебя ${state.shinyStars} 🌟. 4 сияющих = эпический герой!`, null, 'epic');
  }
  
  // Обновляем недели для ранга
  state.weeksPlayed = Math.floor(state.totalDays / 7);
  save();
  render();
}

// ═══════════════════════════════════════════════════
// ГАЛЕРЕЯ
// ═══════════════════════════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery(tab);
}

function renderGallery(tab) {
  const cont = document.getElementById('galleryContent');
  cont.innerHTML = '';
  
  if(tab === 'rare' || tab === 'epic') {
    const info = document.createElement('div');
    info.style.cssText = 'background:#f9f9f9;border-radius:14px;padding:10px 14px;margin-bottom:12px;font-size:12px;font-weight:700;color:#666;line-height:1.9';
    info.innerHTML = tab==='rare' ? `⭐ 4 звезды → 1 редкий персонаж<br>У тебя: ⭐ ${state.stars}` : `🌟 4 сияющих → 1 эпический<br>У тебя: 🌟 ${state.shinyStars}`;
    cont.appendChild(info);
  }
  
  const chars = tab==='base' ? BASE : tab==='rare' ? RARE : tab==='epic' ? EPIC : [LEGEND];
  const grid = document.createElement('div'); grid.className = 'gallery-grid';
  
  chars.forEach((c,i)=>{
    let got = false;
    if(tab==='legend') got = state.gotLegend;
    else if(tab==='base') got = state.gotBase.includes(i);
    else if(tab==='rare') got = state.gotRare.includes(i);
    else if(tab==='epic') got = state.gotEpic.includes(i);
    
    const div = document.createElement('div');
    div.className = 'g-item ' + (got ? 'got' : 'locked');
    
    const area = document.createElement('div'); area.className = 'g-img';
    if(got) {
      const img = document.createElement('img'); img.src = c.img; img.alt = c.power;
      img.onerror = ()=>{img.style.display='none';area.innerHTML='<span style="font-size:48px">'+c.animal+'</span>';};
      area.appendChild(img);
    } else {
      area.innerHTML = '<span class="g-q">❓</span>';
    }
    div.appendChild(area);
    
    if(got) {
      const nm = document.createElement('div'); nm.className = 'g-name'; nm.style.color = c.color; nm.textContent = c.power;
      div.appendChild(nm);
    }
    
    if(!got && (tab==='rare' || tab==='epic')) {
      const cost = 4;
      const have = tab==='rare' ? state.stars : state.shinyStars;
      const icon = tab==='rare' ? '⭐' : '🌟';
      if(have >= cost) {
        const buyBtn = document.createElement('button');
        buyBtn.style.cssText = 'border:none;border-radius:12px;padding:8px 14px;font-family:Nunito,sans-serif;font-weight:800;font-size:12px;cursor:pointer;margin-top:8px;background:#FFF8E1;color:#F9A825';
        buyBtn.innerHTML = icon+' '+cost+' → Открыть!';
        buyBtn.onclick = (e) => {
          e.stopPropagation();
          if(tab==='rare' && state.stars >= 4 && !state.gotRare.includes(i)) {
            state.stars -= 4;
            state.gotRare.push(i);
            save();
            celebrate('⭐', c.power+' открыта!', c.name+' теперь в коллекции!', c.img, 'rare');
            renderGallery(tab);
            render();
            checkLegendary();
          } else if(tab==='epic' && state.shinyStars >= 4 && !state.gotEpic.includes(i)) {
            state.shinyStars -= 4;
            state.gotEpic.push(i);
            save();
            celebrate('🌟', c.power+' открыта!', c.name+' в твоей команде!', c.img, 'epic');
            renderGallery(tab);
            render();
            checkLegendary();
          }
        };
        div.appendChild(buyBtn);
      } else {
        const p = document.createElement('div');
        p.style.cssText = 'font-size:11px;font-weight:700;color:#bbb;margin-top:6px;text-align:center';
        p.textContent = icon+' '+have+'/'+cost;
        div.appendChild(p);
      }
    }
    
    if(!got && tab==='legend') {
      const h = document.createElement('div'); h.style.cssText = 'font-size:11px;font-weight:700;color:#aaa;margin-top:6px;text-align:center';
      h.textContent = 'Собери всех персонажей!';
      div.appendChild(h);
    }
    
    if(!got) {
      const rl = document.createElement('span'); rl.className = 'rarity-label rarity-'+tab;
      const labels = {base:'базовый',rare:'редкий',epic:'эпический',legend:'легендарный'};
      rl.textContent = labels[tab];
      div.appendChild(rl);
    }
    grid.appendChild(div);
  });
  cont.appendChild(grid);
}

window.showGallery = function() {
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('galleryScreen').style.display = 'block';
  renderGallery('base');
};
window.hideGallery = function() {
  document.getElementById('galleryScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  render();
};
window.switchTab = switchTab;

// ═══════════════════════════════════════════════════
// СТАРТ
// ═══════════════════════════════════════════════════
function checkBtn() {
  const name = document.getElementById('nameInput').value.trim();
  const nick = document.getElementById('nickInput').value.trim();
  document.getElementById('startBtn').disabled = !(name && nick);
}

window.startGame = function() {
  const name = document.getElementById('nameInput').value.trim();
  const nick = document.getElementById('nickInput').value.trim();
  if(!name || !nick) return;
  playerKey = (name+'_'+nick).toLowerCase().replace(/[^a-zа-яё0-9]/gi, '_');
  
  if(!load()) {
    state = freshState(name, nick);
  } else {
    state.name = name;
    state.nick = nick;
  }
  save();
  
  playSound('start');
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('gameScreen').style.display = 'block';
  render();
};

window.changeName = function() {
  localStorage.removeItem('as_'+playerKey);
  document.getElementById('gameScreen').style.display = 'none';
  document.getElementById('nameScreen').style.display = 'block';
  document.getElementById('nameInput').value = '';
  document.getElementById('nickInput').value = '';
  checkBtn();
};

// Восстановление прошлого входа
const savedWho = localStorage.getItem('as_who');
if(savedWho) {
  try {
    const d = JSON.parse(savedWho);
    if(d.name && d.nick) {
      document.getElementById('nameInput').value = d.name;
      document.getElementById('nickInput').value = d.nick;
      checkBtn();
    }
  } catch(e) {}
}

setInterval(checkBtn, 200);
</script>
